<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>画像をBASE64に変換</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 24px;
      color: #111827;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 16px;
    }

    input {
      margin-bottom: 20px;
    }

    .preview {
      margin: 20px 0;
      padding: 16px;
      background: #f9fafb;
      border-radius: 16px;
      text-align: center;
    }

    .preview img {
      max-width: 100%;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    textarea {
      width: 100%;
      height: 260px;
      margin-top: 16px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 12px;
      font-size: 13px;
      font-family: monospace;
      resize: vertical;
    }

    .note {
      margin-top: 12px;
      color: #6b7280;
      font-size: 14px;
    }

    .btn {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 16px;
      background: #111827;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      border: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>画像をBASE64に変換</h1>
    <input type="file" id="fileInput" accept="image/*" />
    
    <div class="preview" id="previewBox">
      <p>ここに画像プレビューが表示されます</p>
    </div>

    <button class="btn" id="copyBtn">BASE64をコピー</button>
    <textarea id="output" placeholder="ここに data:image/png;base64,... が表示されます"></textarea>
    <p class="note">画像を選ぶと、自動でBASE64へ変換されます。</p>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const previewBox = document.getElementById("previewBox");
    const output = document.getElementById("output");
    const copyBtn = document.getElementById("copyBtn");

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        const base64 = e.target.result;
        output.value = base64;
        previewBox.innerHTML = `<img src="${base64}" alt="preview">`;
      };

      reader.readAsDataURL(file);
    });

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(output.value);
        alert("BASE64をコピーしました");
      } catch (e) {
        alert("コピーできませんでした");
      }
    });
  </script>
</body>
</html>
