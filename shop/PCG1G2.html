<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G1 G2 Mock</title>
    <style>
        :root {
            --bg: #f6f1e8;
            --panel: rgba(255, 252, 247, 0.94);
            --text: #2f241c;
            --muted: #7a6a5d;
            --accent: #b86d3c;
            --accent-deep: #8f4e23;
            --shadow: 0 18px 40px rgba(74, 49, 30, 0.12);
            --radius-lg: 28px;
            --radius-md: 18px;
            --radius-sm: 14px;

            --box-bg: #fff1f0;
            --box-text: #ff8acb;
            --button-bg: #fff6f6;
            --button-text: #e68ab8;
            --button-border: #ffc7ee;
            --line: rgba(255, 255, 255, 0.72);
            --shadow-soft: 0 1.125rem 2.5rem rgba(105, 26, 78, 0.07);
            --shadow-strong: 0 1.5rem 3.75rem rgba(105, 26, 78, 0.1);
            --gm-bg: #fbf7f2;
            --gm-panel: #ffffff;
            --gm-ink: #a86b8d;
            --gm-muted: rgba(168, 107, 141, 0.5);
            --gm-soft: rgba(168, 107, 141, 0.08);
            --gm-line: rgba(168, 107, 141, 0.14);
            --gm-hover: var(--button-text);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
            color: var(--text);
            background: transparent;
        }

        .shell {
            min-height: 100vh;
            padding: 16px 20px 48px;
        }

        .frame {
            max-width: 1680px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid rgba(216, 203, 184, 0.75);
            border-radius: 36px;
            box-shadow: var(--shadow);
            overflow: hidden;
            backdrop-filter: blur(12px);
        }

        .layout {
            min-height: 720px;
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            align-items: start;
            align-content: start;
            align-content: start;
        }

        .layout.is-g2-active {
            grid-template-columns: 260px minmax(0, 1fr);
        }

        .g1-panel,
        .g2-panel {
            padding: 28px;
        }

        .g2-panel.is-hidden {
            display: none;
        }

        .g1-panel {
            background: rgba(250, 245, 237, 0.82);
            border-bottom: 1px solid rgba(216,203,184,.85);
        }

        .g1-home {
            display: grid;
            grid-template-columns: 240px minmax(0, 1fr);
            gap: 26px;
            align-items: start;
            align-content: start;
        }

        .g1-home.is-brand-select-hidden {
            grid-template-columns: minmax(0, 1fr);
        }

        .g1-home.is-brand-select-hidden .g1-brand-panel {
            display: none;
        }

        .g1-brand-panel {
            position: relative;
            display: grid;
            gap: 12px;
            padding: 18px;
            border-radius: 24px;
            border: 1px solid rgba(216,203,184,.9);
            background: rgba(255,255,255,.76);
            box-shadow: 0 10px 26px rgba(74, 49, 30, 0.06);
        }

        .g1-brand-panel.is-returning {
            animation: brandPanelReturn 2.4s cubic-bezier(.16,.84,.2,1) forwards;
        }

        .g1-brand-panel.is-returning-start {
            opacity: 0;
            transform: translateX(-42px);
        }

        .g1-brand-panel.is-hidden-during-return {
            opacity: 0;
            visibility: hidden;
        }

        .brand-return-overlay {
            position: fixed;
            z-index: 70;
            pointer-events: none;
            animation: brandPanelReturn 2.4s cubic-bezier(.16,.84,.2,1) forwards;
        }

        .brand-return-overlay::after {
            content: "";
            position: absolute;
            inset: 10px -18px 10px 10px;
            border-radius: 20px;
            background: linear-gradient(90deg, rgba(184,109,60,.22), rgba(184,109,60,.08) 48%, rgba(184,109,60,0));
            filter: blur(12px);
            pointer-events: none;
            animation: brandPanelTrail 2.4s ease forwards;
        }

        .g1-brand-panel.is-returning::after {
            content: "";
            position: absolute;
            inset: 10px -18px 10px 10px;
            border-radius: 20px;
            background: linear-gradient(90deg, rgba(184,109,60,.22), rgba(184,109,60,.08) 48%, rgba(184,109,60,0));
            filter: blur(12px);
            pointer-events: none;
            animation: brandPanelTrail 2.4s ease forwards;
        }

        .layout.is-g2-active .g1-brand-panel {
            display: none;
        }

        .g1-brand-panel strong {
            font-size: 12px;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--accent-deep);
        }

        .g1-brand-options {
            display: grid;
            gap: 8px;
        }

        .g1-brand-chip {
              display: block;
              width: 100%;
              padding: 0;
              border: 1px solid rgba(184,109,60,.14);
              border-radius: 18px;
              background: transparent;
              color: var(--text);
              font: inherit;
              cursor: pointer;
              overflow: hidden;
          }

        .g1-brand-chip.is-active {
            border-color: rgba(184,109,60,.42);
            background: rgba(255,248,240,.96);
            box-shadow: 0 10px 20px rgba(184,109,60,.12);
            transform: translateX(0) scale(1.02);
        }

        .g1-brand-chip.is-active .g1-brand-chip-logo {
              border-color: rgba(184,109,60,.28);
              height: 78px;
          }

        .g1-brand-chip-logo {
              display: block;
              position: relative;
              width: 100%;
              height: 64px;
              background: transparent;
              border: 0;
              overflow: hidden;
          }

        .g1-brand-chip-logo svg {
              display: block;
              width: 100%;
              height: 100%;
              transition: transform .36s cubic-bezier(.2,.82,.24,1);
          }

        .g1-brand-chip.is-active .g1-brand-chip-logo svg {
              transform: scale(1.08);
          }

        .g1-brand-chip {
            transition: transform .36s cubic-bezier(.2,.82,.24,1), box-shadow .36s ease, border-color .36s ease, background .36s ease;
        }

        .g1-brand-chip.is-switching-out {
            transform: translateX(-10px) scale(.98);
            opacity: .7;
        }

        .g1-brand-chip.is-switching-in {
            animation: brandChipIn .52s cubic-bezier(.18,.78,.22,1) forwards;
        }

        .g1-brand-chip-count {
            position: absolute;
            right: 8px;
            bottom: 8px;
            padding: 4px 8px;
            border-radius: 999px;
            background: rgba(255,255,255,.88);
            color: var(--accent-deep);
            font-size: 11px;
            font-weight: 700;
            line-height: 1;
            box-shadow: 0 4px 12px rgba(47, 36, 28, 0.12);
        }

        .g1-content {
            min-width: 0;
        }

        .g2-panel {
            padding-top: 36px;
            background:
                radial-gradient(circle at top right, rgba(184,109,60,.1), transparent 24%),
                linear-gradient(180deg, rgba(255,255,255,.92), rgba(248,242,233,.9));
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 12px;
            margin-bottom: 20px;
        }

        .section-head.is-hidden {
            display: none;
        }

              .back-link,
        .button {
            appearance: none;
            border: 1px solid rgba(184,109,60,.22);
            background: rgba(255,255,255,.86);
            color: var(--accent-deep);
            border-radius: 999px;
            padding: 10px 14px;
            font: inherit;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        #g1BackButton,
        #backButton {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 800;
            transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
        }

        #g1BackButton:hover,
        #backButton:hover {
            transform: translateY(-1px);
            filter: saturate(1.06);
        }

        .back-link.is-hidden {
            display: none;
        }

        .button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff7f0;
        }

        .g1-list {
            display: grid;
            grid-template-columns: repeat(4, minmax(0,1fr));
            gap: 14px;
        }

        .g1-item {
            position: relative;
            width: 100%;
            border: 1px solid transparent;
            border-radius: var(--radius-md);
            padding: 12px;
            background: rgba(255,255,255,.82);
            cursor: pointer;
            text-align: left;
            overflow: visible;
        }

        .g1-item::after {
            content: "";
            position: absolute;
            inset: 10px;
            border-radius: calc(var(--radius-md) - 4px);
            background: linear-gradient(90deg, rgba(184,109,60,.18), rgba(184,109,60,.06) 50%, rgba(184,109,60,0));
            opacity: 0;
            transform: translateX(0) scaleX(.92);
            transform-origin: left center;
            pointer-events: none;
            filter: blur(10px);
        }

        .g1-item.is-trailing::after {
            opacity: 1;
            animation: trailFade 1.3s ease forwards;
        }

        .g1-item.is-brand-entering {
            opacity: 0;
            transform: translateY(22px) scale(.97);
            animation: brandSwapIn .58s cubic-bezier(.18,.78,.22,1) forwards;
        }

        .layout.is-g2-active .g1-list {
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .layout.is-g2-active .g1-item {
            border-radius: 16px;
            padding: 10px;
            display: grid;
            grid-template-columns: 72px 1fr;
            gap: 10px;
            align-items: center;
        }

        .g1-thumb {
            aspect-ratio: 1/1;
            width: 100%;
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            background-size: cover;
            background-position: center;
            background-color: #eadfce;
        }

        .layout.is-g2-active .g1-thumb {
            margin-bottom: 0;
        }
.layout.is-g2-active .g1-thumb {
    grid-row: 1 / span 2;
}
.layout.is-g2-active .g1-title {
    align-self: end;
}

.layout.is-g2-active .g1-meta {
    align-self: start;
}
        .layout.is-g2-active .g1-title,
        .layout.is-g2-active .g1-meta,
        .layout.is-g2-active .g1-price,
        .layout.is-g2-active .g1-text {
            grid-column: 2;
        }
.layout.is-g2-active .g1-size,
.layout.is-g2-active .g1-price,
.layout.is-g2-active .g1-text {
    display: none;
}
.g1-item.is-g2-moving .g1-size,
.g1-item.is-g2-moving .g1-price,
.g1-item.is-g2-moving .g1-text {
    display: none;
}
        .g1-title {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .g1-meta {
            font-size: 12px;
            color: var(--muted);
        }

        .g1-price {
            display: block;
            margin-top: 8px;
            font-size: 15px;
            font-weight: 700;
            color: var(--accent-deep);
        }

        .g1-text {
            margin: 8px 0 0;
            font-size: 12px;
            line-height: 1.6;
            color: var(--muted);
        }

        .g2-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .g2-lead {
            display: flex;
            align-items: flex-start;
            gap: 18px;
            flex: 1 1 640px;
            min-width: 0;
        }

        .g2-target {
            width: 132px;
            flex: 0 0 132px;
            border-radius: 20px;
            border: 1px dashed rgba(184,109,60,.32);
            background: rgba(255,255,255,.58);
            padding: 10px;
        }

        .g2-target-thumb {
            aspect-ratio: 1/1;
            width: 100%;
            border-radius: 14px;
            background: #eadfce center / cover no-repeat;
        }

        .g2-target-copy {
            margin-top: 8px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
        }

        .g2-target-copy strong {
            display: block;
            color: var(--accent-deep);
            font-size: 13px;
            margin-bottom: 2px;
        }

        .g2-copy strong {
            display: block;
            font-size: 14px;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--accent-deep);
            margin-bottom: 6px;
        }

        .g2-copy h3 {
            margin: 0 0 6px;
            font-size: clamp(34px,4.8vw,58px);
            line-height: 1.02;
        }

        .g2-copy p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
            font-size: 15px;
            max-width: 760px;
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(184,109,60,.1);
            color: var(--accent-deep);
            font-size: 14px;
            font-weight: 700;
        }

        .brand-bar {
            position: relative;
            z-index: 20;
            width: 100%;
            min-height: 2rem;
            margin: 0 auto 0;
            padding: 1.25rem 2rem;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 22.5rem;
            grid-template-areas:
                "copy logo"
                "links links";
            gap: 0.125rem 2.125rem;
            align-items: start;
            align-content: start;
            overflow: visible;
            background: #fff;
            color: var(--gm-ink);
            border: 1px solid rgba(216, 203, 184, 0.75);
            border-radius: 36px;
        }

        .brand-left {
            display: contents;
        }

        .shop-copy {
            grid-area: copy;
            min-width: 0;
            display: grid;
            gap: 0.5rem;
            padding-left: 1.375rem;
            border-left: 0.0625rem solid var(--gm-line);
        }

        .shop-eyebrow {
            width: fit-content;
            max-width: 100%;
            font-size: 0.6875rem;
            line-height: 1;
            font-weight: 700;
            letter-spacing: 0.22em;
            color: var(--gm-ink);
            white-space: nowrap;
            text-transform: uppercase;
            padding: 0.4375rem 0.625rem 0.375rem;
            background: var(--box-bg);
            border: 0.0625rem solid var(--button-border);
            border-radius: 999rem;
        }

        .shop-message {
            margin: 0;
            font-family: "Hiragino Mincho ProN", "Yu Mincho", "Yu Gothic", "Hiragino Sans", "Meiryo", serif;
            font-size: clamp(0.8125rem, 2.1vw, 2.25rem);
            line-height: 1.18;
            font-weight: 500;
            letter-spacing: 0.045em;
            white-space: nowrap;
            color: var(--gm-ink);
        }

        .shop-subline {
            font-size: clamp(0.75rem, 0.9vw, 0.9375rem);
            line-height: 1.75;
            letter-spacing: 0.055em;
            color: var(--gm-muted);
            max-width: 35rem;
        }

        .brand-links {
            grid-area: links;
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            justify-content: center;
            gap: 0.625rem;
            margin-top: 0.5rem;
            padding-top: 0.125rem;
            font-family: "Helvetica Neue", Arial, "Yu Gothic", "Hiragino Sans", sans-serif;
        }

        .brand-link {
            appearance: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 1 1 0;
            min-height: 3.25rem;
            padding: 0 clamp(0.375rem, 0.9vw, 0.875rem);
            border: 0;
            background: color-mix(in srgb, var(--gm-ink) 62%, #ffffff);
            color: rgba(92, 52, 74, 0.92);
            font: inherit;
            font-size: clamp(0.6875rem, 1.08vw, 1rem);
            font-weight: 700;
            letter-spacing: 0.08em;
            text-decoration: none;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
        }

        .brand-link-label {
            pointer-events: none;
        }

        .brand-link-dropdown {
            display: none;
        }

        .brand-logo-wrap {
            grid-area: logo;
            width: 100%;
            height: 7.375rem;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            min-width: 0;
        }

        .brand-logo {
            display: block;
            width: min(29.375rem, 100%);
            max-height: 7.875rem;
            object-fit: contain;
        }

        .brand-logo-placeholder {
            width: 100%;
            max-width: 21.25rem;
            height: 5.5rem;
            display: grid;
            place-items: center;
            font-size: 0.9375rem;
            font-weight: 500;
            letter-spacing: 0.22em;
            opacity: 0.58;
            color: var(--gm-muted);
        }

        .brand-logo.is-hidden,
        .brand-logo-placeholder.is-hidden {
            display: none !important;
        }

    .g2-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0,1fr));
    gap: 22px;
}

        .card {
            border-radius: 28px;
            border: 1px solid rgba(216,203,184,.9);
            background: rgba(255,255,255,.92);
            overflow: hidden;
            transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
        }

        .card.is-selected {
            border-color: rgba(184,109,60,.72);
            background: rgba(255,248,240,.98);
            box-shadow: 0 16px 34px rgba(184,109,60,.18);
            transform: translateY(-2px);
        }

        .card.is-dealing {
            opacity: 0;
            transform: translateX(54px) translateY(-6px) rotate(2.5deg) scale(.98);
            animation: dealCard .9s cubic-bezier(.18,.78,.22,1) forwards;
        }

        .card-media {
            aspect-ratio: 1/1;
            background-size: cover;
            background-position: center;
            background-color: #eadfce;
        }

        .card-body {
            display: grid;
            gap: 12px;
            padding: 18px;
        }

        .card-kicker {
            font-size: 12px;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--accent-deep);
        }

        .card-title {
            margin: 0;
            font-size: 20px;
        }

        .card-text {
            margin: 0;
            font-size: 15px;
            line-height: 1.7;
            color: var(--muted);
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-size: 15px;
        }

        .tag {
            display: inline-flex;
            padding: 7px 12px;
            border-radius: 999px;
            background: #f3ebe0;
            color: var(--accent-deep);
            font-size: 12px;
            font-weight: 700;
        }

        @keyframes brandPanelBreath {
            0%,
            100% {
                background-position:
                    0% 50%,
                    0 0,
                    0 0;
            }

            50% {
                background-position:
                    100% 50%,
                    0 0,
                    0 0;
            }
        }

        @keyframes copyBlockIn {
            from {
                opacity: 0;
                transform: translateY(0.625rem);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes copyLineIn {
            from {
                opacity: 0;
                transform: translateY(0.5rem);
                filter: blur(0.25rem);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @keyframes copyMainIn {
            from {
                opacity: 0;
                transform: translateY(0.75rem);
                letter-spacing: 0.09em;
                filter: blur(0.3125rem);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                letter-spacing: 0.04em;
                filter: blur(0);
            }
        }

        @keyframes linkRiseIn {
            from {
                opacity: 0;
                transform: translateY(0.75rem);
                filter: blur(0.3125rem);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @keyframes dropdownOpenBounce {
            0% {
                transform: translateY(0) scaleY(0.02);
            }

            54% {
                transform: translateY(0) scaleY(1.16);
            }

            74% {
                transform: translateY(0) scaleY(0.97);
            }

            100% {
                transform: translateY(0) scaleY(1);
            }
        }

        @keyframes dropdownItemPop {
            0% {
                opacity: 0;
                transform: translateY(-0.5rem) scale(0.96);
            }

            70% {
                opacity: 1;
                transform: translateY(0.0625rem) scale(1.025);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes trailFade {
            0% {
                opacity: .9;
                transform: translateX(0) scaleX(.92);
            }
            55% {
                opacity: .42;
                transform: translateX(-40px) scaleX(1.38);
            }
            100% {
                opacity: 0;
                transform: translateX(-68px) scaleX(1.78);
            }
        }

        @keyframes dealCard {
            0% {
                opacity: 0;
                transform: translateX(54px) translateY(-6px) rotate(2.5deg) scale(.98);
            }
            100% {
                opacity: 1;
                transform: translateX(0) translateY(0) rotate(0) scale(1);
            }
        }

        @keyframes brandSwapIn {
            0% {
                opacity: 0;
                transform: translateY(22px) scale(.97);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes brandChipIn {
            0% {
                opacity: .65;
                transform: translateX(12px) scale(.98);
            }
            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        @keyframes brandPanelReturn {
            0% {
                opacity: 0;
                transform: translateX(-42px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes brandPanelTrail {
            0% {
                opacity: .95;
                transform: translateX(0) scaleX(.92);
            }
            60% {
                opacity: .38;
                transform: translateX(-18px) scaleX(1.18);
            }
            100% {
                opacity: 0;
                transform: translateX(-28px) scaleX(1.34);
            }
        }

        @media (max-width: 980px) {
            .brand-bar {
                grid-template-columns: minmax(0, 1fr) 13.75rem;

        function postBrandBannerToParent(payload) {
            if (window.parent === window) {
                return;
            }

            window.parent.postMessage({
                channel: "PcBrandBoxHtml",
                ...payload
            }, "*");
        }

        function brandBannerValueOf(...values) {
            for (const value of values) {
                const text = String(value || "").trim();
                if (text) {
                    return text;
                }
            }

            return "";
        }

        function toStaticWixImageUrl(value) {
            const src = String(value || "").trim();
            if (!src) {
                return "";
            }

            if (!src.startsWith("wix:image://v1/")) {
                return src;
            }

            const body = src.replace("wix:image://v1/", "");
            const mediaId = body.split("/")[0];

            if (!mediaId) {
                return "";
            }

            return `https://static.wixstatic.com/media/${mediaId}`;
        }

        function applyBrandBannerCssVars(payload) {
            const boxBg = brandBannerValueOf(payload.colorBoxBg, defaultBrandBannerPayload.colorBoxBg);
            const boxText = brandBannerValueOf(payload.colorBoxText, defaultBrandBannerPayload.colorBoxText);
            const backBg = brandBannerValueOf(payload.colorBackBg, defaultBrandBannerPayload.colorBackBg);
            const backBorder = brandBannerValueOf(payload.colorBackBorder, defaultBrandBannerPayload.colorBackBorder);
            const backText = brandBannerValueOf(payload.colorBackText, defaultBrandBannerPayload.colorBackText);
            const buttonBg = brandBannerValueOf(payload.colorButtonBg, defaultBrandBannerPayload.colorButtonBg);
            const buttonText = brandBannerValueOf(payload.colorButtonText, defaultBrandBannerPayload.colorButtonText);
            const buttonBorder = brandBannerValueOf(payload.colorButtonBorder, defaultBrandBannerPayload.colorButtonBorder);

            document.documentElement.style.setProperty("--box-bg", boxBg);
            document.documentElement.style.setProperty("--box-text", boxText);
            document.documentElement.style.setProperty("--button-bg", buttonBg);
            document.documentElement.style.setProperty("--button-text", buttonText);
            document.documentElement.style.setProperty("--button-border", buttonBorder);
            document.documentElement.style.setProperty("--gm-bg", backBg);
            document.documentElement.style.setProperty("--gm-panel", boxBg);
            document.documentElement.style.setProperty("--gm-ink", boxText);
            document.documentElement.style.setProperty("--gm-muted", backText);
            document.documentElement.style.setProperty("--gm-soft", backBorder);
            document.documentElement.style.setProperty("--gm-line", buttonBorder);
            document.documentElement.style.setProperty("--gm-hover", buttonText);
        }

         function getBrandBannerDummyDropdownItems(action) {

                ]
            };

            return dummyMap[action] || ["DETAIL", "MORE"];

        function makeBrandBannerButton({ action, label, url }) {
            const normalizedUrl = String(url || "").trim();
            if (!normalizedUrl) {
                return null;
            }

            const link = document.createElement("a");
            link.className = "brand-link";
            link.href = normalizedUrl;
            link.dataset.action = action;
            link.dataset.url = normalizedUrl;

            const labelEl = document.createElement("span");
            labelEl.className = "brand-link-label";
            labelEl.textContent = label;

            const dropdown = document.createElement("span");
            dropdown.className = "brand-link-dropdown";
            dropdown.setAttribute("aria-hidden", "true");

            const dropdownItems = getBrandBannerDummyDropdownItems(action);
            const dropdownHeight = dropdownItems.length * 2.625 + 3.25;

            link.style.setProperty("--dropdown-height", `${dropdownHeight}rem`);

            dropdownItems.forEach((text) => {
                const item = document.createElement("span");
                item.className = "brand-link-dropdown-item";

                const currentShopName = String(currentBrandBannerPayload.brand || "")
                    .replace("Rasiːm", "Rasi:m")
                    .trim()
                    .toLowerCase();

                const dropdownShopName = String(text || "")
                    .replace("Rasiːm", "Rasi:m")
                    .trim()
                    .toLowerCase();

                if (action === "link" && currentShopName && dropdownShopName === currentShopName) {
                    item.classList.add("is-current-shop");
                    item.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" aria-hidden="true"><path d="M9.2 16.6 4.9 12.3l1.7-1.7 2.6 2.6 8.2-8.2 1.7 1.7-9.9 9.9z" fill="currentColor"/></svg><span>${text}</span><span class="brand-link-current-badge">NOW</span>`;
                } else {
                    item.innerHTML = text;
                }

                dropdown.appendChild(item);
            });

            let closeTimer = null;

            function openMenu() {
                if (closeTimer) {
                    window.clearTimeout(closeTimer);
                    closeTimer = null;
                }

                link.classList.remove("is-closing");
                link.classList.add("is-open");
                dropdown.setAttribute("aria-hidden", "false");
            }

            function closeMenu() {
                if (closeTimer) {
                    window.clearTimeout(closeTimer);
                }

                link.classList.remove("is-open");
                link.classList.add("is-closing");
                dropdown.setAttribute("aria-hidden", "true");

                closeTimer = window.setTimeout(() => {
                    link.classList.remove("is-closing");
                    closeTimer = null;
                }, 520);
            }

            link.appendChild(labelEl);
            link.appendChild(dropdown);

            link.addEventListener("mouseenter", openMenu);
            link.addEventListener("mouseleave", closeMenu);
            link.addEventListener("focus", openMenu);
            link.addEventListener("blur", closeMenu);

            link.addEventListener("click", (event) => {
                event.preventDefault();

                if (normalizedUrl === "#") {
                    return;
                }

                postBrandBannerToParent({
                    type: "brandBoxClick",
                    action,
                    url: normalizedUrl,
                    brand: String(currentBrandBannerPayload.brand || "")
                });
            });

            return link;
        }

        pendingExternalState = payload;
        return;
    }

    if (payload.backButtonStyle) {
        externalBackButtonStyle = payload.backButtonStyle;
    }

        externalHideBrandSelect = payload.hideBrandSelect;
    }

    if (FORCE_MAIN_GALLERY_HELMETTY_MODE) {

    const hasBrand =
        typeof payload.brand === "string" &&
        payload.brand.trim() !== "";
    const hasBrandKey =
        typeof payload.brandKey === "string" &&
        payload.brandKey.trim() !== "";

    const hasBrands = Array.isArray(payload.brands) && payload.brands.length > 0;

            isBrandSwitching = false;
            brandSwitchIncomingKey = "";
        }, 700);
    }

                const button = document.createElement("button");
                button.type = "button";
                button.className = "g1-brand-chip" + (brand.key === activeBrandKey ? " is-active" : "");
                if (brand.key === brandSwitchIncomingKey) {
                    button.classList.add("is-switching-in");
                }
                button.innerHTML = `<span class="g1-brand-chip-logo">${brand.logoSvg}</span>`;
                button.addEventListener("click", () => {
                    if (externalBridgeEnabled) {
                        if (brand.key === activeBrandKey) {
                            return;
                        }
                        debugToParent("HTML switchBrand click", {
                            current: activeBrandKey,
                            next: brand.key,
                            name: brand.name
                        });
                        animateExternalBrandSwitch(brand);
                        return;
                    }
                    animateBrandSwitch(brand.key);
                });
                brandList.appendChild(button);
            });
        }

        function renderG1() {
            g1List.innerHTML = "";

            const categories = getCurrentCategories();

            if (!categories.length) {
                const empty = document.createElement("div");
                empty.style.padding = "24px";
                empty.style.border = "1px dashed rgba(184,109,60,.35)";
                empty.style.borderRadius = "18px";
                empty.style.background = "rgba(255,255,255,.72)";
                empty.style.color = "var(--muted)";
                empty.style.fontWeight = "700";
                empty.textContent = "カテゴリデータ待機中";
                g1List.appendChild(empty);
                return;
            }

            categories.forEach((category) => {
                const categoryKey = String(category.key || category.slug || category.id || "").trim();
                const categoryName = String(category.name || category.title || category.label || categoryKey || "").trim();
                const categoryThumb = String(category.thumb || category.image || category.src || category.url || "").trim();
                const categoryCount = Number(category.count || category.itemCount || category.items?.length || 0);
                const categorySizeLabel = String(category.sizeLabel || category.size || category.sizes || "").trim();

                const categoryPrice = String(
                    category.price ||
                    category.formattedPrice ||
                    category.priceText ||
                    category.previewPrice ||
                    category.lowestPrice ||
                    category.minPrice ||
                    category.displayPrice ||
                    category.preview?.price ||
                    category.preview?.formattedPrice ||
                    category.preview?.priceText ||
                    category.items?.[0]?.price ||
                    category.items?.[0]?.formattedPrice ||
                    category.items?.[0]?.priceText ||
                    ""
                ).trim();

                const categoryText = String(
                    category.preview?.text ||
                    category.preview?.description ||
                    category.text ||
                    category.description ||
                    category.items?.[0]?.text ||
                    category.items?.[0]?.description ||
                    ""
                ).trim();

                const normalizedCategory = {
                    ...category,
                    key: categoryKey,
                    name: categoryName,
                    thumb: categoryThumb,
                    count: categoryCount,
                    sizeLabel: categorySizeLabel,
                    preview: {
                        ...(category.preview || {}),
                        price: categoryPrice,
                        text: categoryText
                    }
                };

                const button = document.createElement("button");
                button.type = "button";
                button.dataset.key = categoryKey;
                button.className = "g1-item" + (categoryKey === activeCategoryKey ? " is-active" : "");
                button.innerHTML = `
                    <div class="g1-thumb" style="background-image:url('${categoryThumb}')"></div>
                    <span class="g1-title">${categoryName}</span>
                    <span class="g1-meta">
    <span class="g1-colors">${categoryCount} colors</span>
    <span class="g1-size">${categorySizeLabel}</span>
</span>
                    <span class="g1-price">${categoryPrice}</span>
                    <p class="g1-text">${categoryText}</p>
                `;
                if (isBrandSwitching && !activeCategoryKey) {
                    button.classList.add("is-brand-entering");
                    button.style.animationDelay = `${g1List.children.length * 110}ms`;
                }
                button.addEventListener("click", () => {
                    if (isAnimating) {
                        return;
                    }

                    if (!categoryKey) {
                        console.warn("[mainGalleryHtml][renderG1] categoryKey is empty", category);
                        return;
                    }

                    if (externalBridgeEnabled) {
                        externalG2Items = [];
                        animateCategoryToG2(button, normalizedCategory);
                        postToParent({ type: "openCategory", categoryKey });
                        return;
                    }

                    animateCategoryToG2(button, normalizedCategory);
                });
                g1List.appendChild(button);
            });
        }

        function syncG2Target(category) {
            if (!category) {
                g2TargetThumb.style.backgroundImage = "";
                g2TargetCopy.innerHTML = "<strong>-</strong><span>Selected category</span>";
                return;
            }

            const itemCount = externalBridgeEnabled && activeCategoryKey === category.key && externalG2Items.length
                ? externalG2Items.length
                : category.count;
            g2TargetThumb.style.backgroundImage = `url('${category.thumb}')`;
            g2TargetCopy.innerHTML = `<strong>${category.name}</strong><span>${itemCount} colors</span>`;
        }

        function pulseTrail(element) {
            element.classList.remove("is-trailing");
            void element.offsetWidth;
            element.classList.add("is-trailing");
            window.setTimeout(() => {
                element.classList.remove("is-trailing");
            }, 1300);
        }

        function animateBrandSwitch(nextBrandKey) {
            if (isAnimating || activeCategoryKey || activeBrandKey === nextBrandKey) {
                return;
            }

            const currentItems = Array.from(g1List.querySelectorAll(".g1-item"));
            const currentBrandButtons = Array.from(brandList.querySelectorAll(".g1-brand-chip"));

            currentItems.forEach((item, index) => {
                item.style.transition = `transform 0.36s ease, opacity 0.36s ease`;
                item.style.transitionDelay = `${index * 60}ms`;
                item.style.transform = "translateY(-18px) scale(.98)";
                item.style.opacity = "0";
            });

            currentBrandButtons.forEach((button) => {
                button.classList.add("is-switching-out");
            });

            window.setTimeout(() => {
                activeBrandKey = nextBrandKey;
                brandSwitchIncomingKey = nextBrandKey;
                isBrandSwitching = true;
                renderBrandList();
                renderG1();
                window.setTimeout(() => {
                    isBrandSwitching = false;
                    brandSwitchIncomingKey = "";
                }, 700);
            }, 260);
        }

        function animateExternalBrandSwitch(brand) {
            if (isAnimating || activeCategoryKey || activeBrandKey === brand.key) {
                return;
            }

            const currentItems = Array.from(g1List.querySelectorAll(".g1-item"));
            const currentBrandButtons = Array.from(brandList.querySelectorAll(".g1-brand-chip"));

            currentItems.forEach((item, index) => {
                item.style.transition = "transform 0.36s ease, opacity 0.36s ease";
                item.style.transitionDelay = `${index * 60}ms`;
                item.style.transform = "translateY(-18px) scale(.98)";
                item.style.opacity = "0";
            });

            currentBrandButtons.forEach((button) => {
                button.classList.add("is-switching-out");
            });

            window.setTimeout(() => {
                activeBrandKey = brand.key;
                externalBrandName = brand.name || brand.key;
                brandSwitchIncomingKey = brand.key;
                isBrandSwitching = true;
                activeCategoryKey = "";
                externalCategories = [];
                externalG2Items = [];
                debugToParent("HTML switchBrand postMessage", { type: "switchBrand", brand: brand.key });
                postToParent({ type: "switchBrand", brand: brand.key });
                renderBrandList();
                renderG1();
                renderG2();
            }, 260);
        }

function animateCategoryToG2(sourceButton, category) {
    if (isAnimating) {
        return;
    }
    isAnimating = true;
        document.querySelectorAll(".brand-return-overlay").forEach(el => el.remove());
    const buttons = Array.from(g1List.querySelectorAll(".g1-item"));
            buttons.forEach((button) => {
                button.classList.remove("is-brand-entering");
                button.style.animationDelay = "";
                button.style.animation = "none";
            });
            void g1List.offsetWidth;
            buttons.forEach((button) => {
                button.style.animation = "";
            });
            const firstRects = new Map(
                buttons.map((button) => [button.dataset.key, button.getBoundingClientRect()])
            );

            activeCategoryKey = category.key;
            syncG2Target(category);

            g2Panel.classList.remove("is-hidden");
            g2Panel.style.visibility = "hidden";
            layout.classList.add("is-g2-active");
            g1Head.classList.remove("is-hidden");
            g1BackButton.classList.remove("is-hidden");
            renderG2(false);

            buttons.forEach((button) => {
                if (button === sourceButton) {
                    return;
                }

                const firstRect = firstRects.get(button.dataset.key);
                const lastRect = button.getBoundingClientRect();
                const deltaX = firstRect.left - lastRect.left;
                const deltaY = firstRect.top - lastRect.top;

                if (!deltaX && !deltaY) {
                    return;
                }

                button.style.transition = "none";
                button.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

                requestAnimationFrame(() => {
                    pulseTrail(button);
                    button.style.transition = "transform 0.82s cubic-bezier(.2,.82,.24,1)";
                    button.style.transform = "translate(0, 0)";
                });
            });

            const sourceRect = sourceButton.getBoundingClientRect();
            const targetRect = g2Target.getBoundingClientRect();
            const placeholder = document.createElement("div");

            placeholder.style.width = `${sourceRect.width}px`;
            placeholder.style.height = `${sourceRect.height}px`;
            placeholder.style.borderRadius = getComputedStyle(sourceButton).borderRadius;

            sourceButton.after(placeholder);

            sourceButton.style.position = "fixed";
            sourceButton.style.left = `${sourceRect.left}px`;
            sourceButton.style.top = `${sourceRect.top}px`;
            sourceButton.style.width = `${sourceRect.width}px`;
            sourceButton.style.height = `${sourceRect.height}px`;
            sourceButton.style.margin = "0";
            sourceButton.style.zIndex = "50";
            sourceButton.style.pointerEvents = "none";
            sourceButton.style.transition = "left 0.8s cubic-bezier(.2,.82,.24,1), top 0.8s cubic-bezier(.2,.82,.24,1), width 0.8s cubic-bezier(.2,.82,.24,1), height 0.8s cubic-bezier(.2,.82,.24,1), box-shadow 0.8s ease";
            sourceButton.style.boxShadow = "0 22px 48px rgba(74, 49, 30, 0.22)";
sourceButton.classList.add("is-g2-moving");
document.body.appendChild(sourceButton);
            g2Target.style.visibility = "hidden";

            requestAnimationFrame(() => {
                pulseTrail(sourceButton);
                sourceButton.style.left = `${targetRect.left}px`;
                sourceButton.style.top = `${targetRect.top}px`;
                sourceButton.style.width = `${targetRect.width}px`;
                sourceButton.style.height = `${targetRect.height}px`;
            });

  sourceButton.addEventListener("transitionend", () => {
    placeholder.remove();
    sourceButton.classList.remove("is-g2-moving");
    sourceButton.remove();
    g2Target.style.visibility = "";
    g2Panel.style.visibility = "";
    isAnimating = false;
    renderG1();
    renderG2(true);
    if (pendingExternalState) {
        const nextState = pendingExternalState;
        pendingExternalState = null;
        applyExternalState(nextState);
    }
}, { once: true });
        }

        function animateBackToG1() {
            if (isAnimating || !activeCategoryKey) {
                return;
            }

            isAnimating = true;

            const currentKey = activeCategoryKey;
            const currentCategory = getCurrentCategories().find((category) => category.key === currentKey);
            const currentButtons = Array.from(g1List.querySelectorAll(".g1-item"));
            const firstRects = new Map(
                currentButtons.map((button) => [button.dataset.key, button.getBoundingClientRect()])
            );
            const targetRect = g2Target.getBoundingClientRect();

                activeCategoryKey = "";
            g1BrandPanel.classList.add("is-hidden-during-return");
            renderG1();
            renderG2();

            const nextButtons = Array.from(g1List.querySelectorAll(".g1-item"));

            nextButtons.forEach((button) => {
                if (button.dataset.key === currentKey) {
                    return;
                }

                const firstRect = firstRects.get(button.dataset.key);
                const lastRect = button.getBoundingClientRect();

                if (!firstRect || !lastRect) {
                    return;
                }

                const deltaX = firstRect.left - lastRect.left;
                const deltaY = firstRect.top - lastRect.top;

                if (!deltaX && !deltaY) {
                    return;
                }

                button.style.transition = "none";
                button.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

                requestAnimationFrame(() => {
                    pulseTrail(button);
                    button.style.transition = "transform 0.82s cubic-bezier(.2,.82,.24,1)";
                    button.style.transform = "translate(0, 0)";
                });
            });

            const targetButton = nextButtons.find((button) => button.dataset.key === currentKey);

            if (!currentCategory || !targetButton) {
                isAnimating = false;
                renderG1();
                renderG2();
                return;
            }

            const lastRect = targetButton.getBoundingClientRect();
            const mover = targetButton.cloneNode(true);

            mover.style.position = "fixed";
            mover.style.left = `${targetRect.left}px`;
            mover.style.top = `${targetRect.top}px`;
            mover.style.width = `${targetRect.width}px`;
            mover.style.height = `${targetRect.height}px`;
            mover.style.margin = "0";
            mover.style.zIndex = "50";
            mover.style.pointerEvents = "none";
            mover.style.transition = "left 0.8s cubic-bezier(.2,.82,.24,1), top 0.8s cubic-bezier(.2,.82,.24,1), width 0.8s cubic-bezier(.2,.82,.24,1), height 0.8s cubic-bezier(.2,.82,.24,1), box-shadow 0.8s ease";
            mover.style.boxShadow = "0 22px 48px rgba(74, 49, 30, 0.22)";

            targetButton.style.visibility = "hidden";
            document.body.appendChild(mover);

            requestAnimationFrame(() => {
                pulseTrail(mover);
                mover.style.left = `${lastRect.left}px`;
                mover.style.top = `${lastRect.top}px`;
                mover.style.width = `${lastRect.width}px`;
                mover.style.height = `${lastRect.height}px`;
            });

            mover.addEventListener("transitionend", () => {
                mover.remove();
                targetButton.style.visibility = "";
                isAnimating = false;

                renderG1();
                renderG2();
                renderBrandList();
                applyBrandSelectVisibility();

                if (externalHideBrandSelect) {
                    g1BrandPanel.classList.remove("is-hidden-during-return");
                    return;
                }

                const brandRect = g1BrandPanel.getBoundingClientRect();
                const brandOverlay = g1BrandPanel.cloneNode(true);

                brandOverlay.className = "g1-brand-panel brand-return-overlay";
                brandOverlay.style.left = `${brandRect.left}px`;
                brandOverlay.style.top = `${brandRect.top}px`;
                brandOverlay.style.width = `${brandRect.width}px`;
                brandOverlay.style.height = `${brandRect.height}px`;

                document.body.appendChild(brandOverlay);
                window.setTimeout(() => {
                    brandOverlay.remove();
                    g1BrandPanel.classList.remove("is-hidden-during-return");
                }, 2520);
            }, { once: true });
        }

         function renderG2(withDeal = false) {
            const current = getCurrentCategories().find((category) => category.key === activeCategoryKey);
            if (!current) {
                g2Panel.classList.add("is-hidden");
                g2Panel.style.visibility = "";
                g1Head.classList.add("is-hidden");
                g1BackButton.classList.add("is-hidden");
                layout.classList.remove("is-g2-active");
                syncG2Target(null);
                return;
            }

            layout.classList.add("is-g2-active");
            g2Panel.classList.remove("is-hidden");
            g1Head.classList.remove("is-hidden");
            g1BackButton.classList.remove("is-hidden");
            syncG2Target(current);
            g2Title.textContent = current.name;
            g2Description.textContent = current.description;
            g2Grid.innerHTML = "";

            const itemsToRender = externalBridgeEnabled && activeCategoryKey === current.key && externalG2Items.length
                ? externalG2Items
                : (current.items || []);

            itemsToRender.forEach((item) => {
                const article = document.createElement("article");
                article.className = withDeal ? "card is-dealing" : "card";
                if (withDeal) {
                    article.style.animationDelay = `${220 + (g2Grid.children.length * 220)}ms`;
                }
                article.innerHTML = `
                    <div class="card-media" style="background-image:url('${item.image || item.src || ""}')"></div>
                    <div class="card-body">
                        <span class="card-kicker">${item.brand || ""}</span>
                        <h4 class="card-title">${item.title || ""}</h4>
                        <p class="card-text">${item.text || item.description || ""}</p>
                        <div class="card-footer">
                            <strong>${item.price || item.formattedPrice || item.priceText || item.priceTaxIn || item.description || ""}</strong>
                            <span class="tag">${item.tag || ""}</span>
                        </div>
                    </div>
                `;

                article.style.cursor = "pointer";
                article.addEventListener("click", () => {
                    if (!externalBridgeEnabled) {
                        return;
                    }

                    postToParent({
                        type: "openItem",
                        item: {
                            title: String(item.title || "").trim(),
                            brand: String(item.brand || "").trim(),
                            slug: String(item.slug || "").trim(),
                            productId: String(item.productId || "").trim(),
                            categoryKey: String(activeCategoryKey || "").trim(),
                            priceText: String(item.price || item.formattedPrice || item.priceText || item.priceTaxIn || "").trim(),
                            image: String(item.image || item.src || "").trim()
                        }
                    });
                });

                g2Grid.appendChild(article);
            });
        }

        function backToG1() {
            if (externalBridgeEnabled) {
                if (externalBackSyncTimer) {
                    window.clearTimeout(externalBackSyncTimer);
                }
                animateBackToG1();
                externalBackSyncTimer = window.setTimeout(() => {
                    externalBackSyncTimer = 0;
                    externalG2Items = [];
                    postToParent({ type: "backToG1" });
                }, 820);
                return;
            }
            animateBackToG1();
        }

        backButton.addEventListener("click", backToG1);
        g1BackButton.addEventListener("click", backToG1);

        renderBrandBanner(defaultBrandBannerPayload);

        postBrandBannerToParent({ type: "ready" });
        postToParent({ type: "ready" });
        renderBrandList();
        renderG1();
        renderG2();
        applyBrandSelectVisibility();
        applyBackButtonStyle();

        console.log("[mainGalleryHtml][initial state]", {
            forceHelmetty: FORCE_MAIN_GALLERY_HELMETTY_MODE,
            externalHideBrandSelect,
            g1HomeHasHiddenClass: g1Home?.classList.contains("is-brand-select-hidden")
        });
    </script>
</body>
</html>
