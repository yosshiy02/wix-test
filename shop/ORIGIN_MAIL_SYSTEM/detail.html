<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メール詳細</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="page-detail">
  <div class="app-shell">
    <header class="subbar">
      <a href="./index.html" class="icon-button icon-button--soft" aria-label="一覧へ戻る">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"/>
        </svg>
      </a>

      <div class="subbar__text">
        <p class="eyebrow">HD ORGIN STYLE MAIL SYSTEM</p>
        <h1 class="shop-name">Rasiːm</h1>
      </div>
    </header>

    <section class="panel">
      <div class="detail-head">
        <span class="badge badge--new">NEW</span>
        <span class="badge badge--store">Rasiːm</span>
      </div>

      <h2 class="detail-subject">商品の在庫確認について</h2>

      <dl class="meta-list">
        <div class="meta-row">
          <dt>差出人</dt>
          <dd>田中 一郎 &lt;tanaka@example.com&gt;</dd>
        </div>
        <div class="meta-row">
          <dt>宛先</dt>
          <dd>rasi-m@hatodaiya.com</dd>
        </div>
        <div class="meta-row">
          <dt>状態</dt>
          <dd>未対応</dd>
        </div>
        <div class="meta-row">
          <dt>担当</dt>
          <dd>未割当</dd>
        </div>
      </dl>

      <div class="message-box">
        <p>お世話になっております。</p>
        <p>今週末に受け取りを予定しております。対象商品の在庫があるかご確認をお願いいたします。</p>
        <p>どうぞよろしくお願いいたします。</p>
      </div>

      <label class="field">
        <span class="field__label">内部メモ</span>
        <textarea class="textarea" rows="5" placeholder="担当者向けメモを入力"></textarea>
      </label>
    </section>

    <div class="bottom-bar">
      <a href="./index.html" class="button button--soft">戻る</a>
      <a href="./reply.html" class="button button--primary">返信する</a>
    </div>
  </div>

  <script src="./js/app.js"></script>
</body>
</html>
