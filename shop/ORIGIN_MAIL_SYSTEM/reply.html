<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>返信</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="page-reply">
  <div class="app-shell">
    <header class="subbar">
      <a href="./detail.html" class="icon-button icon-button--soft" aria-label="詳細へ戻る">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"/>
        </svg>
      </a>

      <div class="subbar__text">
        <p class="eyebrow">HD ORGIN STYLE MAIL SYSTEM</p>
        <h1 class="shop-name">返信</h1>
      </div>
    </header>

    <section class="panel">
      <div class="reply-fixed">
        <div class="reply-fixed__row">
          <span class="reply-fixed__label">From</span>
          <span class="reply-fixed__value">rasi-m@hatodaiya.com</span>
        </div>
        <div class="reply-fixed__row">
          <span class="reply-fixed__label">To</span>
          <span class="reply-fixed__value">tanaka@example.com</span>
        </div>
      </div>

      <label class="field">
        <span class="field__label">件名</span>
        <input class="input" type="text" value="Re: 商品の在庫確認について">
      </label>

      <label class="field">
        <span class="field__label">本文</span>
        <textarea class="textarea textarea--large" rows="10">田中様

お問い合わせありがとうございます。
在庫を確認のうえ、折り返しご連絡いたします。

Rasiːm</textarea>
      </label>
    </section>

    <div class="bottom-bar">
      <a href="./detail.html" class="button button--soft">戻る</a>
      <button class="button button--primary" type="button">送信</button>
    </div>
  </div>

  <script src="./js/app.js"></script>
</body>
</html>
