<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G1 G2 Mock</title>
<style>
    :root {
        --bg: #f6f1e8;
        --panel: rgba(255, 252, 247, 0.94);
        --text: #2f241c;
        --muted: #7a6a5d;
        --accent: #b86d3c;
        --accent-deep: #8f4e23;
        --shadow: 0 4.8% 10.67% rgba(74, 49, 30, 0.12);
        --radius-lg: 7.47%;
        --radius-md: 4.8%;
        --radius-sm: 3.73%;

        --menu-bg: #ffe5e5;
        --menu-text: #c71585;
        --menu-border: #ff00c8;
        --line: rgba(0, 0, 0, 0.08);
    }

    * {
        box-sizing: border-box;
    }

    html {
        height: 100%;
        overscroll-behavior: none;
    }

    body {
        height: 100%;
        margin: 0;
        font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
        color: var(--text);
        background: transparent;
        scrollbar-gutter: stable;
        overflow: hidden;
        overscroll-behavior: none;
    }

    .mobile-brand-box {
        position: sticky;
        top: 0;
        z-index: 100;
        width: 100%;
        display: grid;
        grid-template-columns: 12% minmax(0, 1fr) 30%;
        grid-template-rows: auto;
        align-items: center;
        column-gap: 3%;
        padding: 4.2% 3.2%;
        overflow: visible;
        isolation: isolate;
        background:
            radial-gradient(
                circle at 8% 50%,
                color-mix(in srgb, var(--menu-bg) 58%, transparent),
                transparent 40%
            ),
            linear-gradient(
                135deg,
                color-mix(in srgb, var(--menu-bg) 38%, var(--bg)),
                color-mix(in srgb, var(--menu-border) 18%, var(--menu-bg))
            );
        border-bottom: 0.16em solid color-mix(in srgb, var(--menu-border) 34%, transparent);
    }

    .mobile-brand-box::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background:
            linear-gradient(
                90deg,
                color-mix(in srgb, var(--menu-border) 26%, transparent),
                transparent 42%,
                color-mix(in srgb, var(--menu-bg) 32%, transparent)
            );
        opacity: 0.64;
        pointer-events: none;
    }

    .mobile-brand-box::after {
        content: "";
        position: absolute;
        left: 3.2%;
        right: 3.2%;
        bottom: 0;
        height: 0.12em;
        background:
            linear-gradient(
                90deg,
                transparent,
                color-mix(in srgb, var(--menu-border) 54%, transparent),
                transparent
            );
        pointer-events: none;
    }

    .menu-button {
        grid-column: 3;
        grid-row: 1;
        justify-self: end;
        align-self: end;
        appearance: none;
        position: absolute;
        right: 0;
        bottom: 0;
        z-index: 4;
        width: min(57%, 9.4em);
        height: 5.6em;
        min-width: 0;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: var(--menu-text);
        font: inherit;
        font-size: 60%;
        line-height: 1;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-align: center;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        box-shadow: none;
        transform: translateY(0);
        perspective: 24em;
        transform-style: preserve-3d;
        animation: none;
    }

    .menu-button::before,
    .menu-button::after {
        content: none;
    }

    .menu-door-label {
        position: absolute;
        left: 50%;
        top: -24%;
        z-index: 5;
        display: inline-grid;
        place-items: center;
        min-width: 54%;
        padding: 0.26em 0.48em 0.22em;
        border: 0.08em solid color-mix(in srgb, var(--menu-border) 64%, var(--menu-text));
        border-radius: 999em;
        background:
            linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.86),
                color-mix(in srgb, var(--menu-bg) 72%, #ffffff)
            );
        box-shadow:
            0 0.12em 0.24em rgba(0, 0, 0, 0.14),
            inset 0 0 0 0.06em rgba(255, 255, 255, 0.58);
        transform: translateX(-50%);
        color: var(--menu-text);
        font-size: 86%;
        line-height: 1;
        letter-spacing: 0.16em;
        text-shadow:
            0 0.08em 0.12em rgba(255, 255, 255, 0.74),
            0 0.12em 0.24em rgba(0, 0, 0, 0.08);
        pointer-events: none;
    }

    .menu-door-ground {
        position: absolute;
        left: 8%;
        right: 8%;
        bottom: 0;
        height: 0.12em;
        z-index: 0;
        background:
            linear-gradient(
                90deg,
                transparent,
                color-mix(in srgb, var(--menu-border) 54%, var(--text)),
                transparent
            );
        opacity: 0.62;
        pointer-events: none;
    }

    .menu-door-cover {
        position: absolute;
        left: 4%;
        right: 0;
        bottom: 0;
        height: 100%;
        z-index: 3;
        isolation: isolate;
        border: 0.1em solid rgba(190, 151, 105, 0.32);
        border-radius: 1.9em 1.9em 0.08em 0.08em;
        background:
            linear-gradient(
                180deg,
                #fffdf7 0%,
                #fff8e8 58%,
                #f8ecd2 100%
            );
        box-shadow:
            0 0.34em 0.68em rgba(0, 0, 0, 0.14),
            inset 0 0 0 0.08em rgba(255, 255, 255, 0.72),
            inset 0.18em 0 0 rgba(190, 151, 105, 0.1),
            inset -0.18em 0 0 rgba(190, 151, 105, 0.1);
        transform: none;
        transform-style: preserve-3d;
        pointer-events: none;
    }

    .menu-door-cover::before {
        content: "";
        position: absolute;
        left: 20%;
        right: 20%;
        top: 12%;
        bottom: 0;
        z-index: 1;
        border-radius: 999em 999em 0.08em 0.08em;
        border: 0.12em solid rgba(170, 124, 78, 0.56);
        background:
            linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.18),
                rgba(110, 72, 42, 0.04)
            );
        box-shadow:
            inset 0.14em 0 0 rgba(170, 124, 78, 0.16),
            inset -0.14em 0 0 rgba(170, 124, 78, 0.14),
            inset 0 -0.12em 0.22em rgba(110, 72, 42, 0.08);
    }

    .menu-door-cover::after {
        content: none;
    }

    .menu-house-stairs {
        position: absolute;
        left: 30%;
        right: 24%;
        top: 26%;
        bottom: 10%;
        z-index: 3;
        pointer-events: none;
        opacity: 1;
    }

    .menu-house-stairs::before {
        content: "";
        position: absolute;
        left: 4%;
        right: 0;
        top: 0;
        bottom: 0;
        z-index: 0;
        background:
            linear-gradient(
                135deg,
                #efcfaa 0%,
                #e3b782 52%,
                #cf965b 100%
            );
        opacity: 1;
        clip-path: polygon(0% 100%, 100% 18%, 100% 100%);
        box-shadow:
            inset 0 0.06em 0 rgba(255, 241, 219, 0.62),
            inset 0 -0.08em 0 rgba(128, 79, 36, 0.16);
    }

    .menu-house-stairs span {
        position: absolute;
        height: 0.26em;
        border-radius: 0.08em 0.08em 0.04em 0.04em;
        background:
            linear-gradient(
                180deg,
                #f0b86f 0%,
                #d8893e 58%,
                #bd6d2d 100%
            );
        box-shadow:
            0 0.06em 0.12em rgba(94, 55, 25, 0.28),
            inset 0 0.06em 0 rgba(255, 232, 190, 0.78),
            inset 0 -0.05em 0 rgba(111, 60, 22, 0.22);
        transform-origin: left center;
    }

    .menu-house-stairs span::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: 100%;
        height: 0.34em;
        border-radius: 0 0 0.06em 0.06em;
        background:
            linear-gradient(
                180deg,
                #a85f26 0%,
                #7c431b 100%
            );
        box-shadow:
            inset 0.08em 0 0 rgba(255, 220, 174, 0.16),
            inset 0 -0.05em 0 rgba(67, 32, 12, 0.26);
    }

    .menu-house-stairs span:nth-child(1) {
        left: 4%;
        top: 78%;
        width: 34%;
        opacity: 0.96;
    }

    .menu-house-stairs span:nth-child(2) {
        left: 20%;
        top: 60%;
        width: 34%;
        opacity: 0.9;
    }

    .menu-house-stairs span:nth-child(3) {
        left: 38%;
        top: 42%;
        width: 34%;
        opacity: 0.84;
    }

    .menu-house-stairs span:nth-child(4) {
        left: 56%;
        top: 24%;
        width: 34%;
        opacity: 0.78;
    }

    .menu-inner-door {
        position: absolute;
        left: 20%;
        right: 20%;
        top: 12%;
        bottom: 0;
        z-index: 5;
        border: 0.08em solid rgba(55, 130, 168, 0.68);
        border-radius: 999em 999em 0.08em 0.08em;
        background:
            linear-gradient(
                180deg,
                #bfeeff 0%,
                #7fd1ec 58%,
                #58b8d8 100%
            );
        box-shadow:
            0 0.16em 0.32em rgba(0, 0, 0, 0.12),
            inset 0 0 0 0.08em rgba(255, 255, 255, 0.46),
            inset 0.14em 0 0 rgba(255, 255, 255, 0.2),
            inset -0.14em 0 0 rgba(35, 105, 140, 0.2);
        transform-origin: left center;
        transform: rotateY(0deg);
        transform-style: preserve-3d;
        transition: transform 0.62s cubic-bezier(.2,.7,.1,1.08);
        pointer-events: none;
    }

    .menu-inner-door::before {
        content: "";
        position: absolute;
        inset: 16% 16% 14%;
        border-radius: 999em 999em 0.06em 0.06em;
        border: 0.06em solid rgba(255, 255, 255, 0.5);
        background:
            linear-gradient(
                115deg,
                transparent 0%,
                rgba(255, 255, 255, 0.42) 42%,
                rgba(255, 255, 255, 0.08) 58%,
                transparent 100%
            );
    }

    .menu-inner-door::after {
        content: "";
        position: absolute;
        right: 15%;
        top: 58%;
        width: 0.4em;
        height: 0.4em;
        border-radius: 50%;
        background:
            radial-gradient(
                circle at 35% 32%,
                rgba(255, 255, 255, 0.98),
                #f8b8d9 64%,
                #d36ba7 100%
            );
        box-shadow:
            0 0 0 0.08em rgba(255, 255, 255, 0.42),
            0 0.08em 0.22em rgba(0, 0, 0, 0.2);
    }

    .menu-door-shadow {
        position: absolute;
        left: 20%;
        right: 20%;
        top: 12%;
        bottom: 0;
        z-index: 4;
        border-radius: 999em 999em 0.08em 0.08em;
        background:
            linear-gradient(
                90deg,
                rgba(0, 0, 0, 0.2) 0%,
                rgba(0, 0, 0, 0.12) 38%,
                transparent 82%
            );
        opacity: 0;
        transform-origin: left center;
        transform: rotateY(0deg);
        transition:
            opacity 0.62s cubic-bezier(.2,.7,.1,1.08),
            transform 0.62s cubic-bezier(.2,.7,.1,1.08);
        pointer-events: none;
    }

    .menu-button:active {
        opacity: 0.96;
        transform: translateY(1%);
    }

    .menu-button.is-door-open .menu-inner-door {
        transform: rotateY(-112deg);
    }

    .menu-button.is-door-open .menu-door-shadow {
        opacity: 0.24;
        transform: rotateY(-42deg);
    }

    .brand-area {
        grid-column: 2;
        grid-row: 1;
        justify-self: stretch;
        align-self: center;
        position: relative;
        min-width: 0;
        display: grid;
        align-items: center;
        justify-items: center;
        gap: 0.14em;
        padding: 1.8% 2.4%;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
    }

    .brand-area::before {
        display: none;
    }

    .brand-area::after {
        content: "";
        display: block;
        width: 68%;
        height: 0.08em;
        background:
            linear-gradient(
                90deg,
                transparent,
                color-mix(in srgb, var(--menu-border) 48%, var(--text)),
                transparent
            );
        opacity: 0;
        transform: scaleX(0.12);
        transform-origin: center;
        animation: brandLineEntrance 0.72s ease 0.46s forwards;
        transition:
            width 0.36s ease,
            opacity 0.36s ease,
            transform 0.36s ease;
    }

    .mobile-brand-box.is-menu-active .brand-area::after {
        opacity: 0.38;
        transform: scaleX(0.82);
    }

    .mobile-brand-box.is-scrolled .brand-area::after {
        width: 54%;
        opacity: 0.34;
    }

    .brand-logo-wrap {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: visible;
    }

    .brand-logo {
        display: block;
        width: auto;
        max-width: 68%;
        max-height: 3em;
        object-fit: contain;
        filter:
            drop-shadow(0 0.08em 0.12em rgba(255, 255, 255, 0.72))
            drop-shadow(0 0.12em 0.22em rgba(0, 0, 0, 0.08));
    }

    .brand-text {
        display: block;
        width: 100%;
        color: var(--text);
        font-family:
            "Times New Roman",
            "Yu Mincho",
            "Hiragino Mincho ProN",
            serif;
        line-height: 1;
        font-weight: 600;
        text-align: center;
        text-shadow:
            0 0.08em 0.16em rgba(255, 255, 255, 0.76),
            0 0.12em 0.28em rgba(0, 0, 0, 0.08);
        opacity: 1;
        transform: translateY(0);
        animation: none;
        transition:
            opacity 0.36s ease,
            transform 0.36s ease,
            letter-spacing 0.36s ease;
    }

    .brand-text .brand-line-hd {
        display: block;
        font-size: 74%;
        line-height: 1;
        letter-spacing: 0.34em;
        opacity: 0.82;
        transition:
            letter-spacing 0.36s ease,
            opacity 0.36s ease;
    }

    .brand-text .brand-line-store {
        display: block;
        margin-top: 0.22em;
        font-size: 92%;
        line-height: 1;
        letter-spacing: 0.18em;
        white-space: nowrap;
        transition:
            letter-spacing 0.36s ease,
            opacity 0.36s ease;
    }

    .mobile-brand-box.is-menu-active .brand-text {
        opacity: 0.72;
        transform: translateY(0) scale(0.985);
    }

    .banner-shine {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        overflow: hidden;
    }

    .banner-shine::before {
        content: "";
        position: absolute;
        top: -42%;
        left: -58%;
        width: 38%;
        height: 184%;
        background:
            linear-gradient(
                115deg,
                transparent 0%,
                rgba(255, 255, 255, 0.06) 28%,
                rgba(255, 255, 255, 0.92) 48%,
                rgba(255, 255, 255, 0.22) 62%,
                transparent 100%
            );
        filter: blur(0.035em);
        transform: translateX(0) skewX(-18deg);
        opacity: 0;
    }

    .mobile-brand-box.is-menu-active .banner-shine::before {
        animation: bannerShineRun 0.72s ease-out forwards;
    }

    .mobile-brand-box.is-scrolled .brand-text .brand-line-hd {
        letter-spacing: 0.28em;
        opacity: 0.68;
    }

    .mobile-brand-box.is-scrolled .brand-text .brand-line-store {
        letter-spacing: 0.13em;
        opacity: 0.86;
    }

    .brand-sub {
        display: none;
        width: 100%;
        color: var(--muted);
        font-size: 62%;
        line-height: 1.1;
        letter-spacing: 0.08em;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .mobile-brand-box.logo-missing .brand-logo-wrap {
        display: none;
    }

    .mobile-brand-box.logo-missing .brand-text {
        display: block;
    }

    .mobile-brand-box.has-sub .brand-sub {
        display: block;
    }

    .shell {
        height: 100%;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        padding: 0.6%;
        padding-bottom: 0;
        overflow: hidden;
    }

    .frame {
        width: 100%;
        max-width: 100%;
        height: 100%;
        min-height: 0;
        margin: 0 auto;
        background: var(--panel);
        border: 0;
        border-radius: 1.2%;
        box-shadow: none;
        overflow: hidden;
        backdrop-filter: none;
    }

    body.is-menu-open .frame {
        display: none;
    }

    body.is-menu-open .shell {
        height: auto;
        overflow: hidden;
        display: block;
        overscroll-behavior: none;
    }

    .integrated-mobile-menu {
        display: block;
        width: 100%;
        max-height: 0;
        padding: 0 10px;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        overflow: hidden;
        overscroll-behavior: none;
        background:
            radial-gradient(circle at 18% 10%, rgba(231,183,166,0.22), transparent 34%),
            radial-gradient(circle at 86% 16%, rgba(201,217,200,0.18), transparent 30%),
            linear-gradient(180deg, rgba(255,248,241,0.98), rgba(244,231,217,0.98));
        transition:
            opacity 0.34s ease,
            visibility 0s linear 0.34s;
    }

    body.is-menu-open .integrated-mobile-menu {
        max-height: none;
        padding: 12px 10px 24px;
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        overflow: hidden;
        overscroll-behavior: none;
        transition:
            opacity 0.34s ease,
            visibility 0s linear 0s;
    }

    .integrated-menu-sheet {
        width: 100%;
        border-radius: 22px;
        border: 1px solid rgba(255,255,255,0.72);
        background:
            radial-gradient(circle at top right, rgba(255,255,255,0.68), transparent 28%),
            linear-gradient(180deg, rgba(255,248,241,0.98) 0%, rgba(244,231,217,0.98) 100%);
        box-shadow:
            0 20px 42px rgba(74, 45, 20, 0.16),
            0 8px 18px rgba(74, 45, 20, 0.08);
        overflow: hidden;
        opacity: 0;
        transform: translateX(108%);
        transition:
            transform 0.62s cubic-bezier(.22,1,.36,1),
            opacity 0.34s ease;
        will-change: transform, opacity;
    }

    body.is-menu-open .integrated-menu-sheet {
        opacity: 1;
        transform: translateX(0);
    }

    .integrated-menu-inner {
        padding: 12px 12px 14px;
        overflow: hidden;
        overscroll-behavior: none;
    }

    .integrated-menu-hero {
        position: relative;
        padding: 8px 10px;
        margin-bottom: 12px;
        border-radius: 16px;
        overflow: hidden;
        background:
            linear-gradient(135deg, rgba(243,216,191,0.96) 0%, rgba(255,249,244,0.97) 44%, rgba(231,183,166,0.82) 100%);
        border: 1px solid rgba(210,154,99,0.24);
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,0.86),
            0 10px 20px rgba(165,109,63,0.12);
    }

    .integrated-menu-hero-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        position: relative;
        z-index: 1;
        min-height: 34px;
    }

    .integrated-menu-brand-block {
        min-width: 0;
        flex: 1;
        display: flex;
        align-items: center;
        gap: 9px;
    }

    .integrated-menu-title-mark {
        width: 28px;
        height: 28px;
        border-radius: 10px;
        flex: 0 0 auto;
        background:
            linear-gradient(135deg, rgba(210,154,99,0.26) 0%, rgba(171,109,58,0.18) 100%);
        border: 1px solid rgba(171,109,58,0.14);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,0.72),
            0 6px 12px rgba(165,109,63,0.10);
    }

    .integrated-menu-title-mark svg {
        width: 15px;
        height: 15px;
        stroke: #ab6d3a;
        stroke-width: 1.9;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .integrated-menu-eyebrow {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.12em;
        line-height: 1.1;
        color: #ab6d3a;
        font-weight: 800;
        text-transform: uppercase;
    }

    .integrated-menu-close {
        flex: 0 0 auto;
        width: 32px;
        height: 32px;
        border: 1px solid rgba(171,109,58,0.16);
        background: linear-gradient(180deg, rgba(255,255,255,0.90) 0%, rgba(248,234,220,0.92) 100%);
        border-radius: 11px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,0.86),
            0 8px 16px rgba(165,109,63,0.10);
    }

    .integrated-menu-close-icon {
        position: relative;
        width: 12px;
        height: 12px;
    }

    .integrated-menu-close-icon::before,
    .integrated-menu-close-icon::after {
        content: "";
        position: absolute;
        left: 5px;
        top: 0;
        width: 2px;
        height: 12px;
        background: #6b4a30;
        border-radius: 999px;
    }

    .integrated-menu-close-icon::before {
        transform: rotate(45deg);
    }

    .integrated-menu-close-icon::after {
        transform: rotate(-45deg);
    }

    .integrated-menu-section {
        margin-top: 12px;
    }

    .integrated-menu-section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 0 4px 10px;
    }

    .integrated-menu-section-title {
        margin: 0;
        font-size: 12px;
        line-height: 1.4;
        letter-spacing: 0.18em;
        color: #ab6d3a;
        font-weight: 800;
        text-transform: uppercase;
    }

    .integrated-menu-link-list {
        display: grid;
        gap: 9px;
    }

    .integrated-menu-link-row {
        width: 100%;
        border: 1px solid rgba(210,154,99,0.22);
        border-radius: 16px;
        padding: 10px 11px;
        min-height: 58px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        cursor: pointer;
        text-align: left;
        position: relative;
        overflow: hidden;
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,0.78),

        function syncMobileBrandBoxHeightVar() {
            const rect = mobileBrandBox ? mobileBrandBox.getBoundingClientRect() : null;
            const height = rect ? Math.ceil(rect.height) : 0;
            document.documentElement.style.setProperty("--mobile-brand-box-height", `${height}px`);
        }

        function getElementBottom(selector) {
            const element = document.querySelector(selector);

            if (!element) {
                return 0;
            }

            const rect = element.getBoundingClientRect();
            return Math.ceil(rect.bottom + window.scrollY);
        }

        function getLastElementBottom(selector) {
            const elements = Array.from(document.querySelectorAll(selector));

            if (!elements.length) {
                return 0;
            }

            for (let index = elements.length - 1; index >= 0; index -= 1) {
                const element = elements[index];
                const rect = element.getBoundingClientRect();

                if (rect.width || rect.height) {
                    return Math.ceil(rect.bottom + window.scrollY);
                }
            }

            return 0;
        }

        function getMobileChromeBottomBuffer() {
            const visualViewport = window.visualViewport;
            const visualViewportGap = visualViewport
                ? Math.max(0, window.innerHeight - visualViewport.height - visualViewport.offsetTop)
                : 0;

            return Math.ceil(Math.max(260, visualViewportGap + 160));
        }

        function getMobileMainGalleryRawContentHeight() {
            const brandBoxBottom = getElementBottom(".mobile-brand-box");

            if (activeCategoryKey) {
                return Math.ceil(Math.max(
                    brandBoxBottom,
                    getElementBottom(".g2-topbar"),
                    getElementBottom(".g2-grid"),
                    getLastElementBottom(".g2-grid .card")
                ));
            }

            return Math.ceil(Math.max(
                brandBoxBottom,
                getElementBottom(".g1-brand-panel"),
                getElementBottom(".g1-content"),
                getElementBottom(".g1-list"),
                getLastElementBottom(".g1-list .g1-item")
            ));
        }

        function getMobileMainGalleryContentHeight() {
            const brandBox = document.querySelector(".mobile-brand-box");
            if (document.body.classList.contains("is-menu-open") && brandBox) {
                const brandBoxBottom = getElementBottom(".mobile-brand-box");
                const menuBottom = getElementBottom(".integrated-mobile-menu");
                const height = Math.ceil(Math.max(
                    brandBoxBottom,
                    menuBottom
                ));

                return {
                    rawContentHeight: height,
                    bottomBuffer: 0,
                    contentHeight: height
                };
            }

            const brandBoxBottom = getElementBottom(".mobile-brand-box");

            const rawContentHeight = getMobileMainGalleryRawContentHeight();
            const bottomBuffer = getMobileChromeBottomBuffer();

            return {
                rawContentHeight,
                bottomBuffer,
                contentHeight: rawContentHeight + bottomBuffer
            };
        }

        function postMobileMainGalleryMetrics(reason = "") {
            syncMobileBrandBoxHeightVar();

            const metrics = getMobileMainGalleryContentHeight();
            const contentHeight = metrics.contentHeight;

            if (!contentHeight) {
                return;
            }

            if (Math.abs(contentHeight - __mobileMainGalleryLastHeight) < 4) {
                return;
            }

            __mobileMainGalleryLastHeight = contentHeight;

            postToParent({
                type: "mobileMainGalleryMetrics",
                payload: {
                    reason,
                    contentHeight,
                    rawContentHeight: metrics.rawContentHeight,
                    bottomBuffer: metrics.bottomBuffer,
                    bodyScrollHeight: document.body.scrollHeight,
                    documentScrollHeight: document.documentElement.scrollHeight,
                    innerHeight: window.innerHeight,
                    visualViewportHeight: window.visualViewport ? window.visualViewport.height : 0,
                    visualViewportOffsetTop: window.visualViewport ? window.visualViewport.offsetTop : 0
                }
            });
        }

        function scheduleMobileMainGalleryMetrics(reason = "") {
            if (__mobileMainGalleryMetricsTimer) {
                window.clearTimeout(__mobileMainGalleryMetricsTimer);
            }

            window.requestAnimationFrame(() => {
                __mobileMainGalleryMetricsTimer = window.setTimeout(() => {
                    __mobileMainGalleryMetricsTimer = 0;
                    postMobileMainGalleryMetrics(reason);
                }, 80);
            });
        }

            if (data.type === "setMenuData") {

                if (isBrandSwitching && !activeCategoryKey) {
                    button.classList.add("is-brand-entering");
                    button.style.animationDelay = `${g1List.children.length * 110}ms`;
                }
                button.addEventListener("click", () => {
                    if (isAnimating) {
                        return;
                    }
                    if (externalBridgeEnabled) {
                        externalG2Items = [];
                        animateCategoryToG2(button, category);
                        postToParent({ type: "openCategory", categoryKey: category.key });
                        return;
                    }
                    animateCategoryToG2(button, category);
                });
                g1List.appendChild(button);
            });

            scheduleMobileMainGalleryMetrics("renderG1");
        }

        function syncG2Target(category) {
            if (!category) {
                g2TargetThumb.style.backgroundImage = "";
                g2TargetCopy.innerHTML = "<strong>-</strong><span>Selected category</span>";
                return;
            }

            const itemCount = externalBridgeEnabled && activeCategoryKey === category.key && externalG2Items.length
                ? externalG2Items.length
                : category.count;
            g2TargetThumb.style.backgroundImage = `url('${category.thumb}')`;
            g2TargetCopy.innerHTML = `<strong>${category.name}</strong><span>${itemCount} colors</span>`;
        }

        function pulseTrail(element) {
            element.classList.remove("is-trailing");
            void element.offsetWidth;
            element.classList.add("is-trailing");
            window.setTimeout(() => {
                element.classList.remove("is-trailing");
            }, 1300);
        }

        function animateBrandSwitch(nextBrandKey) {
            if (isAnimating || activeCategoryKey || activeBrandKey === nextBrandKey) {
                return;
            }

            const currentItems = Array.from(g1List.querySelectorAll(".g1-item"));
            const currentBrandButtons = Array.from(brandList.querySelectorAll(".g1-brand-chip"));

            currentItems.forEach((item, index) => {
                item.style.transition = `transform 0.36s ease, opacity 0.36s ease`;
                item.style.transitionDelay = `${index * 60}ms`;
                item.style.transform = "translateY(-18px) scale(.98)";
                item.style.opacity = "0";
            });

            currentBrandButtons.forEach((button) => {
                button.classList.add("is-switching-out");
            });

            window.setTimeout(() => {
                activeBrandKey = nextBrandKey;
                brandSwitchIncomingKey = nextBrandKey;
                isBrandSwitching = true;
                renderBrandList();
                renderG1();
                window.setTimeout(() => {
                    isBrandSwitching = false;
                    brandSwitchIncomingKey = "";
                }, 700);
            }, 260);
        }

        function animateExternalBrandSwitch(brand) {
            if (isAnimating || activeCategoryKey || activeBrandKey === brand.key) {
                return;
            }

            const currentItems = Array.from(g1List.querySelectorAll(".g1-item"));
            const currentBrandButtons = Array.from(brandList.querySelectorAll(".g1-brand-chip"));

            currentItems.forEach((item, index) => {
                item.style.transition = "transform 0.36s ease, opacity 0.36s ease";
                item.style.transitionDelay = `${index * 60}ms`;
                item.style.transform = "translateY(-18px) scale(.98)";
                item.style.opacity = "0";
            });

            currentBrandButtons.forEach((button) => {
                button.classList.add("is-switching-out");
            });

            window.setTimeout(() => {
                activeBrandKey = brand.key;
                externalBrandName = brand.name || brand.key;
                brandSwitchIncomingKey = brand.key;
                isBrandSwitching = true;
                activeCategoryKey = "";
                externalCategories = [];
                externalG2Items = [];
                debugToParent("HTML switchBrand postMessage", { type: "switchBrand", brand: brand.key });
                postToParent({ type: "switchBrand", brand: brand.key });
                renderBrandList();
                renderG1();
                renderG2();
            }, 260);
        }

        function animateCategoryToG2(sourceButton, category) {
            if (isAnimating) {
                return;
            }
            isAnimating = true;
            document.querySelectorAll(".brand-return-overlay").forEach(el => el.remove());

            const buttons = Array.from(g1List.querySelectorAll(".g1-item"));
            buttons.forEach((button) => {
                button.classList.remove("is-brand-entering");
                button.style.animationDelay = "";
                button.style.animation = "none";
            });
            void g1List.offsetWidth;
            buttons.forEach((button) => {
                button.style.animation = "";
            });

            const firstRects = new Map(
                buttons.map((button) => [button.dataset.key, button.getBoundingClientRect()])
            );

            activeCategoryKey = category.key;
            syncG2Target(category);

            g2Panel.classList.remove("is-hidden");
            g2Panel.style.visibility = "hidden";
            layout.classList.add("is-g2-active");
            g1Head.classList.remove("is-hidden");
            g1BackButton.classList.remove("is-hidden");
            renderG2(false);

            buttons.forEach((button) => {
                if (button === sourceButton) {
                    return;
                }

                const firstRect = firstRects.get(button.dataset.key);
                const lastRect = button.getBoundingClientRect();
                const deltaX = firstRect.left - lastRect.left;
                const deltaY = firstRect.top - lastRect.top;

                if (!deltaX && !deltaY) {
                    return;
                }

                button.style.transition = "none";
                button.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

                requestAnimationFrame(() => {
                    pulseTrail(button);
                    button.style.transition = "transform 0.82s cubic-bezier(.2,.82,.24,1)";
                    button.style.transform = "translate(0, 0)";
                });
            });

            const sourceRect = sourceButton.getBoundingClientRect();
            const targetRect = g2Target.getBoundingClientRect();
            const placeholder = document.createElement("div");

            placeholder.style.width = `${sourceRect.width}px`;
            placeholder.style.height = `${sourceRect.height}px`;
            placeholder.style.borderRadius = getComputedStyle(sourceButton).borderRadius;

            sourceButton.after(placeholder);

            sourceButton.style.position = "fixed";
            sourceButton.style.left = `${sourceRect.left}px`;
            sourceButton.style.top = `${sourceRect.top}px`;
            sourceButton.style.width = `${sourceRect.width}px`;
            sourceButton.style.height = `${sourceRect.height}px`;
            sourceButton.style.margin = "0";
            sourceButton.style.zIndex = "50";
            sourceButton.style.pointerEvents = "none";
            sourceButton.style.transition = "left 0.8s cubic-bezier(.2,.82,.24,1), top 0.8s cubic-bezier(.2,.82,.24,1), width 0.8s cubic-bezier(.2,.82,.24,1), height 0.8s cubic-bezier(.2,.82,.24,1), box-shadow 0.8s ease";
            sourceButton.style.boxShadow = "0 22px 48px rgba(74, 49, 30, 0.22)";
            sourceButton.classList.add("is-g2-moving");
            document.body.appendChild(sourceButton);
            g2Target.style.visibility = "hidden";

            requestAnimationFrame(() => {
                pulseTrail(sourceButton);
                sourceButton.style.left = `${targetRect.left}px`;
                sourceButton.style.top = `${targetRect.top}px`;
                sourceButton.style.width = `${targetRect.width}px`;
                sourceButton.style.height = `${targetRect.height}px`;
            });

             sourceButton.addEventListener("transitionend", () => {
                placeholder.remove();
                sourceButton.classList.remove("is-g2-moving");
                sourceButton.remove();
                g2Target.style.visibility = "";
                g2Panel.style.visibility = "";
                g1Panel.classList.add("is-hidden");
                isAnimating = false;
                renderG1();
                renderG2(true);
                if (pendingExternalState) {
                    const nextState = pendingExternalState;
                    pendingExternalState = null;
                    applyExternalState(nextState);
                }
            }, { once: true });
        }

           function animateBackToG1() {
            if (isAnimating || !activeCategoryKey) {
                return;
            }

            isAnimating = true;
            g1Panel.classList.remove("is-hidden");

            const currentKey = activeCategoryKey;
            const currentCategory = getCurrentCategories().find((category) => category.key === currentKey);
            const currentButtons = Array.from(g1List.querySelectorAll(".g1-item"));
            const firstRects = new Map(
                currentButtons.map((button) => [button.dataset.key, button.getBoundingClientRect()])
            );
            const targetRect = g2Target.getBoundingClientRect();

            activeCategoryKey = "";
            g1BrandPanel.classList.add("is-hidden-during-return");
            renderG1();
            renderG2();

            const nextButtons = Array.from(g1List.querySelectorAll(".g1-item"));

            nextButtons.forEach((button) => {
                if (button.dataset.key === currentKey) {
                    return;
                }

                const firstRect = firstRects.get(button.dataset.key);
                const lastRect = button.getBoundingClientRect();

                if (!firstRect || !lastRect) {
                    return;
                }

                const deltaX = firstRect.left - lastRect.left;
                const deltaY = firstRect.top - lastRect.top;

                if (!deltaX && !deltaY) {
                    return;
                }

                button.style.transition = "none";
                button.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

                requestAnimationFrame(() => {
                    pulseTrail(button);
                    button.style.transition = "transform 0.82s cubic-bezier(.2,.82,.24,1)";
                    button.style.transform = "translate(0, 0)";
                });
            });

            const targetButton = nextButtons.find((button) => button.dataset.key === currentKey);

            if (!currentCategory || !targetButton) {
                isAnimating = false;
                renderG1();
                renderG2();
                return;
            }

            const lastRect = targetButton.getBoundingClientRect();
            const mover = targetButton.cloneNode(true);

            mover.style.position = "fixed";
            mover.style.left = `${targetRect.left}px`;
            mover.style.top = `${targetRect.top}px`;
            mover.style.width = `${targetRect.width}px`;
            mover.style.height = `${targetRect.height}px`;
            mover.style.margin = "0";
            mover.style.zIndex = "50";
            mover.style.pointerEvents = "none";
            mover.style.transition = "left 0.8s cubic-bezier(.2,.82,.24,1), top 0.8s cubic-bezier(.2,.82,.24,1), width 0.8s cubic-bezier(.2,.82,.24,1), height 0.8s cubic-bezier(.2,.82,.24,1), box-shadow 0.8s ease";
            mover.style.boxShadow = "0 22px 48px rgba(74, 49, 30, 0.22)";

            targetButton.style.visibility = "hidden";
            document.body.appendChild(mover);

            requestAnimationFrame(() => {
                pulseTrail(mover);
                mover.style.left = `${lastRect.left}px`;
                mover.style.top = `${lastRect.top}px`;
                mover.style.width = `${lastRect.width}px`;
                mover.style.height = `${lastRect.height}px`;
            });

            mover.addEventListener("transitionend", () => {
                mover.remove();
                targetButton.style.visibility = "";
                isAnimating = false;

                renderG1();
                renderG2();
                renderBrandList();
                applyBrandSelectVisibility();

                if (externalHideBrandSelect) {
                    g1BrandPanel.classList.remove("is-hidden-during-return");
                    return;
                }

                const brandRect = g1BrandPanel.getBoundingClientRect();
                const brandOverlay = g1BrandPanel.cloneNode(true);

                brandOverlay.className = "g1-brand-panel brand-return-overlay";
                brandOverlay.style.left = `${brandRect.left}px`;
                brandOverlay.style.top = `${brandRect.top}px`;
                brandOverlay.style.width = `${brandRect.width}px`;
                brandOverlay.style.height = `${brandRect.height}px`;

                document.body.appendChild(brandOverlay);
                window.setTimeout(() => {
                    brandOverlay.remove();
                    g1BrandPanel.classList.remove("is-hidden-during-return");
                }, 2520);
            }, { once: true });
        }

        function renderG2(withDeal = false) {
            const current = getCurrentCategories().find((category) => category.key === activeCategoryKey);
            if (!current) {
                g2Panel.classList.add("is-hidden");
                g2Panel.style.visibility = "";
                g1Head.classList.add("is-hidden");
                g1BackButton.classList.add("is-hidden");
                layout.classList.remove("is-g2-active");
                syncG2Target(null);
                scheduleMobileMainGalleryMetrics("renderG2-empty");
                return;
            }

            layout.classList.add("is-g2-active");
            g2Panel.classList.remove("is-hidden");
            g1Head.classList.remove("is-hidden");
            g1BackButton.classList.remove("is-hidden");
            syncG2Target(current);
            g2Title.textContent = current.name;
            g2Description.textContent = current.description;
            g2Grid.innerHTML = "";

            const itemsToRender = externalBridgeEnabled && activeCategoryKey === current.key && externalG2Items.length
                ? externalG2Items
                : (current.items || []);

                       itemsToRender.forEach((item) => {
                const article = document.createElement("article");
                article.className = withDeal ? "card is-dealing" : "card";
                if (withDeal) {
                    article.style.animationDelay = `${220 + (g2Grid.children.length * 220)}ms`;
                }
                article.innerHTML = `
                    <div class="card-media" style="background-image:url('${item.image || item.src || ""}')"></div>
                    <div class="card-body">
                        <span class="card-kicker">${item.brand || ""}</span>
                        <h4 class="card-title">${item.title || ""}</h4>
                        <p class="card-text">${item.text || item.description || ""}</p>
                        <div class="card-footer">
                            <strong>${item.price || ""}</strong>
                            <span class="tag">${item.tag || ""}</span>
                        </div>
                    </div>
                `;

                article.style.cursor = "pointer";
                article.addEventListener("click", () => {
                    if (!externalBridgeEnabled) {
                        return;
                    }

                    postToParent({
                        type: "openItem",
                        item: {
                            ...item,
                            title: String(item.title || "").trim(),
                            brand: String(item.brand || "").trim(),
                            slug: String(item.slug || "").trim(),
                            categoryKey: String(activeCategoryKey || "").trim(),
                            productId: String(item.productId || item._id || "").trim(),
                            image: String(item.image || item.src || item.originalImage || "").trim(),
                            src: String(item.src || item.image || item.originalImage || "").trim(),
                            originalImage: String(item.originalImage || item.src || item.image || "").trim(),
                            hoverImage: String(item.hoverImage || item.altSrc || "").trim(),
                            price: String(item.price || item.priceText || item.priceTaxIn || item.formattedPrice || "").trim(),
                            priceText: String(item.priceText || item.price || item.priceTaxIn || item.formattedPrice || "").trim(),
                            priceTaxIn: String(item.priceTaxIn || item.priceText || item.price || item.formattedPrice || "").trim(),
                            formattedPrice: String(item.formattedPrice || item.priceText || item.price || item.priceTaxIn || "").trim(),
                            text: String(item.text || item.description || "").trim(),
                            description: String(item.description || item.text || "").trim(),
                            tag: String(item.tag || "").trim()
                        }
                    });
                });

                g2Grid.appendChild(article);
            });

            scheduleMobileMainGalleryMetrics("renderG2");
        }
        function applyBackButtonStyle() {
            if (!externalBackButtonStyle) {
                return;
            }

            [g1BackButton].forEach((button) => {
                if (!button) {
                    return;
                }

                if (externalBackButtonStyle.backgroundColor) {
                    button.style.background = externalBackButtonStyle.backgroundColor;
                    button.style.backgroundColor = externalBackButtonStyle.backgroundColor;
                }

                if (externalBackButtonStyle.color) {
                    button.style.color = externalBackButtonStyle.color;
                }

                if (externalBackButtonStyle.borderColor) {
                    button.style.borderColor = externalBackButtonStyle.borderColor;
                }

                if (externalBackButtonStyle.borderWidth) {
                    button.style.borderWidth = externalBackButtonStyle.borderWidth;
                }

                if (externalBackButtonStyle.borderStyle) {
                    button.style.borderStyle = externalBackButtonStyle.borderStyle;
                }

                button.style.boxShadow = "none";
            });
        }

        function backToG1() {
            if (externalBridgeEnabled) {
                if (externalBackSyncTimer) {
                    window.clearTimeout(externalBackSyncTimer);
                }
                animateBackToG1();
                externalBackSyncTimer = window.setTimeout(() => {
                    externalBackSyncTimer = 0;
                    externalG2Items = [];
                    postToParent({ type: "backToG1" });
                }, 820);
                return;
            }
            animateBackToG1();
        }

backButton.addEventListener("click", backToG1);
g1BackButton.addEventListener("click", backToG1);

brandToggle.addEventListener("click", () => {
    g1BrandPanel.classList.toggle("is-open");
    syncBrandToggle();
    scheduleMobileMainGalleryMetrics("brandToggle");
});

integratedMenuCloseTop.addEventListener("click", () => {
    postIntegratedMenuAction("closeMenu");
});

integratedMenuCloseBottom.addEventListener("click", () => {
    postIntegratedMenuAction("closeMenu");
});

integratedMenuTop.addEventListener("click", () => {
    postIntegratedMenuAction("openTop", integratedMenuState.topUrl);
});

integratedMenuInstagram.addEventListener("click", () => {
    menuButton.classList.remove("is-door-open");
    mobileBrandBox.classList.remove("is-menu-active");
    document.body.classList.remove("is-menu-open");
    setIntegratedMenuOpen(false);
    postIntegratedMenuAction("closeMenu");
});

integratedMenuContact.addEventListener("click", () => {
    postIntegratedMenuAction("openContact", integratedMenuState.contactUrl);
});

integratedMenuLinkshop.addEventListener("click", () => {
    postIntegratedMenuAction("openLinkshop", integratedMenuState.linkshopUrl);
});

renderMobileBrandBox(defaultMobileBrandBoxPayload);
postToParent({ type: "ready" });
applyBrandSelectVisibility();
applyBackButtonStyle();
scheduleMobileMainGalleryMetrics("initial");

window.addEventListener("load", () => {
    scheduleMobileMainGalleryMetrics("window-load");
});

window.addEventListener("resize", () => {
    scheduleMobileMainGalleryMetrics("window-resize");
});

if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", () => {
        scheduleMobileMainGalleryMetrics("visualViewport-resize");
    });

    window.visualViewport.addEventListener("scroll", () => {
        scheduleMobileMainGalleryMetrics("visualViewport-scroll");
    });
}
    </script>
</body>
