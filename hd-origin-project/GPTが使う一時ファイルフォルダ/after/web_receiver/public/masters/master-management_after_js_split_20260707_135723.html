<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>マスタ管理 - HD Origin Project</title>
    <link rel="stylesheet" href="./master-management.css">
</head>
<body>
  <header>
    <h1>マスタ管理</h1>
    <div class="button-row">
      <button onclick="location.href='/'">メインへ</button>
      <button onclick="location.href='/expenses/expense-input.html'">経費入力</button>
      <button type="button" class="danger" onclick="restartServerSimple()">サーバー再起動</button>
    </div>
  </header>

  <main>
    <div class="card">
      <h2>管理するマスタを選ぶ</h2>

      <div class="group-title">会計・科目系</div>
      <div id="accountingMasterButtons" class="master-button-grid"></div>

      <div class="group-title">日常入力系</div>
      <div id="dailyMasterButtons" class="master-button-grid"></div>

      <div class="group-title">支払書類・区分系</div>
      <div id="paymentDocumentMasterButtons" class="master-button-grid"></div>

      <div class="important-note">
        マスタは削除ではなく、原則「使用停止」で管理します。<br>
        名前変更は、過去に入力済みの経費・レシート・伝票の表示にも影響する可能性があります。<br>
        誤字修正は名前変更。別人・別会社・別科目にしたい場合は、新規追加して古いものを使用停止にします。<br>
        管理IDはAccessのオートナンバー相当です。並び替えや会計上の番号には使わず、並びは表示順で管理します。
      </div>

      <div id="result">待機中</div>
    </div>

    <div class="card">
      <h2 id="activeMasterTitle">マスタを選んでください</h2>
      <div id="activeMasterNote" class="note"></div>
    </div>

    <div class="card" id="addCard" style="display:none;">
      <h2>新規追加</h2>

      <div class="form-row">
        <div>
          <label id="newNameLabel">名称</label>
          <input id="newName" class="name-input" placeholder="新しい名称">
        </div>

        <div id="newExtraFields" class="form-row"></div>

        <div>
          <label>表示順</label>
          <input id="newSortOrder" class="sort-input" type="number" value="0">
        </div>

        <button onclick="addMasterItem()">追加</button>
      </div>
    </div>

    <div class="card" id="listCard" style="display:none;">
      <h2>一覧</h2>
      <div id="masterList">マスタを選んでください。</div>
    </div>
  </main>

<script src="./master-management.js"></script>
  <script src="/hd-origin-exit-guard.js?v=20260706"></script>
</body>
</html>
