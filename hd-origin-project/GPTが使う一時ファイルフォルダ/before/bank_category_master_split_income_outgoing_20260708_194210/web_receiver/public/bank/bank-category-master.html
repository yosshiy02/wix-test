    let currentGroupId = MASTER_GROUPS[0].id;
    let searchText = '';

    function renderSummary() {
      const totalGroups = MASTER_GROUPS.length;
      const totalItems = MASTER_GROUPS.reduce((sum, group) => sum + group.items.length, 0);
      const majorItems = MASTER_GROUPS.slice(0, 4).reduce((sum, group) => sum + group.items.length, 0);

      document.getElementById('summary').innerHTML = `
        <div class="bank-master-all-summary-card"><span>区分グループ</span><strong>${totalGroups}</strong></div>
        <div class="bank-master-all-summary-card"><span>区分項目</span><strong>${totalItems}</strong></div>
        <div class="bank-master-all-summary-card"><span>主要4区分項目</span><strong>${majorItems}</strong></div>
        <div class="bank-master-all-summary-card"><span>保存状態</span><strong>未実装</strong></div>
        <div class="bank-master-all-summary-card"><span>DB化</span><strong>後で</strong></div>
      `;
    }

    function renderMenu() {
      const menu = document.getElementById('groupMenu');
      menu.innerHTML = '';

      MASTER_GROUPS.forEach((group) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.textContent = `${group.name}（${group.items.length}）`;
        button.className = group.id === currentGroupId ? 'active' : '';
        button.addEventListener('click', () => {
          currentGroupId = group.id;
          renderMenu();
          renderRows();
        });
        menu.appendChild(button);
      });
    }

    function renderRows() {
      const group = MASTER_GROUPS.find((g) => g.id === currentGroupId) || MASTER_GROUPS[0];

      document.getElementById('groupTitle').textContent = group.name;
      document.getElementById('groupDescription').textContent = group.desc;
      document.getElementById('groupCount').textContent = `${group.items.length}項目`;

      const lowerSearch = searchText.trim().toLowerCase();

      const filtered = group.items.filter((item) => {
        if (!lowerSearch) return true;
        return item.join(' ').toLowerCase().includes(lowerSearch);
      });

      const rows = filtered.map((item, index) => {
        const sortOrder = (index + 1) * 10;
        const code = escapeHtml(item[0]);
        const name = escapeHtml(item[1]);
        const desc = escapeHtml(item[2]);

        return `
          <tr>
            <td style="text-align:center;"><input type="checkbox" checked></td>
            <td><input value="${sortOrder}"></td>
            <td><input class="bank-master-all-code" value="${code}"></td>
            <td><input value="${name}"></td>
            <td><input value="${desc}"></td>
            <td>
              <select>
                <option selected>有効</option>
                <option>停止</option>
              </select>
            </td>
          </tr>
        `;
      }).join('');

      document.getElementById('masterRows').innerHTML = rows || `
        <tr>
          <td colspan="6">検索条件に一致する項目がありません。</td>
        </tr>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function clearSearch() {
      searchText = '';
      document.getElementById('masterSearch').value = '';
      renderRows();
    }

    document.getElementById('masterSearch').addEventListener('input', (event) => {
      searchText = event.target.value;
      renderRows();
    });

    renderSummary();
    renderMenu();
    renderRows();
  </script>
