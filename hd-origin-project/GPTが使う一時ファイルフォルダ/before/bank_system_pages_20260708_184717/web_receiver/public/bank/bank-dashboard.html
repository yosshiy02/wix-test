<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>銀行業務・通帳明細 - HD Origin Project</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f4f4f5;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 24px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    p {
      line-height: 1.7;
      color: #4b5563;
    }
    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    button {
      border: 0;
      border-radius: 8px;
      background: #111827;
      color: #ffffff;
      font-weight: 700;
      padding: 10px 14px;
      cursor: pointer;
    }
    button.light {
      background: #ffffff;
      color: #111827;
      border: 1px solid #d1d5db;
    }
    .todo {
      margin-top: 18px;
      padding: 14px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      color: #374151;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>銀行業務・通帳明細システム</h1>
      <p>
        通帳画像、銀行明細、入出金CSV、振込明細、引落明細を読み込み、
        未払・売掛・経費・税金・公共料金などと照合するための入口です。
      </p>

      <div class="todo">
        <strong>今後作る機能</strong>
        <div>・通帳読取</div>
        <div>・銀行CSV取込</div>
        <div>・入出金明細確認</div>
        <div>・未払支払済み確認</div>
        <div>・売掛入金消込</div>
        <div>・残高照合</div>
      </div>

      <div class="buttons">
        <button type="button" onclick="location.href='/'">メインページへ戻る</button>
        <button type="button" class="light" onclick="location.href='/payables/payment-document-review.html'">支払書類仕分けへ</button>
      </div>
    </div>
  </div>
</body>
</html>
