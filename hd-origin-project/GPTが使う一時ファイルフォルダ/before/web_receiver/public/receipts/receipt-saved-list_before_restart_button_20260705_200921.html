<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>レシート台帳</title>
  <link rel="stylesheet" href="./receipt-list.css">
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f4f4;
      color: #222;
      overflow: hidden;
    }

    header {
      height: 3rem;
      box-sizing: border-box;
      padding: 0.75rem 1rem;
      background: #222;
      color: #fff;
      font-size: 1.125rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .receipt-header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-left: auto;
    }

    .receipt-header-actions button {
      background: #fff;
      color: #111;
      border: 0.0625rem solid #fff;
      border-radius: 0.5rem;
      padding: 0.45rem 0.75rem;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    main {
      display: grid;
      grid-template-columns: 18.75rem minmax(32rem, 1fr) 34rem;
      gap: 0.625rem;
      padding: 0.625rem;
      height: calc(100vh - 3rem);
      box-sizing: border-box;
    }

    .panel {
      background: #fff;
      border: 0.0625rem solid #ddd;
      border-radius: 0.5rem;
      overflow: hidden;
      min-height: 0;
    }

    .panel-title {
      height: 2.625rem;
      box-sizing: border-box;
      padding: 0.5625rem 0.625rem;
      border-bottom: 0.0625rem solid #ddd;
      background: #fafafa;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }

    .scroll {
      height: calc(100% - 2.625rem);
      overflow: auto;
    }

    .list-item {
      padding: 0.625rem;
      border-bottom: 0.0625rem solid #eee;
      cursor: pointer;
    }

    .list-item:hover {
      background: #f0f4ff;
    }

    .list-item.active {
      background: #e8f0ff;
      border-left: 0.25rem solid #333;
    }

    .list-main {
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .list-sub {
      font-size: 0.75rem;
      color: #666;
      line-height: 1.5;
      word-break: break-all;
    }

    .image-area {
      height: calc(100% - 2.625rem);
      overflow: auto;
      background: #eee;
      text-align: center;
      padding: 0.625rem;
      box-sizing: border-box;
    }

    .image-area img {
      max-width: 100%;
      border: 0.0625rem solid #ccc;
      background: #fff;
    }

    .detail-area {
      height: calc(100% - 2.625rem);
      overflow: auto;
      padding: 0.625rem;
      box-sizing: border-box;
    }

    .block {
      border: 0.0625rem solid #ddd;
      border-radius: 0.5rem;
      margin-bottom: 0.625rem;
      overflow: hidden;
      background: #fff;
    }

    .block-title {
      padding: 0.5rem 0.625rem;
      background: #fafafa;
      border-bottom: 0.0625rem solid #ddd;
      font-weight: 700;
    }

    .block-body {
      padding: 0.625rem;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .field {
      margin-bottom: 0.5rem;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: #555;
      margin-bottom: 0.2rem;
    }

    .field div {
      min-height: 1.5rem;
      padding: 0.35rem 0.45rem;
      border: 0.0625rem solid #ddd;
      border-radius: 0.3125rem;
      background: #fafafa;
      word-break: break-word;
    }

    .muted {
      color: #777;
      font-size: 0.75rem;
    }

    .ok {
      color: #087a28;
      font-weight: 700;
    }

    .warn {
      color: #b00020;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
    }

    th, td {
      border: 0.0625rem solid #ddd;
      padding: 0.32rem;
      vertical-align: top;
    }

    th {
      background: #fafafa;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <header>
    <div>レシート台帳</div>
    <div class="receipt-header-actions">
      <button type="button" onclick="location.href='/receipts/receipt-list.html'">読取確認へ戻る</button>
      <button type="button" onclick="loadSavedReceipts()">再読込</button>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="panel-title">
        <span>本保存済み</span>
      </div>
      <div id="list" class="scroll">読込中...</div>
    </section>

    <section class="panel">
      <div class="panel-title">証憑画像</div>
      <div id="imageArea" class="image-area">左から選択してください。</div>
    </section>

    <section class="panel">
      <div class="panel-title">保存データ</div>
      <div id="detailArea" class="detail-area">左から選択してください。</div>
    </section>
  </main>

  <script>
    let currentItems = [];
    let selectedReceiptId = null;

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function yen(value) {
      if (value === null || value === undefined || value === "") return "";
      const n = Number(value);
      if (!Number.isFinite(n)) return esc(value);
      return n.toLocaleString("ja-JP") + " 円";
    }

    function dateText(value) {
      if (!value) return "";
      return String(value).slice(0, 10);
    }

    function settledText(value) {
      return value ? '<span class="ok">清算済み</span>' : '<span class="warn">未精算</span>';
    }

    function field(label, value) {
      return '<div class="field"><label>' + esc(label) + '</label><div>' + (value || "") + '</div></div>';
    }

    async function loadSavedReceipts() {
      const list = document.getElementById("list");
      list.innerHTML = "読込中...";

      const res = await fetch("/api/receipts/saved?limit=200");
      const data = await res.json().catch(() => ({ ok: false, error: "JSON読込失敗" }));

      if (!res.ok || !data.ok) {
        list.innerHTML = '<div class="list-item warn">読込失敗: ' + esc(data.error || "") + '</div>';
        return;
      }

      currentItems = data.items || [];

      if (!currentItems.length) {
        list.innerHTML = '<div class="list-item">本保存済みレシートはありません。</div>';
        return;
      }

      list.innerHTML = currentItems.map((item) => {
        const active = Number(item.receipt_id) === Number(selectedReceiptId) ? " active" : "";
        return `
          <div class="list-item${active}" onclick="loadSavedDetail(${esc(item.receipt_id)})">
            <div class="list-main">保存ID ${esc(item.receipt_id)} / ${esc(dateText(item.transaction_date))}</div>
            <div class="list-sub">
              ${esc(item.vendor_name || "")}<br>
              ${esc(yen(item.total_amount))}<br>
              ${item.is_settled ? "清算済み" : "未精算"} / ${esc(item.target_person_name || "")}
            </div>
          </div>
        `;
      }).join("");
    }

    async function loadSavedDetail(id) {
      selectedReceiptId = Number(id);
      await loadSavedReceipts();

      const imageArea = document.getElementById("imageArea");
      const detailArea = document.getElementById("detailArea");

      imageArea.innerHTML = "画像読込中...";
      detailArea.innerHTML = "読込中...";

      const res = await fetch("/api/receipts/saved/" + encodeURIComponent(id));
      const data = await res.json().catch(() => ({ ok: false, error: "JSON読込失敗" }));

      if (!res.ok || !data.ok) {
        imageArea.innerHTML = "";
        detailArea.innerHTML = '<div class="warn">読込失敗: ' + esc(data.error || "") + '</div>';
        return;
      }

      renderSavedDetail(data.item);
    }

    function renderSavedDetail(item) {
      const imageArea = document.getElementById("imageArea");
      const detailArea = document.getElementById("detailArea");

      const importId = item.receipt_import_id;
      if (importId) {
        imageArea.innerHTML = '<img src="/api/receipts/image/' + encodeURIComponent(importId) + '" alt="receipt">';
      } else {
        imageArea.innerHTML = '<div class="warn">画像元の取込IDがありません。</div>';
      }

      const details = Array.isArray(item.details) ? item.details : [];
      const first = details[0] || {};

      const basic = [
        '<div class="block">',
        '<div class="block-title">基本情報</div>',
        '<div class="block-body">',
        '<div class="grid2">',
        field("保存ID", esc(item.receipt_id || "")),
        field("保存日時", esc(item.saved_at || "")),
        field("取引日", esc(dateText(first.transaction_date))),
        field("時刻", esc(first.receipt_time_text || "")),
        field("支払先", esc(first.vendor_name || "")),
        field("支払方法", esc(first.payment_method_name || "")),
        field("合計金額", esc(yen(first.total_amount))),
        field("消費税", esc(yen(first.tax_total_amount))),
        field("対象者", esc(first.target_person_name || "")),
        field("精算状態", settledText(first.is_settled)),
        field("勘定科目", esc(first.account_title_name || "")),
        field("目的", esc(first.purpose_name || "")),
        field("案件", esc(first.project_name || "")),
        field("部門", esc(first.department_name || "")),
        field("インボイス区分", esc(first.invoice_type_name || "")),
        field("証憑区分", esc(first.evidence_type_name || "")),
        '</div>',
        field("摘要", esc(first.summary || "")),
        field("メモ", esc(first.memo || "")),
        field("証憑メモ", esc(first.evidence_memo || "")),
        '</div>',
        '</div>'
      ].join("");

      const detailTables = details.map((detail, index) => {
        const breakdowns = Array.isArray(detail.breakdowns) ? detail.breakdowns : [];

        const breakdownTable = breakdowns.length
          ? [
              '<table>',
              '<thead><tr><th>品名</th><th>数量</th><th>単価</th><th>金額</th><th>税区分</th><th>税処理</th><th>メモ</th></tr></thead>',
              '<tbody>',
              breakdowns.map((row) => `
                <tr>
                  <td>${esc(row.item_name || "")}</td>
                  <td>${esc(row.quantity || "")}</td>
                  <td>${esc(yen(row.unit_price))}</td>
                  <td>${esc(yen(row.amount))}</td>
                  <td>${esc(row.tax_category_name || "")}</td>
                  <td>${esc(row.tax_treatment_name || "")}</td>
                  <td>${esc(row.note || "")}</td>
                </tr>
              `).join(""),
              '</tbody></table>'
            ].join("")
          : '<div class="muted">明細内訳はありません。</div>';

        return [
          '<div class="block">',
          '<div class="block-title">明細 ' + esc(index + 1) + '</div>',
          '<div class="block-body">',
          '<div class="grid2">',
          field("取引日", esc(dateText(detail.transaction_date))),
          field("支払先", esc(detail.vendor_name || "")),
          field("合計金額", esc(yen(detail.total_amount))),
          field("消費税", esc(yen(detail.tax_total_amount))),
          field("勘定科目", esc(detail.account_title_name || "")),
          field("目的", esc(detail.purpose_name || "")),
          field("精算状態", settledText(detail.is_settled)),
          '</div>',
          breakdownTable,
          '</div>',
          '</div>'
        ].join("");
      }).join("");

      detailArea.innerHTML = basic + detailTables;
    }

    loadSavedReceipts();
  </script>
</body>
</html>
