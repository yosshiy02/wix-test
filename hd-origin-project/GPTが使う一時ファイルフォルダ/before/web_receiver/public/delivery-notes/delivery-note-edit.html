<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>納品書編集 - HD Origin Project</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      height: 100vh;
      background: #f5f5f5;
      color: #222;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
    }

    header {
      flex: 0 0 auto;
      background: #222;
      color: #fff;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 20px;
      font-weight: 800;
    }

    .delivery-header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    button,
    input,
    textarea,
    select {
      box-sizing: border-box;
      font: inherit;
    }

    button {
      font-weight: 700;
      cursor: pointer;
      border: 1px solid #aaa;
      border-radius: 8px;
      background: #fff;
      color: #222;
      padding: 7px 10px;
    }

    button:hover {
      background: #eee;
    }

    button.primary {
      background: #222;
      color: #fff;
      border-color: #222;
    }

    button.danger {
      color: #b00020;
      border-color: #b00020;
    }

    main {
      flex: 1 1 auto;
      min-height: 0;
      padding: 10px;
      display: grid;
      grid-template-columns: 330px minmax(360px, 0.95fr) minmax(520px, 1.25fr);
      gap: 10px;
      overflow: hidden;
    }

    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-title {
      flex: 0 0 auto;
      min-height: 42px;
      padding: 9px 10px;
      background: #f0f0f0;
      border-bottom: 1px solid #ddd;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .scroll {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 8px;
    }

    .list-item {
      border: 1px solid #ddd;
      border-radius: 9px;
      background: #fff;
      padding: 8px;
      margin-bottom: 7px;
      cursor: pointer;
    }

    .list-item:hover {
      background: #f7f7f7;
    }

    .list-item.active {
      background: #eef2ff;
      border-color: #222;
    }

    .list-main {
      font-weight: 800;
      overflow-wrap: anywhere;
      line-height: 1.35;
    }

    .list-sub {
      color: #666;
      font-size: 12px;
      line-height: 1.45;
      margin-top: 4px;
      overflow-wrap: anywhere;
    }

    .ocr-done {
      color: #137333;
      font-weight: 800;
    }

    .ocr-wait {
      color: #b06000;
      font-weight: 800;
    }

    .image-area {
      flex: 1 1 auto;
      min-height: 0;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 8px;
      position: relative;
    }

    .image-area img {
      max-width: none;
      max-height: none;
      width: auto;
      height: auto;
      transform-origin: center center;
      border: 1px solid #d1d5db;
      background: #fff;
      box-shadow: 0 1px 8px rgba(0,0,0,0.18);
    }

    .image-tools {
      flex: 0 0 auto;
      padding: 8px;
      border-bottom: 1px solid #ddd;
      background: #fafafa;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }

    #deliveryImageZoomText {
      display: inline-flex;
      min-width: 52px;
      font-weight: 800;
      color: #666;
      font-size: 12px;
    }

    .form-area {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }

    .form-block {
      border: 1px solid #ddd;
      border-left: 7px solid #bbb;
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      margin-bottom: 10px;
    }

    .form-block h2 {
      display: inline-block;
      margin: 0 0 8px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.75);
      border: 1px solid rgba(0,0,0,.08);
      font-size: 16px;
    }

    .block-ocr {
      background: #f0fff4;
      border-left-color: #7bd88f;
    }

    .block-basic {
      background: #fff3f8;
      border-left-color: #ff9fc2;
    }

    .block-lines {
      background: #f7fbff;
      border-left-color: #8bc3ff;
    }

    .block-result {
      background: #f9f9f9;
      border-left-color: #bbb;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #555;
      margin-bottom: 3px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #bbb;
      border-radius: 7px;
      padding: 7px 8px;
      background: #fff;
    }

    textarea {
      min-height: 82px;
      resize: vertical;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .grid3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .muted {
      color: #777;
      font-size: 12px;
      line-height: 1.5;
    }

    .warn {
      color: #b00020;
      font-weight: 800;
    }

    .ok {
      color: #137333;
      font-weight: 800;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    .line-table {
      min-width: 980px;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 6px;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      background: #f0f0f0;
      white-space: nowrap;
    }

    #result {
      white-space: pre-wrap;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px;
      min-height: 42px;
      font-size: 13px;
    }

    #deliveryImageModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.78);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 18px;
    }

    #deliveryImageModal img {
      max-width: 96vw;
      max-height: 94vh;
      background: #fff;
      border-radius: 8px;
    }

    #deliveryImageModal .modal-note {
      position: fixed;
      top: 12px;
      left: 12px;
      color: #fff;
      font-weight: 800;
      background: rgba(0,0,0,.45);
      border-radius: 999px;
      padding: 6px 12px;
    }
  </style>
</head>
<body>
  <header>
    <span>納品書編集</span>
    <div class="delivery-header-actions">
      <button type="button" onclick="location.href='/'">メインページ</button>
      <button type="button" onclick="location.href='/delivery-notes/delivery-note-inbox.html'">納品書取込へ</button>
      <button type="button" onclick="location.href='/payables/payable-list.html'">請求書・未払管理へ</button>
      <button type="button" onclick="loadList()">再読込</button>
    </div>
  </header>

  <main>
    <section class="panel delivery-list-panel">
      <div class="panel-title">
        <span>納品書</span>
        <button type="button" onclick="loadList()">再読込</button>
      </div>
      <div id="list" class="scroll">読込中...</div>
    </section>

    <section class="panel delivery-image-panel">
      <div class="panel-title">画像</div>
      <div class="image-tools">
        <button type="button" onclick="rotateImage(-90)">左90度</button>
        <button type="button" onclick="rotateImage(90)">右90度</button>
        <button type="button" onclick="zoomImage(0.1)">拡大</button>
        <button type="button" onclick="zoomImage(-0.1)">縮小</button>
        <button type="button" onclick="resetView()">表示リセット</button>
        <span id="deliveryImageZoomText">100%</span>
      </div>
      <div id="imageArea" class="image-area">左から選択してください。</div>
    </section>

    <section class="panel delivery-form-panel">
      <div class="panel-title">読取候補の編集</div>
      <div id="formArea" class="form-area">左から選択してください。</div>
    </section>
  </main>

  <div id="deliveryImageModal">
    <div class="modal-note">クリックで閉じる</div>
    <img alt="納品書拡大表示">
  </div>

  <script>
    let currentItems = [];
    let selectedId = null;
    let selectedImport = null;
    let aiJson = null;
    let rotationDeg = 0;
    let zoomRate = 1;
    let fitScale = 1;

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function num(value) {
      const s = String(value ?? "").replace(/,/g, "").trim();
      return s ? Number(s) : null;
    }

    function displayValue(value) {
      if (value === null || value === undefined) return "";
      return String(value);
    }

    function formatSize(size) {
      const n = Number(size || 0);
      if (n >= 1024 * 1024) return (n / 1024 / 1024).toFixed(1) + " MB";
      if (n >= 1024) return (n / 1024).toFixed(1) + " KB";
      return n + " B";
    }

    function ocrStatusLabel(item) {
      const s = String(item && item.ocr_status ? item.ocr_status : "").trim();
      if (s && s !== "未OCR") {
        return '<span class="ocr-done">' + esc(s) + '</span>';
      }
      return '<span class="ocr-wait">未OCR</span>';
    }

    function showResult(message) {
      const result = document.getElementById("result");
      if (result) {
        result.textContent = String(message || "");
      }
    }

    function updateImageFitScale() {
      const area = document.getElementById("imageArea");
      const img = area ? area.querySelector("img") : null;

      if (!area || !img || !img.naturalWidth || !img.naturalHeight) {
        fitScale = 1;
        applyTransform();
        return;
      }

      const areaWidth = Math.max(1, area.clientWidth - 18);
      const areaHeight = Math.max(1, area.clientHeight - 18);

      const rotated = Math.abs(rotationDeg % 180) === 90;
      const imageWidth = rotated ? img.naturalHeight : img.naturalWidth;
      const imageHeight = rotated ? img.naturalWidth : img.naturalHeight;

      fitScale = Math.min(areaWidth / imageWidth, areaHeight / imageHeight);

      if (!Number.isFinite(fitScale) || fitScale <= 0) {
        fitScale = 1;
      }

      applyTransform();
    }

    function applyTransform() {
      const area = document.getElementById("imageArea");
      const img = area ? area.querySelector("img") : null;
      const zoomText = document.getElementById("deliveryImageZoomText");

      if (img) {
        const finalScale = fitScale * zoomRate;
        img.style.transform = "rotate(" + rotationDeg + "deg) scale(" + finalScale + ")";
      }

      if (zoomText) {
        zoomText.textContent = Math.round(zoomRate * 100) + "%";
      }
    }

    function resetView() {
      rotationDeg = 0;
      zoomRate = 1;
      updateImageFitScale();
    }

    function rotateImage(delta) {
      if (!selectedId) {
        showResult("先に納品書を選択してください。");
        return;
      }

      rotationDeg = (rotationDeg + delta) % 360;
      updateImageFitScale();
    }

    function zoomImage(delta) {
      if (!selectedId) {
        showResult("先に納品書を選択してください。");
        return;
      }

      zoomRate = Math.max(0.2, Math.min(3, Math.round((zoomRate + delta) * 10) / 10));
      applyTransform();
    }

    function setupImageModal() {
      const modal = document.getElementById("deliveryImageModal");
      const modalImg = modal ? modal.querySelector("img") : null;
      const imageArea = document.getElementById("imageArea");

      if (!modal || !modalImg || !imageArea) return;

      modal.addEventListener("click", function () {
        modal.style.display = "none";
        modalImg.src = "";
      });

      imageArea.addEventListener("click", function (event) {
        const img = event.target.closest("img");
        if (!img) return;

        modalImg.src = img.src;
        modal.style.display = "flex";
      });
    }

    async function loadList() {
      const list = document.getElementById("list");
      list.innerHTML = "読込中...";

      const res = await fetch("/api/delivery-notes/imports?limit=100");
      const data = await res.json();

      if (!data.ok) {
        list.innerHTML = '<div class="list-item warn">読込失敗: ' + esc(data.error || "原因不明") + '</div>';
        return;
      }

      currentItems = data.items || [];

      if (currentItems.length === 0) {
        list.innerHTML = '<div class="list-item">納品書がありません。先に納品書取込画面で取り込んでください。</div>';
        return;
      }

      list.innerHTML = currentItems.map(function (item) {
        const id = Number(item.id);
        const active = id === Number(selectedId) ? " active" : "";

        return [
          '<div class="list-item' + active + '" onclick="loadDetail(' + id + ')">',
          '  <div class="list-main">ID ' + esc(id) + ' / ' + esc(item.original_file_name || item.local_image_file_name || "") + '</div>',
          '  <div class="list-sub">',
          '    ' + esc(item.import_status || "") + ' / ' + ocrStatusLabel(item) + ' / ' + formatSize(item.image_size_bytes) + '<br>',
          '    ' + esc(item.imported_at_jst || item.created_at || ""),
          '  </div>',
          '</div>'
        ].join("");
      }).join("");
    }

    async function loadDetail(id) {
      selectedId = Number(id);
      await loadList();

      const imageArea = document.getElementById("imageArea");
      const formArea = document.getElementById("formArea");

      formArea.innerHTML = "読込中...";
      imageArea.innerHTML = "画像読込中...";

      const res = await fetch("/api/delivery-notes/imports/" + encodeURIComponent(selectedId));
      const data = await res.json();

      if (!data.ok) {
        formArea.innerHTML = '<div class="warn">読込失敗: ' + esc(data.error || "原因不明") + '</div>';
        imageArea.innerHTML = "左から選択してください。";
        return;
      }

      selectedImport = data.item;

      if (String(selectedImport.mime_type || "").includes("pdf")) {
        imageArea.innerHTML = '<div class="muted">PDFはこの画面では画像プレビュー対象外です。OCR本文と編集はできます。</div>';
      } else {
        imageArea.innerHTML = '<img src="/api/delivery-notes/image/' + encodeURIComponent(selectedId) + '?t=' + Date.now() + '" alt="納品書画像">';
        const img = imageArea.querySelector("img");
        img.onload = function () {
          resetView();
        };
      }

      await renderFormForSelected();
    }

    async function renderFormForSelected() {
      const formArea = document.getElementById("formArea");

      if (!selectedId || !selectedImport) {
        formArea.innerHTML = "左から選択してください。";
        return;
      }

      let draft = null;

      try {
        const draftRes = await fetch("/api/delivery-notes/drafts?import_id=" + encodeURIComponent(selectedId));
        const draftData = await draftRes.json();
        if (draftData.ok && draftData.draft) {
          draft = draftData.draft;
        }
      } catch (error) {
        draft = null;
      }

      const source = draft || {};
      const lines = Array.isArray(source.lines) && source.lines.length ? source.lines : [{}];

      aiJson = source.ai_json || selectedImport.ai_json || null;

      formArea.innerHTML = [
        '<div class="form-block block-ocr">',
        '  <h2>OCR本文</h2>',
        '  <textarea id="ocrRawText" placeholder="OCR本文がここに入ります。">' + esc(source.ocr_raw_text || selectedImport.ocr_raw_text || "") + '</textarea>',
        '  <div class="button-row" style="margin-top:8px;">',
        '    <button type="button" onclick="saveOcrText()">OCR本文を保存</button>',
        '    <button type="button" class="primary" onclick="runAiCandidate()">AI候補作成</button>',
        '  </div>',
        '  <div class="muted" style="margin-top:6px;">画像ではなくOCR本文を候補作成に使います。</div>',
        '</div>',

        '<div class="form-block block-basic">',
        '  <h2>基本情報</h2>',
        '  <div class="grid3">',
        '    <div>',
        '      <label>納品日</label>',
        '      <input id="deliveryDate" type="date" value="' + esc((source.delivery_date || "").slice(0, 10)) + '">',
        '    </div>',
        '    <div>',
        '      <label>取引先</label>',
        '      <input id="vendorName" value="' + esc(source.vendor_name || "") + '">',
        '    </div>',
        '    <div>',
        '      <label>納品書番号</label>',
        '      <input id="deliveryNoteNo" value="' + esc(source.delivery_note_no || "") + '">',
        '    </div>',
        '  </div>',
        '  <div class="grid3" style="margin-top:8px;">',
        '    <div>',
        '      <label>合計数量</label>',
        '      <input id="totalQuantity" inputmode="decimal" value="' + esc(displayValue(source.total_quantity)) + '">',
        '    </div>',
        '    <div>',
        '      <label>税抜合計</label>',
        '      <input id="subtotalAmount" inputmode="decimal" value="' + esc(displayValue(source.subtotal_amount)) + '">',
        '    </div>',
        '    <div>',
        '      <label>消費税</label>',
        '      <input id="taxAmount" inputmode="decimal" value="' + esc(displayValue(source.tax_amount)) + '">',
        '    </div>',
        '  </div>',
        '  <div class="grid2" style="margin-top:8px;">',
        '    <div>',
        '      <label>税込合計</label>',
        '      <input id="totalAmount" inputmode="decimal" value="' + esc(displayValue(source.total_amount)) + '">',
        '    </div>',
        '    <div>',
        '      <label>概要</label>',
        '      <input id="summary" value="' + esc(source.summary || "") + '">',
        '    </div>',
        '  </div>',
        '  <div style="margin-top:8px;">',
        '    <label>社内メモ</label>',
        '    <textarea id="memo">' + esc(source.memo || "") + '</textarea>',
        '  </div>',
        '</div>',

        '<div class="form-block block-lines">',
        '  <h2>納品明細</h2>',
        '  <div class="table-wrap">',
        '    <table class="line-table">',
        '      <thead>',
        '        <tr>',
        '          <th style="width:140px;">品番</th>',
        '          <th style="width:170px;">品名</th>',
        '          <th style="width:230px;">内容</th>',
        '          <th style="width:80px;">数量</th>',
        '          <th style="width:80px;">単位</th>',
        '          <th style="width:100px;">単価</th>',
        '          <th style="width:100px;">金額</th>',
        '          <th style="width:160px;">メモ</th>',
        '          <th style="width:60px;">削除</th>',
        '        </tr>',
        '      </thead>',
        '      <tbody id="lineBody"></tbody>',
        '    </table>',
        '  </div>',
        '  <div class="button-row" style="margin-top:8px;">',
        '    <button type="button" onclick="addLine()">明細追加</button>',
        '    <button type="button" class="primary" onclick="saveDraft()">下書き保存</button>',
        '  </div>',
        '</div>',

        '<div class="form-block block-result">',
        '  <h2>結果</h2>',
        '  <div id="result">待機中</div>',
        '</div>'
      ].join("");

      const body = document.getElementById("lineBody");
      body.innerHTML = "";
      lines.forEach(function (line) {
        addLine(line);
      });

      showResult("納品書を読み込みました。");
    }

    function addLine(line) {
      const x = line || {};
      const tr = document.createElement("tr");

      tr.innerHTML = [
        '<td><input data-field="itemCode" value="' + esc(x.item_code || x.itemCode || "") + '"></td>',
        '<td><input data-field="itemName" value="' + esc(x.item_name || x.itemName || "") + '"></td>',
        '<td><input data-field="description" value="' + esc(x.description || "") + '"></td>',
        '<td><input data-field="quantity" inputmode="decimal" value="' + esc(displayValue(x.quantity)) + '"></td>',
        '<td><input data-field="unit" value="' + esc(x.unit || "") + '"></td>',
        '<td><input data-field="unitPrice" inputmode="decimal" value="' + esc(displayValue(x.unit_price ?? x.unitPrice)) + '"></td>',
        '<td><input data-field="amount" inputmode="decimal" value="' + esc(displayValue(x.amount)) + '"></td>',
        '<td><input data-field="memo" value="' + esc(x.memo || "") + '"></td>',
        '<td><button type="button" class="danger" onclick="this.closest(' + "'tr'" + ').remove()">削除</button></td>'
      ].join("");

      document.getElementById("lineBody").appendChild(tr);
    }

    function collectLines() {
      return Array.from(document.querySelectorAll("#lineBody tr")).map(function (tr) {
        const obj = {};
        tr.querySelectorAll("input[data-field]").forEach(function (input) {
          obj[input.dataset.field] = input.value;
        });
        return obj;
      }).filter(function (line) {
        return Object.values(line).some(function (v) {
          return String(v || "").trim();
        });
      });
    }

    async function saveOcrText() {
      if (!selectedId) {
        showResult("先に納品書を選択してください。");
        return;
      }

      const ocrRawText = document.getElementById("ocrRawText").value;

      const res = await fetch("/api/delivery-notes/imports/" + encodeURIComponent(selectedId) + "/ocr", {
        method: "POST",
        headers: { "Content-Type": "application/json; charset=utf-8" },
        body: JSON.stringify({ ocrRawText: ocrRawText })
      });

      const data = await res.json();

      if (!res.ok || !data.ok) {
        showResult("OCR本文保存失敗: " + (data.error || ""));
        return;
      }

      if (selectedImport) {
        selectedImport.ocr_raw_text = ocrRawText;
      }

      showResult("OCR本文を保存しました。");
    }

    async function runAiCandidate() {
      if (!selectedId) {
        showResult("先に納品書を選択してください。");
        return;
      }

      const ocrRawText = document.getElementById("ocrRawText").value;

      if (!ocrRawText.trim()) {
        showResult("OCR本文が空です。先にOCRしてください。");
        return;
      }

      showResult("AI候補を作成中...");

      const res = await fetch("/api/delivery-notes/analyze/" + encodeURIComponent(selectedId), {
        method: "POST",
        headers: { "Content-Type": "application/json; charset=utf-8" },
        body: JSON.stringify({ ocrRawText: ocrRawText })
      });

      const data = await res.json();

      if (!res.ok || !data.ok) {
        showResult("AI候補作成失敗: " + (data.error || ""));
        return;
      }

      const c = data.candidate || {};
      aiJson = c;

      if (c.deliveryDate) document.getElementById("deliveryDate").value = c.deliveryDate;
      if (c.vendorName) document.getElementById("vendorName").value = c.vendorName;
      if (c.deliveryNoteNo) document.getElementById("deliveryNoteNo").value = c.deliveryNoteNo;
      if (c.totalQuantity !== null && c.totalQuantity !== undefined) document.getElementById("totalQuantity").value = c.totalQuantity;
      if (c.subtotalAmount !== null && c.subtotalAmount !== undefined) document.getElementById("subtotalAmount").value = c.subtotalAmount;
      if (c.taxAmount !== null && c.taxAmount !== undefined) document.getElementById("taxAmount").value = c.taxAmount;
      if (c.totalAmount !== null && c.totalAmount !== undefined) document.getElementById("totalAmount").value = c.totalAmount;
      if (c.summary) document.getElementById("summary").value = c.summary;

      showResult("AI候補を反映しました。必ず人間確認してください。");
    }

    async function saveDraft() {
      if (!selectedId) {
        showResult("先に納品書を選択してください。");
        return;
      }

      const payload = {
        import_id: selectedId,
        delivery_date: document.getElementById("deliveryDate").value,
        vendor_name: document.getElementById("vendorName").value,
        delivery_note_no: document.getElementById("deliveryNoteNo").value,
        total_quantity: num(document.getElementById("totalQuantity").value),
        subtotal_amount: num(document.getElementById("subtotalAmount").value),
        tax_amount: num(document.getElementById("taxAmount").value),
        total_amount: num(document.getElementById("totalAmount").value),
        summary: document.getElementById("summary").value,
        memo: document.getElementById("memo").value,
        ocr_raw_text: document.getElementById("ocrRawText").value,
        ai_json: aiJson,
        lines: collectLines()
      };

      const res = await fetch("/api/delivery-notes/drafts", {
        method: "POST",
        headers: { "Content-Type": "application/json; charset=utf-8" },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (!res.ok || !data.ok) {
        showResult("下書き保存失敗: " + (data.error || ""));
        return;
      }

      showResult("納品書下書きを保存しました。");
      await loadList();
    }

    function selectFromQueryIfNeeded() {
      const params = new URLSearchParams(location.search);
      const importId = Number(params.get("import_id") || 0);

      if (importId) {
        const found = currentItems.some(function (item) {
          return Number(item.id) === importId;
        });

        if (found) {
          loadDetail(importId);
        }
      }
    }

    window.addEventListener("resize", function () {
      updateImageFitScale();
    });

    setupImageModal();

    loadList()
      .then(selectFromQueryIfNeeded)
      .catch(function (error) {
        document.getElementById("list").innerHTML =
          '<div class="list-item warn">初期読込エラー: ' + esc(error.message || error) + '</div>';
      });
  </script>
  <script src="../hd-origin-exit-guard.js"></script>
</body>
</html>
