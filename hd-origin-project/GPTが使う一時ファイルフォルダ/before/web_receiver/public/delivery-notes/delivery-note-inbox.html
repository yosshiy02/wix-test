<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>納品書取込 - HD Origin Project</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #f5f5f5; color: #222; font-family: system-ui, sans-serif; }
    header { background: #222; color: #fff; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    header h1 { margin: 0; font-size: 20px; }
    .button-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    button, input { box-sizing: border-box; font: inherit; }
    button { font-weight: 700; cursor: pointer; border: 1px solid #aaa; border-radius: 8px; background: #fff; color: #222; padding: 8px 11px; }
    button:hover { background: #eee; }
    button.primary { background: #222; color: #fff; border-color: #222; }
    button.header-main { background: #fff; color: #222; border-color: #fff; }
    main { padding: 14px; display: grid; grid-template-columns: 430px minmax(720px, 1fr); gap: 12px; align-items: start; }
    .card { background: #fff; border: 1px solid #ddd; border-left: 8px solid #d0d0d0; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
    .card h2 { display: inline-block; margin: 0 0 12px; padding: 4px 10px; border-radius: 999px; background: rgba(255,255,255,.75); border: 1px solid rgba(0,0,0,.08); font-size: 17px; }
    .card-import { background: #fff8ed; border-color: #ffbf69; }
    .card-list { background: #f1f7ff; border-color: #86b7ff; }
    .card-image { background: #f7f1ff; border-color: #b58cff; }
    .card-result { background: #f9f9f9; border-color: #bbb; }
    label { display: block; font-size: 12px; font-weight: 700; color: #555; margin-bottom: 3px; }
    input { width: 100%; border: 1px solid #bbb; border-radius: 7px; padding: 7px 8px; background: #fff; }
    .muted { color: #777; font-size: 12px; line-height: 1.6; }
    .warn { color: #b00020; font-weight: 800; }
    .ok { color: #137333; font-weight: 800; }
    .list { display: flex; flex-direction: column; gap: 7px; max-height: 46vh; overflow: auto; }
    .item { border: 1px solid #ddd; border-radius: 9px; background: #fff; padding: 8px; cursor: pointer; }
    .item.active { border-color: #222; background: #eef2ff; }
    .item-title { font-weight: 800; overflow-wrap: anywhere; }
    .item-sub { color: #666; font-size: 12px; margin-top: 3px; }
    .image-preview-wrap { min-height: 620px; border: 1px dashed #aaa; border-radius: 10px; background: #fafafa; display: flex; align-items: flex-start; justify-content: center; overflow: auto; padding: 8px; }
    #deliveryImagePreview { max-width: 100%; display: none; border-radius: 8px; box-shadow: 0 1px 8px rgba(0,0,0,0.18); transform-origin: center center; transition: transform .15s ease; }
    #result { white-space: pre-wrap; background: #f0f0f0; border: 1px solid #ddd; border-radius: 8px; padding: 10px; min-height: 48px; font-size: 13px; }
    #deliveryImageZoomText { display: inline-flex; min-width: 52px; font-weight: 800; }
  
    /* DELIVERY_NOTE_INBOX_ONE_SCREEN_FIT_20260707_START */
    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      flex: 0 0 auto;
    }

    main {
      flex: 1 1 auto;
      min-height: 0;
      height: auto;
      padding: 10px;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 10px;
      overflow: hidden;
    }

    main > section {
      min-height: 0;
      overflow: hidden;
    }

    main > section:first-child {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) minmax(0, 1fr) auto;
      gap: 8px;
      height: 100%;
    }

    main > section:first-child .card {
      min-height: 0;
      margin-bottom: 0;
      padding: 10px;
    }

    main > section:first-child .card h2,
    main > section:nth-child(2) .card h2 {
      margin-bottom: 8px;
    }

    main > section:first-child .card-list {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    main > section:first-child .card-list .list {
      flex: 1 1 auto;
      min-height: 0;
      max-height: none;
      overflow: auto;
    }

    main > section:nth-child(2) {
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    main > section:nth-child(2) .card-image {
      height: 100%;
      min-height: 0;
      margin-bottom: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .image-preview-wrap {
      flex: 1 1 auto;
      min-height: 0;
      height: auto;
      overflow: hidden;
      align-items: center;
      justify-content: center;
    }

    #deliveryImagePreview {
      max-width: none !important;
      max-height: none !important;
      width: auto;
      height: auto;
      transform-origin: center center;
    }
    /* DELIVERY_NOTE_INBOX_ONE_SCREEN_FIT_20260707_END */
  </style>
</head>
<body>
<header>
  <h1>納品書取込</h1>
  <div class="button-row">
    <button type="button" class="header-main" onclick="location.href='../payables/payable-list.html'">請求書・未払管理へ</button>
    <button type="button" class="header-main" onclick="location.href='../'">メインへ</button>
    <button type="button" class="header-main" onclick="reloadDeliveryNoteInbox(this)">再読み込み</button>
  </div>
</header>

<main>
  <section>
    <div class="card card-import">
      <h2>画像取込</h2>
      <label>納品書画像</label>
      <input id="deliveryImageFile" type="file" accept="image/*,.pdf">
      <p class="muted">ここは取込専用です。OCR・AI候補・人間編集・明細編集は別ページで行います。</p>
      <div class="button-row" style="margin-top:10px;">
        <button type="button" class="primary" onclick="uploadSelectedFile()">この画像を取込</button>
        <button type="button" onclick="clearFileInput()">選択クリア</button>
      </div>
    </div>

    <div class="card card-list">
      <h2>取込済み納品書</h2>
      <div id="importList" class="list">読み込み中...</div>
    </div>

    <div class="card card-list">
      <h2>scan_inbox</h2>
      <p class="muted">Dropbox等に置いた納品書画像を取り込む入口です。</p>
      <div id="scanList" class="list">読み込み中...</div>
    </div>

    <div class="card card-result">
      <h2>結果</h2>
      <div id="result">待機中</div>
    </div>
  </section>

  <section>
    <div class="card card-image">
      <h2>納品書画像</h2>
      <div class="button-row" style="margin-bottom:10px;">
        <button type="button" onclick="rotateImage(-90)">左90度</button>
        <button type="button" onclick="rotateImage(90)">右90度</button>
        <button type="button" onclick="zoomImage(0.1)">拡大</button>
        <button type="button" onclick="zoomImage(-0.1)">縮小</button>
        <button type="button" onclick="resetView()">表示リセット</button>
        <span id="deliveryImageZoomText" class="muted">100%</span>
      </div>
      <div class="button-row" style="margin-bottom:10px;">
        <button type="button" class="primary" onclick="openEditPage()">納品書編集ページへ</button>
      </div>
      <div class="image-preview-wrap">
        <img id="deliveryImagePreview" alt="納品書画像プレビュー">
        <div id="imageEmptyText" class="muted">左の一覧、またはファイル選択から画像を表示します。</div>
      </div>
    </div>
  </section>
</main>

<script>
let imports = [];
let selectedImportId = null;
let rotationDeg = 0;
let zoomRate = 1;
let fitScale = 1;

function esc(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function showResult(message) {
  document.getElementById("result").textContent = String(message || "");
}

function formatSize(size) {
  const n = Number(size || 0);
  if (n >= 1024 * 1024) return (n / 1024 / 1024).toFixed(1) + " MB";
  if (n >= 1024) return (n / 1024).toFixed(1) + " KB";
  return n + " B";
}

function updateImageFitScale() {
  const wrap = document.querySelector(".image-preview-wrap");
  const img = document.getElementById("deliveryImagePreview");

  if (!wrap || !img || !img.naturalWidth || !img.naturalHeight || img.style.display === "none") {
    fitScale = 1;
    applyTransform();
    return;
  }

  const wrapWidth = Math.max(1, wrap.clientWidth - 18);
  const wrapHeight = Math.max(1, wrap.clientHeight - 18);

  const rotated = Math.abs(rotationDeg % 180) === 90;
  const imageWidth = rotated ? img.naturalHeight : img.naturalWidth;
  const imageHeight = rotated ? img.naturalWidth : img.naturalHeight;

  fitScale = Math.min(wrapWidth / imageWidth, wrapHeight / imageHeight);

  if (!Number.isFinite(fitScale) || fitScale <= 0) {
    fitScale = 1;
  }

  applyTransform();
}

function applyTransform() {
  const img = document.getElementById("deliveryImagePreview");
  const finalScale = fitScale * zoomRate;
  img.style.transform = "rotate(" + rotationDeg + "deg) scale(" + finalScale + ")";
  document.getElementById("deliveryImageZoomText").textContent = Math.round(zoomRate * 100) + "%";
}

function resetView() {
  rotationDeg = 0;
  zoomRate = 1;
  updateImageFitScale();
}

function rotateImage(delta) {
  rotationDeg = (rotationDeg + delta) % 360;
  updateImageFitScale();
}

function zoomImage(delta) {
  zoomRate = Math.max(0.2, Math.min(3, Math.round((zoomRate + delta) * 10) / 10));
  applyTransform();
}

function showPreviewByUrl(url) {
  const img = document.getElementById("deliveryImagePreview");
  const empty = document.getElementById("imageEmptyText");

  img.onload = function () {
    updateImageFitScale();
  };

  img.src = url;
  img.style.display = "block";
  empty.style.display = "none";

  rotationDeg = 0;
  zoomRate = 1;
}

function clearFileInput() {
  document.getElementById("deliveryImageFile").value = "";
  showResult("ファイル選択をクリアしました。");
}

function selectImport(id) {
  selectedImportId = Number(id);
  document.querySelectorAll(".item").forEach((el) => el.classList.remove("active"));
  const active = document.querySelector(`.item[data-import-id="${selectedImportId}"]`);
  if (active) active.classList.add("active");
  showPreviewByUrl(`/api/delivery-notes/image/${selectedImportId}?t=${Date.now()}`);
  showResult(`取込ID ${selectedImportId} を選択しました。`);
}

async function loadImports() {
  const box = document.getElementById("importList");
  box.innerHTML = "読み込み中...";

  const res = await fetch("/api/delivery-notes/imports?limit=100");
  const data = await res.json();

  if (!data.ok) {
    box.innerHTML = `<div class="warn">読込失敗: ${esc(data.error)}</div>`;
    return;
  }

  imports = data.items || [];

  if (imports.length === 0) {
    box.innerHTML = '<div class="muted">取込済み納品書はありません。</div>';
    return;
  }

  box.innerHTML = imports.map((item) => `
    <div class="item" data-import-id="${esc(item.id)}" onclick="selectImport(${Number(item.id)})">
      <div class="item-title">ID ${esc(item.id)} / ${esc(item.original_file_name || item.local_image_file_name)}</div>
      <div class="item-sub">${esc(item.import_status || "")} / ${esc(item.ocr_status || "")} / ${formatSize(item.image_size_bytes)}</div>
    </div>
  `).join("");
}

async function loadScanInbox() {
  const box = document.getElementById("scanList");
  box.innerHTML = "読み込み中...";

  const res = await fetch("/api/delivery-notes/scan-inbox");
  const data = await res.json();

  if (!data.ok) {
    box.innerHTML = `<div class="warn">読込失敗: ${esc(data.error)}</div>`;
    return;
  }

  if (data.missing) {
    box.innerHTML = `<div class="muted">scan_inbox フォルダがまだありません。<br>${esc(data.dir || "")}</div>`;
    return;
  }

  const files = data.files || [];
  if (files.length === 0) {
    box.innerHTML = '<div class="muted">scan_inbox に画像・PDFはありません。</div>';
    return;
  }

  box.innerHTML = files.map((file) => `
    <div class="item">
      <div class="item-title">${esc(file.fileName)}</div>
      <div class="item-sub">${formatSize(file.sizeBytes)}</div>
      <div class="button-row" style="margin-top:6px;">
        <button type="button" onclick="importScanFile('${esc(file.fileName)}')">取込</button>
      </div>
    </div>
  `).join("");
}

async function importScanFile(fileName) {
  showResult("scan_inbox から取り込み中...");

  const res = await fetch("/api/delivery-notes/import-scan", {
    method: "POST",
    headers: { "Content-Type": "application/json; charset=utf-8" },
    body: JSON.stringify({ fileName })
  });

  const data = await res.json();

  if (!res.ok || !data.ok) {
    showResult("取込失敗: " + (data.error || ""));
    return;
  }

  await loadImports();
  selectImport(data.item.id);
  showResult("scan_inbox から取り込みました。");
}

function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ""));
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadSelectedFile() {
  const input = document.getElementById("deliveryImageFile");
  const file = input.files && input.files[0];

  if (!file) {
    showResult("先に納品書画像を選択してください。");
    return;
  }

  showResult("アップロード取り込み中...");

  const dataUrl = await readFileAsDataUrl(file);

  const res = await fetch("/api/delivery-notes/upload", {
    method: "POST",
    headers: { "Content-Type": "application/json; charset=utf-8" },
    body: JSON.stringify({
      fileName: file.name,
      dataUrl
    })
  });

  const data = await res.json();

  if (!res.ok || !data.ok) {
    showResult("取込失敗: " + (data.error || ""));
    return;
  }

  await loadImports();
  selectImport(data.item.id);
  showResult("納品書画像を取り込みました。");
}

function openEditPage() {
  if (!selectedImportId) {
    showResult("先に取込済み納品書を選択してください。");
    return;
  }

  location.href = `./delivery-note-edit.html?import_id=${encodeURIComponent(selectedImportId)}`;
}

async function loadAll() {
  const results = await Promise.allSettled([
    loadImports(),
    loadScanInbox()
  ]);

  const errors = results
    .filter((x) => x.status === "rejected")
    .map((x) => x.reason && x.reason.message ? x.reason.message : String(x.reason || ""));

  if (errors.length) {
    throw new Error(errors.join("\n"));
  }
}

async function reloadDeliveryNoteInbox(button) {
  const btn = button || null;
  const originalText = btn ? btn.textContent : "";

  if (btn) {
    btn.disabled = true;
    btn.textContent = "再読み込み中...";
  }

  showResult("再読み込み中...");

  try {
    await loadAll();
    showResult("再読み込みしました。");
  } catch (error) {
    showResult("再読み込みエラー: " + (error && error.message ? error.message : error));
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.textContent = originalText || "再読み込み";
    }
  }
}

window.reloadDeliveryNoteInbox = reloadDeliveryNoteInbox;

document.getElementById("deliveryImageFile").addEventListener("change", function () {
  const file = this.files && this.files[0];
  if (!file) return;

  if (file.type && file.type.startsWith("image/")) {
    const url = URL.createObjectURL(file);
    showPreviewByUrl(url);
  }

  showResult("ファイルを選択しました。取込ボタンでDBへ登録します。");
});

window.addEventListener("resize", function () {
  updateImageFitScale();
});
/* DELIVERY_NOTE_INBOX_RESIZE_FIT_20260707 */

loadAll().catch((error) => showResult("初期読込エラー: " + error.message));
</script>
<script src="../hd-origin-exit-guard.js"></script>
</body>
</html>
