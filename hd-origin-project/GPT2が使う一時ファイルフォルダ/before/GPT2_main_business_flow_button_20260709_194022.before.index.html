<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>HD Origin Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg-main: #eef2f7;
      --bg-panel: rgba(255, 255, 255, 0.88);
      --bg-panel-solid: #ffffff;
      --text-main: #0f172a;
      --text-sub: #64748b;
      --line-soft: rgba(148, 163, 184, 0.35);
      --shadow-soft: 0 22px 60px rgba(15, 23, 42, 0.12);
      --shadow-card: 0 14px 38px rgba(15, 23, 42, 0.10);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --blue: #2563eb;
      --cyan: #0891b2;
      --green: #059669;
      --orange: #ea580c;
      --purple: #7c3aed;
      --rose: #e11d48;
      --slate: #334155;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 34%),
        radial-gradient(circle at top right, rgba(8, 145, 178, 0.18), transparent 30%),
        linear-gradient(135deg, #f8fafc 0%, var(--bg-main) 55%, #e2e8f0 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(15, 23, 42, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, 0.035) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.75), transparent 75%);
    }

    header {
      position: relative;
      padding: 28px 32px 18px;
    }

    .hero {
      max-width: 1180px;
      margin: 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(30, 64, 175, 0.88)),
        radial-gradient(circle at 80% 10%, rgba(34, 211, 238, 0.34), transparent 38%);
      color: #ffffff;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -110px;
      top: -120px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: center;
      padding: 34px 38px;
    }

    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      color: rgba(255, 255, 255, 0.88);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 14px;
    }

    .hero-kicker::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.18);
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 4.5vw, 54px);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .hero-text {
      margin: 14px 0 0;
      color: rgba(255, 255, 255, 0.78);
      line-height: 1.8;
      font-size: 15px;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      min-width: min(360px, 100%);
    }

    main {
      position: relative;
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px 32px 42px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(300px, 0.85fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--bg-panel);
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(14px);
      overflow: hidden;
    }

    .panel-head {
      padding: 24px 26px 12px;
    }

    .panel-title {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .panel-subtitle {
      margin: 8px 0 0;
      color: var(--text-sub);
      font-size: 14px;
      line-height: 1.7;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 14px;
      padding: 18px 22px 24px;
    }

    .menu-button,
    .hero-button,
    .small-button {
      border: 0;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
    }

    .menu-button {
      position: relative;
      min-height: 112px;
      padding: 18px 18px 16px;
      border-radius: var(--radius-lg);
      background: var(--bg-panel-solid);
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.08);
      border: 1px solid rgba(148, 163, 184, 0.22);
      overflow: hidden;
    }

    .menu-button::after {
      content: "";
      position: absolute;
      inset: auto -30px -42px auto;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: var(--accent-soft);
    }

    .menu-button:hover,
    .hero-button:hover,
    .small-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.02);
    }

    .menu-button:active,
    .hero-button:active,
    .small-button:active {
      transform: translateY(0);
    }

    .menu-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #ffffff;
      font-size: 20px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 22px var(--accent-shadow);
      margin-bottom: 14px;
    }

    .menu-title {
      display: block;
      font-size: 18px;
      font-weight: 850;
      color: var(--text-main);
      letter-spacing: -0.02em;
    }

    .menu-desc {
      display: block;
      margin-top: 7px;
      color: var(--text-sub);
      font-size: 13px;
      line-height: 1.55;
      font-weight: 600;
    }

    .accent-blue {
      --accent: #2563eb;
      --accent-2: #0891b2;
      --accent-soft: rgba(37, 99, 235, 0.12);
      --accent-shadow: rgba(37, 99, 235, 0.24);
    }

    .accent-green {
      --accent: #059669;
      --accent-2: #22c55e;
      --accent-soft: rgba(5, 150, 105, 0.12);
      --accent-shadow: rgba(5, 150, 105, 0.22);
    }

    .accent-orange {
      --accent: #ea580c;
      --accent-2: #f59e0b;
      --accent-soft: rgba(234, 88, 12, 0.13);
      --accent-shadow: rgba(234, 88, 12, 0.20);
    }

    .accent-purple {
      --accent: #7c3aed;
      --accent-2: #db2777;
      --accent-soft: rgba(124, 58, 237, 0.12);
      --accent-shadow: rgba(124, 58, 237, 0.22);
    }

    .accent-slate {
      --accent: #334155;
      --accent-2: #64748b;
      --accent-soft: rgba(51, 65, 85, 0.12);
      --accent-shadow: rgba(51, 65, 85, 0.18);
    }

    .accent-rose {
      --accent: #e11d48;
      --accent-2: #fb7185;
      --accent-soft: rgba(225, 29, 72, 0.12);
      --accent-shadow: rgba(225, 29, 72, 0.18);
    }

    .hero-button {
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
      font-weight: 800;
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
    }

    .hero-button.primary {
      background: #ffffff;
      color: #1e3a8a;
    }

    .side-stack {
      display: grid;
      gap: 18px;
    }

    .status-card {
      padding: 24px;
    }

    .status-list {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 12px 13px;
      border-radius: 16px;
      background: rgba(248, 250, 252, 0.82);
      border: 1px solid var(--line-soft);
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 700;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.12);
      flex: 0 0 auto;
    }

    .bank-card {
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.90), rgba(239, 246, 255, 0.92)),
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.16), transparent 38%);
    }

    .bank-title {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .bank-text {
      margin: 10px 0 18px;
      color: var(--text-sub);
      line-height: 1.75;
      font-size: 14px;
    }

    .small-button {
      width: 100%;
      padding: 13px 16px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      color: #ffffff;
      font-size: 15px;
      font-weight: 850;
      text-align: center;
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.25);
    }

    #result {
      margin-top: 16px;
      white-space: pre-wrap;
      background: #0f172a;
      color: #dbeafe;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 16px;
      padding: 14px;
      min-height: 74px;
      line-height: 1.65;
      font-size: 13px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .danger-text {
      color: #be123c;
    }

    @media (max-width: 900px) {
      header {
        padding: 18px 16px 10px;
      }

      .hero-inner,
      .layout {
        grid-template-columns: 1fr;
      }

      .hero-inner {
        display: block;
        padding: 28px 24px;
      }

      .hero-actions {
        justify-content: flex-start;
        margin-top: 20px;
      }

      main {
        padding: 12px 16px 32px;
      }

      .layout {
        display: grid;
      }

      .menu-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header>
    <section class="hero">
      <div class="hero-inner">
        <div>
          <div class="hero-kicker">LOCAL ACCOUNTING SYSTEM</div>
          <h1>HD Origin Project</h1>
          <p class="hero-text">
            証憑、経費、未払、入金、銀行業務、マスタ管理をまとめて扱うローカル業務システムです。
          </p>
        </div>

        <div class="hero-actions">
          <button type="button" class="hero-button primary" onclick="location.href='/payables/payment-document-inbox.html'">支払書類へ</button>
          <button type="button" class="hero-button" onclick="openSettings()">設定</button>
        </div>
      </div>
    </section>
  </header>

  <main>
    <div class="layout">
      <section class="panel" id="mainMenuCard">
        <div class="panel-head">
          <h2 class="panel-title">メインメニュー</h2>
          <p class="panel-subtitle">よく使う画面へすぐ移動できます。</p>
        </div>

        <div class="menu-grid">
          <button type="button" class="menu-button accent-green" onclick="location.href='/expenses/expense-input.html'">
            <span class="menu-icon">経</span>
            <span class="menu-title">経費入力</span>
            <span class="menu-desc">レシート・支払内容を入力します。</span>
          </button>

          <button type="button" class="menu-button accent-blue" onclick="location.href='/expenses/expense-list.html'">
            <span class="menu-icon">覧</span>
            <span class="menu-title">経費一覧</span>
            <span class="menu-desc">登録済みの経費を確認します。</span>
          </button>

          <!-- PAYABLES_MAIN_MENU_BUTTON_20260706_START -->
          <button type="button" class="menu-button accent-orange" onclick="location.href='/payables/payable-list.html'">
            <span class="menu-icon">未</span>
            <span class="menu-title">請求書・未払管理</span>
            <span class="menu-desc">請求書、未払、支払予定を管理します。</span>
          </button>
          <!-- PAYABLES_MAIN_MENU_BUTTON_20260706_END -->

          <button type="button" class="menu-button accent-purple" onclick="location.href='/payables/payment-document-inbox.html'">
            <span class="menu-icon">証</span>
            <span class="menu-title">支払書類仕分け</span>
            <span class="menu-desc">OCR済み支払書類を仕分けします。</span>
          </button>

          <!-- HD_ORIGIN_RECEIVABLES_MENU_BUTTON_20260707_START -->
          <button type="button" class="menu-button accent-blue" onclick="location.href='/receivables/receivable-dashboard.html'">
            <span class="menu-icon">入</span>
            <span class="menu-title">入金管理</span>
            <span class="menu-desc">入金予定と確認状況を見ます。</span>
          </button>
          <!-- HD_ORIGIN_RECEIVABLES_MENU_BUTTON_20260707_END -->

          <button type="button" class="menu-button accent-slate" onclick="location.href='/masters/master-management.html'">
            <span class="menu-icon">主</span>
            <span class="menu-title">マスタ管理</span>
            <span class="menu-desc">区分、科目、取引先などを管理します。</span>
          </button>

          <button type="button" class="menu-button accent-slate" onclick="openSettings()">
            <span class="menu-icon">設</span>
            <span class="menu-title">設定</span>
            <span class="menu-desc">バックアップ、リストア、環境設定を開きます。</span>
          </button>

          <button type="button" class="menu-button accent-rose" onclick="exitApp()">
            <span class="menu-icon">終</span>
            <span class="menu-title">終了</span>
            <span class="menu-desc">必要に応じて終了前バックアップを作成します。</span>
          </button>
        </div>
      </section>

      <aside class="side-stack">
        <!-- HD_ORIGIN_BANK_ENTRY_BUTTON_20260708_START -->
        <section class="panel bank-card">
          <h2 class="bank-title">銀行業務・通帳明細</h2>
          <p class="bank-text">
            通帳読取、銀行明細取込、入出金確認、未払・売掛との照合を行います。
          </p>
          <button type="button" class="small-button" onclick="location.href='/bank/bank-dashboard.html'">
            銀行業務へ
          </button>
        </section>
        <!-- HD_ORIGIN_BANK_ENTRY_BUTTON_20260708_END -->

        <section class="panel status-card">
          <h2 class="panel-title">システム状態</h2>
          <p class="panel-subtitle">操作結果や終了処理の状態を表示します。</p>

          <div class="status-list">
            <div class="status-item">
              <span class="status-dot"></span>
              ローカル起動中
            </div>
            <div class="status-item">
              <span class="status-dot"></span>
              バックアップ・リストアは設定画面から確認
            </div>
          </div>

          <div id="result">待機中</div>
        </section>
      </aside>
    </div>
  </main>

<script>
function openSettings() {
  const width = 760;
  const height = 600;
  const left = window.screenX + 80;
  const top = window.screenY + 80;

  window.open(
    "/settings.html",
    "hd_origin_settings",
    `width=${width},height=${height},left=${left},top=${top},resizable=yes,scrollbars=yes`
  );
}

function showResult(message) {
  document.getElementById("result").textContent =
    typeof message === "string" ? message : JSON.stringify(message, null, 2);
}

async function exitApp() {
  const closeOk = confirm("HD Origin Projectを終了しますか？");

  if (!closeOk) {
    showResult("終了をキャンセルしました。");
    return;
  }

  const backupOk = confirm("終了前にバックアップを作成しますか？");

  showResult(
    backupOk
      ? "バックアップ作成後に終了します。少し待ってください。"
      : "バックアップせずに終了します。"
  );

  try {
    const res = await fetch("/api/app/exit", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ backup: backupOk })
    });

    const data = await res.json();
    showResult(data);

    setTimeout(() => {
      window.close();

      setTimeout(() => {
        document.body.innerHTML = `
          <main style="font-family: system-ui, sans-serif; padding: 32px;">
            <h1>HD Origin Projectを終了しました</h1>
            <p>この画面は閉じて大丈夫です。</p>
          </main>
        `;
      }, 500);
    }, 800);
  } catch (err) {
    showResult("終了処理を送信しました。サーバーが停止した可能性があります。");
  }
}
</script>
  <script src="/hd-origin-exit-guard.js?v=20260706"></script>
</body>
</html>
