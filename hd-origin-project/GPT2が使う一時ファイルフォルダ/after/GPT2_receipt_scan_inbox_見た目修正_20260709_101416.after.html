<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>レシート取込</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #edf1f7;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #cbd5e1;
      --line-soft: #e2e8f0;
      --navy: #111827;
      --blue: #2563eb;
      --sky: #0891b2;
      --green: #16a34a;
      --orange: #ea580c;
      --amber: #f59e0b;
      --red: #b00020;
      --shadow: 0 14px 34px rgba(15, 23, 42, 0.12);
      --shadow-soft: 0 8px 18px rgba(15, 23, 42, 0.08);
      --radius: 16px;
      --radius-sm: 10px;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(22, 163, 74, 0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.13), transparent 28%),
        linear-gradient(135deg, #f8fafc 0%, var(--bg) 55%, #e2e8f0 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    .wrap {
      width: 100vw;
      height: 100dvh;
      margin: 0;
      padding: 0.8rem;
      display: grid;
      grid-template-columns: 24rem minmax(0, 1fr);
      grid-template-rows: auto minmax(0, 1fr);
      gap: 0.75rem;
    }

    .top {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(21, 128, 61, 0.92)),
        radial-gradient(circle at 92% 12%, rgba(125, 211, 252, 0.28), transparent 34%);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 1rem;
      padding: 0.72rem 0.82rem;
      box-shadow: var(--shadow);
    }

    h1 {
      font-size: 1.15rem;
      margin: 0 0.55rem 0 0;
      white-space: nowrap;
      letter-spacing: -0.02em;
    }

    h1::before {
      content: "SCAN";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-right: 0.5rem;
      padding: 0.18rem 0.42rem;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.18);
      color: #bbf7d0;
      border: 1px solid rgba(187, 247, 208, 0.28);
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      vertical-align: middle;
    }

    .muted {
      color: rgba(255, 255, 255, 0.74);
      font-size: 0.8rem;
      line-height: 1.45;
    }

    button {
      border: 0;
      border-radius: 0.58rem;
      background: linear-gradient(135deg, #111827, #334155);
      color: #ffffff;
      font-weight: 800;
      padding: 0.48rem 0.7rem;
      cursor: pointer;
      white-space: nowrap;
      font-size: 0.82rem;
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.12);
      transition: transform 0.12s ease, filter 0.12s ease, box-shadow 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      background: linear-gradient(135deg, var(--blue), var(--sky));
    }

    .panel {
      min-height: 0;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: var(--radius);
      padding: 0.65rem;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
    }

    .panel-title {
      flex: 0 0 auto;
      font-weight: 900;
      margin-bottom: 0.55rem;
      min-height: 1.75rem;
      display: flex;
      align-items: center;
      gap: 0.38rem;
      color: var(--ink);
    }

    .panel-title::before {
      content: "";
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.13);
    }

    .summary {
      flex: 0 0 auto;
      font-size: 0.82rem;
      line-height: 1.52;
      background: linear-gradient(135deg, #f0fdf4, #eff6ff);
      border: 1px solid #bbf7d0;
      color: #14532d;
      border-radius: 0.65rem;
      padding: 0.6rem 0.65rem;
      margin-bottom: 0.55rem;
      white-space: pre-wrap;
      font-weight: 750;
    }

    .list {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      overflow: auto;
      padding-right: 0.08rem;
    }

    .list::-webkit-scrollbar,
    .path::-webkit-scrollbar {
      width: 0.55rem;
    }

    .list::-webkit-scrollbar-thumb,
    .path::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 999px;
    }

    .item-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto auto !important;
      gap: 0.32rem;
      align-items: stretch;
    }

    .item {
      display: grid;
      grid-template-columns: 2.2rem minmax(0, 1fr) 4.6rem;
      gap: 0.36rem;
      align-items: center;
      width: 100%;
      text-align: left;
      background: #f8fafc;
      color: var(--ink);
      border: 1px solid var(--line-soft);
      border-radius: 0.58rem;
      padding: 0.42rem 0.48rem;
      box-shadow: none;
    }

    .item:hover {
      background: #eef6ff;
    }

    .item.active {
      background: linear-gradient(135deg, #111827, #15803d);
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.18);
    }

    .no {
      text-align: center;
      font-weight: 950;
      font-size: 0.8rem;
      opacity: 0.9;
    }

    .name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
      font-size: 0.82rem;
    }

    .size {
      text-align: right;
      font-size: 0.72rem;
      font-weight: 850;
      opacity: 0.88;
    }

    .rotate-mini,
    .delete-mini {
      font-size: 0.72rem;
      font-weight: 900;
      padding: 0.36rem 0.48rem;
      border-radius: 0.52rem;
      min-width: 3.2rem;
      cursor: pointer;
      box-shadow: none;
    }

    .rotate-mini {
      border: 1px solid #94a3b8;
      color: #0f172a;
      background: #ffffff;
    }

    .rotate-mini:hover {
      background: #f1f5f9;
    }

    .delete-mini {
      border: 1px solid rgba(176, 0, 32, 0.28);
      color: var(--red);
      background: #fff5f5;
    }

    .delete-mini:hover {
      background: #ffe4e6;
    }

    .preview {
      flex: 1 1 auto;
      min-height: 0;
      width: 100% !important;
      height: auto !important;
      max-height: none !important;
      overflow: hidden !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      background:
        linear-gradient(135deg, #f8fafc, #eef2f7) !important;
      border: 1px solid rgba(203, 213, 225, 0.95);
      border-radius: var(--radius-sm) !important;
      color: var(--muted);
      font-weight: 800;
      padding: 0.55rem;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85);
    }

    .preview img,
    #preview img {
      display: block !important;
      max-width: 100% !important;
      max-height: 100% !important;
      width: auto !important;
      height: auto !important;
      object-fit: contain !important;
      margin: 0 auto !important;
      background: #ffffff !important;
      border: 1px solid var(--line);
      border-radius: 0.5rem;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
    }

    .path {
      flex: 0 0 auto;
      margin-top: 0.55rem;
      max-height: 6.5rem;
      overflow: auto;
      font-size: 0.74rem;
      line-height: 1.45;
      color: var(--muted);
      word-break: break-all;
      white-space: pre-wrap;
      background: #f8fafc;
      border: 1px solid var(--line-soft);
      border-radius: 0.6rem;
      padding: 0.55rem;
    }

    #uploadInput,
    #folderInput {
      max-width: 18rem;
      font-size: 0.85rem;
      padding: 0.35rem;
      border: 1px solid #d1d5db;
      border-radius: 0.45rem;
      background: #fff;
    }

    @media (max-width: 82rem) {
      body {
        height: auto;
        min-height: 100dvh;
        overflow: auto;
      }

      .wrap {
        width: 100%;
        height: auto;
        min-height: 100dvh;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }

      .list {
        max-height: 20rem;
      }

      .preview {
        height: 34rem !important;
        min-height: 34rem !important;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>レシート取込システム</h1>
      <button id="uploadFileButton" onclick="document.getElementById('uploadInput').click()">ファイル追加</button>
      <button id="uploadFolderButton" onclick="document.getElementById('folderInput').click()">フォルダ追加</button>
      <input id="uploadInput" type="file" accept="image/*" multiple onchange="uploadSelectedFiles()" style="display:none">
      <input id="folderInput" type="file" accept="image/*" multiple webkitdirectory onchange="uploadSelectedFolder()" style="display:none">
      <button onclick="loadInbox()">再読込</button>
      <button onclick="runImportAll()">取込待ちを処理</button>
      <button type="button" onclick="location.href=&quot;/&quot;">メインページ</button>
      <button class="secondary" onclick="openConfirmPage()">読取確認ページ</button>
      <span class="muted">選択した画像をPROJECT内部で処理します。</span>
    </div>

    <section class="panel">
      <div class="panel-title">取込待ち一覧</div>
      <div id="summary" class="summary">読込中...</div>
      <div id="list" class="list"></div>
    </section>

    <section class="panel">
      <div class="panel-title">選択中画像</div>
      <div id="preview" class="preview">左から選択してください。</div>
      <div id="detail" class="path"></div>
    </section>
  </div>

<script>
  let items = [];
  let selectedIndex = -1;

  function esc(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function kb(bytes) {
    return Math.round((Number(bytes) || 0) / 1024) + " KB";
  }

  function readFileAsDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();

      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  const RECEIPT_UPLOAD_MAX_BYTES = 100 * 1024;

  function dataUrlBytes(dataUrl) {
    const base64 = String(dataUrl || "").split(",")[1] || "";
    return Math.round(base64.length * 3 / 4);
  }

  function fileNameWithoutExt(fileName) {
    return String(fileName || "receipt").replace(/\.[^.]+$/, "");
  }

  function readFileAsImage(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();

      reader.onload = () => {
        const img = new Image();

        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = reader.result;
      };

      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function drawImageToDataUrl(img, maxSide, quality) {
    let w = img.naturalWidth;
    let h = img.naturalHeight;

    const longSide = Math.max(w, h);

    if (longSide > maxSide) {
      const scale = maxSide / longSide;
      w = Math.round(w * scale);
      h = Math.round(h * scale);
    }

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = w;
    canvas.height = h;

    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, w, h);
    ctx.drawImage(img, 0, 0, w, h);

    return canvas.toDataURL("image/jpeg", quality);
  }

  async function prepareReceiptImageForUpload(file) {
    if (file.size <= RECEIPT_UPLOAD_MAX_BYTES) {
      return {
        dataUrl: await readFileAsDataUrl(file),
        fileName: file.name,
        mimeType: file.type || "image/jpeg",
        originalBytes: file.size,
        uploadBytes: file.size,
        compressed: false
      };
    }

    const img = await readFileAsImage(file);

    const attempts = [
      { maxSide: 1600, quality: 0.72 },
      { maxSide: 1400, quality: 0.68 },
      { maxSide: 1200, quality: 0.64 },
      { maxSide: 1000, quality: 0.58 },
      { maxSide: 900,  quality: 0.52 },
      { maxSide: 800,  quality: 0.48 },
      { maxSide: 700,  quality: 0.44 },
      { maxSide: 600,  quality: 0.40 },
      { maxSide: 520,  quality: 0.36 }
    ];

    let bestDataUrl = "";
    let bestBytes = Number.MAX_SAFE_INTEGER;

    for (const attempt of attempts) {
      const dataUrl = drawImageToDataUrl(img, attempt.maxSide, attempt.quality);
      const bytes = dataUrlBytes(dataUrl);

      if (bytes < bestBytes) {
        bestDataUrl = dataUrl;
        bestBytes = bytes;
      }

      if (bytes <= RECEIPT_UPLOAD_MAX_BYTES) {
        break;
      }
    }

    return {
      dataUrl: bestDataUrl,
      fileName: fileNameWithoutExt(file.name) + "_compressed.jpg",
      mimeType: "image/jpeg",
      originalBytes: file.size,
      uploadBytes: bestBytes,
      compressed: true
    };
  }

  async function uploadSelectedFiles() {
    return uploadSelectedFilesFromInput("uploadInput");
  }

  async function uploadSelectedFolder() {
    return uploadSelectedFilesFromInput("folderInput");
  }

  async function uploadSelectedFilesFromInput(inputId) {
    const input = document.getElementById(inputId);
    const summary = document.getElementById("summary");

    const files = Array.from(input.files || []).filter((file) => {
      return file && file.type && file.type.indexOf("image/") === 0;
    });

    if (!files.length) {
      summary.textContent = "画像ファイルが選択されていません。";
      return;
    }

    let successCount = 0;
    let errorCount = 0;
    const errors = [];

    summary.textContent =
      "取込待ちへ追加中です。\n" +
      "対象: " + files.length + "件";

    for (let i = 0; i < files.length; i++) {
      const file = files[i];

      try {
        summary.textContent =
          "取込待ちへ追加中です。\n" +
          "処理中: " + (i + 1) + " / " + files.length + "\n" +
          "ファイル: " + file.name + "\n" +
          "100KB超の画像は自動圧縮します。";

        const prepared = await prepareReceiptImageForUpload(file);

        const res = await fetch("/api/receipts/scan-inbox/upload", {
          method: "POST",
          headers: {
            "Content-Type": "application/json; charset=utf-8"
          },
          body: JSON.stringify({
            fileName: prepared.fileName,
            mimeType: prepared.mimeType,
            dataUrl: prepared.dataUrl
          })
        });

        const data = await res.json();

        if (!data.ok) {
          throw new Error(data.error || "追加失敗");
        }

        successCount++;
      } catch (error) {
        errorCount++;
        errors.push(file.name + ": " + (error.message || String(error)));
      }
    }

    input.value = "";

    await loadInbox();

    document.getElementById("summary").textContent =
      "取込待ち追加完了\n" +
      "追加成功: " + successCount + "件\n" +
      "エラー: " + errorCount + "件\n\n" +
      (errors.length ? errors.join("\n") + "\n\n" : "") +
      document.getElementById("summary").textContent;
  }

  async function loadInbox() {
    const summary = document.getElementById("summary");
    const list = document.getElementById("list");
    const preview = document.getElementById("preview");
    const detail = document.getElementById("detail");

    summary.textContent = "読込中...";
    list.innerHTML = "";
    preview.textContent = "左から選択してください。";
    detail.textContent = "";

    const res = await fetch("/api/receipts/scan-inbox");
    const data = await res.json();

    if (!data.ok) {
      summary.textContent = "読込失敗: " + (data.error || "原因不明");
      return;
    }

    items = data.items || [];
    selectedIndex = -1;

    summary.textContent =
      "一時保存先: " + data.dir + "\n" +
      "件数: " + data.count + "件\n" +
      "通常上限: " + data.normalLimit + "件\n" +
      "最大上限: " + data.hardLimit + "件";

    if (!items.length) {
      list.innerHTML = '<div class="muted">画像がありません。</div>';
      return;
    }

    list.innerHTML = items.map((item, index) => {
      return `
        <div class="item-row">
          <button class="item" onclick="selectItem(${index})">
            <span class="no">${index + 1}</span>
            <span class="name">${esc(item.fileName)}</span>
            <span class="size">${kb(item.sizeBytes)}</span>
          </button>
          <button class="rotate-mini" onclick="rotateInboxItem(event, ${index}, -90)">左回転</button>
          <button class="rotate-mini" onclick="rotateInboxItem(event, ${index}, 90)">右回転</button>
          <button class="delete-mini" onclick="deleteInboxItem(event, ${index})">削除</button>
        </div>
      `;
    }).join("");
selectItem(0);
  }
  function inboxImageSrc(fileName) {
    return "/api/receipts/scan-inbox/image?fileName=" +
      encodeURIComponent(fileName) +
      "&v=" + Date.now();
  }
function mimeForRotatedOutput(fileName) {
    const ext = String(fileName || "").toLowerCase();

    if (ext.endsWith(".png")) return "image/png";
    if (ext.endsWith(".webp")) return "image/webp";

    return "image/jpeg";
  }

  function loadInboxImageForRotate(fileName) {
    return new Promise((resolve, reject) => {
      const img = new Image();

      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error("画像の読み込みに失敗しました。"));

      img.src = inboxImageSrc(fileName);
    });
  }

  function drawRotatedDataUrl(img, degrees, fileName) {
    const normalized = ((degrees % 360) + 360) % 360;
    const w = img.naturalWidth || img.width;
    const h = img.naturalHeight || img.height;

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    if (normalized === 90 || normalized === 270) {
      canvas.width = h;
      canvas.height = w;
    } else {
      canvas.width = w;
      canvas.height = h;
    }

    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();

    if (normalized === 90) {
      ctx.translate(canvas.width, 0);
      ctx.rotate(Math.PI / 2);
    } else if (normalized === 180) {
      ctx.translate(canvas.width, canvas.height);
      ctx.rotate(Math.PI);
    } else if (normalized === 270) {
      ctx.translate(0, canvas.height);
      ctx.rotate(-Math.PI / 2);
    }

    ctx.drawImage(img, 0, 0);
    ctx.restore();

    const mime = mimeForRotatedOutput(fileName);

    if (mime === "image/jpeg") {
      return canvas.toDataURL(mime, 0.9);
    }

    return canvas.toDataURL(mime);
  }

  async function rotateInboxItem(event, index, degrees) {
    event.stopPropagation();

    const item = items[index];
    if (!item) return;

    const summary = document.getElementById("summary");

    summary.textContent =
      "画像を回転保存中です。\n" +
      item.fileName;

    try {
      const img = await loadInboxImageForRotate(item.fileName);
      const dataUrl = drawRotatedDataUrl(img, degrees, item.fileName);

      const res = await fetch("/api/receipts/scan-inbox/replace", {
        method: "POST",
        headers: {
          "Content-Type": "application/json; charset=utf-8"
        },
        body: JSON.stringify({
          fileName: item.fileName,
          dataUrl
        })
      });

      const data = await res.json();

      if (!data.ok) {
        throw new Error(data.error || "回転保存に失敗しました。");
      }

      const fileName = item.fileName;

      refreshInboxPreview(fileName);

      await loadInbox();

      const nextIndex = items.findIndex((x) => x.fileName === fileName);
      if (nextIndex >= 0) {
        selectItem(nextIndex);
      
        refreshInboxPreview(fileName);}

      document.getElementById("summary").textContent =
        "画像の向きを保存しました。\n" +
        fileName + "\n\n" +
        document.getElementById("summary").textContent;

    } catch (error) {
      summary.textContent =
        "回転保存エラー:\n" +
        item.fileName + "\n" +
        (error.message || String(error));
    }
  }
  async function deleteInboxItem(event, index) {
    event.stopPropagation();

    const item = items[index];
    if (!item) return;

    const ok = confirm(
      "この画像を削除しますか？\n\n" +
      item.fileName + "\n\n" +
      "取込待ちから削除します。"
    );

    if (!ok) return;

    const summary = document.getElementById("summary");

    summary.textContent =
      "削除中です。\n" +
      item.fileName;

    const url = "/api/receipts/scan-inbox/delete?fileName=" + encodeURIComponent(item.fileName);

    const res = await fetch(url, {
      method: "POST"
    });

    const data = await res.json();

    if (!data.ok) {
      summary.textContent = "削除エラー:\n" + (data.error || "原因不明");
      return;
    }

    await loadInbox();

    document.getElementById("summary").textContent =
      "削除しました。\n" +
      item.fileName + "\n\n" +
      document.getElementById("summary").textContent;
  }

  function refreshInboxPreview(fileName) {
    const preview = document.getElementById("preview");
    if (!preview || !fileName) return;

    const src = inboxImageSrc(fileName);
    const img = preview.querySelector("img");

    if (img) {
      img.src = src;
    } else {
      preview.innerHTML = '<img src="' + src + '" alt="receipt">';
    }
  }
  function selectItem(index) {
    selectedIndex = index;
    const item = items[index];

    document.querySelectorAll(".item").forEach((el, i) => {
      el.classList.toggle("active", i === index);
    });

    const src = inboxImageSrc(item.fileName);

    document.getElementById("preview").innerHTML =
      '<img src="' + src + '" alt="receipt">';

    document.getElementById("detail").textContent =
      "ファイル名: " + item.fileName + "\n" +
      "サイズ: " + kb(item.sizeBytes) + "\n" +
      "SHA-256: " + item.sha256 + "\n" +
      "パス: " + item.fullPath;
  }

  async function confirmContentDuplicatesAfterImportAll(data) {
    const candidates = (data.results || []).filter((r) => {
      return r.status === "content_duplicate_needs_confirm";
    });

    if (!candidates.length) {
      return;
    }

    for (const item of candidates) {
      const ok = confirm(
        "内容重複候補があります。\n\n" +
        "ファイル: " + item.fileName + "\n" +
        "既存ID: " + (item.existingId || "") + "\n" +
        "類似度: " + (item.similarity || "") + "\n\n" +
        "それでも取り込みますか？\n\n" +
        "はい：取り込む\n" +
        "いいえ：scan_inbox に残す"
      );

      if (!ok) {
        continue;
      }

      const url =
        "/api/receipts/scan-inbox/import-one?allowContentDuplicate=1&fileName=" +
        encodeURIComponent(item.fileName);

      const res = await fetch(url, {
        method: "POST"
      });

      const forced = await res.json();

      if (!forced.ok) {
        alert(
          "強制取込に失敗しました。\n\n" +
          item.fileName + "\n" +
          (forced.error || forced.message || "原因不明")
        );
      }
    }
  }

  async function runImportAll(force) {
    const summary = document.getElementById("summary");

    summary.textContent = "取込待ちを処理中です。しばらく待ってください。";

    const url = "/api/receipts/scan-inbox/import-all" + (force ? "?force=1" : "");

    const res = await fetch(url, {
      method: "POST"
    });

    const data = await res.json();

    
    await confirmContentDuplicatesAfterImportAll(data);
if (!data.ok && data.requireForce) {
      if (confirm(data.error + "\n\n続行しますか？")) {
        await runImportAll(true);
      } else {
        summary.textContent = "取込待ちを処理をキャンセルしました。";
      }
      return;
    }

    if (!data.ok) {
      summary.textContent = "取込待ちを処理エラー:\n" + (data.error || "原因不明");
      return;
    }

    const resultText =
      "取込待ちを処理完了\n" +
      "対象: " + (data.count || 0) + "件\n" +
      "取込成功: " + (data.importedCount || 0) + "件\n" +
      "重複: " + (data.duplicateCount || 0) + "件\n" +
      "エラー: " + (data.errorCount || 0) + "件\n" +
      "batchId: " + (data.batchId || "");

    await loadInbox();

    document.getElementById("summary").textContent =
      resultText + "\n\n" + document.getElementById("summary").textContent;
  }

  function openConfirmPage() {
    location.href = "/receipts/receipt-list.html";
  }

  loadInbox();
</script>
