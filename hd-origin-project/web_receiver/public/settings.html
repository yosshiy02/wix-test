<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>HD Origin Project - 設定</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }
    header {
      background: #333;
      color: white;
      padding: 16px 22px;
    }
    header h1 {
      margin: 0;
      font-size: 20px;
    }
    main {
      padding: 22px;
    }
    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 22px;
      margin-bottom: 18px;
    }
    .button-row {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    button, select {
      font-size: 16px;
      padding: 12px;
    }
    button {
      font-weight: 700;
      cursor: pointer;
      border: 1px solid #aaa;
      border-radius: 8px;
      background: #fff;
    }
    button:hover {
      background: #eee;
    }
    .danger {
      border-color: #b00020;
      color: #b00020;
    }
    .note {
      color: #666;
      line-height: 1.7;
    }
    #result {
      white-space: pre-wrap;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      min-height: 80px;
      margin-top: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 12px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    th {
      background: #eee;
    }
  </style>
</head>
<body>
  <header>
    <h1>設定</h1>
  </header>

  <main>
    <div class="card">
      <h2>データ丸ごとバックアップ／リストア</h2>
      <p class="note">
        対象：PostgreSQL の hd_origin_project データベース丸ごと<br>
        保存先：backup フォルダ<br>
        形式：.backup
      </p>

      <div class="button-row">
        <button type="button" onclick="createBackup()">現状バックアップ</button>
        <button type="button" onclick="loadBackups()">バックアップ一覧更新</button>
      </div>

      <h3>リストア対象</h3>
      <select id="backupSelect" style="width: 100%;"></select>

      <div class="button-row">
        <button type="button" class="danger" onclick="restoreBackup()">選択したバックアップからリストア</button>
      </div>

      <div id="result">待機中</div>
    </div>

    <div class="card">
      <h2>バックアップ一覧</h2>
      <div id="backupList">読み込み中...</div>
    </div>
      <div class="card">
      <h2>プログラム本体バックアップ</h2>
      <p class="note">
        対象：hd-origin-project のプログラム本体<br>
        含む：HTML / server.js / database / docs / .env など<br>
        除外：.git / node_modules / backup / 一時ファイル<br>
        保存先：backup/project フォルダ
      </p>

      <div class="button-row">
        <button type="button" onclick="createProjectBackup()">プログラム本体バックアップ</button>
        <button type="button" onclick="loadProjectBackups()">プログラムバックアップ一覧更新</button>
      </div>

      <div id="projectBackupResult">待機中</div>
      <div id="projectBackupList">読み込み中...</div>
    </div>
</main>

<script>
function showResult(data) {
  document.getElementById("result").textContent =
    typeof data === "string" ? data : JSON.stringify(data, null, 2);
}

function formatBytes(bytes) {
  if (!bytes) return "0 B";
  const units = ["B", "KB", "MB", "GB"];
  let size = bytes;
  let unit = 0;
  while (size >= 1024 && unit < units.length - 1) {
    size = size / 1024;
    unit++;
  }
  return `${size.toFixed(1)} ${units[unit]}`;
}

function formatJst(value) {
  if (!value) return "";

  const d = new Date(value);

  return new Intl.DateTimeFormat("ja-JP", {
    timeZone: "Asia/Tokyo",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: false
  }).format(d);
}

async function createBackup() {
  showResult("バックアップ作成中です。少し待ってください。");

  const res = await fetch("/api/backup/create", {
    method: "POST"
  });

  const data = await res.json();
  showResult(data);
  await async function createProjectBackup() {
  document.getElementById("projectBackupResult").textContent =
    "プログラム本体バックアップ作成中です。少し待ってください。";

  const res = await fetch("/api/project-backup/create", {
    method: "POST"
  });

  const data = await res.json();

  document.getElementById("projectBackupResult").textContent =
    JSON.stringify(data, null, 2);

  await loadProjectBackups();
}

async function loadProjectBackups() {
  const res = await fetch("/api/project-backup/list");
  const data = await res.json();

  if (!data.ok) {
    document.getElementById("projectBackupList").textContent =
      JSON.stringify(data, null, 2);
    return;
  }

  if (!data.backups.length) {
    document.getElementById("projectBackupList").textContent =
      "プログラム本体バックアップはまだありません。";
    return;
  }

  let html = "<table><tr><th>ファイル名</th><th>サイズ</th><th>更新日時</th></tr>";

  for (const backup of data.backups) {
    html += `
      <tr>
        <td>${backup.file_name}</td>
        <td>${formatBytes(backup.size_bytes)}</td>
        <td>${formatJst(backup.updated_at)}</td>
      </tr>
    `;
  }

  html += "</table>";
  document.getElementById("projectBackupList").innerHTML = html;
}

loadBackups();
loadProjectBackups();
}

async function loadBackups() {
  const res = await fetch("/api/backup/list");
  const data = await res.json();

  if (!data.ok) {
    showResult(data);
    return;
  }

  const select = document.getElementById("backupSelect");
  select.innerHTML = "";

  if (!data.backups.length) {
    document.getElementById("backupList").textContent = "バックアップはまだありません。";
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = "バックアップなし";
    select.appendChild(opt);
    return;
  }

  let html = "<table><tr><th>区分</th><th>ファイル名</th><th>サイズ</th><th>更新日時</th></tr>";

  for (const backup of data.backups) {
    const label =
      backup.is_latest_normal
        ? "【最新版】" + backup.file_name
        : backup.is_safety_backup
          ? "【リストア前保険】" + backup.file_name
          : backup.file_name;

    const opt = document.createElement("option");
    opt.value = backup.file_name;
    opt.textContent = label;
    select.appendChild(opt);

    const typeLabel =
      backup.is_latest_normal
        ? "最新版"
        : backup.is_safety_backup
          ? "リストア前保険"
          : "通常";

    html += `
      <tr>
        <td>${typeLabel}</td>
        <td>${label}</td>
        <td>${formatBytes(backup.size_bytes)}</td>
        <td>${formatJst(backup.updated_at)}</td>
      </tr>
    `;
  }

  html += "</table>";
  document.getElementById("backupList").innerHTML = html;
}

async function restoreBackup() {
  const fileName = document.getElementById("backupSelect").value;

  if (!fileName) {
    alert("リストアするバックアップを選んでください。");
    return;
  }

  const ok1 = confirm(
    "リストアします。\n\n現在のデータは選択したバックアップの内容に戻ります。\n実行前に安全用バックアップも自動作成します。\n\n続けますか？"
  );

  if (!ok1) {
    showResult("リストアをキャンセルしました。");
    return;
  }

  const ok2 = confirm(
    "最終確認です。\n\nリストア対象:\n" + fileName + "\n\n本当に実行しますか？"
  );

  if (!ok2) {
    showResult("リストアをキャンセルしました。");
    return;
  }

  showResult("リストア中です。少し待ってください。");

  const res = await fetch("/api/backup/restore", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ file_name: fileName })
  });

  const data = await res.json();
  showResult(data);
  await async function createProjectBackup() {
  document.getElementById("projectBackupResult").textContent =
    "プログラム本体バックアップ作成中です。少し待ってください。";

  const res = await fetch("/api/project-backup/create", {
    method: "POST"
  });

  const data = await res.json();

  document.getElementById("projectBackupResult").textContent =
    JSON.stringify(data, null, 2);

  await loadProjectBackups();
}

async function loadProjectBackups() {
  const res = await fetch("/api/project-backup/list");
  const data = await res.json();

  if (!data.ok) {
    document.getElementById("projectBackupList").textContent =
      JSON.stringify(data, null, 2);
    return;
  }

  if (!data.backups.length) {
    document.getElementById("projectBackupList").textContent =
      "プログラム本体バックアップはまだありません。";
    return;
  }

  let html = "<table><tr><th>ファイル名</th><th>サイズ</th><th>更新日時</th></tr>";

  for (const backup of data.backups) {
    html += `
      <tr>
        <td>${backup.file_name}</td>
        <td>${formatBytes(backup.size_bytes)}</td>
        <td>${formatJst(backup.updated_at)}</td>
      </tr>
    `;
  }

  html += "</table>";
  document.getElementById("projectBackupList").innerHTML = html;
}

loadBackups();
loadProjectBackups();
}

async function createProjectBackup() {
  document.getElementById("projectBackupResult").textContent =
    "プログラム本体バックアップ作成中です。少し待ってください。";

  const res = await fetch("/api/project-backup/create", {
    method: "POST"
  });

  const data = await res.json();

  document.getElementById("projectBackupResult").textContent =
    JSON.stringify(data, null, 2);

  await loadProjectBackups();
}

async function loadProjectBackups() {
  const res = await fetch("/api/project-backup/list");
  const data = await res.json();

  if (!data.ok) {
    document.getElementById("projectBackupList").textContent =
      JSON.stringify(data, null, 2);
    return;
  }

  if (!data.backups.length) {
    document.getElementById("projectBackupList").textContent =
      "プログラム本体バックアップはまだありません。";
    return;
  }

  let html = "<table><tr><th>ファイル名</th><th>サイズ</th><th>更新日時</th></tr>";

  for (const backup of data.backups) {
    html += `
      <tr>
        <td>${backup.file_name}</td>
        <td>${formatBytes(backup.size_bytes)}</td>
        <td>${formatJst(backup.updated_at)}</td>
      </tr>
    `;
  }

  html += "</table>";
  document.getElementById("projectBackupList").innerHTML = html;
}

loadBackups();
loadProjectBackups();
</script>
</body>
</html>
