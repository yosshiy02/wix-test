<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CSV出力モック画面</title>
  <link rel="stylesheet" href="./csv-export.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>CSV出力モック画面</h1>
      <p class="notice">現在は独立モジュール試験画面です。本番データには接続していません。</p>
    </header>

    <section class="panel">
      <h2>出力条件</h2>
      <div class="form-grid">
        <label>
          <span>出力種別</span>
          <select id="exportType"></select>
        </label>

        <label>
          <span>会社</span>
          <input id="companyCode" type="text" value="HATO_DAIYA">
        </label>

        <label>
          <span>対象期間From</span>
          <input id="dateFrom" type="date" value="2026-07-01">
        </label>

        <label>
          <span>対象期間To</span>
          <input id="dateTo" type="date" value="2026-07-31">
        </label>

        <label>
          <span>状態</span>
          <select id="status">
            <option value="">指定なし</option>
            <option value="draft">下書き</option>
            <option value="approved">承認済み</option>
            <option value="scheduled">支払予定</option>
          </select>
        </label>

        <label>
          <span>文字コード</span>
          <select id="encoding"></select>
        </label>

        <label>
          <span>出力プロファイル</span>
          <select id="profileCode"></select>
        </label>

        <label class="checkbox-row">
          <input id="includeHeader" type="checkbox" checked>
          <span>ヘッダーあり</span>
        </label>
      </div>

      <div class="action-row">
        <button id="generateButton" type="button">CSV生成</button>
        <button id="downloadButton" type="button" disabled>ダウンロード</button>
      </div>
    </section>

    <section class="panel two-col">
      <div>
        <h2>出力予定件数</h2>
        <div id="recordCount" class="metric">0</div>
      </div>
      <div>
        <h2>検証結果</h2>
        <pre id="validationResult" class="log-box">未実行</pre>
      </div>
    </section>

    <section class="panel">
      <h2>CSVプレビュー</h2>
      <textarea id="csvPreview" class="preview" spellcheck="false" readonly></textarea>
    </section>
  </main>

  <script src="./csv-export.js"></script>
</body>
</html>
