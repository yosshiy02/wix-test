<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>経費入力 - HD Origin Project</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #222;
      color: white;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 18px;
    }

    main {
      padding: 12px;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
      max-width: 920px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(145px, max-content));
      gap: 8px 14px;
      align-items: start;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 3px;
      font-size: 13px;
    }

    input,
    select,
    textarea,
    button {
      box-sizing: border-box;
      padding: 6px 8px;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      width: 100%;
    }

    textarea {
      min-height: 38px;
    }

    button {
      font-weight: 700;
      cursor: pointer;
      border: 1px solid #aaa;
      border-radius: 8px;
      background: #fff;
    }

    button:hover {
      background: #eee;
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .danger {
      border-color: #b00020;
      color: #b00020;
    }

    .money {
      text-align: right;
    }

    .date-field {
      max-width: 160px;
    }

    .date-row {
      display: flex;
      align-items: center;
      width: 150px;
      height: 34px;
      border: 1px solid #aaa;
      border-radius: 7px;
      background: #fff;
      overflow: hidden;
    }

    .date-text-input {
      width: 112px;
      height: 32px;
      border: 0;
      padding: 5px 6px;
      font-size: 14px;
      outline: none;
    }

    .date-calendar-input {
      width: 34px;
      min-width: 34px;
      height: 32px;
      border: 0;
      padding: 0 2px;
      color: transparent;
      background: transparent;
      cursor: pointer;
      outline: none;
    }

    .date-calendar-input::-webkit-calendar-picker-indicator {
      margin: 0;
      padding: 0;
      cursor: pointer;
    }

    .date-preview {
      width: 280px;
      font-size: 12px;
      line-height: 1.4;
      margin-top: 4px;
      color: #555;
    }

    .date-preview.warning {
      color: #b00020;
      font-weight: 700;
    }

    #vendorName {
      width: 190px;
    }

    #paymentMethod {
      width: 165px;
    }

    #totalAmount {
      width: 115px;
    }

    #targetPersonId {
      width: 120px;
    }

    #purposeId {
      width: 155px;
    }

    #projectId {
      width: 175px;
    }

    #departmentId {
      width: 135px;
    }

    #invoiceStatus {
      width: 115px;
    }

    #invoiceNumber {
      width: 155px;
    }

    #evidenceType {
      width: 125px;
    }

    #evidenceMemo {
      width: 170px;
    }

    .summary-input {
      width: 420px;
      max-width: 100%;
      min-height: 36px;
      height: 38px;
      resize: vertical;
    }

    .detail-table-wrap {
      max-width: 100%;
      overflow-x: auto;
      border: 1px solid #ddd;
      background: #fff;
    }

    .detail-table {
      width: auto;
      min-width: 780px;
      margin-top: 0;
      table-layout: fixed;
      border-collapse: collapse;
      background: white;
    }

    .detail-table th,
    .detail-table td {
      border: 1px solid #ddd;
      padding: 4px;
      font-size: 13px;
      vertical-align: top;
    }

    .detail-table th {
      background: #eee;
    }

    #detailBody select.accountTitle {
      width: 118px;
    }

    #detailBody input.description {
      width: 215px;
    }

    #detailBody input.amount {
      width: 88px;
      text-align: right;
    }

    #detailBody select.taxCategory {
      width: 92px;
    }

    #detailBody input.memo {
      width: 145px;
    }

    #detailBody button {
      padding: 4px 7px;
      font-size: 12px;
      min-width: 44px;
    }

    #result {
      white-space: pre-wrap;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px;
      min-height: 44px;
      margin-top: 10px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <h1>経費入力</h1>
    <div class="button-row" style="margin-top:0;">
      <button onclick="location.href='/'">メインへ</button>
      <button onclick="location.href='/expenses/expense-list.html'">経費一覧</button>
      <button onclick="location.href='/receipts/receipt-scan-inbox.html'">レシート機能</button>
    </div>
  </header>

  <main>
    <div class="card">
      <h2>親入力</h2>

      <div class="grid">
        <div class="date-field">
          <label>日付</label>
          <div class="date-row">
            <input id="expenseDate" class="date-text-input" type="text" inputmode="numeric" placeholder="20260625" oninput="updateDatePreview()">
            <input id="expenseDateCalendar" class="date-calendar-input" type="date" onchange="syncTextFromCalendar()">
          </div>
          <div id="expenseDatePreview" class="date-preview">登録日付：未判定</div>
        </div>

        <div>
          <label>支払先</label>
          <input id="vendorName" list="vendorList" placeholder="例：Amazon">
          <datalist id="vendorList"></datalist>
        </div>

        <div>
          <label>支払方法</label>
          <select id="paymentMethod"></select>
        </div>

        <div>
          <label>対象者</label>
          <select id="targetPersonId"></select>
        </div>

        <div>
          <label>目的</label>
          <select id="purposeId"></select>
        </div>

        <div>
          <label>案件</label>
          <select id="projectId"></select>
        </div>

        <div>
          <label>部門</label>
          <select id="departmentId"></select>
        </div>

        <div>
          <label>インボイス</label>
          <select id="invoiceStatus"></select>
        </div>

        <div>
          <label>番号</label>
          <input id="invoiceNumber" placeholder="T1234567890123">
        </div>

        <div>
          <label>証憑</label>
          <select id="evidenceType"></select>
        </div>

        <div>
          <label>証憑メモ</label>
          <input id="evidenceMemo" placeholder="例：紙で保管">
        </div>

        <div>
          <label>合計金額</label>
          <input id="totalAmount" class="money" readonly>
        </div>
      </div>

      <div style="margin-top:8px;">
        <label>全体メモ</label>
        <textarea id="summary" class="summary-input" placeholder="例：川谷分の備品購入"></textarea>
      </div>
    </div>

    <div class="card">
      <h2>明細入力</h2>

      <div class="detail-table-wrap">
        <table class="detail-table">
          <thead>
            <tr>
              <th style="width:120px;">勘定科目</th>
              <th style="width:220px;">内容</th>
              <th style="width:90px;">金額</th>
              <th style="width:95px;">税区分</th>
              <th style="width:150px;">メモ</th>
              <th style="width:58px;">操作</th>
            </tr>
          </thead>
          <tbody id="detailBody"></tbody>
        </table>
      </div>

      <div class="button-row">
        <button onclick="addDetailRow()">明細行を追加</button>
        <button onclick="saveExpense()">保存</button>
        <button onclick="clearForm()">クリア</button>
      </div>

      <div id="result">待機中</div>
    </div>
  </main>

<script>
let masters = {
  account_titles: [],
  payment_methods: [],
  tax_categories: [],
  vendors: [],
  target_people: [],
  purposes: [],
  projects: [],
  departments: [],
  invoice_types: [],
  evidence_types: []
};

function pad2(value) {
  return String(value).padStart(2, "0");
}

function makeDateOnly(year, month, day) {
  return new Date(year, month - 1, day);
}

function toIsoDate(date) {
  return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
}

function todayDateOnly() {
  const now = new Date();
  return makeDateOnly(now.getFullYear(), now.getMonth() + 1, now.getDate());
}

function todayInputText() {
  const now = new Date();
  return `${pad2(now.getMonth() + 1)}${pad2(now.getDate())}`;
}

function currentFiscalStartYear() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;

  return month >= 4 ? year : year - 1;
}

function isValidYmd(year, month, day) {
  const d = makeDateOnly(year, month, day);

  return d.getFullYear() === year &&
    d.getMonth() + 1 === month &&
    d.getDate() === day;
}

function normalizeExpenseDate() {
  const rawOriginal = document.getElementById("expenseDate").value.trim();
  let raw = rawOriginal.replace(/[\/\-.]/g, "");

  if (!raw) {
    return {
      ok: false,
      message: "日付が未入力です。"
    };
  }

  let year;
  let month;
  let day;
  let explicitYear = false;
  let warning = "";

  if (/^\d{8}$/.test(raw)) {
    explicitYear = true;
    year = Number(raw.slice(0, 4));
    month = Number(raw.slice(4, 6));
    day = Number(raw.slice(6, 8));
  } else if (/^\d{3,4}$/.test(raw)) {
    raw = raw.padStart(4, "0");
    month = Number(raw.slice(0, 2));
    day = Number(raw.slice(2, 4));

    const fiscalStartYear = currentFiscalStartYear();
    year = month >= 4 ? fiscalStartYear : fiscalStartYear + 1;
  } else {
    return {
      ok: false,
      message: "日付は 0625 または 20260625 の形で入力してください。"
    };
  }

  if (!isValidYmd(year, month, day)) {
    return {
      ok: false,
      message: `存在しない日付です：${rawOriginal}`
    };
  }

  let date = makeDateOnly(year, month, day);
  const today = todayDateOnly();

  if (!explicitYear && date > today) {
    year = year - 1;
    date = makeDateOnly(year, month, day);
    warning = "未来日になるため、前年の日付として自動判定しました。";
  }

  const iso = toIsoDate(date);
  const isFuture = date > today;

  return {
    ok: true,
    iso,
    display: iso.replace(/-/g, "/"),
    isFuture,
    explicitYear,
    warning
  };
}

function syncCalendarFromPreviewResult(result) {
  const calendar = document.getElementById("expenseDateCalendar");

  if (!calendar) return;

  if (!result || !result.ok) {
    calendar.value = "";
    return;
  }

  if (calendar.value !== result.iso) {
    calendar.value = result.iso;
  }
}

function syncTextFromCalendar() {
  const calendar = document.getElementById("expenseDateCalendar");

  if (!calendar || !calendar.value) return;

  document.getElementById("expenseDate").value = calendar.value.replace(/-/g, "");
  updateDatePreview();
}

function updateDatePreview() {
  const preview = document.getElementById("expenseDatePreview");
  const result = normalizeExpenseDate();

  preview.classList.remove("warning");

  if (!result.ok) {
    preview.textContent = result.message;
    preview.classList.add("warning");
    syncCalendarFromPreviewResult(null);
    return;
  }

  let text = `登録日付：${result.display}`;

  if (result.warning) {
    text += `　※${result.warning}`;
    preview.classList.add("warning");
  }

  if (result.isFuture) {
    text += "　※未来日です。保存時に確認します。";
    preview.classList.add("warning");
  }

  preview.textContent = text;
  syncCalendarFromPreviewResult(result);
}

function showResult(data) {
  document.getElementById("result").textContent =
    typeof data === "string" ? data : JSON.stringify(data, null, 2);
}

function money(value) {
  const n = Number(value || 0);
  return n.toLocaleString("ja-JP");
}

function fillSelect(selectId, items, valueKey, labelKey, blankLabel = "未選択") {
  const select = document.getElementById(selectId);
  select.innerHTML = "";

  const blank = document.createElement("option");
  blank.value = "";
  blank.textContent = blankLabel;
  select.appendChild(blank);

  for (const item of items) {
    const opt = document.createElement("option");
    opt.value = item[valueKey];
    opt.textContent = item[labelKey];
    select.appendChild(opt);
  }
}

function selectOptionByText(selectId, text) {
  const select = document.getElementById(selectId);

  for (const option of select.options) {
    if (option.textContent === text) {
      select.value = option.value;
      return;
    }
  }
}

async function loadMasters() {
  const res = await fetch("/api/expenses/masters");
  const data = await res.json();

  if (!data.ok) {
    showResult(data);
    return;
  }

  masters = data.masters;

  fillSelect("paymentMethod", masters.payment_methods, "payment_method_id", "method_name");
  fillSelect("targetPersonId", masters.target_people, "target_person_id", "target_person_name");
  fillSelect("purposeId", masters.purposes, "purpose_id", "purpose_name");
  fillSelect("projectId", masters.projects, "project_id", "project_name");
  fillSelect("departmentId", masters.departments, "department_id", "department_name");
  fillSelect("invoiceStatus", masters.invoice_types || [], "invoice_type_id", "invoice_type_name");
  fillSelect("evidenceType", masters.evidence_types || [], "evidence_type_id", "evidence_type_name");

  selectOptionByText("invoiceStatus", "番号あり");
  selectOptionByText("evidenceType", "紙レシート");

  const vendorList = document.getElementById("vendorList");
  vendorList.innerHTML = "";

  for (const item of masters.vendors) {
    const opt = document.createElement("option");
    opt.value = item.vendor_name;
    vendorList.appendChild(opt);
  }
}

function accountOptions(selectedValue = "") {
  let html = `<option value="">選択</option>`;

  for (const item of masters.account_titles) {
    const selected = String(item.account_title_id) === String(selectedValue) ? "selected" : "";
    html += `<option value="${item.account_title_id}" ${selected}>${item.account_name}</option>`;
  }

  return html;
}

function taxOptions(selectedValue = "") {
  let html = `<option value="">選択</option>`;

  for (const item of masters.tax_categories) {
    const selected = String(item.tax_category_id) === String(selectedValue) ? "selected" : "";
    html += `<option value="${item.tax_category_id}" ${selected}>${item.tax_name}</option>`;
  }

  return html;
}

function addDetailRow(data = {}) {
  const tbody = document.getElementById("detailBody");
  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td>
      <select class="accountTitle">
        ${accountOptions(data.account_title_id || "")}
      </select>
    </td>
    <td>
      <input class="description" value="${data.description || ""}" placeholder="例：コピー用紙">
    </td>
    <td>
      <input class="amount money" type="number" value="${data.amount || ""}" oninput="calcTotal()">
    </td>
    <td>
      <select class="taxCategory">
        ${taxOptions(data.tax_category_id || "")}
      </select>
    </td>
    <td>
      <input class="memo" value="${data.memo || ""}">
    </td>
    <td>
      <button class="danger" onclick="this.closest('tr').remove(); calcTotal();">削除</button>
    </td>
  `;

  tbody.appendChild(tr);
  calcTotal();
}

function calcTotal() {
  let total = 0;

  document.querySelectorAll(".amount").forEach(input => {
    total += Number(input.value || 0);
  });

  document.getElementById("totalAmount").value = money(total);
}

function collectPayload(normalizedDate) {
  const details = [];

  document.querySelectorAll("#detailBody tr").forEach(tr => {
    details.push({
      account_title_id: tr.querySelector(".accountTitle").value,
      description: tr.querySelector(".description").value,
      amount: tr.querySelector(".amount").value,
      tax_category_id: tr.querySelector(".taxCategory").value,
      memo: tr.querySelector(".memo").value
    });
  });

  return {
    expense_date: normalizedDate.iso,
    vendor_name: document.getElementById("vendorName").value,
    payment_method_id: document.getElementById("paymentMethod").value,
    target_person_id: document.getElementById("targetPersonId").value,
    purpose_id: document.getElementById("purposeId").value,
    project_id: document.getElementById("projectId").value,
    department_id: document.getElementById("departmentId").value,
    invoice_type_id: document.getElementById("invoiceStatus").value,
    invoice_number: document.getElementById("invoiceNumber").value,
    evidence_type_id: document.getElementById("evidenceType").value,
    evidence_memo: document.getElementById("evidenceMemo").value,
    summary: document.getElementById("summary").value,
    details
  };
}

async function saveExpense() {
  const normalizedDate = normalizeExpenseDate();

  if (!normalizedDate.ok) {
    alert(normalizedDate.message);
    showResult(normalizedDate.message);
    updateDatePreview();
    return;
  }

  if (normalizedDate.isFuture) {
    const ok = confirm(`入力された日付は未来日です。\n\n登録日付：${normalizedDate.display}\n\nこの日付で保存しますか？`);

    if (!ok) {
      showResult("未来日のため、保存をキャンセルしました。");
      return;
    }
  }

  const payload = collectPayload(normalizedDate);

  showResult("保存中です。");

  const res = await fetch("/api/expenses", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (!data.ok) {
    showResult(data);
    return;
  }

  showResult(data);
  await loadMasters();
}

function clearForm() {
  document.getElementById("expenseDate").value = todayInputText();
  document.getElementById("vendorName").value = "";
  document.getElementById("paymentMethod").value = "";
  document.getElementById("targetPersonId").value = "";
  document.getElementById("purposeId").value = "";
  document.getElementById("projectId").value = "";
  document.getElementById("departmentId").value = "";
  selectOptionByText("invoiceStatus", "番号あり");
  document.getElementById("invoiceNumber").value = "";
  selectOptionByText("evidenceType", "紙レシート");
  document.getElementById("evidenceMemo").value = "";
  document.getElementById("summary").value = "";
  document.getElementById("detailBody").innerHTML = "";

  addDetailRow();
  updateDatePreview();
  showResult("クリアしました。");
}

function focusNextField(current) {
  const fields = Array.from(document.querySelectorAll(
    'input:not([type="hidden"]):not([disabled]), select:not([disabled]), textarea:not([disabled]), button:not([disabled])'
  )).filter(el => el.offsetParent !== null);

  const index = fields.indexOf(current);

  if (index >= 0 && fields[index + 1]) {
    fields[index + 1].focus();

    if (typeof fields[index + 1].select === "function") {
      fields[index + 1].select();
    }
  }
}

function enableEnterToNext() {
  document.addEventListener("keydown", event => {
    if (event.key !== "Enter") return;

    const tag = event.target.tagName.toLowerCase();

    if (!["input", "select", "textarea"].includes(tag)) return;

    if (tag === "textarea" && event.shiftKey) {
      return;
    }

    event.preventDefault();
    focusNextField(event.target);
  });
}

async function init() {
  document.getElementById("expenseDate").value = todayInputText();
  await loadMasters();
  addDetailRow();
  updateDatePreview();
  enableEnterToNext();
}

init();
</script>
</body>
</html>
