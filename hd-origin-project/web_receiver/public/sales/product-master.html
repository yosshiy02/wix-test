<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width,initial-scale=1">
  <title>商品マスター</title>

  <!-- GPT00_SALES_PRODUCT_MASTER_PAGE_20260712 -->

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #eef2f6;
      color: #1f2937;
      font-family:
        "Yu Gothic UI",
        Meiryo,
        sans-serif;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .page {
      width: min(
        1800px,
        calc(100% - 20px)
      );
      margin: 10px auto 50px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 10px;
      padding: 12px 14px;
      border: 1px solid #b9c4d0;
      background: #fff;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 25px;
    }

    h2 {
      margin: 0;
      font-size: 17px;
    }

    .sub {
      margin: 0;
      color: #64748b;
      font-size: 13px;
    }

    .top-actions,
    .toolbar,
    .record-nav,
    .form-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }

    .btn {
      min-height: 34px;
      padding: 6px 12px;
      border: 1px solid #94a3b8;
      border-radius: 3px;
      background: #fff;
      color: #1f2937;
    }

    .btn-primary {
      color: #fff;
      border-color: #1d4ed8;
      background: #1d4ed8;
    }

    .btn-success {
      color: #065f46;
      border-color: #10b981;
      background: #ecfdf5;
    }

    .btn-warning {
      color: #92400e;
      border-color: #f59e0b;
      background: #fffbeb;
    }

    .btn-danger {
      color: #991b1b;
      border-color: #ef4444;
      background: #fff1f2;
    }

    .btn-small {
      min-height: 29px;
      padding: 4px 9px;
    }

    .company-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding: 9px 12px;
      border: 1px solid #b9c4d0;
      background: #dbeafe;
    }

    .company-bar label {
      font-weight: 700;
    }

    .company-bar select {
      min-width: 320px;
    }

    select,
    input {
      min-height: 34px;
      padding: 5px 8px;
      border: 1px solid #94a3b8;
      border-radius: 2px;
      background: #fff;
    }

    input:focus,
    select:focus {
      outline: 2px solid #93c5fd;
      border-color: #2563eb;
    }

    .message {
      display: none;
      margin-bottom: 10px;
      padding: 9px 12px;
      border: 1px solid #94a3b8;
      background: #fff;
      font-weight: 700;
    }

    .message.show {
      display: block;
    }

    .message.ok {
      color: #065f46;
      border-color: #10b981;
      background: #ecfdf5;
    }

    .message.error {
      color: #991b1b;
      border-color: #ef4444;
      background: #fff1f2;
    }

    .main-grid {
      display: grid;
      grid-template-columns:
        minmax(310px, 0.82fr)
        minmax(560px, 1.65fr);
      gap: 10px;
      align-items: stretch;
    }

    .panel {
      border: 1px solid #94a3b8;
      background: #fff;
      min-width: 0;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      min-height: 43px;
      padding: 7px 10px;
      border-bottom: 1px solid #94a3b8;
      background: #e2e8f0;
    }

    .panel-body {
      padding: 10px;
    }

    .list-panel {
      display: flex;
      flex-direction: column;
      min-height: 470px;
    }

    .list-toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      padding: 8px;
      border-bottom: 1px solid #cbd5e1;
    }

    .record-list {
      flex: 1;
      max-height: 520px;
      overflow: auto;
    }

    .record-row {
      display: grid;
      grid-template-columns: 105px 1fr 55px;
      gap: 6px;
      width: 100%;
      padding: 7px 8px;
      border: 0;
      border-bottom: 1px solid #e2e8f0;
      background: #fff;
      text-align: left;
    }

    .record-row:hover {
      background: #eff6ff;
    }

    .record-row.selected {
      background: #bfdbfe;
      box-shadow:
        inset 4px 0 #2563eb;
    }

    .record-code {
      font-weight: 700;
    }

    .record-inactive {
      color: #991b1b;
      font-size: 12px;
    }

    .empty {
      padding: 20px;
      color: #64748b;
      text-align: center;
    }

    .record-form {
      display: grid;
      grid-template-columns:
        160px
        minmax(240px, 1fr)
        150px;
      gap: 10px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 12px;
      font-weight: 700;
    }

    .status-box {
      min-height: 34px;
      padding: 6px 8px;
      border: 1px solid #94a3b8;
      background: #f8fafc;
      font-weight: 700;
    }

    .form-actions {
      grid-column: 1 / -1;
      margin-top: 3px;
      padding-top: 9px;
      border-top: 1px solid #e2e8f0;
    }

    .internal-info {
      margin-top: 10px;
      color: #64748b;
      font-size: 12px;
    }

    .section-grid {
      display: grid;
      grid-template-columns:
        minmax(420px, 1fr)
        minmax(480px, 1.35fr);
      gap: 10px;
      margin-top: 10px;
    }

    .master-form {
      display: grid;
      grid-template-columns:
        100px
        minmax(160px, 1fr)
        95px;
      gap: 7px;
      align-items: end;
      margin-bottom: 8px;
    }

    .master-form.size-form {
      grid-template-columns:
        95px
        minmax(120px, 1fr)
        100px
        90px;
    }

    .table-wrap {
      max-height: 330px;
      overflow: auto;
      border: 1px solid #cbd5e1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      padding: 6px 7px;
      border: 1px solid #cbd5e1;
      text-align: left;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #e2e8f0;
    }

    tbody tr {
      cursor: pointer;
    }

    tbody tr:hover {
      background: #eff6ff;
    }

    tbody tr.selected {
      background: #bfdbfe;
    }

    .matrix-panel {
      margin-top: 10px;
    }

    .matrix-wrap {
      max-height: 520px;
      overflow: auto;
      border: 1px solid #94a3b8;
    }

    .matrix {
      width: max-content;
      min-width: 100%;
    }

    .matrix th:first-child,
    .matrix td:first-child {
      position: sticky;
      left: 0;
      z-index: 3;
      min-width: 150px;
      background: #f8fafc;
    }

    .matrix th:first-child {
      z-index: 4;
      background: #e2e8f0;
    }

    .matrix th:not(:first-child),
    .matrix td:not(:first-child) {
      min-width: 74px;
      text-align: center;
    }

    .matrix input[type="checkbox"] {
      width: 20px;
      height: 20px;
      min-height: 20px;
    }

    .inactive-text {
      color: #991b1b;
    }

    .record-count {
      color: #475569;
      font-size: 12px;
    }

    @media (max-width: 1050px) {
      .main-grid,
      .section-grid {
        grid-template-columns: 1fr;
      }

      .record-form {
        grid-template-columns: 1fr 1fr;
      }

      .master-form,
      .master-form.size-form {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

<body>
<div class="page">
  <header class="header">
    <div>
      <h1>商品マスター</h1>
      <p class="sub">
        商品ID・商品名、色、サイズ、商品明細を管理します。
        単価は得意先別単価で管理します。
      </p>
    </div>

    <div class="top-actions">
      <a class="btn"
         href="/sales/sales-dashboard.html">
        販売管理へ
      </a>
      <a class="btn"
         href="/ledgers/ledger-management-dashboard.html">
        台帳管理へ
      </a>
    </div>
  </header>

  <div class="company-bar">
    <label for="companySelect">
      対象会社
    </label>

    <select id="companySelect">
      <option value="">
        会社を読み込み中…
      </option>
    </select>

    <span id="companyStatus"></span>
  </div>

  <div id="message"
       class="message"></div>

  <div class="main-grid">
    <section class="panel list-panel">
      <div class="panel-header">
        <h2>商品一覧</h2>

        <span id="productCount"
              class="record-count">
          0件
        </span>
      </div>

      <div class="list-toolbar">
        <input id="productSearch"
               type="search"
               placeholder="商品ID・商品名検索">

        <button id="newProductButton"
                type="button"
                class="btn btn-primary">
          新規
        </button>
      </div>

      <div id="productList"
           class="record-list"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>商品</h2>

        <div class="record-nav">
          <button id="previousProductButton"
                  type="button"
                  class="btn btn-small">
            ◀
          </button>

          <span id="recordPosition">
            0 / 0
          </span>

          <button id="nextProductButton"
                  type="button"
                  class="btn btn-small">
            ▶
          </button>
        </div>
      </div>

      <div class="panel-body">
        <div class="record-form">
          <div class="field">
            <label for="productCode">
              商品ID
            </label>
            <input id="productCode"
                   maxlength="100">
          </div>

          <div class="field">
            <label for="productName">
              商品名
            </label>
            <input id="productName"
                   maxlength="300">
          </div>

          <div class="field">
            <label>状態</label>
            <div id="productActiveLabel"
                 class="status-box">
              使用中
            </div>
          </div>

          <div class="form-actions">
            <button id="saveProductButton"
                    type="button"
                    class="btn btn-primary">
              商品を保存
            </button>

            <button id="toggleProductButton"
                    type="button"
                    class="btn btn-warning">
              使用停止
            </button>
          </div>
        </div>

        <div class="internal-info">
          商品内部番号：
          <span id="productInternalId">
            新規
          </span>
        </div>
      </div>
    </section>
  </div>

  <div class="section-grid">
    <section class="panel">
      <div class="panel-header">
        <h2>色マスター</h2>
        <button id="newColorButton"
                type="button"
                class="btn btn-small">
          色を新規
        </button>
      </div>

      <div class="panel-body">
        <div class="master-form">
          <div class="field">
            <label for="colorCode">
              色ID
            </label>
            <input id="colorCode"
                   maxlength="20"
                   placeholder="01">
          </div>

          <div class="field">
            <label for="colorName">
              色名
            </label>
            <input id="colorName"
                   maxlength="100">
          </div>

          <div class="field">
            <label for="colorSortOrder">
              表示順
            </label>
            <input id="colorSortOrder"
                   type="number"
                   value="0">
          </div>
        </div>

        <div class="toolbar">
          <button id="saveColorButton"
                  type="button"
                  class="btn btn-success">
            色を保存
          </button>

          <button id="toggleColorButton"
                  type="button"
                  class="btn btn-warning">
            使用停止
          </button>
        </div>

        <div class="table-wrap"
             style="margin-top:8px">
          <table>
            <thead>
              <tr>
                <th>色ID</th>
                <th>色名</th>
                <th>状態</th>
              </tr>
            </thead>
            <tbody id="colorTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>サイズマスター</h2>
        <button id="newSizeButton"
                type="button"
                class="btn btn-small">
          サイズを新規
        </button>
      </div>

      <div class="panel-body">
        <div class="master-form size-form">
          <div class="field">
            <label for="sizeCode">
              コード
            </label>
            <input id="sizeCode"
                   maxlength="30">
          </div>

          <div class="field">
            <label for="sizeName">
              サイズ名
            </label>
            <input id="sizeName"
                   maxlength="100">
          </div>

          <div class="field">
            <label for="sizeCategory">
              区分
            </label>
            <select id="sizeCategory">
              <option value="CM">cm</option>
              <option value="ALPHA">
                S・M・L
              </option>
              <option value="OTHER">
                その他
              </option>
            </select>
          </div>

          <div class="field">
            <label for="sizeSortOrder">
              表示順
            </label>
            <input id="sizeSortOrder"
                   type="number"
                   value="0">
          </div>
        </div>

        <div class="toolbar">
          <button id="saveSizeButton"
                  type="button"
                  class="btn btn-success">
            サイズを保存
          </button>

          <button id="toggleSizeButton"
                  type="button"
                  class="btn btn-warning">
            使用停止
          </button>
        </div>

        <div class="table-wrap"
             style="margin-top:8px">
          <table>
            <thead>
              <tr>
                <th>コード</th>
                <th>サイズ名</th>
                <th>区分</th>
                <th>状態</th>
              </tr>
            </thead>
            <tbody id="sizeTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <section class="panel matrix-panel">
    <div class="panel-header">
      <div>
        <h2>商品明細</h2>
        <div class="sub">
          商品に存在する色とサイズの組合せを選択します。
        </div>
      </div>

      <button id="saveVariantsButton"
              type="button"
              class="btn btn-primary">
        商品明細を保存
      </button>
    </div>

    <div class="panel-body">
      <div id="matrixEmpty"
           class="empty">
        商品を選択してください。
      </div>

      <div id="matrixWrap"
           class="matrix-wrap"
           hidden>
        <table class="matrix">
          <thead id="matrixHead"></thead>
          <tbody id="matrixBody"></tbody>
        </table>
      </div>
    </div>
  </section>
</div>

<script>
(() => {
  "use strict";

  const state = {
    companyId: null,
    products: [],
    filteredProducts: [],
    selectedProductId: null,
    selectedProductActive: true,
    colors: [],
    sizes: [],
    selectedColorId: null,
    selectedColorActive: true,
    selectedSizeId: null,
    selectedSizeActive: true,
    variantKeys: new Set()
  };

  function byId(id) {
    return document.getElementById(id);
  }

  function showMessage(message, type = "ok") {
    const element = byId("message");

    element.textContent = message || "";
    element.className =
      "message show " +
      (type === "error" ? "error" : "ok");
  }

  function clearMessage() {
    const element = byId("message");
    element.textContent = "";
    element.className = "message";
  }

  async function requestJson(
    url,
    options = {}
  ) {
    const response = await fetch(
      url,
      {
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {})
        },
        ...options
      }
    );

    let data = null;

    try {
      data = await response.json();
    }
    catch (_) {
      data = null;
    }

    if (!response.ok) {
      throw new Error(
        data && (
          data.error ||
          data.message
        )
          ? data.error || data.message
          : "通信に失敗しました。"
      );
    }

    return data || {};
  }

  function companyQuery() {
    if (!state.companyId) {
      throw new Error(
        "対象会社を選択してください。"
      );
    }

    return "company_id=" +
      encodeURIComponent(
        state.companyId
      );
  }

  function findArray(payload, keys) {
    if (Array.isArray(payload)) {
      return payload;
    }

    for (const key of keys) {
      if (
        payload &&
        Array.isArray(payload[key])
      ) {
        return payload[key];
      }
    }

    if (payload && payload.data) {
      return findArray(
        payload.data,
        keys
      );
    }

    return [];
  }

  async function loadCompanies() {
    const data = await requestJson(
      "/api/company-transaction-rules/companies"
    );

    const companies =
      findArray(
        data,
        [
          "companies",
          "items",
          "rows"
        ]
      );

    const select = byId("companySelect");
    select.innerHTML = "";

    for (const company of companies) {
      const id =
        company.company_id ??
        company.id ??
        company.companyId;

      const name =
        company.company_name ??
        company.name ??
        company.companyName ??
        String(id);

      const option =
        document.createElement("option");

      option.value = String(id);
      option.textContent = name;
      select.appendChild(option);
    }

    if (!companies.length) {
      const option =
        document.createElement("option");

      option.value = "";
      option.textContent =
        "会社がありません。";

      select.appendChild(option);
      state.companyId = null;
      return;
    }

    state.companyId =
      Number(select.value);

    byId("companyStatus").textContent =
      companies.length + "社";
  }

  async function loadProducts(
    preferredProductId = null
  ) {
    const data = await requestJson(
      "/api/sales/products?" +
      companyQuery()
    );

    state.products =
      Array.isArray(data.products)
        ? data.products
        : [];

    applyProductSearch();

    let nextProductId =
      preferredProductId ||
      state.selectedProductId;

    if (
      !nextProductId ||
      !state.products.some(
        row =>
          Number(row.product_id) ===
          Number(nextProductId)
      )
    ) {
      nextProductId =
        state.products[0]
          ? state.products[0].product_id
          : null;
    }

    if (nextProductId) {
      selectProduct(nextProductId);
    }
    else {
      newProduct();
    }
  }

  function applyProductSearch() {
    const search =
      byId("productSearch")
        .value
        .trim()
        .toLowerCase();

    state.filteredProducts =
      state.products.filter(product => {
        if (!search) {
          return true;
        }

        return (
          String(
            product.product_code || ""
          )
            .toLowerCase()
            .includes(search) ||
          String(
            product.product_name || ""
          )
            .toLowerCase()
            .includes(search)
        );
      });

    renderProductList();
    updateRecordPosition();
  }

  function renderProductList() {
    const container =
      byId("productList");

    container.innerHTML = "";

    byId("productCount").textContent =
      state.filteredProducts.length +
      "件";

    if (!state.filteredProducts.length) {
      container.innerHTML =
        '<div class="empty">' +
        "商品はありません。" +
        "</div>";
      return;
    }

    for (
      const product of
      state.filteredProducts
    ) {
      const button =
        document.createElement("button");

      button.type = "button";
      button.className =
        "record-row" +
        (
          Number(product.product_id) ===
          Number(state.selectedProductId)
            ? " selected"
            : ""
        );

      const code =
        document.createElement("span");

      code.className = "record-code";
      code.textContent =
        product.product_code || "";

      const name =
        document.createElement("span");

      name.textContent =
        product.product_name || "";

      const status =
        document.createElement("span");

      status.className =
        product.is_active
          ? ""
          : "record-inactive";

      status.textContent =
        product.is_active
          ? "使用中"
          : "停止";

      button.append(
        code,
        name,
        status
      );

      button.addEventListener(
        "click",
        () => {
          selectProduct(
            product.product_id
          );
        }
      );

      container.appendChild(button);
    }
  }

  async function selectProduct(
    productId
  ) {
    const product =
      state.products.find(
        row =>
          Number(row.product_id) ===
          Number(productId)
      );

    if (!product) {
      return;
    }

    state.selectedProductId =
      Number(product.product_id);

    state.selectedProductActive =
      product.is_active !== false;

    byId("productCode").value =
      product.product_code || "";

    byId("productName").value =
      product.product_name || "";

    byId("productInternalId").textContent =
      String(product.product_id);

    updateProductStatus();
    renderProductList();
    updateRecordPosition();

    await loadVariantMatrix();
  }

  function newProduct() {
    state.selectedProductId = null;
    state.selectedProductActive = true;
    state.variantKeys = new Set();

    byId("productCode").value = "";
    byId("productName").value = "";
    byId("productInternalId").textContent =
      "新規";

    updateProductStatus();
    renderProductList();
    updateRecordPosition();
    renderVariantMatrix();

    byId("productCode").focus();
  }

  function updateProductStatus() {
    byId("productActiveLabel").textContent =
      state.selectedProductActive
        ? "使用中"
        : "使用停止";

    byId("toggleProductButton").textContent =
      state.selectedProductActive
        ? "使用停止"
        : "使用再開";

    byId("toggleProductButton").disabled =
      !state.selectedProductId;
  }

  function updateRecordPosition() {
    const index =
      state.filteredProducts.findIndex(
        row =>
          Number(row.product_id) ===
          Number(state.selectedProductId)
      );

    byId("recordPosition").textContent =
      index >= 0
        ? (
            String(index + 1) +
            " / " +
            String(
              state.filteredProducts.length
            )
          )
        : (
            "0 / " +
            String(
              state.filteredProducts.length
            )
          );

    byId("previousProductButton").disabled =
      index <= 0;

    byId("nextProductButton").disabled =
      index < 0 ||
      index >=
        state.filteredProducts.length - 1;
  }

  async function moveProduct(offset) {
    const index =
      state.filteredProducts.findIndex(
        row =>
          Number(row.product_id) ===
          Number(state.selectedProductId)
      );

    const next =
      state.filteredProducts[
        index + offset
      ];

    if (next) {
      await selectProduct(
        next.product_id
      );
    }
  }

  async function saveProduct() {
    clearMessage();

    const payload = {
      company_id: state.companyId,
      product_code:
        byId("productCode")
          .value
          .trim(),
      product_name:
        byId("productName")
          .value
          .trim(),
      is_active:
        state.selectedProductActive
    };

    const isUpdate =
      Boolean(state.selectedProductId);

    if (isUpdate) {
      payload.product_id =
        state.selectedProductId;
    }

    const url =
      isUpdate
        ? (
            "/api/sales/product-master/products/" +
            encodeURIComponent(
              state.selectedProductId
            )
          )
        : (
            "/api/sales/product-master/products"
          );

    const data = await requestJson(
      url,
      {
        method:
          isUpdate ? "PUT" : "POST",
        body: JSON.stringify(payload)
      }
    );

    const savedId =
      data.product &&
      data.product.product_id;

    await loadProducts(savedId);

    showMessage(
      "商品を保存しました。"
    );
  }

  async function toggleProduct() {
    if (!state.selectedProductId) {
      return;
    }

    const nextActive =
      !state.selectedProductActive;

    await requestJson(
      "/api/sales/products/" +
      encodeURIComponent(
        state.selectedProductId
      ) +
      "/active",
      {
        method: "PATCH",
        body: JSON.stringify({
          company_id: state.companyId,
          is_active: nextActive
        })
      }
    );

    await loadProducts(
      state.selectedProductId
    );

    showMessage(
      nextActive
        ? "商品の使用を再開しました。"
        : "商品の使用を停止しました。"
    );
  }

  async function loadColors() {
    const data = await requestJson(
      "/api/sales/colors?" +
      companyQuery()
    );

    state.colors =
      Array.isArray(data.colors)
        ? data.colors
        : [];

    renderColors();
    prepareNewColor(false);
  }

  function renderColors() {
    const tbody =
      byId("colorTableBody");

    tbody.innerHTML = "";

    for (const color of state.colors) {
      const tr =
        document.createElement("tr");

      if (
        Number(color.color_id) ===
        Number(state.selectedColorId)
      ) {
        tr.classList.add("selected");
      }

      for (const value of [
        color.color_code,
        color.color_name,
        color.is_active
          ? "使用中"
          : "停止"
      ]) {
        const td =
          document.createElement("td");

        td.textContent =
          value == null ? "" : value;

        if (color.is_active === false) {
          td.classList.add(
            "inactive-text"
          );
        }

        tr.appendChild(td);
      }

      tr.addEventListener(
        "click",
        () => selectColor(color)
      );

      tbody.appendChild(tr);
    }
  }

  function nextColorCode() {
    const numbers =
      state.colors
        .map(row =>
          Number(row.color_code)
        )
        .filter(number =>
          Number.isInteger(number)
        );

    const next =
      numbers.length
        ? Math.max(...numbers) + 1
        : 1;

    return String(next).padStart(
      2,
      "0"
    );
  }

  function prepareNewColor(
    focus = true
  ) {
    state.selectedColorId = null;
    state.selectedColorActive = true;

    byId("colorCode").value =
      nextColorCode();

    byId("colorName").value = "";
    byId("colorSortOrder").value =
      String(
        (state.colors.length + 1) *
        10
      );

    byId("toggleColorButton").disabled =
      true;

    byId("toggleColorButton").textContent =
      "使用停止";

    renderColors();

    if (focus) {
      byId("colorCode").focus();
    }
  }

  function selectColor(color) {
    state.selectedColorId =
      Number(color.color_id);

    state.selectedColorActive =
      color.is_active !== false;

    byId("colorCode").value =
      color.color_code || "";

    byId("colorName").value =
      color.color_name || "";

    byId("colorSortOrder").value =
      String(color.sort_order || 0);

    byId("toggleColorButton").disabled =
      false;

    byId("toggleColorButton").textContent =
      state.selectedColorActive
        ? "使用停止"
        : "使用再開";

    renderColors();
  }

  async function saveColor() {
    const payload = {
      company_id: state.companyId,
      color_code:
        byId("colorCode")
          .value
          .trim(),
      color_name:
        byId("colorName")
          .value
          .trim(),
      sort_order:
        Number(
          byId("colorSortOrder").value
        ) || 0,
      is_active:
        state.selectedColorActive
    };

    const isUpdate =
      Boolean(state.selectedColorId);

    if (isUpdate) {
      payload.color_id =
        state.selectedColorId;
    }

    await requestJson(
      isUpdate
        ? (
            "/api/sales/colors/" +
            encodeURIComponent(
              state.selectedColorId
            )
          )
        : "/api/sales/colors",
      {
        method:
          isUpdate ? "PUT" : "POST",
        body: JSON.stringify(payload)
      }
    );

    await loadColors();

    if (state.selectedProductId) {
      await loadVariantMatrix();
    }

    showMessage(
      "色マスターを保存しました。"
    );
  }

  async function toggleColor() {
    if (!state.selectedColorId) {
      return;
    }

    await requestJson(
      "/api/sales/colors/" +
      encodeURIComponent(
        state.selectedColorId
      ) +
      "/active",
      {
        method: "PATCH",
        body: JSON.stringify({
          company_id: state.companyId,
          is_active:
            !state.selectedColorActive
        })
      }
    );

    await loadColors();

    if (state.selectedProductId) {
      await loadVariantMatrix();
    }

    showMessage(
      "色マスターの状態を変更しました。"
    );
  }

  async function loadSizes() {
    const data = await requestJson(
      "/api/sales/sizes?" +
      companyQuery()
    );

    state.sizes =
      Array.isArray(data.sizes)
        ? data.sizes
        : [];

    renderSizes();
    prepareNewSize(false);
  }

  function renderSizes() {
    const tbody =
      byId("sizeTableBody");

    tbody.innerHTML = "";

    for (const size of state.sizes) {
      const tr =
        document.createElement("tr");

      if (
        Number(size.size_id) ===
        Number(state.selectedSizeId)
      ) {
        tr.classList.add("selected");
      }

      for (const value of [
        size.size_code,
        size.size_name,
        size.size_category,
        size.is_active
          ? "使用中"
          : "停止"
      ]) {
        const td =
          document.createElement("td");

        td.textContent =
          value == null ? "" : value;

        if (size.is_active === false) {
          td.classList.add(
            "inactive-text"
          );
        }

        tr.appendChild(td);
      }

      tr.addEventListener(
        "click",
        () => selectSize(size)
      );

      tbody.appendChild(tr);
    }
  }

  function prepareNewSize(
    focus = true
  ) {
    state.selectedSizeId = null;
    state.selectedSizeActive = true;

    byId("sizeCode").value = "";
    byId("sizeName").value = "";
    byId("sizeCategory").value =
      "OTHER";

    byId("sizeSortOrder").value =
      String(
        (state.sizes.length + 1) *
        10
      );

    byId("toggleSizeButton").disabled =
      true;

    byId("toggleSizeButton").textContent =
      "使用停止";

    renderSizes();

    if (focus) {
      byId("sizeCode").focus();
    }
  }

  function selectSize(size) {
    state.selectedSizeId =
      Number(size.size_id);

    state.selectedSizeActive =
      size.is_active !== false;

    byId("sizeCode").value =
      size.size_code || "";

    byId("sizeName").value =
      size.size_name || "";

    byId("sizeCategory").value =
      size.size_category || "OTHER";

    byId("sizeSortOrder").value =
      String(size.sort_order || 0);

    byId("toggleSizeButton").disabled =
      false;

    byId("toggleSizeButton").textContent =
      state.selectedSizeActive
        ? "使用停止"
        : "使用再開";

    renderSizes();
  }

  async function saveSize() {
    const payload = {
      company_id: state.companyId,
      size_code:
        byId("sizeCode")
          .value
          .trim(),
      size_name:
        byId("sizeName")
          .value
          .trim(),
      size_category:
        byId("sizeCategory").value,
      sort_order:
        Number(
          byId("sizeSortOrder").value
        ) || 0,
      is_active:
        state.selectedSizeActive
    };

    const isUpdate =
      Boolean(state.selectedSizeId);

    if (isUpdate) {
      payload.size_id =
        state.selectedSizeId;
    }

    await requestJson(
      isUpdate
        ? (
            "/api/sales/sizes/" +
            encodeURIComponent(
              state.selectedSizeId
            )
          )
        : "/api/sales/sizes",
      {
        method:
          isUpdate ? "PUT" : "POST",
        body: JSON.stringify(payload)
      }
    );

    await loadSizes();

    if (state.selectedProductId) {
      await loadVariantMatrix();
    }

    showMessage(
      "サイズマスターを保存しました。"
    );
  }

  async function toggleSize() {
    if (!state.selectedSizeId) {
      return;
    }

    await requestJson(
      "/api/sales/sizes/" +
      encodeURIComponent(
        state.selectedSizeId
      ) +
      "/active",
      {
        method: "PATCH",
        body: JSON.stringify({
          company_id: state.companyId,
          is_active:
            !state.selectedSizeActive
        })
      }
    );

    await loadSizes();

    if (state.selectedProductId) {
      await loadVariantMatrix();
    }

    showMessage(
      "サイズマスターの状態を変更しました。"
    );
  }

  async function loadVariantMatrix() {
    if (!state.selectedProductId) {
      state.variantKeys = new Set();
      renderVariantMatrix();
      return;
    }

    const data = await requestJson(
      "/api/sales/products/" +
      encodeURIComponent(
        state.selectedProductId
      ) +
      "/variants?" +
      companyQuery()
    );

    const matrix = data.matrix || {};

    state.colors =
      Array.isArray(matrix.colors)
        ? matrix.colors
        : state.colors;

    state.sizes =
      Array.isArray(matrix.sizes)
        ? matrix.sizes
        : state.sizes;

    state.variantKeys =
      new Set(
        (
          Array.isArray(matrix.variants)
            ? matrix.variants
            : []
        ).map(
          row =>
            String(row.color_id) +
            ":" +
            String(row.size_id)
        )
      );

    renderColors();
    renderSizes();
    renderVariantMatrix();
  }

  function renderVariantMatrix() {
    const empty = byId("matrixEmpty");
    const wrap = byId("matrixWrap");
    const head = byId("matrixHead");
    const body = byId("matrixBody");

    head.innerHTML = "";
    body.innerHTML = "";

    if (!state.selectedProductId) {
      empty.textContent =
        "商品を選択してください。";
      empty.hidden = false;
      wrap.hidden = true;
      return;
    }

    if (
      !state.colors.length ||
      !state.sizes.length
    ) {
      empty.textContent =
        "色マスターとサイズマスターを登録してください。";
      empty.hidden = false;
      wrap.hidden = true;
      return;
    }

    empty.hidden = true;
    wrap.hidden = false;

    const headerRow =
      document.createElement("tr");

    const colorHeader =
      document.createElement("th");

    colorHeader.textContent = "色";
    headerRow.appendChild(colorHeader);

    for (const size of state.sizes) {
      const th =
        document.createElement("th");

      th.textContent =
        size.size_name ||
        size.size_code;

      if (size.is_active === false) {
        th.classList.add(
          "inactive-text"
        );
      }

      headerRow.appendChild(th);
    }

    head.appendChild(headerRow);

    for (const color of state.colors) {
      const tr =
        document.createElement("tr");

      const colorCell =
        document.createElement("td");

      colorCell.textContent =
        String(color.color_code || "") +
        " " +
        String(color.color_name || "");

      if (color.is_active === false) {
        colorCell.classList.add(
          "inactive-text"
        );
      }

      tr.appendChild(colorCell);

      for (const size of state.sizes) {
        const td =
          document.createElement("td");

        const checkbox =
          document.createElement("input");

        checkbox.type = "checkbox";

        const key =
          String(color.color_id) +
          ":" +
          String(size.size_id);

        checkbox.checked =
          state.variantKeys.has(key);

        checkbox.disabled =
          color.is_active === false ||
          size.is_active === false;

        checkbox.addEventListener(
          "change",
          () => {
            if (checkbox.checked) {
              state.variantKeys.add(key);
            }
            else {
              state.variantKeys.delete(key);
            }
          }
        );

        td.appendChild(checkbox);
        tr.appendChild(td);
      }

      body.appendChild(tr);
    }
  }

  async function saveVariants() {
    if (!state.selectedProductId) {
      throw new Error(
        "商品を選択してください。"
      );
    }

    const variants =
      Array.from(
        state.variantKeys
      ).map(key => {
        const [
          colorId,
          sizeId
        ] = key
          .split(":")
          .map(Number);

        return {
          color_id: colorId,
          size_id: sizeId
        };
      });

    await requestJson(
      "/api/sales/products/" +
      encodeURIComponent(
        state.selectedProductId
      ) +
      "/variants",
      {
        method: "PUT",
        body: JSON.stringify({
          company_id: state.companyId,
          variants
        })
      }
    );

    await loadVariantMatrix();

    showMessage(
      "商品明細を保存しました。"
    );
  }

  async function reloadCompanyData() {
    clearMessage();

    state.companyId =
      Number(
        byId("companySelect").value
      ) || null;

    state.selectedProductId = null;
    state.selectedColorId = null;
    state.selectedSizeId = null;
    state.variantKeys = new Set();

    if (!state.companyId) {
      return;
    }

    await Promise.all([
      loadColors(),
      loadSizes()
    ]);

    await loadProducts();
  }

  function run(action) {
    Promise.resolve()
      .then(action)
      .catch(error => {
        console.error(error);
        showMessage(
          error.message ||
          "処理に失敗しました。",
          "error"
        );
      });
  }

  byId("companySelect")
    .addEventListener(
      "change",
      () => run(reloadCompanyData)
    );

  byId("productSearch")
    .addEventListener(
      "input",
      applyProductSearch
    );

  byId("newProductButton")
    .addEventListener(
      "click",
      newProduct
    );

  byId("saveProductButton")
    .addEventListener(
      "click",
      () => run(saveProduct)
    );

  byId("toggleProductButton")
    .addEventListener(
      "click",
      () => run(toggleProduct)
    );

  byId("previousProductButton")
    .addEventListener(
      "click",
      () => run(
        () => moveProduct(-1)
      )
    );

  byId("nextProductButton")
    .addEventListener(
      "click",
      () => run(
        () => moveProduct(1)
      )
    );

  byId("newColorButton")
    .addEventListener(
      "click",
      () => prepareNewColor()
    );

  byId("saveColorButton")
    .addEventListener(
      "click",
      () => run(saveColor)
    );

  byId("toggleColorButton")
    .addEventListener(
      "click",
      () => run(toggleColor)
    );

  byId("newSizeButton")
    .addEventListener(
      "click",
      () => prepareNewSize()
    );

  byId("saveSizeButton")
    .addEventListener(
      "click",
      () => run(saveSize)
    );

  byId("toggleSizeButton")
    .addEventListener(
      "click",
      () => run(toggleSize)
    );

  byId("saveVariantsButton")
    .addEventListener(
      "click",
      () => run(saveVariants)
    );

  document.addEventListener(
    "DOMContentLoaded",
    () => {
      run(async () => {
        await loadCompanies();
        await reloadCompanyData();
      });
    }
  );
})();
</script>
</body>
</html>
