<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>支払書類 読取内容確認 - HD Origin Project</title>
  <link rel="stylesheet" href="./payment-document-review.css">
</head>
<body>
  <div class="wrap">
    <header class="top">
      <h1>支払書類 読取内容確認</h1>
      <button type="button" onclick="location.href='./payment-document-inbox.html'">OCR取込へ戻る</button>
      <button type="button" onclick="location.href='/payables/payable-list.html'">請求書・未払管理へ</button>
      <button type="button" onclick="location.href='/'">メインページ</button>
      <button type="button" class="warn" onclick="restartServer()">サーバー再起動</button>
      <span class="muted">OCR済み書類の読取内容を確認する画面です。</span>
    </header>

    <section class="panel list-panel">
      <div class="panel-title">
        <span>OCR済み書類</span>
        <button type="button" class="light" onclick="loadItems()">更新</button>
      </div>
      <div id="summary" class="summary">読込中...</div>
      <div id="list" class="list"></div>
    </section>

    <section class="panel ocr-panel">
      <div class="panel-title">
        <span>OCR本文</span>
      </div>
      <textarea id="ocrText" readonly placeholder="左からOCR済み書類を選択してください。"></textarea>
    </section>

    <section class="panel draft-panel">
      <div class="panel-title">
        <span>確認・下書き</span>
      </div>

      <div class="draft-note">
        ここは確認画面の骨格です。候補作成と下書き保存は、後でDB設計を作ってから実装します。
      </div>

      <div class="form-grid">
        <label>
          書類区分
          <input id="draftDocumentType" placeholder="例：請求書 / 納税通知書 / 領収書">
        </label>

        <label>
          発行元
          <input id="draftIssuer" placeholder="例：大阪市あべの市税事務所">
        </label>

        <label>
          宛名
          <input id="draftRecipient" placeholder="例：株式会社HDオリジンスタイル / 坂口 喜康">
        </label>

        <label>
          金額
          <input id="draftAmount" placeholder="例：98,800">
        </label>

        <label>
          支払期限
          <input id="draftDueDate" placeholder="例：2026-07-31">
        </label>

        <label>
          処理先
          <input id="draftDestination" placeholder="例：税金・公的支払い / 未払 / 経費">
        </label>

        <label class="span2">
          要確認メモ
          <textarea id="draftWarnings" placeholder="例：宛名が個人名。会社負担可否を確認。"></textarea>
        </label>
      </div>

      <div class="button-row">
        <button type="button" onclick="showPlanned('AI解析')">候補作成</button>
        <button type="button" onclick="showPlanned('下書き保存')">下書き保存</button>
        <button type="button" class="secondary" onclick="showPlanned('本登録')">登録へ進む</button>
      </div>

      <div id="result" class="result"></div>
    </section>
  </div>

<script>
  let items = [];
  let selectedIndex = -1;

  function esc(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function formatJapanDateTime(value) {
    if (!value) return "";

    const date = new Date(value);

    if (Number.isNaN(date.getTime())) {
      return String(value);
    }

    const parts = new Intl.DateTimeFormat("ja-JP", {
      timeZone: "Asia/Tokyo",
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hour12: false
    }).formatToParts(date).reduce((acc, part) => {
      acc[part.type] = part.value;
      return acc;
    }, {});

    return `${parts.year}-${parts.month}-${parts.day} ${parts.hour}:${parts.minute}:${parts.second}`;
  }

  function showResult(message) {
    document.getElementById("result").textContent = message || "";
  }

  function hasOcr(item) {
    return !!(item.ocrRawText || item.ocrTextPreview || item.ocrStatus === "ocr_done");
  }

  async function loadItems() {
    const summary = document.getElementById("summary");
    const list = document.getElementById("list");

    summary.textContent = "読込中...";
    list.innerHTML = "";
    selectedIndex = -1;

    document.getElementById("ocrText").value = "";
    clearDraftFields();

    try {
      const res = await fetch("/api/payment-documents/scan-inbox");
      const data = await res.json();

      if (!data.ok) {
        throw new Error(data.error || "読込失敗");
      }

      const allItems = data.items || [];
      items = allItems.filter(hasOcr);

      summary.textContent =
        "OCR済み: " + items.length + "件 / 全体: " + allItems.length + "件";

      if (!items.length) {
        list.innerHTML = '<div class="empty">OCR済み書類がありません。先にOCR取込画面でOCRしてください。</div>';
        return;
      }

      list.innerHTML = items.map((item, index) => {
        const active = index === selectedIndex ? " active" : "";
        const name = item.originalFileName || item.fileName;
        const time = item.ocrAt ? formatJapanDateTime(item.ocrAt) : "";

        return `
          <button class="item${active}" onclick="selectItem(${index})">
            <span class="no">${index + 1}</span>
            <span class="name">${esc(name)}</span>
            <span class="time">${esc(time)}</span>
          </button>
        `;
      }).join("");
    } catch (error) {
      summary.textContent = "読込エラー: " + (error.message || String(error));
    }
  }

  function clearDraftFields() {
    document.getElementById("draftDocumentType").value = "";
    document.getElementById("draftIssuer").value = "";
    document.getElementById("draftRecipient").value = "";
    document.getElementById("draftAmount").value = "";
    document.getElementById("draftDueDate").value = "";
    document.getElementById("draftDestination").value = "";
    document.getElementById("draftWarnings").value = "";
    showResult("");
  }

  function selectItem(index) {
    selectedIndex = index;
    const item = items[index];

    document.querySelectorAll(".item").forEach((el, i) => {
      el.classList.toggle("active", i === index);
    });

    document.getElementById("ocrText").value = item.ocrRawText || item.ocrTextPreview || "";
    clearDraftFields();

    showResult("OCR本文を読み込みました。");
  }

  function showPlanned(name) {
    const item = selectedIndex >= 0 ? items[selectedIndex] : null;

    if (!item) {
      showResult("先にOCR済み書類を選択してください。");
      return;
    }

    showResult(
      name + "は後工程です。\n" +
      "このページでは画面骨格のみ作成済みです。\n" +
      "次にDBを作って、AI候補と人間修正下書きを保存できるようにします。"
    );
  }

  async function restartServer() {
    const ok = confirm("サーバーを再起動しますか？\n終了前バックアップありの再起動APIを呼びます。");

    if (!ok) return;

    showResult("サーバー再起動を要求中です。");

    try {
      const res = await fetch("/api/system/restart-with-backup", {
        method: "POST"
      });

      const data = await res.json();
      showResult(JSON.stringify(data, null, 2));
    } catch (error) {
      showResult("再起動要求後に接続が切れた可能性があります。\n" + (error.message || String(error)));
    }
  }

  loadItems();
</script>
<script src="../hd-origin-exit-guard.js"></script>
</body>
</html>
