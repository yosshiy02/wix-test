      <button type="button" onclick="location.href='/payables/payable-list.html'">請求書・未払管理へ</button>
      <button type="button" onclick="location.href='/'">メインページ</button>

<span class="muted">OCR済み書類をAI候補と人間判断で仕分ける画面です。</span>

    <section class="panel list-panel">
      <div class="panel-title">
        <span>仕分け対象書類</span>
        <button type="button" class="light" onclick="loadItems()">更新</button>
      </div>
            <div class="sorting-bulk-row" style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;margin:0.5rem 0;">
        <button type="button" class="light" onclick="selectAllSortingItems()">全選択</button>
        <button type="button" class="light" onclick="clearSortingSelection()">全解除</button>
        <button type="button" class="action-btn action-ai sorting-bulk-analyze" onclick="runSelectedAiDrafts()">まとめて仕分け</button>
<!-- GPT00_AUTOSAVE: 保存ボタン廃止 -->
</div>
      <div id="selectedSortingSummary" class="selected-summary">選択: 0件</div>
      <div id="sortingColorLegend" class="sorting-color-legend">
        <span class="legend-chip legend-invoice">請求・未払系</span>
        <span class="legend-chip legend-expense">レシート・領収書</span>
        <span class="legend-chip legend-tax">税金・公的支払</span>
        <span class="legend-chip legend-contract">契約・保険・リース</span>
        <span class="legend-chip legend-utility">公共料金・通信費</span>
        <span class="legend-chip legend-card">カード</span>
        <span class="legend-chip legend-reference">照合用</span>
        <span class="legend-chip legend-review">要確認</span>

<div id="summary" class="summary">読込中...</div>
      <div id="list" class="list"></div>
    </section>

    <section class="panel preview-panel">
      <div class="panel-title preview-title">
        <span>原本画像プレビュー</span>
        <div class="preview-rotate-buttons" aria-label="原本画像回転">
          <button type="button" onclick="rotateDocumentPreview(-90)">左回転</button>
          <button type="button" onclick="rotateDocumentPreview(90)">右回転</button>
          <button type="button" onclick="resetDocumentPreviewRotation()">戻す</button>
        </div>
      </div>
      <div id="documentPreview" class="document-preview">
        左からDB保存済みOCRを選択してください。
      </div>
    </section>

    <section class="panel draft-panel">
      <div class="panel-title">
        <span>AI候補・仕分け確認</span>
        <div class="record-navigation">
          <button type="button"
                  class="light record-navigation-button"
                  id="previousRecordButton"
                  onclick="moveSelectedRecord(-1)"
                  aria-label="前のレコード"
                  title="前のレコード">◀</button>
          <span class="record-navigation-position" id="recordNavigationPosition">0 / 0</span>
          <button type="button"
                  class="light record-navigation-button"
                  id="nextRecordButton"
                  onclick="moveSelectedRecord(1)"
                  aria-label="次のレコード"
                  title="次のレコード">▶</button>
          <button type="button" class="light mini-memo-button" id="visibleFieldsMemoButton">表示</button>
        </div>
      </div>

            <div class="draft-form-scroll">
        <!-- HD_ORIGIN_BASIC_ANALYSIS_LAYOUT_20260711_START -->

              </select>
            </label>

            <label hidden aria-hidden="true" data-internal-field="payment-destination">

            </label>

            <label>

                      id="draftAnalysisSystemLabel"

                      data-master-label="専門解析先">
                <option value="">マスタ読込中.</option>
              </select>
              <input class="draft-field"
                     type="hidden"
                     id="draftAnalysisSystemCode">
              <input class="draft-field"
                     type="hidden"
                     id="draftAnalysisSystemReason">
              <input class="draft-field"
                     type="hidden"
                     id="draftAnalysisSystemConfidence">
            </label>

            <label>

            <label>

  function esc(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function formatJapanDateTime(value) {
    if (!value) return "";

    const date = new Date(value);

    if (Number.isNaN(date.getTime())) {
      return String(value);
    }

    const parts = new Intl.DateTimeFormat("ja-JP", {
      timeZone: "Asia/Tokyo",
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hour12: false
    }).formatToParts(date).reduce((acc, part) => {
      acc[part.type] = part.value;
      return acc;
    }, {});

    return `${parts.year}-${parts.month}-${parts.day} ${parts.hour}:${parts.minute}:${parts.second}`;
  }

  function showResult(message) {
    const result = document.getElementById("result");
    if (!result) return;

    if (message && typeof message === "object") {
      result.textContent = JSON.stringify(message, null, 2);
      return;
    }

    result.textContent = message || "";
  }

/* PAYMENT_DOCUMENT_REVIEW_IMAGE_PREVIEW_20260707_START */
  function documentPreviewUrl(item) {
    if (!item) return "";

    if (item.imageUrl) {
      return item.imageUrl;
    }

    const id = item.paymentDocumentOcrImportId || item.payment_document_ocr_import_id || "";

    if (id) {
      return "/api/payment-documents/ocr-imports/file/" + encodeURIComponent(String(id));
    }

    const fileName = item.savedFileName || item.fileName || "";

    if (fileName) {
      return "/api/payment-documents/scan-inbox/file/" + encodeURIComponent(fileName);
    }

    return "";
  }

  function isPreviewImage(item, url) {
    const mime = String(item && item.mimeType || "").toLowerCase();

    if (mime.startsWith("image/")) {
      return true;
    }

    return /\.(png|jpg|jpeg|webp|gif)(\?|#|$)/i.test(String(url || ""));
  }

  function isPreviewPdf(item, url) {
    const mime = String(item && item.mimeType || "").toLowerCase();

    if (mime === "application/pdf") {
      return true;
    }

    return /\.pdf(\?|#|$)/i.test(String(url || ""));
  }

/* PAYMENT_DOCUMENT_REVIEW_PREVIEW_ROTATE_20260707_START */
  let documentPreviewRotation = 0;
/* PAYMENT_DOCUMENT_REVIEW_PREVIEW_REAL_FIT_20260707_START */
  function previewInnerSize() {
    const preview = document.getElementById("documentPreview");

    if (!preview) {
      return { width: 1, height: 1 };
    }

    const style = window.getComputedStyle(preview);
    const paddingX =
      parseFloat(style.paddingLeft || "0") +
      parseFloat(style.paddingRight || "0");
    const paddingY =
      parseFloat(style.paddingTop || "0") +
      parseFloat(style.paddingBottom || "0");

    return {
      width: Math.max(1, preview.clientWidth - paddingX),
      height: Math.max(1, preview.clientHeight - paddingY)
    };
  }

  function previewTargetNaturalSize(target) {
    if (!target) {
      return { width: 1, height: 1 };
    }

    if (target.tagName === "IMG") {
      return {
        width: Math.max(1, target.naturalWidth || target.width || 1),
        height: Math.max(1, target.naturalHeight || target.height || 1)
      };
    }

    return previewInnerSize();
  }

  function currentPreviewTarget() {
    const preview = document.getElementById("documentPreview");

    if (!preview) {
      return null;
    }

    return preview.querySelector(".document-preview-image, .document-preview-frame");
  }

  function applyDocumentPreviewRotation() {
    const target = currentPreviewTarget();

    if (!target) {
      scheduleDocumentPreviewFit();
      return;
    }

    const box = previewInnerSize();
    const natural = previewTargetNaturalSize(target);
    const rotation = ((documentPreviewRotation % 360) + 360) % 360;
    const sideways = rotation === 90 || rotation === 270;

    const logicalWidth = sideways ? natural.height : natural.width;
    const logicalHeight = sideways ? natural.width : natural.height;

    const scale = Math.min(
      box.width / logicalWidth,
      box.height / logicalHeight
    );

    const displayWidth = natural.width * scale;
    const displayHeight = natural.height * scale;
    const displayWidthPercent = box.width > 0 ? (displayWidth / box.width) * 100 : 100;
    const displayHeightPercent = box.height > 0 ? (displayHeight / box.height) * 100 : 100;

    target.style.width = Math.max(0, Math.min(100, displayWidthPercent)) + "%";
    target.style.height = Math.max(0, Math.min(100, displayHeightPercent)) + "%";
    target.style.maxWidth = "none";
    target.style.maxHeight = "none";
    target.style.transform = "rotate(" + rotation + "deg)";
    target.style.transformOrigin = "center center";
  }

  function scheduleDocumentPreviewFit() {
    window.setTimeout(() => {
      applyDocumentPreviewRotation();
    }, 0);

    window.setTimeout(() => {
      applyDocumentPreviewRotation();
    }, 80);
  }

  window.addEventListener("resize", () => {
    scheduleDocumentPreviewFit();
  });
/* PAYMENT_DOCUMENT_REVIEW_PREVIEW_REAL_FIT_20260707_END */

  function rotateDocumentPreview(degrees) {
    documentPreviewRotation = (documentPreviewRotation + Number(degrees || 0)) % 360;

    if (documentPreviewRotation < 0) {
      documentPreviewRotation += 360;
    }

    applyDocumentPreviewRotation();
  }

  function resetDocumentPreviewRotation(shouldApply = true) {
    documentPreviewRotation = 0;

    if (shouldApply) {
      applyDocumentPreviewRotation();
    }
  }
/* PAYMENT_DOCUMENT_REVIEW_PREVIEW_ROTATE_20260707_END */
function setDocumentPreview(item) {
    const preview = document.getElementById("documentPreview");

    if (!preview) {
      scheduleDocumentPreviewFit();
      return;
    }

    if (!item) {
      preview.innerHTML = '<div class="preview-empty">左からDB保存済みOCRを選択してください。</div>';
      scheduleDocumentPreviewFit();
      return;
    }

    const url = documentPreviewUrl(item);
    const name = item.originalFileName || item.savedFileName || item.fileName || "原本";

    if (!url) {
      preview.innerHTML =
        '<div class="preview-empty">原本ファイルの参照先がありません。</div>';
      scheduleDocumentPreviewFit();
      return;
    }

    if (isPreviewPdf(item, url)) {
      preview.innerHTML =
        '<iframe class="document-preview-frame" src="' + esc(url) + '" title="' + esc(name) + '"></iframe>';
      scheduleDocumentPreviewFit();
      return;
    }

    if (isPreviewImage(item, url)) {
      preview.innerHTML =
        '<img class="document-preview-image" onload="scheduleDocumentPreviewFit()" src="' + esc(url) + '" alt="' + esc(name) + '">';
      scheduleDocumentPreviewFit();
      return;
    }

    preview.innerHTML =
      '<div class="preview-empty">' +
      '<div>この形式は画面内プレビュー対象外です。</div>' +
      '<a href="' + esc(url) + '" target="_blank" rel="noopener">原本を開く</a>' +
      '</div>';
  }

    return normalizeLabelText(clone.textContent);

  function findControlByLabelText(labelText) {
    const wanted = normalizeLabelText(labelText);

    if (!wanted) {
      return null;
    }

    const labels = Array.from(document.querySelectorAll("label"));

    for (const label of labels) {
      const text = labelTextOnly(label);

      if (!text) {
        continue;
      }

      if (text !== wanted && !text.startsWith(wanted) && !wanted.startsWith(text)) {
        continue;
      }

      if (label.htmlFor) {
        const byFor = document.getElementById(label.htmlFor);

        if (byFor) {
          return byFor;
        }
      }

      const control = label.querySelector("input, select, textarea");

      if (control) {
        return control;
      }
    }

    return null;
  }

  function findControlByLabelText(labelText) {
    const wanted = normalizeLabelText(labelText);

    if (!wanted) {
      return null;

    const labels = Array.from(document.querySelectorAll("label, .field-label, .form-label, .label"));

    for (const label of labels) {
      const text = normalizeLabelText(label.textContent);

      if (!text || text !== wanted) {
        continue;
      }

      if (label.htmlFor) {
        const byFor = document.getElementById(label.htmlFor);

        if (byFor) {
          return byFor;
        }
      }

      const parent = label.closest(".field, .form-field, .input-row, .form-row, div") || label.parentElement;

      if (parent) {
        const control = parent.querySelector("input, select, textarea");

        if (control) {
          return control;
        }
      }

      const next = label.nextElementSibling;

      if (next && next.matches && next.matches("input, select, textarea")) {
        return next;
      }
    }

    return null;
  }

  window.runAiDraftForItemIndex = async function(index, options = {}) {
    if (!Array.isArray(items) || index < 0 || index >= items.length) {
      showResult("解析する書類が見つかりません。");
      return { ok: false, error: "解析する書類が見つかりません。" };
    }

    selectedIndex = index;
    selectItem(index);

    const item = items[index];
    const id = String(window.ocrImportIdOf(item) || "");
    const name = item.originalFileName || item.fileName || ("No." + (index + 1));

    if (!id) {
      const error = "OCR保存IDがないため解析できません。";
      showResult(error);
      return { ok: false, name, error };
    }

    if (!options.silent) {
      showResult("単品仕分け中: " + name + "\nOCR本文だけで1回目仕分けをしています。詳細項目は抽出しません。");
    }

    try {
      const res = await fetch("/api/payment-documents/ai-sort/" + encodeURIComponent(id), {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        }
      });

      const data = await res.json();

      if (!data.ok) {
        const error = data.error || data.message || "AI仕分け失敗";
        showResult({ ok: false, name, error, data });
        return { ok: false, name, error };

      window.applySortingAiResultToItem(item, data);

      if (typeof applySortingOnlyDraftToForm === "function") { const appliedCount = applySortingOnlyDraftToForm(item.__aiDraft); window.__lastAiDraftAppliedCount = appliedCount; }

      if (typeof showVisibleFieldsOnly === "function") {
        showVisibleFieldsOnly(item.__visibleFieldLabels || []);
      }

      window.__expandedOcrImportIds.clear();
      window.__expandedOcrImportIds.add(id);

      window.renderSortingList();

      const visual = window.buildSortingVisual(item);

      if (!options.silent) {
        showResult(
          "単品仕分けが完了しました。\n" +
          "種類: " + visual.kindLabel + "\n" +
          "行き先: " + visual.destinationLabel + "\n" +
          (visual.accountingLabel ? "会計候補: " + visual.accountingLabel + "\n" : "") +
          (visual.confidenceLabel ? "AI信頼度: " + visual.confidenceLabel + "\n" : "") +
          (visual.needsReview ? "要確認: あり\n" : "要確認: なし\n")
        );
      }

      return {
        ok: true,
        name,
        kind: visual.kindLabel,
        destination: visual.destinationLabel,
        accounting: visual.accountingLabel,
        confidence: visual.confidenceLabel,
        needsReview: visual.needsReview
      };
    } catch (error) {
      const message = error.message || String(error);
      showResult({ ok: false, name, error: message });
      return { ok: false, name, error: message };
    }

  window.runSelectedAiDrafts = async function() {
    const indexes = window.selectedSortingIndexes();

    if (!indexes.length) {
      showResult("まとめて仕分けする書類にチェックを入れてください。");
      return;
    }

    const results = [];
    let success = 0;
    let failed = 0;
    let review = 0;

    for (let i = 0; i < indexes.length; i++) {
      const index = indexes[i];
      const item = items[index] || {};
      const name = item.originalFileName || item.fileName || ("No." + (index + 1));

      showResult("まとめて仕分け中: " + (i + 1) + " / " + indexes.length + "\n" + name);

      const result = await window.runAiDraftForItemIndex(index, { silent: true });

      results.push(result);

      if (result && result.ok) {
        success++;
        if (result.needsReview) review++;
      } else {
        failed++;
      }

      window.renderSortingList();
    }

    window.__expandedOcrImportIds.clear();
    window.renderSortingList();

    const grouped = results
      .filter(row => row && row.ok)
      .reduce((acc, row) => {
        const key = row.destination || "未判定";
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});

    const groupedText = Object.keys(grouped)
      .map(key => key + ": " + grouped[key] + "件")
      .join("\n");

    showResult(
      "まとめて仕分けが完了しました。\n" +
      "対象: " + indexes.length + "件\n" +
      "成功: " + success + "件\n" +
      "失敗: " + failed + "件\n" +
      "要確認: " + review + "件\n\n" +
      "行き先別:\n" +
      (groupedText || "なし")
    );
  };

      return Math.round(n / 1024) + " KB";
    }

    return n ? n + " B" : "";

  function updateRecordNavigationControls() {
    const total = Array.isArray(items) ? items.length : 0;
    const index = Number.isInteger(selectedIndex) ? selectedIndex : -1;

    const previousButton = document.getElementById("previousRecordButton");
    const nextButton = document.getElementById("nextRecordButton");
    const position = document.getElementById("recordNavigationPosition");

    if (previousButton) {
      previousButton.disabled = total === 0 || index <= 0;
    }

    if (nextButton) {
      nextButton.disabled = total === 0 || index < 0 || index >= total - 1;
    }

    if (position) {
      position.textContent = index >= 0 && index < total
        ? (index + 1) + " / " + total
        : "0 / " + total;
    }
  }

  function moveSelectedRecord(direction) {
    const total = Array.isArray(items) ? items.length : 0;

    if (total === 0) {
      updateRecordNavigationControls();
      return;
    }

    const currentIndex =
      Number.isInteger(selectedIndex) && selectedIndex >= 0
        ? selectedIndex
        : 0;

    const nextIndex = currentIndex + Number(direction || 0);

    if (nextIndex < 0 || nextIndex >= total) {
      updateRecordNavigationControls();
      return;
    }

    selectItem(nextIndex);

    const activeItem = document.querySelector(".item.active");

    if (activeItem && typeof activeItem.scrollIntoView === "function") {
      activeItem.scrollIntoView({
        block: "nearest",
        behavior: "smooth"
      });
    }
  }

    if (!Array.isArray(items) || index < 0 || index >= items.length) {
      updateRecordNavigationControls();
      return;
    }

    selectedIndex = index;
    const item = items[index];

    updateRecordNavigationControls();

    document.querySelectorAll(".item").forEach((el, i) => {
      el.classList.toggle("active", i === index);
    });

    const ocrValue = item.ocrRawText || item.ocrTextPreview || "";
    document.getElementById("ocrText").value = ocrValue;
    resetDocumentPreviewRotation(false);

  function normalizeMasterText(value) {

      .toLowerCase();
  }

  function getDraftMasterRows(type) {
    const source = draftMasters || {};

    if (Array.isArray(source[type])) {
      return source[type];
    }

    if (source.masters && Array.isArray(source.masters[type])) {
      return source.masters[type];
    }

    if (Array.isArray(source.items)) {
      return source.items.filter(row => row && row.type === type);
    }

    if (Array.isArray(source)) {
      return source.filter(row => row && row.type === type);
    }

    return [];

  function masterRowName(row) {

      row.tax_name ||
      row.vendor_name ||
      row.target_person_name ||

      row.purpose_id ??

  function masterRowLabel(row) {
    const name = masterRowName(row);

    if (!name) {

    if (row.account_code) {
      return String(row.account_code) + " " + name;
    }

    if (row.tax_rate !== undefined && row.tax_rate !== null && row.tax_rate !== "") {
      return name + "（" + row.tax_rate + "%）";

    return name;

  function populateOneMasterSelect(select) {
    if (!select) return;

    const type = select.dataset.masterType || "";
    const label = select.dataset.masterLabel || type || "マスタ";
    const rows = getDraftMasterRows(type).filter(row => row && row.is_active !== false);

    const previousValue = select.value;
    select.innerHTML = "";

    const empty = document.createElement("option");
    empty.value = "";
    empty.textContent = label + "を選択";
    select.appendChild(empty);

    if (!rows.length) {
      const option = document.createElement("option");
      option.value = "";
      option.textContent = label + "マスタ未接続または未登録";
      option.disabled = false;
      select.appendChild(option);
      select.classList.add("master-missing");
      select.disabled = false;
      scheduleDocumentPreviewFit();
      return;
    }

    select.disabled = false;
    select.classList.remove("master-missing");

    for (const row of rows) {
      const name = masterRowName(row);
      const value = masterRowValue(row);
      const labelText = masterRowLabel(row);

      if (!name || !value) {
        continue;
      }

      const option = document.createElement("option");
      option.value = value;
      option.dataset.name = name;
      option.textContent = labelText;

<script>
(function () {
  function cleanText(value) {
    return String(value || "").replace(/\s+/g, " ").trim();
  }

  function showResultSafe(value) {
    var text = typeof value === "string" ? value : JSON.stringify(value, null, 2);
    var result = document.getElementById("result");

    if (result) {
      result.textContent = text;
      result.classList.add("has-message");
      return;
    }

    alert(text);
  }

  function isElementActuallyVisible(element) {
    if (!element) return false;

    if (element.closest(".ai-section-hidden")) return false;
    if (element.closest(".ai-field-hidden")) return false;

    var node = element;

    while (node && node.nodeType === 1) {
      if (node.hidden) return false;

      var style = window.getComputedStyle(node);

      if (!style) return false;
      if (style.display === "none") return false;
      if (style.visibility === "hidden") return false;

      if (node === document.body) break;

      node = node.parentElement;
    }

    return true;
  }

  function labelFor(control) {
    if (!control) return "";

    var label = control.closest("label");

    if (!label) {
      return control.id || control.name || control.tagName || "";
    }

    var clone = label.cloneNode(true);

    clone.querySelectorAll("input, select, textarea, button, option").forEach(function (el) {
      el.remove();
    });

    return cleanText(clone.textContent) || control.id || control.name || "";
  }

  function sectionFor(control) {
    var section = control && control.closest(".draft-section");

    if (!section) {
      return "未分類";
    }

    var title = section.querySelector(".draft-section-title");

    return title ? cleanText(title.textContent) : "未分類";
  }

  function valueFor(control) {
    if (!control) {
      return {
        value: "",
        displayText: ""
      };
    }

    if (control.tagName === "SELECT") {
      var option = control.options && control.selectedIndex >= 0
        ? control.options[control.selectedIndex]
        : null;

      return {
        value: String(control.value || ""),
        displayText: option ? cleanText(option.textContent) : ""
      };
    }

    return {
      value: control.value === null || control.value === undefined ? "" : String(control.value),
      displayText: ""
    };
  }

  function collectVisibleFieldsOnly() {
    var controls = Array.from(document.querySelectorAll(".draft-panel .draft-field"))
      .filter(function (control) {
        if (!control || control.type === "hidden") return false;

        var label = control.closest("label") || control;
        var section = control.closest(".draft-section");

        if (!isElementActuallyVisible(section || label)) return false;
        if (!isElementActuallyVisible(label)) return false;
        if (!isElementActuallyVisible(control)) return false;

        return true;
      });

    return controls.map(function (control, index) {
      var valueInfo = valueFor(control);

      return {
        no: index + 1,
        section: sectionFor(control),
        label: labelFor(control),
        id: control.id || "",
        tagName: control.tagName || "",
        type: control.type || "",
        value: valueInfo.value,
        displayText: valueInfo.displayText,
        placeholder: control.getAttribute("placeholder") || "",
        masterType: control.dataset ? (control.dataset.masterType || "") : "",
        masterLabel: control.dataset ? (control.dataset.masterLabel || "") : ""
      };
    });
  }

  function safeSelectedIndex() {
    try {
      if (typeof selectedIndex === "number") {
        return selectedIndex;
      }
    } catch (error) {
      return -1;
    }

    return -1;
  }

  function safeSelectedItem() {
    try {
      if (typeof items !== "undefined" && Array.isArray(items)) {
        var index = safeSelectedIndex();

        if (index >= 0 && items[index]) {
          return items[index];
        }
      }
    } catch (error) {
      return null;
    }

    return null;
  }

  function safeSelectedOcrImportId() {
    try {
      if (typeof selectedOcrImportId === "function") {
        return selectedOcrImportId() || "";
      }
    } catch (error) {
      // noop
    }

    var item = safeSelectedItem();

    if (!item) {
      return "";
    }

    return item.paymentDocumentOcrImportId || item.payment_document_ocr_import_id || "";
  }

  async function exportVisibleFieldsMemoVisibleOnly() {
    var button = document.getElementById("visibleFieldsMemoButton") || document.querySelector(".mini-memo-button");
    var oldText = button ? button.textContent : "";
    var item = safeSelectedItem();

    if (button) {
      button.disabled = true;
      button.textContent = "出力中";
    }

    try {
      var fields = collectVisibleFieldsOnly();

      var payload = {
        pageTitle: document.title || "",
        pagePath: location.pathname,
        selectedIndex: safeSelectedIndex(),
        selectedOcrImportId: safeSelectedOcrImportId(),
        selectedItem: item ? {
          paymentDocumentOcrImportId: item.paymentDocumentOcrImportId || item.payment_document_ocr_import_id || "",
          originalFileName: item.originalFileName || "",
          savedFileName: item.savedFileName || item.fileName || "",
          mimeType: item.mimeType || "",
          ocrStatus: item.ocrStatus || "",
          savedAt: item.savedAt || "",
          updatedAt: item.updatedAt || ""
        } : null,
                ocrRawText: item ? String(item.ocrRawText || item.ocr_raw_text || item.ocrText || "") : "",
        ocrTextLength: item ? Number(item.ocrTextLength || item.ocr_text_length || String(item.ocrRawText || item.ocr_raw_text || item.ocrText || "").length || 0) : 0,sortingAppliedCount: window.__lastAiDraftAppliedCount || 0,
        aiMissingControls: Array.isArray(window.__lastAiDraftMissingControls) ? window.__lastAiDraftMissingControls : [],
        fields: fields
      };

      showResultSafe({
        ok: true,
        message: "表示中の項目だけをmemoへ出します。",
        visibleFieldCount: fields.length
      });

      var res = await fetch("/api/payment-documents/review-visible-fields-memo", {
        method: "POST",
        headers: {
          "Content-Type": "application/json; charset=utf-8"
        },
        body: JSON.stringify(payload)
      });

      var responseText = await res.text();
      var data = {};

      try {
        data = JSON.parse(responseText || "{}");
      } catch (error) {
        throw new Error("API応答がJSONではありません: " + responseText.slice(0, 300));
      }

      if (!res.ok || !data.ok) {
        throw new Error(data.error || data.message || ("HTTP " + res.status));
      }

      showResultSafe({
        ok: true,
        message: "表示中の項目だけをmemoへ出しました。",
        count: data.count,
        memoPath: data.memoPath,
        openedNotepad: data.openedNotepad
      });
    } catch (error) {
      showResultSafe({
        ok: false,
        error: error.message || String(error)
      });
    } finally {
      if (button) {
        button.disabled = false;
        button.textContent = oldText || "表示";
      }
    }
  }

  function attachVisibleMemoButton() {
    var button = document.getElementById("visibleFieldsMemoButton") || document.querySelector(".mini-memo-button");

    if (!button) {
      return;
    }

    button.onclick = null;

    button.addEventListener("click", function (event) {
      event.preventDefault();
      exportVisibleFieldsMemoVisibleOnly();
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", attachVisibleMemoButton);
  } else {
    attachVisibleMemoButton();
  }

  window.exportVisibleFieldsMemoVisibleOnly = exportVisibleFieldsMemoVisibleOnly;
})();
</script>

<script>
(function () {
  window.__hdOriginPaymentAnalyzeBusyInstalled = true;
  window.__hdOriginPaymentBulkBusyRunning = false;

  function textOf(value) {
    if (value === null || value === undefined) return "";
    if (typeof value === "string") return value;

    try {
      return JSON.stringify(value, null, 2);
    } catch (error) {
      return String(value);
    }
  }

  function ensureAnalyzeBusyPanel() {
    let panel = document.getElementById("hdPaymentAnalyzeBusyPanel");

    if (panel) {
      return panel;
    }

    panel = document.createElement("div");
    panel.id = "hdPaymentAnalyzeBusyPanel";

      '  <div class="hd-analyze-spinner" aria-hidden="true"></div>',
      '  <div class="hd-analyze-busy-main">',
      '    <div class="hd-analyze-busy-title" id="hdAnalyzeBusyTitle">仕分け中です</div>',
      '    <div class="hd-analyze-busy-sub" id="hdAnalyzeBusySub">AIが仕分け候補を作成しています。</div>',
      '    <div class="hd-analyze-progress">',
      '      <div class="hd-analyze-progress-bar" id="hdAnalyzeProgressBar"></div>',
      '    </div>',
      '    <div class="hd-analyze-busy-detail" id="hdAnalyzeBusyDetail">画面を閉じずにお待ちください。</div>',
      '  </div>',
      '</div>'
    ].join("");

    document.body.appendChild(panel);
    return panel;
  }

  function setAnalyzeButtonsDisabled(disabled) {
    const selector = [
      'button[onclick*="runSelectedAiDrafts"]',
      'button[onclick*="runAiDraftForItemIndex"]',
      'button[onclick*="runAiDraftFromSelectedOcr"]',
      '.sorting-bulk-analyze',
      '.sorting-single-analyze',
      '.action-ai'
    ].join(",");

    document.querySelectorAll(selector).forEach(button => {
      if (!button) return;

      if (disabled) {
        if (!button.dataset.hdAnalyzeOldDisabled) {
          button.dataset.hdAnalyzeOldDisabled = button.disabled ? "1" : "0";
        }

        button.disabled = true;
        button.classList.add("hd-analyze-button-disabled");
      } else {
        if (button.dataset.hdAnalyzeOldDisabled === "0") {
          button.disabled = false;
        }

        if (button.dataset.hdAnalyzeOldDisabled === "1") {
          button.disabled = true;
        }

        delete button.dataset.hdAnalyzeOldDisabled;
        button.classList.remove("hd-analyze-button-disabled");
      }
    });
  }

  window.hdPaymentSetAnalyzeBusy = function (active, options) {
    const panel = ensureAnalyzeBusyPanel();
    const opt = options || {};

    const title = document.getElementById("hdAnalyzeBusyTitle");
    const sub = document.getElementById("hdAnalyzeBusySub");
    const detail = document.getElementById("hdAnalyzeBusyDetail");
    const bar = document.getElementById("hdAnalyzeProgressBar");

    if (active) {
      document.body.classList.add("hd-analyze-busy");
      panel.classList.add("visible");

      if (title) title.textContent = opt.title || "仕分け中です";
      if (sub) sub.textContent = opt.sub || "AIが仕分け候補を作成しています。";

      const current = Number(opt.current || 0);
      const total = Number(opt.total || 0);
      const fileName = String(opt.fileName || "").trim();

      if (detail) {
        if (total > 0 && current > 0) {
          detail.textContent =
            "処理中: " + current + " / " + total +
            (fileName ? "　" + fileName : "");
        } else {
          detail.textContent = fileName || opt.detail || "画面を閉じずにお待ちください。";
        }
      }

      if (bar) {
        if (total > 0 && current > 0) {
          const percent = Math.max(4, Math.min(100, Math.round((current / total) * 100)));
          bar.style.width = percent + "%";
          bar.classList.remove("indeterminate");
        } else {
          bar.style.width = "45%";
          bar.classList.add("indeterminate");
        }
      }

      setAnalyzeButtonsDisabled(true);
    } else {
      document.body.classList.remove("hd-analyze-busy");
      panel.classList.remove("visible");
      setAnalyzeButtonsDisabled(false);

      if (bar) {
        bar.style.width = "0%";
        bar.classList.remove("indeterminate");
      }

  };

  window.hdPaymentAnalyzeStep = function (current, total, fileName) {
    window.hdPaymentSetAnalyzeBusy(true, {
      title: "まとめて仕分け中です",
      sub: "チェックした書類を順番に仕分けています。",
      current: current,
      total: total,
      fileName: fileName || ""
    });
  };

  function parseProgressMessage(message) {
    const text = textOf(message);

    if (!text) return;

    if (text.includes("まとめて解析中") || text.includes("まとめて仕分け中")) {
      const match = text.match(/(\d+)\s*\/\s*(\d+)/);
      const lines = text.split(/\r?\n/);
      const fileName = lines.length ? lines[lines.length - 1] : "";

      window.__hdOriginPaymentBulkBusyRunning = true;

      window.hdPaymentSetAnalyzeBusy(true, {
        title: "まとめて仕分け中です",
        sub: "選択した書類を1件ずつAI仕分けしています。",
        current: match ? Number(match[1]) : 0,
        total: match ? Number(match[2]) : 0,
        fileName: fileName || ""
      });

      return;
    }

    if (
      text.includes("単品解析中") ||
      text.includes("単品仕分け中") ||
      text.includes("AIで書類分類") ||
      text.includes("必要項目だけ抽出")
    ) {
      if (window.__hdOriginPaymentBulkBusyRunning) {
        return;
      }

      window.hdPaymentSetAnalyzeBusy(true, {
        title: "単品仕分け中です",
        sub: "OCR本文から種類・行き先を判定しています。",
        detail: "AI応答待ちです。画面を閉じずにお待ちください。"
      });

      return;
    }

    if (
      text.includes("まとめて解析が完了") ||
      text.includes("まとめて仕分けが完了") ||
      text.includes("解析が完了") ||
      text.includes("仕分けが完了") ||
      text.includes("AI解析失敗") ||
      text.includes("AI仕分け失敗") ||
      text.includes("解析する書類が見つかりません") ||
      text.includes("仕分けする書類が見つかりません") ||
      text.includes("エラー")
    ) {
      if (text.includes("まとめて解析が完了") || text.includes("まとめて仕分けが完了")) {
        window.__hdOriginPaymentBulkBusyRunning = false;
      }

      window.setTimeout(function () {
        if (!window.__hdOriginPaymentBulkBusyRunning) {
          window.hdPaymentSetAnalyzeBusy(false);
        }
      }, 900);
    }
  }

  function wrapShowResult() {
    if (typeof window.showResult !== "function") return false;

    if (window.showResult.__hdAnalyzeBusyWrappedV2) {
      return true;
    }

    const originalShowResult = window.showResult;

    const wrapped = function (message) {
      parseProgressMessage(message);
      return originalShowResult.apply(this, arguments);
    };

    wrapped.__hdAnalyzeBusyWrappedV2 = true;
    window.showResult = wrapped;

    return true;

  function wrapAnalyzerFunction(name) {
    const fn = window[name];

    if (typeof fn !== "function") return false;

    if (fn.__hdAnalyzeBusyWrappedV2) {
      return true;
    }

    const original = fn;

    const wrapped = async function () {
      const isBulk = name === "runSelectedAiDrafts";
      const wasBulkRunning = window.__hdOriginPaymentBulkBusyRunning;

      if (isBulk) {
        window.__hdOriginPaymentBulkBusyRunning = true;

        window.hdPaymentSetAnalyzeBusy(true, {

          detail: "動いています。画面を閉じずにお待ちください。"

      }

        if (isBulk) {
          window.__hdOriginPaymentBulkBusyRunning = false;

          window.setTimeout(function () {
            window.hdPaymentSetAnalyzeBusy(false);
          }, 1000);
        } else {
          if (!wasBulkRunning && !window.__hdOriginPaymentBulkBusyRunning) {
            window.setTimeout(function () {
              window.hdPaymentSetAnalyzeBusy(false);
            }, 900);
          }
        }
      }
    };

    wrapped.__hdAnalyzeBusyWrappedV2 = true;
    window[name] = wrapped;

    return true;
  }

  function installAnalyzeBusyHooks() {
    ensureAnalyzeBusyPanel();

    wrapShowResult();

    wrapAnalyzerFunction("runAiDraftForItemIndex");
    wrapAnalyzerFunction("runAiDraftFromSelectedOcr");
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", installAnalyzeBusyHooks);
  } else {

  let retryCount = 0;
  const timer = window.setInterval(function () {

    if (retryCount >= 20) {
      window.clearInterval(timer);

})();

      const response = await originalFetch.apply(null, arguments);

      if (id && response && response.clone) {

      if (row) {
        pushId(
          row.dataset.paymentDocumentOcrImportId ||

        );

    document.querySelectorAll(".selected[data-payment-document-ocr-import-id], .active[data-payment-document-ocr-import-id], .selected[data-ocr-import-id], .active[data-ocr-import-id]").forEach(function (el) {
      pushId(el.dataset.paymentDocumentOcrImportId || el.dataset.ocrImportId || el.dataset.id);

  function getIdsFromCache() {
    return Object.keys(window.hdOriginSortingDraftBulkCache || {})
      .map(numberId)
      .filter(Boolean);

  function buildPayloadFromCachedResult(id, cached) {
    const result = cached && cached.result ? cached.result : cached;
    const root = firstObject(result.sortResult, result.sort_result, result.sorting, result.classification, result.draft, result.aiDraft, result);
    const draft = firstObject(result.draft, result.aiDraft, result.sorting, result.classification, root.draft, root.sorting, root.classification, root);
    const aiSummary = firstObject(result.ai_summary, result.aiSummary, draft.ai_summary, draft.aiSummary, root.ai_summary, root.aiSummary);

    return {
      paymentDocumentOcrImportId: id,

      document_type_code: textValue(draft.document_type_code || root.document_type_code || aiSummary.document_kind),

      specialist_route_code: textValue(draft.specialist_route_code || root.specialist_route_code || root.document_group),
      specialist_route_label: textValue(draft.specialist_route_label || root.specialist_route_label),

      ai_reason: textValue(draft.ai_reason || draft.reason || root.review_reason || aiSummary.reason),

  async function postSortingDraft(payload) {
    const res = await fetch("/api/payment-documents/sorting-drafts/save", {
      method: "POST",
      headers: {
        "Content-Type": "application/json; charset=utf-8"
      },
      body: JSON.stringify(payload)
    });

    const json = await res.json().catch(function () {
      return {};
    });

    if (!res.ok || !json.ok) {
      throw new Error(json.error || "下書き保存に失敗しました。");
    }

    return json;
  }

  async function bulkSaveSortingDrafts() {
    let ids = getSelectedOcrIds();

    if (ids.length === 0) {
      ids = getIdsFromCache();
    }

    if (ids.length === 0) {
      throw new Error("まとめて保存する対象が見つかりません。先にまとめて仕分けを実行してください。");
    }

    const ok = [];
    const ng = [];

    for (const id of ids) {
      const cached = window.hdOriginSortingDraftBulkCache[String(id)];

      if (!cached) {

          id,

          draftId: saved.paymentDocumentSortingDraftId || ""

  function ensureBulkSaveButton() {

    if (!sortButton || !sortButton.parentNode) {
      return null;

    button.className = "btn btn-primary hd-origin-bulk-save-sorting-draft";

    sortButton.insertAdjacentElement("afterend", button);

    return button;
  }

  document.addEventListener("click", async function (event) {
    const button = event.target.closest("#bulkSaveSortingDraftButton");

    if (!button) {
      return;
    }

    event.preventDefault();
    event.stopPropagation();

    if (button.dataset.saving === "1") {
      return;
    }

    const originalText = button.textContent;

    try {
      button.dataset.saving = "1";
      button.textContent = "まとめて保存中...";

      const result = await bulkSaveSortingDrafts();

      button.textContent = "まとめて保存";

      alert(
        "まとめて保存が完了しました。\n" +
        "成功: " + result.ok.length + "件\n" +
        "失敗: " + result.ng.length + "件"
      );

      if (result.ng.length > 0) {
        console.warn("HD Origin bulk save draft errors:", result.ng);
      }
    } catch (err) {
      button.textContent = originalText || "まとめて保存";

      alert("まとめて保存に失敗しました。\n" + (err && err.message ? err.message : String(err)));
    } finally {
      button.dataset.saving = "0";
    }
  }, true);

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", ensureBulkSaveButton);
  } else {
    ensureBulkSaveButton();
  }

  window.hdOriginBulkSaveSortingDrafts = bulkSaveSortingDrafts;
})();

<script>
(function () {
  "use strict";

  if (window.__hdOriginSortingDraftAutoSaveGpt00FixedInstalled) return;
  window.__hdOriginSortingDraftAutoSaveGpt00FixedInstalled = true;

  var autoSaveTimer = null;
  var autoSaveRunning = false;
  var autoSaveQueued = false;
  var suppressAutoSave = false;

  function textValue(value) {
    return String(value || "").replace(/\s+/g, "").trim();
  }

  function statusBox() {
    var box = document.getElementById("sortingAutoSaveStatus");

    if (box) return box;

    box = document.createElement("span");
    box.id = "sortingAutoSaveStatus";
    box.className = "muted sorting-auto-save-status";
    box.style.marginLeft = "0.5rem";
    box.style.fontWeight = "800";
    box.textContent = "自動保存: 待機";

    var title = document.querySelector(".draft-panel .panel-title");

    if (title) {
      title.appendChild(box);
    } else {
      document.body.appendChild(box);
    }

    return box;
  }

  function setStatus(message, isError) {
    var box = statusBox();

    box.textContent = message;
    box.style.color = isError ? "#991b1b" : "#166534";
  }

  function selectedIdExists() {
    try {
      if (typeof selectedOcrImportId === "function" && selectedOcrImportId()) return true;
    } catch (error) {}

    try {
      if (typeof findSelectedOcrImportId === "function" && findSelectedOcrImportId()) return true;
    } catch (error) {}

    try {
      if (typeof selectedItem === "function") {
        var item = selectedItem();

        if (
          item &&
          (
            item.paymentDocumentOcrImportId ||
            item.payment_document_ocr_import_id ||
            item.ocrImportId ||
            item.ocr_import_id
          )
        ) {
          return true;
        }
      }
    } catch (error) {}

    return false;
  }

  function saveFunctionReady() {
    return typeof window.hdOriginSaveSortingDraftFromReviewPage === "function";
  }

  async function runAutoSave(reason) {
    if (suppressAutoSave) {
      return { ok: false, skipped: true, reason: "suppressed" };
    }

    if (!selectedIdExists()) {
      return { ok: false, skipped: true, reason: "no_selected_ocr" };
    }

    if (!saveFunctionReady()) {
      setStatus("自動保存待機: 保存関数の読込待ち", false);

      setTimeout(function () {
        runAutoSave(reason || "human");
      }, 500);

      return { ok: false, skipped: true, reason: "save_function_not_ready" };
    }

    if (autoSaveRunning) {
      autoSaveQueued = true;
      return { ok: false, queued: true };
    }

    autoSaveRunning = true;
    setStatus(reason === "ai" ? "AI結果を自動保存中..." : "修正内容を自動保存中...", false);

    try {
      /*
        重要:
        collectSortingDraftPayload は既存IIFE内のローカル関数なので、ここから直接呼ばない。
        既存側が window に公開している hdOriginSaveSortingDraftFromReviewPage を呼ぶ。
      */
      var saved = await window.hdOriginSaveSortingDraftFromReviewPage();

      setStatus("自動保存済み " + new Date().toLocaleTimeString("ja-JP", { hour12: false }), false);

      return Object.assign({ ok: true }, saved || {});
    } catch (error) {
      var message = error && error.message ? error.message : String(error);

      console.error("HD Origin sorting draft autosave failed:", error);
      setStatus("自動保存失敗: " + message, true);

      return { ok: false, error: message };
    } finally {
      autoSaveRunning = false;

      if (autoSaveQueued) {
        autoSaveQueued = false;
        scheduleAutoSave("human");
      }
    }
  }

  function scheduleAutoSave(reason) {
    if (suppressAutoSave) return;
    if (!selectedIdExists()) return;

    clearTimeout(autoSaveTimer);
    setStatus("自動保存待機中...", false);

    autoSaveTimer = setTimeout(function () {
      runAutoSave(reason || "human");
    }, 700);
  }

  function isDraftControl(target) {
    if (!target || !target.closest) return false;

    return !!target.closest(".draft-field, .master-select");
  }

  function isSaveButton(button) {
    if (!button) return false;

    if (button.id === "bulkSaveSortingDraftButton") return true;
    if (button.classList && button.classList.contains("hd-origin-bulk-save-sorting-draft")) return true;

    var t = textValue(button.textContent || button.value || button.getAttribute("aria-label") || button.title);

    if (!t) return false;

    return t.includes("まとめて保存") || t.includes("下書き保存");
  }

  function removeSaveButtons() {
    Array.from(document.querySelectorAll("button, input[type='button'], input[type='submit'], a")).forEach(function (button) {
      if (isSaveButton(button)) {
        button.remove();
      }
    });
  }

  document.addEventListener("input", function (event) {
    if (isDraftControl(event.target)) {
      scheduleAutoSave("human");
    }
  }, true);

  document.addEventListener("change", function (event) {
    if (isDraftControl(event.target)) {
      scheduleAutoSave("human");
    }
  }, true);

  document.addEventListener("click", function (event) {
    var button = event.target && event.target.closest
      ? event.target.closest("button, input[type='button'], input[type='submit'], a")
      : null;

    if (!isSaveButton(button)) return;

    event.preventDefault();
    event.stopPropagation();
    event.stopImmediatePropagation();

    removeSaveButtons();
    setStatus("保存ボタンは廃止済みです。自動保存します。", false);
  }, true);

  function wrapAnalyzer(name) {
    var original = window[name];

    if (typeof original !== "function" || original.__hdOriginAutoSaveGpt00FixedWrapped) {
      return;
    }

    var wrapped = async function () {
      suppressAutoSave = true;

      try {
        return await original.apply(this, arguments);
      } finally {
        suppressAutoSave = false;

        setTimeout(function () {
          runAutoSave("ai");
        }, 0);
      }
    };

    wrapped.__hdOriginAutoSaveGpt00FixedWrapped = true;
    window[name] = wrapped;
  }

  function installAnalyzerWraps() {
    wrapAnalyzer("runAiDraftFromSelectedOcr");
    wrapAnalyzer("runAiDraftForItemIndex");
  }

  removeSaveButtons();
  installAnalyzerWraps();

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", function () {
      removeSaveButtons();
      installAnalyzerWraps();
    });
  }

  var observer = new MutationObserver(function () {
    removeSaveButtons();
    installAnalyzerWraps();
  });

  observer.observe(document.documentElement, {
    childList: true,
    subtree: true
  });

  window.hdOriginRunSortingDraftAutoSave = runAutoSave;
  window.hdOriginScheduleSortingDraftAutoSave = scheduleAutoSave;
})();
</script>

<script>
(function () {
  "use strict";

  if (window.__hdOriginReviewAllItemsMemoInstalled) return;
  window.__hdOriginReviewAllItemsMemoInstalled = true;

  function getItemsForAllMemo() {
    try {
      if (Array.isArray(window.items)) return window.items;
      if (typeof items !== "undefined" && Array.isArray(items)) return items;
    } catch (error) {
      return [];
    }
    return [];
  }

  function textOf(value) {
    if (value === null || value === undefined) return "";
    if (typeof value === "string") return value;
    try {
      return JSON.stringify(value, null, 2);
    } catch (error) {
      return String(value);
    }
  }

  function fileNameOf(item, index) {
    if (!item) return "No." + (index + 1);

    return item.originalFileName ||
      item.original_file_name ||
      item.savedFileName ||
      item.saved_file_name ||
      item.fileName ||
      item.file_name ||
      ("No." + (index + 1));
  }

  function ocrIdOf(item) {
    if (!item) return "";

    try {
      if (typeof window.ocrImportIdOf === "function") {
        return window.ocrImportIdOf(item) || "";
      }
    } catch (error) {}

    return item.paymentDocumentOcrImportId ||
      item.payment_document_ocr_import_id ||
      item.ocrImportId ||
      item.ocr_import_id ||
      item.id ||
      "";
  }

  function ocrTextOf(item) {
    if (!item) return "";

    return String(
      item.ocrRawText ||
      item.ocr_raw_text ||
      item.ocrText ||
      item.ocr_text ||
      item.rawText ||
      item.raw_text ||
      ""
    );
  }

  function aiDraftOf(item) {
    if (!item) return {};

    return item.__aiDraft ||
      item.aiDraft ||
      item.ai_draft ||
      item.sortingDraft ||
      item.sorting_draft ||
      item.draft ||
      {};
  }

  function aiRawOf(item) {
    if (!item) return {};

    return item.__aiRawResult ||
      item.aiRawResult ||
      item.ai_raw_result ||
      item.sortResult ||
      item.sort_result ||
      item.sorting ||
      {};
  }

  function aiStepsOf(item) {
    if (!item) return [];

    return item.__aiSteps ||
      item.aiSteps ||
      item.ai_steps ||
      [];
  }

  function visibleLabelsOf(item) {
    return ["会計区分", "専門解析先", "発行日", "信頼度", "理由"];
  }

  function pushField(fields, section, label, id, value) {
    fields.push({
      no: fields.length + 1,
      section: section,
      label: label,
      id: id || "",
      value: textOf(value),
      displayText: "",
      masterType: "",
      placeholder: ""
    });
  }

  function pushAiSummary(fields, section, draft, raw) {
    var summary = draft.ai_summary || raw.ai_summary || raw.summary || {};

    pushField(fields, section, "書類区分", "document_type", draft.document_type_label || draft.document_type_code || raw.document_type_label || raw.document_type_code || "");
    pushField(fields, section, "処理先", "payment_destination", draft.payment_destination_label || draft.payment_destination_code || raw.payment_destination_label || raw.payment_destination_code || "");
    pushField(fields, section, "専門ルート", "specialist_route", draft.specialist_route_label || draft.specialist_route_code || raw.specialist_route_label || raw.specialist_route_code || raw.document_group || "");
    pushField(fields, section, "会計候補", "accounting_category", draft.accounting_category_label || draft.accounting_category_code || raw.accounting_category_label || raw.accounting_category_code || "");
    pushField(fields, section, "未払種別", "payable_kind", draft.payable_kind_label || draft.payable_kind_code || raw.payable_kind_label || raw.payable_kind_code || "");
    pushField(fields, section, "支払対象", "payment_target", draft.payment_target_label || summary.payment_target || "");
    pushField(fields, section, "未払登録対象", "payable_target", draft.payable_target_label || summary.payable_target || "");
    pushField(fields, section, "経費登録対象", "expense_target", draft.expense_target_label || summary.expense_target || "");
    pushField(fields, section, "税金・公的支払", "tax_public", draft.tax_public_label || summary.tax_public || "");
    pushField(fields, section, "公共料金・通信費", "public_utility", draft.public_utility_label || summary.public_utility || "");
    pushField(fields, section, "契約・保険・リース", "contract_insurance_lease", draft.contract_insurance_lease_label || summary.contract_insurance_lease || "");
    pushField(fields, section, "AI信頼度", "confidence", draft.confidence_label || draft.ai_confidence_label || draft.ai_confidence || draft.confidence || raw.confidence_label || raw.confidence || "");
    pushField(fields, section, "要確認", "needs_review", draft.needs_review === true ? "あり" : (draft.needs_review === false ? "なし" : ""));

  }

  function pushObject(fields, section, obj) {
    obj = obj && typeof obj === "object" ? obj : {};

    var keys = Object.keys(obj);

    if (!keys.length) {
      pushField(fields, section, "内容", "", "[なし]");
      return;
    }

    keys.forEach(function (key) {
      pushField(fields, section, key, key, obj[key]);
    });
  }

  function buildPayload() {
    var list = getItemsForAllMemo();
    var fields = [];
    var allOcrParts = [];
    var analyzedCount = 0;
    var ocrCount = 0;

    list.forEach(function (item, index) {
      var no = String(index + 1).padStart(3, "0");
      var name = fileNameOf(item, index);
      var id = ocrIdOf(item);
      var ocr = ocrTextOf(item);
      var draft = aiDraftOf(item);
      var raw = aiRawOf(item);
      var steps = aiStepsOf(item);
      var labels = visibleLabelsOf(item);

      var hasAi =
        !!(draft && typeof draft === "object" && Object.keys(draft).length) ||
        !!(raw && typeof raw === "object" && Object.keys(raw).length);

      if (hasAi) analyzedCount++;
      if (ocr.trim()) ocrCount++;

      var baseSection = no + " " + name + " / 基本";
      var aiSection = no + " " + name + " / 現在のAI解析結果";
      var rawSection = no + " " + name + " / AI生データ";
      var ocrSection = no + " " + name + " / OCR本文";

      pushField(fields, baseSection, "No", "no", index + 1);
      pushField(fields, baseSection, "OCR取込ID", "payment_document_ocr_import_id", id);
      pushField(fields, baseSection, "ファイル名", "original_file_name", name);
      pushField(fields, baseSection, "AI解析状態", "ai_status", hasAi ? "解析結果あり" : "未解析または画面上にAI結果なし");

      pushAiSummary(fields, aiSection, draft, raw);

      pushField(fields, rawSection, "表示対象ラベル", "visible_field_labels", labels.length ? labels.join(", ") : "");
      pushField(fields, rawSection, "AIステップ", "ai_steps", steps.length ? JSON.stringify(steps, null, 2) : "");
      pushObject(fields, rawSection + " / draft", draft);
      pushObject(fields, rawSection + " / rawResult", raw);

      pushField(fields, ocrSection, "OCR本文", "ocr_raw_text", ocr || "[OCR本文なし]");

      allOcrParts.push(
        "==============================\n" +
        no + " " + name + "\n" +
        "OCR取込ID: " + id + "\n" +
        "AI解析状態: " + (hasAi ? "解析結果あり" : "未解析または画面上にAI結果なし") + "\n" +
        "==============================\n" +
        (ocr || "[OCR本文なし]")

    return {
      pageTitle: document.title || "",
      pagePath: location.pathname,
      selectedIndex: -1,
      selectedOcrImportId: "ALL",
      selectedItem: {
        paymentDocumentOcrImportId: "ALL",
        originalFileName: "全件表示: " + list.length + "件",
        savedFileName: "",
        mimeType: "",
        ocrStatus: "全件",
        savedAt: "",
        updatedAt: ""
      },
      ocrRawText: allOcrParts.join("\n\n"),
      ocrTextLength: allOcrParts.join("\n\n").length,
      aiAppliedCount: analyzedCount,
      sortingAppliedCount: analyzedCount,
      aiMissingControls: [],
      fields: fields,
      allItemCount: list.length,
      allAnalyzedCount: analyzedCount,
      allOcrCount: ocrCount
    };
  }

  function showResult(value) {
    if (typeof window.showResultSafe === "function") {
      window.showResultSafe(value);
      return;
    }

    if (typeof window.showResult === "function") {
      window.showResult(value);
      return;
    }

    console.log(value);
  }

  async function exportAllItemsMemo() {
    var button = document.getElementById("visibleAllFieldsMemoButton");
    var oldText = button ? button.textContent : "";

    if (button) {
      button.disabled = true;
      button.textContent = "全件出力中";
    }

    try {
      var list = getItemsForAllMemo();

      if (!list.length) {
        showResult({ ok: false, error: "全件表示する書類がありません。先に一覧を更新してください。" });
        return;
      }

      var payload = buildPayload();

      var res = await fetch("/api/payment-documents/review-visible-fields-memo", {
        method: "POST",
        headers: { "Content-Type": "application/json; charset=utf-8" },
        body: JSON.stringify(payload)
      });

      var responseText = await res.text();
      var data = {};

      try {
        data = JSON.parse(responseText || "{}");
      } catch (error) {
        throw new Error("API応答がJSONではありません: " + responseText.slice(0, 300));
      }

      if (!res.ok || !data.ok) {
