<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>HD Origin Project</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 32px; background: #f5f5f5; }
    .card { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    label { display: block; margin-top: 12px; font-weight: 700; }
    input, textarea, select, button { width: 100%; box-sizing: border-box; padding: 10px; margin-top: 6px; font-size: 16px; }
    button { margin-top: 18px; cursor: pointer; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { border: 1px solid #ddd; padding: 8px; vertical-align: top; }
    th { background: #eee; }
    pre { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <div class="card">
    <h1>HD Origin Project</h1>
    <p>ブラウザ → server.js → PostgreSQL 保存テスト</p>
    <button onclick="healthCheck()">DB接続確認</button>
    <pre id="health"></pre>
  </div>

  <div class="card">
    <h2>入力</h2>

    <label>区分</label>
    <select id="type">
      <option value="売上">売上</option>
      <option value="仕入">仕入</option>
      <option value="経費">経費</option>
      <option value="その他">その他</option>
    </select>

    <label>金額</label>
    <input id="amount" type="number" value="1000">

    <label>名前</label>
    <input id="name" value="テスト太郎">

    <label>日付</label>
    <input id="date" type="date">

    <label>メモ</label>
    <textarea id="memo">ポスグレ保存テスト</textarea>

    <button onclick="sendData()">送信してPostgreSQLに保存</button>
  </div>

  <div class="card">
    <h2>保存一覧</h2>
    <button onclick="loadItems()">再読み込み</button>
    <div id="items"></div>
  </div>

<script>
document.getElementById("date").value = new Date().toISOString().slice(0, 10);

async function healthCheck() {
  const res = await fetch("/api/health");
  const data = await res.json();
  document.getElementById("health").textContent = JSON.stringify(data, null, 2);
}

async function sendData() {
  const payload = {
    type: document.getElementById("type").value,
    amount: document.getElementById("amount").value,
    name: document.getElementById("name").value,
    date: document.getElementById("date").value,
    memo: document.getElementById("memo").value
  };

  const res = await fetch("/api/test", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (!data.ok) {
    alert("保存失敗: " + data.error);
    return;
  }

  await loadItems();
}

async function loadItems() {
  const res = await fetch("/api/items");
  const items = await res.json();

  if (!items.length) {
    document.getElementById("items").textContent = "まだデータがありません。";
    return;
  }

  let html = "<table><tr><th>ID</th><th>受信日時</th><th>区分</th><th>金額</th><th>名前</th><th>日付</th><th>メモ</th><th>元データ</th></tr>";

  for (const item of items) {
    html += `
      <tr>
        <td>${item.id}</td>
        <td>${item.received_at}</td>
        <td>${item.type || ""}</td>
        <td>${item.amount || ""}</td>
        <td>${item.name || ""}</td>
        <td>${item.deal_date || ""}</td>
        <td>${item.memo || ""}</td>
        <td><pre>${JSON.stringify(item.payload, null, 2)}</pre></td>
      </tr>
    `;
  }

  html += "</table>";
  document.getElementById("items").innerHTML = html;
}

healthCheck();
loadItems();
</script>
</body>
</html>
