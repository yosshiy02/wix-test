<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>契約・保険・リース 帳面 | HD Origin</title>
  <link rel="stylesheet" href="/ledgers/reports/contract-insurance-lease-ledger-report.css">
</head>
<body>
  <header class="page-header">
    <div>
      <p>HD Origin Project</p>
      <h1>契約・保険・リース帳面</h1>
    </div>

    <nav>
      <a href="/payables/payment-document-specialist-contract-insurance-lease.html">解析画面へ</a>
      <a class="active" href="/ledgers/reports/contract-insurance-lease-ledger-report.html">帳面画面</a>
    </nav>
  </header>

  <main>
    <section class="summary">
      <div>登録件数<strong id="recordCount">－</strong></div>
      <div>契約<strong id="contractCount">－</strong></div>
      <div>保険<strong id="insuranceCount">－</strong></div>
      <div>リース<strong id="leaseCount">－</strong></div>
    </section>

    <p id="loadStatus">帳面データを読み込んでいます。</p>

    <section class="ledger">
      <table>
        <thead>
          <tr>
            <th>No.</th>
            <th>種別</th>
            <th>書類区分</th>
            <th>相手先</th>
            <th>契約者</th>
            <th>開始日</th>
            <th>終了日</th>
            <th>対象・物件</th>
            <th>金額</th>
            <th>支払日</th>
            <th>明細</th>
            <th>元ファイル</th>
            <th>修正</th>
          </tr>
        </thead>
        <tbody id="ledgerBody"></tbody>
      </table>
    </section>
  </main>

  <script src="/ledgers/reports/contract-insurance-lease-ledger-report.js"></script>
</body>
</html>
