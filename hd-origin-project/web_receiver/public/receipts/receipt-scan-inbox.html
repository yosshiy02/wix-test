<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>レシート取込</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f4f4f5;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      width: min(98vw, 96rem);
      margin: 0 auto;
      padding: 0.75rem;
      display: grid;
      grid-template-columns: minmax(22rem, 0.85fr) minmax(34rem, 1.15fr);
      gap: 0.75rem;
    }

    .top {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      padding: 0.6rem 0.7rem;
    }

    h1 {
      font-size: 1rem;
      margin: 0;
      white-space: nowrap;
    }

    .muted {
      color: #6b7280;
      font-size: 0.8rem;
    }

    button {
      border: 0;
      border-radius: 0.45rem;
      background: #111827;
      color: #fff;
      font-weight: 700;
      padding: 0.45rem 0.65rem;
      cursor: pointer;
      white-space: nowrap;
    }

    button.secondary {
      background: #374151;
    }

    .panel {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      padding: 0.7rem;
      min-height: 20rem;
    }

    .panel-title {
      font-weight: 800;
      margin-bottom: 0.55rem;
    }

    .summary {
      font-size: 0.85rem;
      line-height: 1.55;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
      padding: 0.55rem;
      margin-bottom: 0.55rem;
      white-space: pre-wrap;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      max-height: calc(100vh - 12rem);
      overflow: auto;
    }

    .item {
      display: grid;
      grid-template-columns: 2.5rem minmax(0, 1fr) 5rem;
      gap: 0.4rem;
      align-items: center;
      width: 100%;
      text-align: left;
      background: #f3f4f6;
      color: #111827;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
      padding: 0.45rem;
    }

    .item.active {
      background: #111827;
      color: #fff;
    }

    .no {
      text-align: center;
      font-weight: 800;
    }

    .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .size {
      text-align: right;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .preview {
      background: #eee;
      border-radius: 0.5rem;
      min-height: 24rem;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: auto;
      padding: 0.5rem;
    }

    .preview img {
      max-width: 100%;
      background: #fff;
      border: 1px solid #d1d5db;
    }

    .path {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #6b7280;
      word-break: break-all;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>レシート取込</h1>
      <button onclick="loadInbox()">再読込</button>
      <button onclick="runImportAll()">全件処理</button>
      <button class="secondary" onclick="openConfirmPage()">読取確認ページ</button>
      <span class="muted">scan_inbox の画像をPROJECT側で処理します。</span>
    </div>

    <section class="panel">
      <div class="panel-title">scan_inbox 一覧</div>
      <div id="summary" class="summary">読込中...</div>
      <div id="list" class="list"></div>
    </section>

    <section class="panel">
      <div class="panel-title">選択中画像</div>
      <div id="preview" class="preview">左から選択してください。</div>
      <div id="detail" class="path"></div>
    </section>
  </div>

<script>
  let items = [];
  let selectedIndex = -1;

  function esc(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function kb(bytes) {
    return Math.round((Number(bytes) || 0) / 1024) + " KB";
  }

  async function loadInbox() {
    const summary = document.getElementById("summary");
    const list = document.getElementById("list");
    const preview = document.getElementById("preview");
    const detail = document.getElementById("detail");

    summary.textContent = "読込中...";
    list.innerHTML = "";
    preview.textContent = "左から選択してください。";
    detail.textContent = "";

    const res = await fetch("/api/receipts/scan-inbox");
    const data = await res.json();

    if (!data.ok) {
      summary.textContent = "読込失敗: " + (data.error || "原因不明");
      return;
    }

    items = data.items || [];
    selectedIndex = -1;

    summary.textContent =
      "フォルダ: " + data.dir + "\n" +
      "件数: " + data.count + "件\n" +
      "通常上限: " + data.normalLimit + "件\n" +
      "最大上限: " + data.hardLimit + "件";

    if (!items.length) {
      list.innerHTML = '<div class="muted">画像がありません。</div>';
      return;
    }

    list.innerHTML = items.map((item, index) => {
      return `
        <button class="item" onclick="selectItem(${index})">
          <span class="no">${index + 1}</span>
          <span class="name">${esc(item.fileName)}</span>
          <span class="size">${kb(item.sizeBytes)}</span>
        </button>
      `;
    }).join("");

    selectItem(0);
  }

  function selectItem(index) {
    selectedIndex = index;
    const item = items[index];

    document.querySelectorAll(".item").forEach((el, i) => {
      el.classList.toggle("active", i === index);
    });

    const src = "/api/receipts/scan-inbox/image?fileName=" + encodeURIComponent(item.fileName);

    document.getElementById("preview").innerHTML =
      '<img src="' + src + '" alt="receipt">';

    document.getElementById("detail").textContent =
      "ファイル名: " + item.fileName + "\n" +
      "サイズ: " + kb(item.sizeBytes) + "\n" +
      "SHA-256: " + item.sha256 + "\n" +
      "パス: " + item.fullPath;
  }

  async function runImportAll(force) {
    const summary = document.getElementById("summary");

    summary.textContent = "全件処理中です。しばらく待ってください。";

    const url = "/api/receipts/scan-inbox/import-all" + (force ? "?force=1" : "");

    const res = await fetch(url, {
      method: "POST"
    });

    const data = await res.json();

    if (!data.ok && data.requireForce) {
      if (confirm(data.error + "\n\n続行しますか？")) {
        await runImportAll(true);
      } else {
        summary.textContent = "全件処理をキャンセルしました。";
      }
      return;
    }

    if (!data.ok) {
      summary.textContent = "全件処理エラー:\n" + (data.error || "原因不明");
      return;
    }

    const resultText =
      "全件処理完了\n" +
      "対象: " + (data.count || 0) + "件\n" +
      "取込成功: " + (data.importedCount || 0) + "件\n" +
      "重複: " + (data.duplicateCount || 0) + "件\n" +
      "エラー: " + (data.errorCount || 0) + "件\n" +
      "batchId: " + (data.batchId || "");

    await loadInbox();

    document.getElementById("summary").textContent =
      resultText + "\n\n" + document.getElementById("summary").textContent;
  }

  function openConfirmPage() {
    location.href = "/receipts/receipt-list.html";
  }

  loadInbox();
</script>
</body>
</html>
