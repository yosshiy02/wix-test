<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>レシート取込</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f4f4f5;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      width: min(98vw, 96rem);
      margin: 0 auto;
      padding: 0.75rem;
      display: grid;
      grid-template-columns: minmax(22rem, 0.85fr) minmax(34rem, 1.15fr);
      gap: 0.75rem;
    }

    .top {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      padding: 0.6rem 0.7rem;
    }

    h1 {
      font-size: 1rem;
      margin: 0;
      white-space: nowrap;
    }

    .muted {
      color: #6b7280;
      font-size: 0.8rem;
    }

    button {
      border: 0;
      border-radius: 0.45rem;
      background: #111827;
      color: #fff;
      font-weight: 700;
      padding: 0.45rem 0.65rem;
      cursor: pointer;
      white-space: nowrap;
    }

    button.secondary {
      background: #374151;
    }

    .panel {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      padding: 0.7rem;
      min-height: 20rem;
    }

    .panel-title {
      font-weight: 800;
      margin-bottom: 0.55rem;
    }

    .summary {
      font-size: 0.85rem;
      line-height: 1.55;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
      padding: 0.55rem;
      margin-bottom: 0.55rem;
      white-space: pre-wrap;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      max-height: calc(100vh - 12rem);
      overflow: auto;
    }

    .item {
      display: grid;
      grid-template-columns: 2.5rem minmax(0, 1fr) 5rem;
      gap: 0.4rem;
      align-items: center;
      width: 100%;
      text-align: left;
      background: #f3f4f6;
      color: #111827;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
      padding: 0.45rem;
    }

    .item.active {
      background: #111827;
      color: #fff;
    }

    .no {
      text-align: center;
      font-weight: 800;
    }

    .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .size {
      text-align: right;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .preview {
      background: #eee;
      border-radius: 0.5rem;
      min-height: 24rem;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: auto;
      padding: 0.5rem;
    }

    .preview img {
      max-width: 100%;
      background: #fff;
      border: 1px solid #d1d5db;
    }

    .path {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #6b7280;
      word-break: break-all;
      white-space: pre-wrap;
    }
  
    /* PC_RECEIPT_FILE_INPUT */
    #uploadInput {
      max-width: 18rem;
      font-size: 0.85rem;
      padding: 0.35rem;
      border: 1px solid #d1d5db;
      border-radius: 0.45rem;
      background: #fff;
    }
  
    /* PC_RECEIPT_LIST_DELETE_BUTTON */
    .item-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.35rem;
      align-items: stretch;
    }

    .delete-mini {
      border: 1px solid #b00020;
      color: #b00020;
      background: #fff;
      font-size: 0.8rem;
      font-weight: 800;
      padding: 0.35rem 0.55rem;
      border-radius: 0.5rem;
      min-width: 4rem;
      cursor: pointer;
    }

    .delete-mini:hover {
      background: #ffecec;
    }
  
    /* RECEIPT_SCAN_ROTATE_BUTTONS_START */
    .item-row {
      grid-template-columns: minmax(0, 1fr) auto auto auto !important;
    }

    .rotate-mini {
      border: 1px solid #374151;
      color: #111827;
      background: #fff;
      font-size: 0.8rem;
      font-weight: 800;
      padding: 0.35rem 0.5rem;
      border-radius: 0.5rem;
      min-width: 3.2rem;
      cursor: pointer;
    }

    .rotate-mini:hover {
      background: #f3f4f6;
    }
    /* RECEIPT_SCAN_ROTATE_BUTTONS_END */

    /* RECEIPT_SCAN_PREVIEW_SIZE_START */

    /*
      レシート取込画面：
      画像プレビューは画面内に収まる確認用サイズ。
      固定長は使わず、相対単位で指定する。
    */

    #preview {
      width: 100% !important;
      height: clamp(18rem, calc(100dvh - 16rem), 46rem) !important;
      max-height: calc(100dvh - 16rem) !important;
      min-height: 45dvh !important;
      overflow: hidden !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      background: #f7f7f7 !important;
      border-radius: 0.625rem !important;
    }

    #preview img {
      display: block !important;
      max-width: 100% !important;
      max-height: calc(100dvh - 17.5rem) !important;
      width: auto !important;
      height: auto !important;
      object-fit: contain !important;
      margin: 0 auto !important;
    }

    @media (max-height: 48rem) {
      #preview {
        height: clamp(15rem, calc(100dvh - 14rem), 36rem) !important;
        max-height: calc(100dvh - 14rem) !important;
        min-height: 42dvh !important;
      }

      #preview img {
        max-height: calc(100dvh - 15.5rem) !important;
      }
    }

    @media (max-height: 39rem) {
      #preview {
        height: clamp(12rem, calc(100dvh - 12rem), 30rem) !important;
        max-height: calc(100dvh - 12rem) !important;
        min-height: 38dvh !important;
      }

      #preview img {
        max-height: calc(100dvh - 13.5rem) !important;
      }
    }

    /* RECEIPT_SCAN_PREVIEW_SIZE_END */
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>レシート取込</h1>
      <button id="uploadFileButton" onclick="document.getElementById('uploadInput').click()">ファイル追加</button>
      <button id="uploadFolderButton" onclick="document.getElementById('folderInput').click()">フォルダ追加</button>
      <input id="uploadInput" type="file" accept="image/*" multiple onchange="uploadSelectedFiles()" style="display:none">
      <input id="folderInput" type="file" accept="image/*" multiple webkitdirectory onchange="uploadSelectedFolder()" style="display:none">
      <button onclick="loadInbox()">再読込</button>
      <button onclick="runImportAll()">取込待ちを処理</button>
      <button type="button" onclick="location.href=&quot;/&quot;">メインページ</button>
      <button class="secondary" onclick="openConfirmPage()">読取確認ページ</button>
      <span class="muted">選択した画像をPROJECT内部で処理します。</span>
    </div>

    <section class="panel">
      <div class="panel-title">取込待ち一覧</div>
      <div id="summary" class="summary">読込中...</div>
      <div id="list" class="list"></div>
    </section>

    <section class="panel">
      <div class="panel-title">選択中画像</div>
      <div id="preview" class="preview">左から選択してください。</div>
      <div id="detail" class="path"></div>
    </section>
  </div>

<script>
  let items = [];
  let selectedIndex = -1;

  function esc(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function kb(bytes) {
    return Math.round((Number(bytes) || 0) / 1024) + " KB";
  }

  function readFileAsDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();

      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  const RECEIPT_UPLOAD_MAX_BYTES = 100 * 1024;

  function dataUrlBytes(dataUrl) {
    const base64 = String(dataUrl || "").split(",")[1] || "";
    return Math.round(base64.length * 3 / 4);
  }

  function fileNameWithoutExt(fileName) {
    return String(fileName || "receipt").replace(/\.[^.]+$/, "");
  }

  function readFileAsImage(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();

      reader.onload = () => {
        const img = new Image();

        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = reader.result;
      };

      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function drawImageToDataUrl(img, maxSide, quality) {
    let w = img.naturalWidth;
    let h = img.naturalHeight;

    const longSide = Math.max(w, h);

    if (longSide > maxSide) {
      const scale = maxSide / longSide;
      w = Math.round(w * scale);
      h = Math.round(h * scale);
    }

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = w;
    canvas.height = h;

    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, w, h);
    ctx.drawImage(img, 0, 0, w, h);

    return canvas.toDataURL("image/jpeg", quality);
  }

  async function prepareReceiptImageForUpload(file) {
    if (file.size <= RECEIPT_UPLOAD_MAX_BYTES) {
      return {
        dataUrl: await readFileAsDataUrl(file),
        fileName: file.name,
        mimeType: file.type || "image/jpeg",
        originalBytes: file.size,
        uploadBytes: file.size,
        compressed: false
      };
    }

    const img = await readFileAsImage(file);

    const attempts = [
      { maxSide: 1600, quality: 0.72 },
      { maxSide: 1400, quality: 0.68 },
      { maxSide: 1200, quality: 0.64 },
      { maxSide: 1000, quality: 0.58 },
      { maxSide: 900,  quality: 0.52 },
      { maxSide: 800,  quality: 0.48 },
      { maxSide: 700,  quality: 0.44 },
      { maxSide: 600,  quality: 0.40 },
      { maxSide: 520,  quality: 0.36 }
    ];

    let bestDataUrl = "";
    let bestBytes = Number.MAX_SAFE_INTEGER;

    for (const attempt of attempts) {
      const dataUrl = drawImageToDataUrl(img, attempt.maxSide, attempt.quality);
      const bytes = dataUrlBytes(dataUrl);

      if (bytes < bestBytes) {
        bestDataUrl = dataUrl;
        bestBytes = bytes;
      }

      if (bytes <= RECEIPT_UPLOAD_MAX_BYTES) {
        break;
      }
    }

    return {
      dataUrl: bestDataUrl,
      fileName: fileNameWithoutExt(file.name) + "_compressed.jpg",
      mimeType: "image/jpeg",
      originalBytes: file.size,
      uploadBytes: bestBytes,
      compressed: true
    };
  }

  async function uploadSelectedFiles() {
    return uploadSelectedFilesFromInput("uploadInput");
  }

  async function uploadSelectedFolder() {
    return uploadSelectedFilesFromInput("folderInput");
  }

  async function uploadSelectedFilesFromInput(inputId) {
    const input = document.getElementById(inputId);
    const summary = document.getElementById("summary");

    const files = Array.from(input.files || []).filter((file) => {
      return file && file.type && file.type.indexOf("image/") === 0;
    });

    if (!files.length) {
      summary.textContent = "画像ファイルが選択されていません。";
      return;
    }

    let successCount = 0;
    let errorCount = 0;
    const errors = [];

    summary.textContent =
      "取込待ちへ追加中です。\n" +
      "対象: " + files.length + "件";

    for (let i = 0; i < files.length; i++) {
      const file = files[i];

      try {
        summary.textContent =
          "取込待ちへ追加中です。\n" +
          "処理中: " + (i + 1) + " / " + files.length + "\n" +
          "ファイル: " + file.name + "\n" +
          "100KB超の画像は自動圧縮します。";

        const prepared = await prepareReceiptImageForUpload(file);

        const res = await fetch("/api/receipts/scan-inbox/upload", {
          method: "POST",
          headers: {
            "Content-Type": "application/json; charset=utf-8"
          },
          body: JSON.stringify({
            fileName: prepared.fileName,
            mimeType: prepared.mimeType,
            dataUrl: prepared.dataUrl
          })
        });

        const data = await res.json();

        if (!data.ok) {
          throw new Error(data.error || "追加失敗");
        }

        successCount++;
      } catch (error) {
        errorCount++;
        errors.push(file.name + ": " + (error.message || String(error)));
      }
    }

    input.value = "";

    await loadInbox();

    document.getElementById("summary").textContent =
      "取込待ち追加完了\n" +
      "追加成功: " + successCount + "件\n" +
      "エラー: " + errorCount + "件\n\n" +
      (errors.length ? errors.join("\n") + "\n\n" : "") +
      document.getElementById("summary").textContent;
  }

  async function loadInbox() {
    const summary = document.getElementById("summary");
    const list = document.getElementById("list");
    const preview = document.getElementById("preview");
    const detail = document.getElementById("detail");

    summary.textContent = "読込中...";
    list.innerHTML = "";
    preview.textContent = "左から選択してください。";
    detail.textContent = "";

    const res = await fetch("/api/receipts/scan-inbox");
    const data = await res.json();

    if (!data.ok) {
      summary.textContent = "読込失敗: " + (data.error || "原因不明");
      return;
    }

    items = data.items || [];
    selectedIndex = -1;

    summary.textContent =
      "一時保存先: " + data.dir + "\n" +
      "件数: " + data.count + "件\n" +
      "通常上限: " + data.normalLimit + "件\n" +
      "最大上限: " + data.hardLimit + "件";

    if (!items.length) {
      list.innerHTML = '<div class="muted">画像がありません。</div>';
      return;
    }

    list.innerHTML = items.map((item, index) => {
      return `
        <div class="item-row">
          <button class="item" onclick="selectItem(${index})">
            <span class="no">${index + 1}</span>
            <span class="name">${esc(item.fileName)}</span>
            <span class="size">${kb(item.sizeBytes)}</span>
          </button>
          <button class="rotate-mini" onclick="rotateInboxItem(event, ${index}, -90)">左回転</button>
          <button class="rotate-mini" onclick="rotateInboxItem(event, ${index}, 90)">右回転</button>
          <button class="delete-mini" onclick="deleteInboxItem(event, ${index})">削除</button>
        </div>
      `;
    }).join("");
selectItem(0);
  }
  function inboxImageSrc(fileName) {
    return "/api/receipts/scan-inbox/image?fileName=" +
      encodeURIComponent(fileName) +
      "&v=" + Date.now();
  }
function mimeForRotatedOutput(fileName) {
    const ext = String(fileName || "").toLowerCase();

    if (ext.endsWith(".png")) return "image/png";
    if (ext.endsWith(".webp")) return "image/webp";

    return "image/jpeg";
  }

  function loadInboxImageForRotate(fileName) {
    return new Promise((resolve, reject) => {
      const img = new Image();

      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error("画像の読み込みに失敗しました。"));

      img.src = inboxImageSrc(fileName);
    });
  }

  function drawRotatedDataUrl(img, degrees, fileName) {
    const normalized = ((degrees % 360) + 360) % 360;
    const w = img.naturalWidth || img.width;
    const h = img.naturalHeight || img.height;

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    if (normalized === 90 || normalized === 270) {
      canvas.width = h;
      canvas.height = w;
    } else {
      canvas.width = w;
      canvas.height = h;
    }

    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();

    if (normalized === 90) {
      ctx.translate(canvas.width, 0);
      ctx.rotate(Math.PI / 2);
    } else if (normalized === 180) {
      ctx.translate(canvas.width, canvas.height);
      ctx.rotate(Math.PI);
    } else if (normalized === 270) {
      ctx.translate(0, canvas.height);
      ctx.rotate(-Math.PI / 2);
    }

    ctx.drawImage(img, 0, 0);
    ctx.restore();

    const mime = mimeForRotatedOutput(fileName);

    if (mime === "image/jpeg") {
      return canvas.toDataURL(mime, 0.9);
    }

    return canvas.toDataURL(mime);
  }

  async function rotateInboxItem(event, index, degrees) {
    event.stopPropagation();

    const item = items[index];
    if (!item) return;

    const summary = document.getElementById("summary");

    summary.textContent =
      "画像を回転保存中です。\n" +
      item.fileName;

    try {
      const img = await loadInboxImageForRotate(item.fileName);
      const dataUrl = drawRotatedDataUrl(img, degrees, item.fileName);

      const res = await fetch("/api/receipts/scan-inbox/replace", {
        method: "POST",
        headers: {
          "Content-Type": "application/json; charset=utf-8"
        },
        body: JSON.stringify({
          fileName: item.fileName,
          dataUrl
        })
      });

      const data = await res.json();

      if (!data.ok) {
        throw new Error(data.error || "回転保存に失敗しました。");
      }

      const fileName = item.fileName;

      refreshInboxPreview(fileName);

      await loadInbox();

      const nextIndex = items.findIndex((x) => x.fileName === fileName);
      if (nextIndex >= 0) {
        selectItem(nextIndex);
      
        refreshInboxPreview(fileName);}

      document.getElementById("summary").textContent =
        "画像の向きを保存しました。\n" +
        fileName + "\n\n" +
        document.getElementById("summary").textContent;

    } catch (error) {
      summary.textContent =
        "回転保存エラー:\n" +
        item.fileName + "\n" +
        (error.message || String(error));
    }
  }
  async function deleteInboxItem(event, index) {
    event.stopPropagation();

    const item = items[index];
    if (!item) return;

    const ok = confirm(
      "この画像を削除しますか？\n\n" +
      item.fileName + "\n\n" +
      "取込待ちから削除します。"
    );

    if (!ok) return;

    const summary = document.getElementById("summary");

    summary.textContent =
      "削除中です。\n" +
      item.fileName;

    const url = "/api/receipts/scan-inbox/delete?fileName=" + encodeURIComponent(item.fileName);

    const res = await fetch(url, {
      method: "POST"
    });

    const data = await res.json();

    if (!data.ok) {
      summary.textContent = "削除エラー:\n" + (data.error || "原因不明");
      return;
    }

    await loadInbox();

    document.getElementById("summary").textContent =
      "削除しました。\n" +
      item.fileName + "\n\n" +
      document.getElementById("summary").textContent;
  }

  function refreshInboxPreview(fileName) {
    const preview = document.getElementById("preview");
    if (!preview || !fileName) return;

    const src = inboxImageSrc(fileName);
    const img = preview.querySelector("img");

    if (img) {
      img.src = src;
    } else {
      preview.innerHTML = '<img src="' + src + '" alt="receipt">';
    }
  }
  function selectItem(index) {
    selectedIndex = index;
    const item = items[index];

    document.querySelectorAll(".item").forEach((el, i) => {
      el.classList.toggle("active", i === index);
    });

    const src = inboxImageSrc(item.fileName);

    document.getElementById("preview").innerHTML =
      '<img src="' + src + '" alt="receipt">';

    document.getElementById("detail").textContent =
      "ファイル名: " + item.fileName + "\n" +
      "サイズ: " + kb(item.sizeBytes) + "\n" +
      "SHA-256: " + item.sha256 + "\n" +
      "パス: " + item.fullPath;
  }

  async function confirmContentDuplicatesAfterImportAll(data) {
    const candidates = (data.results || []).filter((r) => {
      return r.status === "content_duplicate_needs_confirm";
    });

    if (!candidates.length) {
      return;
    }

    for (const item of candidates) {
      const ok = confirm(
        "内容重複候補があります。\n\n" +
        "ファイル: " + item.fileName + "\n" +
        "既存ID: " + (item.existingId || "") + "\n" +
        "類似度: " + (item.similarity || "") + "\n\n" +
        "それでも取り込みますか？\n\n" +
        "はい：取り込む\n" +
        "いいえ：scan_inbox に残す"
      );

      if (!ok) {
        continue;
      }

      const url =
        "/api/receipts/scan-inbox/import-one?allowContentDuplicate=1&fileName=" +
        encodeURIComponent(item.fileName);

      const res = await fetch(url, {
        method: "POST"
      });

      const forced = await res.json();

      if (!forced.ok) {
        alert(
          "強制取込に失敗しました。\n\n" +
          item.fileName + "\n" +
          (forced.error || forced.message || "原因不明")
        );
      }
    }
  }

  async function runImportAll(force) {
    const summary = document.getElementById("summary");

    summary.textContent = "取込待ちを処理中です。しばらく待ってください。";

    const url = "/api/receipts/scan-inbox/import-all" + (force ? "?force=1" : "");

    const res = await fetch(url, {
      method: "POST"
    });

    const data = await res.json();

    
    await confirmContentDuplicatesAfterImportAll(data);
if (!data.ok && data.requireForce) {
      if (confirm(data.error + "\n\n続行しますか？")) {
        await runImportAll(true);
      } else {
        summary.textContent = "取込待ちを処理をキャンセルしました。";
      }
      return;
    }

    if (!data.ok) {
      summary.textContent = "取込待ちを処理エラー:\n" + (data.error || "原因不明");
      return;
    }

    const resultText =
      "取込待ちを処理完了\n" +
      "対象: " + (data.count || 0) + "件\n" +
      "取込成功: " + (data.importedCount || 0) + "件\n" +
      "重複: " + (data.duplicateCount || 0) + "件\n" +
      "エラー: " + (data.errorCount || 0) + "件\n" +
      "batchId: " + (data.batchId || "");

    await loadInbox();

    document.getElementById("summary").textContent =
      resultText + "\n\n" + document.getElementById("summary").textContent;
  }

  function openConfirmPage() {
    location.href = "/receipts/receipt-list.html";
  }

  loadInbox();
</script>
  <script src="/hd-origin-exit-guard.js?v=20260706"></script>
</body>
