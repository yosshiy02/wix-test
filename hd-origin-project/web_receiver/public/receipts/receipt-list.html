<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>取込済みレシート一覧</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #222;
      color: #fff;
      padding: 14px 18px;
    }

    main {
      padding: 16px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 16px;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 14px;
    }

    h1 {
      font-size: 20px;
      margin: 0;
    }

    h2 {
      font-size: 16px;
      margin: 0 0 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid #e0e0e0;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #fafafa;
      position: sticky;
      top: 0;
    }

    tr {
      cursor: pointer;
    }

    tr:hover {
      background: #f0f7ff;
    }

    .muted {
      color: #666;
      font-size: 12px;
    }

    .mono {
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      word-break: break-all;
    }

    #receiptImage {
      max-width: 100%;
      max-height: 480px;
      border: 1px solid #ddd;
      background: #fafafa;
      display: none;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #111;
      color: #eee;
      padding: 12px;
      border-radius: 6px;
      max-height: 360px;
      overflow: auto;
      font-size: 12px;
    }

    button {
      padding: 7px 12px;
      border: 1px solid #aaa;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
    }

    button:hover {
      background: #f2f2f2;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1>取込済みレシート一覧</h1>
  </header>

  <main>
    <section class="card">
      <div class="toolbar">
        <button onclick="loadReceipts()">再読込</button>
        <span id="count" class="muted"></span>
      </div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>取込日時</th>
            <th>ファイル名</th>
            <th>OCR</th>
            <th>状態</th>
          </tr>
        </thead>
        <tbody id="listBody">
          <tr>
            <td colspan="5">読込中...</td>
          </tr>
        </tbody>
      </table>
    </section>

    <section class="card">
      <h2>詳細</h2>
      <div id="detail" class="muted">左の一覧から選択してください。</div>
      <hr>
      <img id="receiptImage" alt="レシート画像">
      <h2 style="margin-top:14px;">OCR rawText</h2>
      <pre id="ocrText"></pre>
    </section>
  </main>

  <script>
    const listBody = document.getElementById("listBody");
    const countEl = document.getElementById("count");
    const detailEl = document.getElementById("detail");
    const imageEl = document.getElementById("receiptImage");
    const ocrEl = document.getElementById("ocrText");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      return d.toLocaleString("ja-JP");
    }

    async function loadReceipts() {
      listBody.innerHTML = `<tr><td colspan="5">読込中...</td></tr>`;
      countEl.textContent = "";

      try {
        const res = await fetch("/api/receipts/imports?limit=100");
        const json = await res.json();

        if (!json.ok) {
          throw new Error(json.message || "APIエラー");
        }

        countEl.textContent = `${json.count}件`;

        if (!json.items.length) {
          listBody.innerHTML = `<tr><td colspan="5">取込済みレシートはありません。</td></tr>`;
          return;
        }

        listBody.innerHTML = json.items.map(item => `
          <tr onclick="showDetail(${item.id})">
            <td>${escapeHtml(item.id)}</td>
            <td>${escapeHtml(formatDate(item.imported_at_jst))}</td>
            <td>
              ${escapeHtml(item.local_image_file_name)}
              <div class="muted">${escapeHtml(item.upload_id)}</div>
            </td>
            <td>
              ${escapeHtml(item.ocr_line_count ?? 0)}行 /
              ${escapeHtml(item.ocr_word_count ?? 0)}語
            </td>
            <td>${escapeHtml(item.status)}</td>
          </tr>
        `).join("");
      } catch (error) {
        listBody.innerHTML = `<tr><td colspan="5">${escapeHtml(error.message)}</td></tr>`;
      }
    }

    async function showDetail(id) {
      detailEl.textContent = "読込中...";
      imageEl.style.display = "none";
      imageEl.removeAttribute("src");
      ocrEl.textContent = "";

      try {
        const res = await fetch(`/api/receipts/imports/${id}`);
        const json = await res.json();

        if (!json.ok) {
          throw new Error(json.message || "APIエラー");
        }

        const item = json.item;

        detailEl.innerHTML = `
          <div><b>ID:</b> ${escapeHtml(item.id)}</div>
          <div><b>upload_id:</b> <span class="mono">${escapeHtml(item.upload_id)}</span></div>
          <div><b>wix_item_id:</b> <span class="mono">${escapeHtml(item.wix_item_id)}</span></div>
          <div><b>ファイル名:</b> ${escapeHtml(item.local_image_file_name)}</div>
          <div><b>保存先:</b> <span class="mono">${escapeHtml(item.local_image_path)}</span></div>
          <div><b>SHA-256:</b> <span class="mono">${escapeHtml(item.image_hash_sha256)}</span></div>
          <div><b>取込日時:</b> ${escapeHtml(formatDate(item.imported_at_jst))}</div>
          <div><b>OCR:</b> ${escapeHtml(item.ocr_provider || "")}</div>
        `;

        imageEl.src = `/api/receipts/image/${item.id}?t=${Date.now()}`;
        imageEl.style.display = "block";

        ocrEl.textContent = item.ocr_raw_text || "";
      } catch (error) {
        detailEl.textContent = error.message;
      }
    }

    loadReceipts();
  </script>
</body>
</html>
