<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>レシート読取確認</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    header {
      height: 48px;
      box-sizing: border-box;
      padding: 12px 16px;
      background: #222;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
    }

    main {
      display: grid;
      grid-template-columns: 300px 1fr 520px;
      gap: 10px;
      padding: 10px;
      height: calc(100vh - 48px);
      box-sizing: border-box;
    }

    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      min-height: 0;
    }

    .panel-title {
      height: 42px;
      box-sizing: border-box;
      padding: 9px 10px;
      border-bottom: 1px solid #ddd;
      background: #fafafa;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .scroll {
      height: calc(100% - 42px);
      overflow: auto;
    }

    .list-item {
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .list-item:hover {
      background: #f0f4ff;
    }

    .list-item.active {
      background: #e8f0ff;
      border-left: 4px solid #333;
    }

    .list-main {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .list-sub {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
      word-break: break-all;
    }

    .image-area {
      height: calc(100% - 42px);
      overflow: auto;
      background: #eee;
      text-align: center;
      padding: 10px;
      box-sizing: border-box;
    }

    .image-area img {
      max-width: 100%;
      border: 1px solid #ccc;
      background: #fff;
    }

    .form-area {
      height: calc(100% - 42px);
      overflow: auto;
      padding: 10px;
      box-sizing: border-box;
    }

    .block {
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
      background: #fff;
    }

    .block-title {
      padding: 8px 10px;
      background: #fafafa;
      border-bottom: 1px solid #ddd;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .block-body {
      padding: 10px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #444;
    }

    input, textarea, select {
      width: 100%;
      box-sizing: border-box;
      padding: 7px;
      border: 1px solid #bbb;
      border-radius: 5px;
      font-size: 14px;
      background: #fff;
    }

    textarea {
      min-height: 64px;
      resize: vertical;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .grid1 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    button {
      border: 1px solid #aaa;
      background: #fff;
      padding: 7px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #f2f2f2;
    }

    button.primary {
      background: #222;
      color: #fff;
      border-color: #222;
    }

    button.primary:hover {
      background: #444;
    }

    button.danger {
      color: #b00020;
      border-color: #d8a0aa;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .muted {
      color: #777;
      font-size: 12px;
    }

    .warn {
      color: #b00020;
      font-weight: 700;
    }

    .ok {
      color: #087a28;
      font-weight: 700;
    }

    table.lines {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    table.lines th,
    table.lines td {
      border: 1px solid #ddd;
      padding: 5px;
      vertical-align: top;
    }

    table.lines th {
      background: #fafafa;
      font-weight: 700;
      white-space: nowrap;
    }

    table.lines input {
      padding: 5px;
      font-size: 13px;
    }

    .line-name {
      min-width: 150px;
    }

    .line-small {
      width: 70px;
    }

    .line-money {
      width: 90px;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-all;
      background: #111;
      color: #eee;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.5;
      max-height: 180px;
      overflow: auto;
    }
  
    /* RECEIPT_HEADER_IMPORT_NAV */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    header h1 {
      margin: 0;
    }

    .receipt-header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-left: auto;
    }

    .receipt-header-actions button {
      background: #fff;
      color: #111;
      border: 1px solid #fff;
      border-radius: 0.5rem;
      padding: 0.45rem 0.75rem;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .receipt-header-actions button:hover {
      background: #f1f1f1;
    }
  
    /* RECEIPT_COMPACT_ACCOUNTING_LAYOUT */
    body {
      overflow: hidden;
    }

    .receipt-compact-layout {
      display: grid !important;
      grid-template-columns: 190px minmax(680px, 1fr) 330px !important;
      gap: 6px !important;
      height: calc(100vh - 58px) !important;
      padding: 6px 8px !important;
      box-sizing: border-box !important;
      overflow: hidden !important;
    }

    .receipt-compact-layout > * {
      min-width: 0 !important;
      min-height: 0 !important;
      overflow: hidden !important;
    }

    .receipt-list-panel {
      order: 1 !important;
    }

    .receipt-candidate-panel {
      order: 2 !important;
    }

    .receipt-image-panel {
      order: 3 !important;
    }

    .receipt-list-panel .panel-title,
    .receipt-candidate-panel .panel-title,
    .receipt-image-panel .panel-title {
      padding: 6px 8px !important;
      font-size: 14px !important;
      line-height: 1.2 !important;
    }

    .receipt-list-panel button,
    .receipt-list-panel .item {
      font-size: 12px !important;
      line-height: 1.25 !important;
      padding: 6px 7px !important;
    }

    .receipt-list-panel small,
    .receipt-list-panel .meta,
    .receipt-list-panel .sub {
      font-size: 10px !important;
      line-height: 1.2 !important;
    }

    .receipt-list-panel {
      font-size: 12px !important;
    }

    .receipt-candidate-panel {
      font-size: 12px !important;
    }

    .receipt-image-panel {
      font-size: 12px !important;
    }

    #formArea {
      height: calc(100vh - 112px) !important;
      overflow: auto !important;
      padding: 8px !important;
      box-sizing: border-box !important;
    }

    #formArea input,
    #formArea select,
    #formArea textarea {
      font-size: 12px !important;
      padding: 4px 6px !important;
      min-height: 26px !important;
      box-sizing: border-box !important;
    }

    #formArea textarea {
      min-height: 48px !important;
      max-height: 76px !important;
    }

    #formArea table {
      width: 100% !important;
      table-layout: fixed !important;
      font-size: 12px !important;
    }

    #formArea th,
    #formArea td {
      padding: 3px !important;
      font-size: 12px !important;
      vertical-align: middle !important;
    }

    #formArea button {
      font-size: 12px !important;
      padding: 5px 8px !important;
      min-height: 28px !important;
    }

    #formArea .card,
    #formArea .section,
    #formArea fieldset {
      margin-bottom: 8px !important;
      padding: 8px !important;
    }

    #imageArea {
      height: calc(100vh - 112px) !important;
      overflow: hidden !important;
      padding: 6px !important;
      box-sizing: border-box !important;
      display: flex !important;
      align-items: flex-start !important;
      justify-content: center !important;
      background: #fff !important;
    }

    #imageArea img {
      max-width: 100% !important;
      max-height: 100% !important;
      width: auto !important;
      height: auto !important;
      object-fit: contain !important;
      cursor: zoom-in !important;
    }

    #receiptImageModal {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.78);
      padding: 18px;
      box-sizing: border-box;
    }

    #receiptImageModal img {
      max-width: 96vw;
      max-height: 94vh;
      object-fit: contain;
      background: #fff;
      border-radius: 8px;
      cursor: zoom-out;
    }

    #receiptImageModal .modal-note {
      position: fixed;
      top: 10px;
      right: 16px;
      color: #fff;
      font-size: 13px;
      background: rgba(0,0,0,0.45);
      padding: 6px 10px;
      border-radius: 6px;
    }

    @media (max-width: 1300px) {
      .receipt-compact-layout {
        grid-template-columns: 170px minmax(560px, 1fr) 280px !important;
      }
    }
  
    /* RECEIPT_LEFT_LIST_ONE_LINE_AND_COMPACT_BASIC */

    /* 左レシート一覧：1行で見せる */
    .receipt-list-panel {
      width: 170px !important;
      min-width: 170px !important;
      max-width: 170px !important;
    }

    .receipt-list-panel button,
    .receipt-list-panel .item {
      display: block !important;
      width: 100% !important;
      white-space: nowrap !important;
      overflow: hidden !important;
      text-overflow: ellipsis !important;
      font-size: 12px !important;
      line-height: 1.2 !important;
      padding: 7px 8px !important;
      text-align: left !important;
    }

    .receipt-list-panel .item small,
    .receipt-list-panel .item .meta,
    .receipt-list-panel .item .sub,
    .receipt-list-panel .item br {
      display: none !important;
    }

    .receipt-list-one-line {
      display: block !important;
      white-space: nowrap !important;
      overflow: hidden !important;
      text-overflow: ellipsis !important;
    }

    /* 全体幅を左小・中央大・右画像小に再調整 */
    .receipt-compact-layout {
      grid-template-columns: 170px minmax(760px, 1fr) 300px !important;
    }

    /* 基本情報・会計候補の入力欄をコンパクトにする */
    #formArea .card,
    #formArea .section,
    #formArea fieldset {
      padding: 7px !important;
      margin-bottom: 7px !important;
    }

    #formArea label {
      font-size: 11px !important;
      line-height: 1.2 !important;
      margin-bottom: 2px !important;
    }

    #formArea input,
    #formArea select {
      height: 24px !important;
      min-height: 24px !important;
      font-size: 12px !important;
      padding: 3px 5px !important;
    }

    #formArea textarea {
      min-height: 42px !important;
      max-height: 62px !important;
      font-size: 12px !important;
      padding: 4px 5px !important;
    }

    #formArea .form-row,
    #formArea .row,
    #formArea .grid,
    #formArea .form-grid,
    #formArea .field-grid {
      gap: 6px !important;
    }

    @media (max-width: 1300px) {
      .receipt-compact-layout {
        grid-template-columns: 155px minmax(620px, 1fr) 260px !important;
      }

      .receipt-list-panel {
        width: 155px !important;
        min-width: 155px !important;
        max-width: 155px !important;
      }
    }
  </style>
</head>
<body>
  <header>レシート読取確認

      <!-- RECEIPT_HEADER_IMPORT_NAV_START -->
      <div class="receipt-header-actions">
        <button onclick="location.href='/receipts/receipt-scan-inbox.html'">レシート取込へ</button>
      </div>
      <!-- RECEIPT_HEADER_IMPORT_NAV_END -->
    </header>

  <main>
    <section class="panel">
      <div class="panel-title">
        <span>レシート</span>
        <button onclick="loadList()">再読込</button>
      </div>
      <div id="list" class="scroll">読込中...</div>
    </section>

    <section class="panel">
      <div class="panel-title">画像</div>
      <div id="imageArea" class="image-area">左から選択してください。</div>
    </section>

    <section class="panel">
      <div class="panel-title">読取候補の編集</div>
      <div id="formArea" class="form-area">左から選択してください。</div>
    </section>
  </main>

  <script>
    let currentItems = [];
    let selectedId = null;
    let currentDraft = null;
    let currentLineItems = [];

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function toDateInput(value, rawJson) {
      if (rawJson && rawJson.transactionDate) return rawJson.transactionDate;
      if (!value) return "";
      return String(value).slice(0, 10);
    }

    function numValue(value) {
      if (value === null || value === undefined) return "";
      return String(value);
    }

    function invoiceNote(value) {
      const v = String(value || "").trim();
      if (!v) return "";
      if (!/^T\d{13}$/.test(v)) {
        return '<div class="warn">T番号ではありません。伝票番号の可能性があります。</div>';
      }
      return '<div class="ok">T番号形式です。</div>';
    }

    async function loadList() {
      const list = document.getElementById("list");
      list.innerHTML = "読込中...";

      const res = await fetch("/api/receipts/imports?limit=100");
      const data = await res.json();

      if (!data.ok) {
        list.innerHTML = '<div class="list-item warn">読込失敗: ' + esc(data.error) + '</div>';
        return;
      }

      currentItems = data.items || [];

      if (currentItems.length === 0) {
        list.innerHTML = '<div class="list-item">レシートがありません。</div>';
        return;
      }

      list.innerHTML = currentItems.map(item => {
        const active = Number(item.id) === Number(selectedId) ? " active" : "";

        return `
          <div class="list-item${active}" onclick="loadDetail(${item.id})">
            <div class="list-main">ID ${esc(item.id)} / ${esc(item.upload_id || "")}</div>
            <div class="list-sub">
              ${esc(item.local_image_file_name || "")}<br>
              ${esc(item.imported_at_jst || "")}
            </div>
          </div>
        `;
      }).join("");
    }

    async function loadDetail(id) {
      selectedId = id;
      await loadList();

      document.getElementById("imageArea").innerHTML = `<img src="/api/receipts/image/${id}" alt="receipt">`;
      document.getElementById("formArea").innerHTML = "読込中...";

      const res = await fetch("/api/receipts/imports/" + encodeURIComponent(id));
      const data = await res.json();

      if (!data.ok) {
        document.getElementById("formArea").innerHTML = '<div class="warn">読込失敗: ' + esc(data.error) + '</div>';
        return;
      }

      renderForm(data.item, data.aiDrafts || []);
    }

    function renderForm(item, drafts) {
      currentDraft = drafts[0] || null;

      if (!currentDraft) {
        currentLineItems = [];
        document.getElementById("formArea").innerHTML = `
          <div class="actions">
            <button class="primary" onclick="analyzeReceipt(${item.id})">AIで読取候補を作成</button>
            <button class="danger" onclick="deleteReceiptImport(${item.id})">削除</button>
          </div>
          <div class="muted">まだ候補がありません。まずAI解析してください。</div>
        `;
        return;
      }

      const raw = currentDraft.ai_raw_json || {};
      currentLineItems = Array.isArray(currentDraft.line_items) ? currentDraft.line_items : [];

      document.getElementById("formArea").innerHTML = `
        <div class="actions">
          <button class="primary" onclick="saveDraft()">候補を保存</button>
          <button onclick="analyzeReceipt(${item.id})">AI再解析</button>
          <button class="danger" onclick="deleteReceiptImport(${item.id})">削除</button>
        </div>

        <div class="block">
          <div class="block-title">基本情報</div>
          <div class="block-body">
            <div class="grid2">
              <div>
                <label>取引日</label>
                <input id="transactionDate" type="date" value="${esc(toDateInput(currentDraft.transaction_date, raw))}">
              </div>
              <div>
                <label>支払方法</label>
                <input id="paymentMethodName" value="${esc(currentDraft.payment_method_name)}">
              </div>
            </div>

            <div class="grid1">
              <div>
                <label>店名・支払先</label>
                <input id="vendorName" value="${esc(currentDraft.vendor_name)}">
              </div>
            </div>

            <div class="grid2">
              <div>
                <label>合計金額</label>
                <input id="totalAmount" type="number" value="${esc(numValue(currentDraft.total_amount))}">
              </div>
              <div>
                <label>消費税額</label>
                <input id="taxAmount" type="number" value="${esc(numValue(currentDraft.tax_amount))}">
              </div>
            </div>

            <div class="grid2">
              <div>
                <label>税率</label>
                <input id="taxRate" value="${esc(currentDraft.tax_rate)}">
              </div>
              <div>
                <label>インボイス番号</label>
                <input id="invoiceNumber" value="${esc(currentDraft.invoice_number)}">
                ${invoiceNote(currentDraft.invoice_number)}
              </div>
            </div>

            <div class="grid1">
              <div>
                <label>摘要</label>
                <input id="summary" value="${esc(currentDraft.summary)}">
              </div>
              <div>
                <label>メモ・注意点</label>
                <textarea id="memo">${esc(currentDraft.memo)}</textarea>
              </div>
            </div>
          </div>
        </div>

        <div class="block">
          <div class="block-title">
            <span>明細</span>
            <button onclick="addLineItem()">明細追加</button>
          </div>
          <div class="block-body">
            <div id="lineItemsArea"></div>
          </div>
        </div>

        <div class="block">
          <div class="block-title">会計候補</div>
          <div class="block-body">
            <div class="grid2">
              <div>
                <label>勘定科目候補</label>
                <input id="accountTitleName" value="${esc(currentDraft.account_title_name)}">
              </div>
              <div>
                <label>信頼度</label>
                <input id="confidence" type="number" value="${esc(numValue(currentDraft.confidence))}">
              </div>
            </div>
            <div class="muted">ここは確定ではなく候補です。あとで本登録時に調整します。</div>
          </div>
        </div>

        <div class="block">
          <div class="block-title">OCR本文</div>
          <div class="block-body">
            <pre>${esc(item.ocr_raw_text || "")}</pre>
          </div>
        </div>
      `;

      renderLineItems();
    }

    function renderLineItems() {
      const area = document.getElementById("lineItemsArea");

      if (!area) return;

      if (!currentLineItems.length) {
        area.innerHTML = `
          <div class="muted">明細がありません。</div>
          <div style="margin-top:8px;">
            <button onclick="addLineItem()">明細追加</button>
          </div>
        `;
        return;
      }

      area.innerHTML = `
        <table class="lines">
          <thead>
            <tr>
              <th>品名</th>
              <th>数量</th>
              <th>単価</th>
              <th>金額</th>
              <th>税率</th>
              <th>備考</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${currentLineItems.map((line, index) => `
              <tr>
                <td><input class="line-name" value="${esc(line.name || "")}" oninput="currentLineItems[${index}].name=this.value"></td>
                <td><input class="line-small" type="number" step="0.01" value="${esc(numValue(line.quantity))}" oninput="currentLineItems[${index}].quantity=this.value"></td>
                <td><input class="line-money" type="number" value="${esc(numValue(line.unitPrice))}" oninput="currentLineItems[${index}].unitPrice=this.value"></td>
                <td><input class="line-money" type="number" value="${esc(numValue(line.amount))}" oninput="currentLineItems[${index}].amount=this.value"></td>
                <td><input class="line-small" value="${esc(line.taxRate || "")}" oninput="currentLineItems[${index}].taxRate=this.value"></td>
                <td><input value="${esc(line.memo || "")}" oninput="currentLineItems[${index}].memo=this.value"></td>
                <td><button class="danger" onclick="removeLineItem(${index})">削除</button></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function addLineItem() {
      currentLineItems.push({
        name: "",
        quantity: "",
        unitPrice: "",
        amount: "",
        taxRate: "",
        memo: ""
      });

      renderLineItems();
    }

    function removeLineItem(index) {
      currentLineItems.splice(index, 1);
      renderLineItems();
    }

    function getInput(id) {
      const el = document.getElementById(id);
      return el ? el.value : "";
    }

    function cleanNumber(value) {
      if (value === "") return null;
      const n = Number(value);
      if (!Number.isFinite(n)) return null;
      return n;
    }

    function collectDraftPayload() {
      return {
        transactionDate: getInput("transactionDate") || null,
        vendorName: getInput("vendorName"),
        totalAmount: cleanNumber(getInput("totalAmount")),
        taxAmount: cleanNumber(getInput("taxAmount")),
        taxRate: getInput("taxRate"),
        paymentMethodName: getInput("paymentMethodName"),
        accountTitleName: getInput("accountTitleName"),
        invoiceNumber: getInput("invoiceNumber"),
        summary: getInput("summary"),
        memo: getInput("memo"),
        confidence: cleanNumber(getInput("confidence")),
        status: "draft",
        lineItems: currentLineItems.map(line => ({
          name: line.name || "",
          quantity: cleanNumber(line.quantity),
          unitPrice: cleanNumber(line.unitPrice),
          amount: cleanNumber(line.amount),
          taxRate: line.taxRate || "",
          memo: line.memo || ""
        }))
      };
    }

    async function saveDraft() {
      if (!currentDraft) {
        alert("保存する候補がありません。");
        return;
      }

      const payload = collectDraftPayload();

      const res = await fetch("/api/receipts/ai-drafts/" + encodeURIComponent(currentDraft.id), {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json; charset=utf-8"
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (!data.ok) {
        alert("保存失敗: " + (data.error || ""));
        return;
      }

      alert("保存しました。");
      await loadDetail(selectedId);
    }

    async function deleteReceiptImport(id) {
      if (!id) return;

      const ok = confirm(
        "このレシートを削除しますか？\n\n" +
        "DBの取込データ、AI下書き、画像ファイルを削除します。"
      );

      if (!ok) return;

      const formArea = document.getElementById("formArea");
      formArea.innerHTML = '<div class="warn">削除中...</div>';

      const res = await fetch("/api/receipts/imports/" + encodeURIComponent(id), {
        method: "DELETE"
      });

      const data = await res.json();

      if (!data.ok) {
        formArea.innerHTML = '<div class="warn">削除失敗: ' + esc(data.error || "原因不明") + '</div>';
        return;
      }

      selectedId = null;
      currentDraft = null;
      currentLineItems = [];

      document.getElementById("imageArea").innerHTML = "左から選択してください。";
      document.getElementById("formArea").innerHTML =
        '<div class="warn">削除しました。画像削除: ' +
        (data.imageDeleted ? "済" : "なし/失敗") +
        '</div>';

      await loadList();
    }

    async function analyzeReceipt(id) {
      if (!confirm("AI解析を実行しますか？")) return;

      const formArea = document.getElementById("formArea");
      formArea.insertAdjacentHTML("afterbegin", '<div class="block"><div class="block-body">AI解析中...</div></div>');

      const res = await fetch("/api/receipts/imports/" + encodeURIComponent(id) + "/analyze", {
        method: "POST"
      });

      const data = await res.json();

      if (!data.ok) {
        alert("AI解析失敗: " + (data.error || ""));
        await loadDetail(id);
        return;
      }

      await loadDetail(id);
    }

    loadList();
  </script>

  <script>
    function setupCompactReceiptAccountingLayout() {
      const titles = Array.from(document.querySelectorAll(".panel-title"));

      function findPanel(label) {
        const title = titles.find((el) => {
          return String(el.textContent || "").trim().includes(label);
        });

        if (!title) return null;

        return title.closest(".panel") || title.parentElement;
      }

      const listPanel = findPanel("レシート");
      const imagePanel = findPanel("画像");
      const candidatePanel = findPanel("読取候補");

      if (!listPanel || !imagePanel || !candidatePanel) {
        return;
      }

      const parent = candidatePanel.parentElement;

      if (!parent) return;

      parent.classList.add("receipt-compact-layout");

      listPanel.classList.add("receipt-list-panel");
      imagePanel.classList.add("receipt-image-panel");
      candidatePanel.classList.add("receipt-candidate-panel");
    }

    function setupReceiptImageModal() {
      if (document.getElementById("receiptImageModal")) {
        return;
      }

      const modal = document.createElement("div");
      modal.id = "receiptImageModal";
      modal.innerHTML =
        '<div class="modal-note">クリックで閉じる</div>' +
        '<img alt="レシート拡大表示">';

      document.body.appendChild(modal);

      const modalImg = modal.querySelector("img");

      modal.addEventListener("click", () => {
        modal.style.display = "none";
        modalImg.src = "";
      });

      const imageArea = document.getElementById("imageArea");

      if (imageArea) {
        imageArea.addEventListener("click", (event) => {
          const img = event.target.closest("img");
          if (!img) return;

          modalImg.src = img.src;
          modal.style.display = "flex";
        });
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      setupCompactReceiptAccountingLayout();
      setupReceiptImageModal();

      setTimeout(setupCompactReceiptAccountingLayout, 300);
      setTimeout(setupCompactReceiptAccountingLayout, 800);
    });
  </script>
  <!-- RECEIPT_COMPACT_ACCOUNTING_LAYOUT_SCRIPT_END -->

  <!-- RECEIPT_LEFT_LIST_ONE_LINE_SCRIPT_START -->
  <script>
    function findValueDeep(obj, keys) {
      if (!obj || typeof obj !== "object") return "";

      for (const key of keys) {
        if (Object.prototype.hasOwnProperty.call(obj, key) && obj[key] !== null && obj[key] !== undefined && obj[key] !== "") {
          return obj[key];
        }
      }

      for (const value of Object.values(obj)) {
        if (value && typeof value === "object") {
          const found = findValueDeep(value, keys);
          if (found !== "") return found;
        }
      }

      return "";
    }

    function formatYenForList(value) {
      const n = Number(String(value || "").replace(/[^\d.-]/g, ""));
      if (!Number.isFinite(n) || n <= 0) return "";
      return n.toLocaleString("ja-JP") + "円";
    }

    async function decorateReceiptListRowsOneLine() {
      const listPanel =
        document.querySelector(".receipt-list-panel") ||
        Array.from(document.querySelectorAll(".panel")).find((panel) => {
          return String(panel.textContent || "").includes("レシート");
        });

      if (!listPanel) return;

      const rows = Array.from(listPanel.querySelectorAll("button, .item"));

      for (const row of rows) {
        if (row.dataset.oneLineDone === "1") continue;

        const raw = String(row.textContent || "").replace(/\s+/g, " ").trim();
        const idMatch = raw.match(/ID\s*(\d+)/i);

        if (!idMatch) continue;

        const id = idMatch[1];

        try {
          const res = await fetch("/api/receipts/imports/" + encodeURIComponent(id));
          const data = await res.json();

          const source = data.item || data.receipt || data.data || data;

          const summary =
            findValueDeep(source, ["summary", "description", "memo", "vendorName", "vendor_name", "payeeName", "payee_name"]) ||
            "レシート";

          const amount =
            findValueDeep(source, ["totalAmount", "total_amount", "amount", "税込金額", "支払総額"]) ||
            "";

          const amountText = formatYenForList(amount);

          const label =
            "ID" + id + "　" +
            String(summary).replace(/\s+/g, " ").slice(0, 14) +
            (amountText ? "　" + amountText : "");

          row.innerHTML = '<span class="receipt-list-one-line">' + label.replace(/[&<>"']/g, (c) => {
            return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
          }) + '</span>';

          row.title = raw;
          row.dataset.oneLineDone = "1";

        } catch (error) {
          row.innerHTML = '<span class="receipt-list-one-line">' + raw + '</span>';
          row.dataset.oneLineDone = "1";
        }
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(decorateReceiptListRowsOneLine, 300);
      setTimeout(decorateReceiptListRowsOneLine, 900);
      setTimeout(decorateReceiptListRowsOneLine, 1600);
    });

    document.addEventListener("click", () => {
      setTimeout(decorateReceiptListRowsOneLine, 300);
    });
  </script>
  <!-- RECEIPT_LEFT_LIST_ONE_LINE_SCRIPT_END -->
