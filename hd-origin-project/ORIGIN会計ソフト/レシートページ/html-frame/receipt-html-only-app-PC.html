<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>レシートOCR登録 PC版</title>
  <style>
    * { box-sizing: border-box; }

    html {
      font-size: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f4f4f5;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      width: min(96vw, 86rem);
      min-height: 100vh;
      margin: 0 auto;
      padding: 1rem;
      display: grid;
      grid-template-columns: minmax(22rem, 0.95fr) minmax(36rem, 1.35fr);
      grid-template-areas:
        "head preview"
        "settings preview"
        "actions status";
      gap: 0.875rem;
      align-items: start;
    }

    .card {
      background: #fff;
      border: 0.0625rem solid #e5e7eb;
      border-radius: 1rem;
      padding: 1rem;
      box-shadow: 0 0.125rem 0.5rem rgba(0,0,0,.04);
    }

    .wrap .card:nth-child(1) { grid-area: head; }
    .wrap .card:nth-child(2) { grid-area: settings; }
    .wrap .card:nth-child(3) { grid-area: preview; }
    .wrap .card:nth-child(4) { grid-area: actions; }
    .wrap .card:nth-child(5) { grid-area: status; }

    h1 {
      font-size: 1.45rem;
      margin: 0 0 0.5rem;
    }

    p {
      font-size: 0.9rem;
      color: #6b7280;
      line-height: 1.6;
      margin: 0.25rem 0 0.75rem;
    }

    label {
      display: block;
      margin: 0.75rem 0 0.35rem;
      font-size: 0.85rem;
      font-weight: 700;
      color: #374151;
    }

    input,
    select,
    button {
      width: 100%;
      font-size: 1rem;
      border-radius: 0.75rem;
      padding: 0.75rem;
      border: 0.0625rem solid #d1d5db;
      background: #fff;
    }

    button {
      background: #111827;
      color: #fff;
      font-weight: 700;
      border: 0;
      margin-top: 0.75rem;
      cursor: pointer;
    }

    button.secondary {
      background: #374151;
    }

    button.danger {
      background: #991b1b;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.625rem;
    }

    canvas {
      width: 100%;
      background: #111;
      border-radius: 0.75rem;
      border: 0.0625rem solid #e5e7eb;
      max-height: calc(100vh - 4rem);
      object-fit: contain;
    }

    .status {
      white-space: pre-wrap;
      font-size: 0.85rem;
      line-height: 1.55;
      background: #f9fafb;
      border: 0.0625rem solid #e5e7eb;
      border-radius: 0.75rem;
      padding: 0.75rem;
      color: #374151;
      max-height: calc(100vh - 4rem);
      overflow: auto;
    }

    .small {
      font-size: 0.78rem;
      color: #6b7280;
      margin-top: 0.3rem;
    }

    @media (max-width: 55rem) {
      .wrap {
        width: 100%;
        grid-template-columns: 1fr;
        grid-template-areas:
          "head"
          "settings"
          "preview"
          "actions"
          "status";
      }

      canvas,
      .status {
        max-height: 70vh;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>レシートOCR登録 PC版</h1>
      <p>レシート画像を圧縮し、OCRで読み取った生テキストを保存します。</p>

      <label>レシート画像</label>
      <input id="fileInput" type="file" accept="image/*" capture="environment">
      <div class="small">スマホではカメラ起動、PCでは画像選択になります。</div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <label>長辺px</label>
          <select id="maxSize">
            <option value="1200" selected>1200</option>
            <option value="1600">1600</option>
          </select>
        </div>

        <div>
          <label>画質</label>
          <select id="quality">
            <option value="0.6" selected>0.6 標準</option>
            <option value="0.5">0.5 軽量</option>
          </select>
        </div>
      </div>

      <button id="rotateBtn" class="secondary">90度回転</button>
      <button id="compressBtn">画像を圧縮 / 再圧縮</button>
    </div>

    <div class="card">
      <canvas id="canvas"></canvas>
    </div>

    <div class="card">
      <button id="ocrTestBtn" class="secondary">OCR読み込み / 再読み込み</button>
      <button id="saveBtn">Wixへ保存</button>
      <button id="openConfirmBtn" class="secondary">読取確認ページを開く</button>
      <button id="resetBtn" class="danger">入力をクリア</button>
    </div>

    <div class="card">
      <div id="status" class="status">画像を選んでください。</div>
    </div>
  </div>

<script>
(function () {
  const fileInput = document.getElementById("fileInput");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const maxSizeEl = document.getElementById("maxSize");
  const qualityEl = document.getElementById("quality");

  const rotateBtn = document.getElementById("rotateBtn");
  const compressBtn = document.getElementById("compressBtn");
  const ocrTestBtn = document.getElementById("ocrTestBtn");
  const saveBtn = document.getElementById("saveBtn");
  const openConfirmBtn = document.getElementById("openConfirmBtn");
  const resetBtn = document.getElementById("resetBtn");
  const statusEl = document.getElementById("status");

  let sourceImage = null;
  let sourceFileName = "";
  let rotation = 0;

  let lastDataUrl = "";
  let lastBytes = 0;
  let lastReceiptId = "";

  let lastOcrRawText = "";
  let lastOcrProvider = "";
  let lastOcrLineCount = 0;
  let lastOcrWordCount = 0;
  let lastOcrImageKey = "";

  function pad2(n) {
    return String(n).padStart(2, "0");
  }

  function makeReceiptId() {
    const d = new Date();
    return "R" +
      d.getFullYear() +
      pad2(d.getMonth() + 1) +
      pad2(d.getDate()) +
      "-" +
      pad2(d.getHours()) +
      pad2(d.getMinutes()) +
      pad2(d.getSeconds());
  }

  function setStatus(text) {
    statusEl.textContent = text;
  }

  function clearOcrState() {
    lastOcrRawText = "";
    lastOcrProvider = "";
    lastOcrLineCount = 0;
    lastOcrWordCount = 0;
    lastOcrImageKey = "";
  }

  function clearCompressedState() {
    lastDataUrl = "";
    lastBytes = 0;
    clearOcrState();
  }

  function currentImageKey() {
    return [
      lastReceiptId,
      String(lastBytes),
      String(maxSizeEl.value),
      String(qualityEl.value),
      String(rotation)
    ].join("|");
  }

  function dataUrlBytes(dataUrl) {
    const base64 = dataUrl.split(",")[1] || "";
    return Math.round(base64.length * 3 / 4);
  }

  function loadFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();

      reader.onload = () => {
        const img = new Image();

        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = reader.result;
      };

      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function drawImage() {
    if (!sourceImage) return;

    const maxSize = Number(maxSizeEl.value);
    let w = sourceImage.naturalWidth;
    let h = sourceImage.naturalHeight;

    const longSide = Math.max(w, h);

    if (longSide > maxSize) {
      const scale = maxSize / longSide;
      w = Math.round(w * scale);
      h = Math.round(h * scale);
    }

    const rotated = rotation % 180 !== 0;

    canvas.width = rotated ? h : w;
    canvas.height = rotated ? w : h;

    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (rotation === 90) {
      ctx.translate(canvas.width, 0);
      ctx.rotate(Math.PI / 2);
    } else if (rotation === 180) {
      ctx.translate(canvas.width, canvas.height);
      ctx.rotate(Math.PI);
    } else if (rotation === 270) {
      ctx.translate(0, canvas.height);
      ctx.rotate(3 * Math.PI / 2);
    }

    ctx.drawImage(sourceImage, 0, 0, w, h);
    ctx.restore();
  }

  async function compressImage() {
    if (!sourceImage) {
      setStatus("画像がありません。");
      return false;
    }

    drawImage();

    const quality = Number(qualityEl.value);

    lastDataUrl = canvas.toDataURL("image/jpeg", quality);
    lastBytes = dataUrlBytes(lastDataUrl);
    clearOcrState();

    if (!lastReceiptId) {
      lastReceiptId = makeReceiptId();
    }

    setStatus(
      "圧縮完了\n" +
      "receipt_id: " + lastReceiptId + "\n" +
      "サイズ: 約 " + Math.round(lastBytes / 1024) + " KB\n" +
      "長辺: " + maxSizeEl.value + "px\n" +
      "画質: " + quality + "\n\n" +
      "OCRは未実行です。OCR読み込みを押してください。"
    );

    return true;
  }

  fileInput.addEventListener("change", async () => {
    const file = fileInput.files && fileInput.files[0];

    if (!file) return;

    sourceFileName = file.name || "";
    sourceImage = await loadFile(file);
    rotation = 0;
    lastReceiptId = makeReceiptId();

    clearCompressedState();

    drawImage();

    setStatus(
      "画像を読み込みました。\n" +
      "receipt_id: " + lastReceiptId + "\n" +
      "元ファイル: " + sourceFileName + "\n" +
      "元サイズ: " + sourceImage.naturalWidth + " x " + sourceImage.naturalHeight + "\n\n" +
      "次に「画像を圧縮」を押してください。"
    );
  });

  rotateBtn.addEventListener("click", () => {
    if (!sourceImage) {
      setStatus("画像がありません。");
      return;
    }

    rotation = (rotation + 90) % 360;
    clearCompressedState();
    drawImage();

    setStatus(
      "90度回転しました。\n" +
      "圧縮画像とOCR結果はクリアしました。\n\n" +
      "もう一度「画像を圧縮」を押してください。"
    );
  });

  maxSizeEl.addEventListener("change", () => {
    if (!sourceImage) return;

    clearCompressedState();
    drawImage();

    setStatus(
      "長辺pxを変更しました。\n" +
      "圧縮画像とOCR結果はクリアしました。\n\n" +
      "もう一度「画像を圧縮」を押してください。"
    );
  });

  qualityEl.addEventListener("change", () => {
    if (!sourceImage) return;

    clearCompressedState();

    setStatus(
      "画質を変更しました。\n" +
      "圧縮画像とOCR結果はクリアしました。\n\n" +
      "もう一度「画像を圧縮」を押してください。"
    );
  });

  compressBtn.addEventListener("click", compressImage);

  openConfirmBtn.addEventListener("click", () => {
    window.open("http://localhost:3000/receipts/receipt-list.html", "_blank", "noopener,noreferrer");
  });

  ocrTestBtn.addEventListener("click", async () => {
    if (!lastDataUrl) {
      const ok = await compressImage();
      if (!ok) return;
    }

    clearOcrState();

    const payload = {
      type: "TEST_AZURE_READ_OCR",
      receiptId: lastReceiptId || makeReceiptId(),
      originalFileName: sourceFileName || "",
      compressedFileName: (lastReceiptId || makeReceiptId()) + "_compressed.jpg",
      mimeType: "image/jpeg",
      imageDataUrl: lastDataUrl,
      bytes: lastBytes,
      createdAt: new Date().toISOString()
    };

    window.parent.postMessage(payload, "*");

    setStatus(
      "Azure OCR読み込み依頼を送りました。\n" +
      "receipt_id: " + payload.receiptId + "\n" +
      "OCR結果を待っています。"
    );
  });

  saveBtn.addEventListener("click", async () => {
    if (!lastDataUrl) {
      const ok = await compressImage();
      if (!ok) return;
    }

    const ocrIsCurrent =
      lastOcrRawText &&
      lastOcrImageKey &&
      lastOcrImageKey === currentImageKey();

    if (!ocrIsCurrent) {
      setStatus(
        "OCR読み込みが完了していないため保存しません。\n\n" +
        "先に「OCR読み込み / 再読み込み」を押してください。\n" +
        "OCR完了後に「Wixへ保存」を押してください。"
      );
      return;
    }

    const payload = {
      type: "SAVE_RECEIPT",
      receiptId: lastReceiptId || makeReceiptId(),
      originalFileName: sourceFileName || "",
      compressedFileName: (lastReceiptId || makeReceiptId()) + "_compressed.jpg",
      mimeType: "image/jpeg",
      imageDataUrl: lastDataUrl,
      bytes: lastBytes,
      ocrRawText: ocrIsCurrent ? lastOcrRawText : "",
      ocrProvider: ocrIsCurrent ? lastOcrProvider : "",
      ocrLineCount: ocrIsCurrent ? lastOcrLineCount : 0,
      ocrWordCount: ocrIsCurrent ? lastOcrWordCount : 0,
      createdAt: new Date().toISOString()
    };

    window.parent.postMessage(payload, "*");

    setStatus(
      "Wixへ保存依頼を送りました。\n" +
      "receipt_id: " + payload.receiptId + "\n" +
      "OCR保存: " + (ocrIsCurrent ? "あり" : "なし") + "\n" +
      "保存結果を待っています。"
    );
  });

  resetBtn.addEventListener("click", () => {
    sourceImage = null;
    sourceFileName = "";
    rotation = 0;
    lastReceiptId = "";

    clearCompressedState();

    fileInput.value = "";
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    setStatus("クリアしました。画像を選んでください。");
  });

  window.addEventListener("message", (event) => {
    const data = event.data;

    if (!data || !data.type) return;

    if (data.type === "SAVE_RECEIPT_RESULT") {
      if (data.ok) {
        setStatus(
          "保存完了\n" +
          "receipt_id: " + data.receiptId + "\n" +
          "status: " + (data.status || "") + "\n" +
          "画像URL: " + (data.imageUrl || "")
        );
      } else {
        setStatus("保存エラー\n" + (data.message || "原因不明"));
      }

      return;
    }

    if (data.type === "TEST_AZURE_READ_OCR_RESULT") {
      if (data.ok) {
        lastOcrRawText = data.rawText || "";
        lastOcrProvider = data.provider || "";
        lastOcrLineCount = data.lineCount || 0;
        lastOcrWordCount = data.wordCount || 0;
        lastOcrImageKey = currentImageKey();

        setStatus(
          "OCR読み込み完了\n" +
          "provider: " + lastOcrProvider + "\n" +
          "行数: " + lastOcrLineCount + "\n" +
          "単語数: " + lastOcrWordCount + "\n\n" +
          "----- OCR rawText -----\n" +
          lastOcrRawText
        );
      } else {
        clearOcrState();
        setStatus("OCR読み込みエラー\n" + (data.message || "原因不明"));
      }

      return;
    }
  });
})();
</script>
</body>
</html>
