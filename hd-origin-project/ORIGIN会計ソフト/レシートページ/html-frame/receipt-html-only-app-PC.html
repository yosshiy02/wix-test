<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>レシートOCR登録 PC版</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #f4f4f5;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      width: min(98vw, 96rem);
      margin: 0 auto;
      padding: 0.5rem;
      display: grid;
      grid-template-columns: minmax(16rem, 0.55fr) minmax(24rem, 0.8fr) minmax(36rem, 1.25fr);
      grid-template-areas:
        "top top top"
        "preview queue status";
      grid-template-rows: auto auto;
      gap: 0.45rem;
      align-content: start;
      align-items: start;
    }

    .card {
      background: #fff;
      border: 0.0625rem solid #e5e7eb;
      border-radius: 0.75rem;
      padding: 0.45rem;
      box-shadow: 0 0.125rem 0.5rem rgba(0,0,0,.04);
    }

    .top-control-card {
      grid-area: top;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: nowrap;
      overflow: hidden;
      padding: 0.4rem 0.5rem;
    }

    .top-control-card h1 {
      font-size: 0.8rem;
      line-height: 1;
      margin: 0;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .top-control-card p {
      font-size: 0.62rem;
      line-height: 1;
      margin: 0;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 13rem;
      flex: 0 1 auto;
    }

    .top-control-card label {
      font-size: 0.62rem;
      font-weight: 700;
      margin: 0;
      white-space: nowrap;
    }

    .top-control-card input,
    .top-control-card select {
      font-size: 0.68rem;
      padding: 0.22rem 0.35rem;
      border: 0.0625rem solid #d1d5db;
      border-radius: 0.4rem;
      background: #fff;
      height: 1.65rem;
    }

    #fileInput {
      width: 11rem;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      flex: 0 0 auto;
    }

    button {
      width: auto;
      min-width: 0;
      padding: 0.32rem 0.48rem;
      border: 0;
      border-radius: 0.42rem;
      background: #111827;
      color: #fff;
      font-size: 0.66rem;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      cursor: pointer;
    }

    button.secondary {
      background: #374151;
    }

    button.danger {
      background: #991b1b;
    }

    .preview-card {
      grid-area: preview;
      max-width: 20rem;
    }

    canvas {
      width: 100%;
      max-height: 46vh;
      background: #111;
      border-radius: 0.5rem;
      border: 0.0625rem solid #e5e7eb;
      object-fit: contain;
      display: block;
    }

    .queue-card {
      grid-area: queue;
    }

    .queue-title {
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
    }

    .queue-list {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      max-height: calc(100vh - 5rem);
      overflow: auto;
      font-size: 0.72rem;
    }

    .queue-empty {
      color: #6b7280;
      font-size: 0.72rem;
      line-height: 1.5;
    }

    .queue-item {
      width: 100%;
      display: grid;
      grid-template-columns: 2rem minmax(0, 1fr) 4.5rem;
      gap: 0.35rem;
      align-items: center;
      text-align: left;
      padding: 0.35rem 0.45rem;
      margin: 0;
      border-radius: 0.45rem;
      background: #f3f4f6;
      color: #111827;
      border: 0.0625rem solid #e5e7eb;
      font-size: 0.72rem;
      line-height: 1.2;
    }

    .queue-item.active {
      background: #111827;
      color: #fff;
    }

    .queue-no {
      font-weight: 700;
      text-align: center;
    }

    .queue-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .queue-status {
      text-align: center;
      font-weight: 700;
      font-size: 0.68rem;
    }

    .status-card {
      grid-area: status;
    }

    .status {
      white-space: pre-wrap;
      font-size: 0.85rem;
      line-height: 1.55;
      background: #f9fafb;
      border: 0.0625rem solid #e5e7eb;
      border-radius: 0.55rem;
      padding: 0.55rem;
      color: #374151;
      max-height: calc(100vh - 5rem);
      overflow: auto;
    }
  
    /* PC_BATCH_BUTTONS_VISIBLE */
    .top-control-card {
      overflow-x: auto !important;
      overflow-y: hidden !important;
    }

    .top-control-card button {
      font-size: 0.58rem !important;
      padding: 0.26rem 0.36rem !important;
    }
  
    /* PC_QUEUE_ACTIONS_AND_OCR_INFO */
    .queue-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.25rem;
      align-items: stretch;
    }

    .queue-main {
      width: 100%;
      display: grid;
      grid-template-columns: 2rem minmax(0, 1fr) 4.5rem;
      gap: 0.35rem;
      align-items: center;
      text-align: left;
      padding: 0.35rem 0.45rem;
      margin: 0;
      border-radius: 0.45rem;
      background: #f3f4f6;
      color: #111827;
      border: 0.0625rem solid #e5e7eb;
      font-size: 0.72rem;
      line-height: 1.2;
    }

    .queue-row.active .queue-main {
      background: #111827;
      color: #fff;
    }

    .queue-actions {
      display: flex;
      gap: 0.2rem;
      align-items: center;
    }

    .queue-mini {
      padding: 0.25rem 0.35rem !important;
      font-size: 0.62rem !important;
      border-radius: 0.35rem !important;
      white-space: nowrap !important;
      background: #374151 !important;
      color: #fff !important;
    }

    .danger-mini {
      background: #991b1b !important;
    }

    .current-ocr-info {
      margin-top: 0.45rem;
      white-space: normal;
      font-size: 0.72rem;
      line-height: 1.45;
      background: #fff;
      border: 0.0625rem solid #e5e7eb;
      border-radius: 0.55rem;
      padding: 0.55rem;
      color: #374151;
      max-height: 38vh;
      overflow: auto;
    }

    .ocr-info-title {
      font-weight: 700;
      margin-bottom: 0.35rem;
      color: #111827;
    }

    .ocr-info-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.35rem;
      margin-bottom: 0.45rem;
    }

    .ocr-info-grid div {
      background: #f9fafb;
      border: 0.0625rem solid #e5e7eb;
      border-radius: 0.35rem;
      padding: 0.3rem;
      overflow-wrap: anywhere;
    }

    .ocr-info-raw {
      white-space: pre-wrap;
      background: #f9fafb;
      border: 0.0625rem solid #e5e7eb;
      border-radius: 0.35rem;
      padding: 0.4rem;
      max-height: 12rem;
      overflow: auto;
    }
  
    /* PC_OCR_RAW_FOCUS */
    .current-ocr-info {
      margin-top: 0.45rem !important;
      padding: 0.45rem !important;
      max-height: 52vh !important;
      overflow: auto !important;
      background: #fff !important;
      border: 0.0625rem solid #e5e7eb !important;
      border-radius: 0.55rem !important;
    }

    .ocr-raw-title {
      font-size: 0.78rem !important;
      font-weight: 700 !important;
      margin-bottom: 0.35rem !important;
      color: #111827 !important;
    }

    .ocr-raw-main {
      white-space: pre-wrap !important;
      font-size: 0.9rem !important;
      line-height: 1.55 !important;
      color: #111827 !important;
      background: #f9fafb !important;
      border: 0.0625rem solid #e5e7eb !important;
      border-radius: 0.45rem !important;
      padding: 0.55rem !important;
      min-height: 14rem !important;
      overflow-wrap: anywhere !important;
    }

    .ocr-info-grid,
    .ocr-info-title,
    .ocr-info-raw {
      display: none !important;
    }
  
    /* PC_ONLY_BATCH_ALL_BUTTON */
    #batchAllBtn {
      background: #111827 !important;
      font-weight: 800 !important;
      min-width: 5.5rem !important;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card top-control-card">
      <h1>レシートOCR登録 PC版</h1>
      <p>レシート画像を圧縮し、OCRで読み取った生テキストを保存します。</p>

      <label>レシート画像</label>
      <input id="fileInput" type="file" accept="image/*" capture="environment" multiple>

      <div class="field">
        <label>長辺px</label>
        <select id="maxSize">
          <option value="1200" selected>1200</option>
          <option value="1600">1600</option>
        </select>
      </div>

      <div class="field">
        <label>画質</label>
        <select id="quality">
          <option value="0.6" selected>0.6 標準</option>
          <option value="0.5">0.5 軽量</option>
        </select>
      </div>

      <button id="rotateBtn" class="secondary">90度回転</button>
      <button id="batchAllBtn" class="secondary">全件処理</button>
      <button id="openConfirmBtn" class="secondary">読取確認ページを開く</button>
      <button id="resetBtn" class="danger">入力をクリア</button>
    </div>

    <div class="card preview-card">
      <canvas id="canvas"></canvas>
    </div>

    <div class="card queue-card">
      <div class="queue-title">レシート一覧</div>
      <div id="queueList" class="queue-list">
        <div class="queue-empty">複数枚選択すると、ここに一覧が出ます。</div>
      </div>
    </div>

    <div class="card status-card">
      <div id="status" class="status">画像を選んでください。</div>
      <div id="currentOcrInfo" class="current-ocr-info">選択中レシートのOCR情報はまだありません。</div>
    </div>
  </div>

<script>
(function () {
  const fileInput = document.getElementById("fileInput");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const maxSizeEl = document.getElementById("maxSize");
  const qualityEl = document.getElementById("quality");

  const rotateBtn = document.getElementById("rotateBtn");
  const compressBtn = document.getElementById("compressBtn");
  const ocrTestBtn = document.getElementById("ocrTestBtn");
  const saveBtn = document.getElementById("saveBtn");
  const batchCompressBtn = document.getElementById("batchCompressBtn");
  const batchOcrBtn = document.getElementById("batchOcrBtn");
  const batchSaveBtn = document.getElementById("batchSaveBtn");
  const batchAllBtn = document.getElementById("batchAllBtn");
  const openConfirmBtn = document.getElementById("openConfirmBtn");
  const resetBtn = document.getElementById("resetBtn");
  const statusEl = document.getElementById("status");
  const queueListEl = document.getElementById("queueList");
  const currentOcrInfoEl = document.getElementById("currentOcrInfo");

  let sourceImage = null;
  let sourceFileName = "";
  let rotation = 0;

  let lastDataUrl = "";
  let lastBytes = 0;
  let lastReceiptId = "";

  let lastOcrRawText = "";
  let lastOcrProvider = "";
  let lastOcrLineCount = 0;
  let lastOcrWordCount = 0;
  let lastOcrImageKey = "";

  let receiptQueue = [];
  let currentQueueIndex = -1;

  let pendingOcrResolve = null;
  let pendingSaveResolve = null;
  let batchRunning = false;

  function pad2(n) {
    return String(n).padStart(2, "0");
  }

  function makeReceiptId() {
    const d = new Date();
    return "R" +
      d.getFullYear() +
      pad2(d.getMonth() + 1) +
      pad2(d.getDate()) +
      "-" +
      pad2(d.getHours()) +
      pad2(d.getMinutes()) +
      pad2(d.getSeconds());
  }

  function setStatus(text) {
    statusEl.textContent = text;
  }

  function escapeHtml(text) {
    return String(text || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function clearOcrState() {
    lastOcrRawText = "";
    lastOcrProvider = "";
    lastOcrLineCount = 0;
    lastOcrWordCount = 0;
    lastOcrImageKey = "";
  }

  function clearCompressedState() {
    lastDataUrl = "";
    lastBytes = 0;
    clearOcrState();
  }

  function currentImageKey() {
    return [
      lastReceiptId,
      String(lastBytes),
      String(maxSizeEl.value),
      String(qualityEl.value),
      String(rotation)
    ].join("|");
  }

  function dataUrlBytes(dataUrl) {
    const base64 = dataUrl.split(",")[1] || "";
    return Math.round(base64.length * 3 / 4);
  }

  function loadFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();

      reader.onload = () => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = reader.result;
      };

      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function getCurrentItem() {
    if (currentQueueIndex < 0) return null;
    return receiptQueue[currentQueueIndex] || null;
  }

  function saveCurrentItem(statusText) {
    const item = getCurrentItem();
    if (!item) return;

    item.rotation = rotation;
    item.receiptId = lastReceiptId;
    item.dataUrl = lastDataUrl;
    item.bytes = lastBytes;
    item.ocrRawText = lastOcrRawText;
    item.ocrProvider = lastOcrProvider;
    item.ocrLineCount = lastOcrLineCount;
    item.ocrWordCount = lastOcrWordCount;
    item.ocrImageKey = lastOcrImageKey;

    if (statusText) {
      item.status = statusText;
    }

    renderQueue();
    renderCurrentOcrInfo();
  }


  function renderCurrentOcrInfo() {
    if (!currentOcrInfoEl) return;

    const item = getCurrentItem();

    if (!item) {
      currentOcrInfoEl.innerHTML =
        "<div class=\"ocr-raw-title\">OCR内容</div>" +
        "<div class=\"ocr-raw-main\">レシートが選択されていません。</div>";
      return;
    }

    const rawText = item.ocrRawText || lastOcrRawText || "";

    currentOcrInfoEl.innerHTML =
      "<div class=\"ocr-raw-title\">OCR内容</div>" +
      "<div class=\"ocr-raw-main\">" +
        escapeHtml(rawText || "OCR未実行です。") +
      "</div>";
  }

  function renderQueue() {
    if (!receiptQueue.length) {
      queueListEl.innerHTML = '<div class="queue-empty">複数枚選択すると、ここに一覧が出ます。</div>';
      return;
    }

    queueListEl.innerHTML = receiptQueue.map((item, index) => {
      const active = index === currentQueueIndex ? " active" : "";

      return (
        '<div class="queue-row' + active + '">' +
          '<button type="button" class="queue-main" data-queue-index="' + index + '">' +
            '<span class="queue-no">' + (index + 1) + '</span>' +
            '<span class="queue-name">' + escapeHtml(item.fileName) + '</span>' +
            '<span class="queue-status">' + escapeHtml(item.status || "未処理") + '</span>' +
          '</button>' +
          '<div class="queue-actions">' +
            '<button type="button" class="queue-mini" data-queue-action="recompress" data-queue-index="' + index + '">再圧縮</button>' +
            '<button type="button" class="queue-mini" data-queue-action="reocr" data-queue-index="' + index + '">再OCR</button>' +
            '<button type="button" class="queue-mini danger-mini" data-queue-action="delete" data-queue-index="' + index + '">削除</button>' +
          '</div>' +
        '</div>'
      );
    }).join("");
  }

  async function loadQueueItem(index) {
    if (index < 0 || index >= receiptQueue.length) return;

    saveCurrentItem();

    currentQueueIndex = index;
    const item = receiptQueue[index];

    if (!item.image) {
      item.image = await loadFile(item.file);
    }

    sourceImage = item.image;
    sourceFileName = item.fileName;
    rotation = item.rotation || 0;
    lastReceiptId = item.receiptId || makeReceiptId();

    lastDataUrl = item.dataUrl || "";
    lastBytes = item.bytes || 0;
    lastOcrRawText = item.ocrRawText || "";
    lastOcrProvider = item.ocrProvider || "";
    lastOcrLineCount = item.ocrLineCount || 0;
    lastOcrWordCount = item.ocrWordCount || 0;
    lastOcrImageKey = item.ocrImageKey || "";

    drawImage();
    renderQueue();
    renderCurrentOcrInfo();

    setStatus(
      "画像を読み込みました。\n" +
      "番号: " + (index + 1) + " / " + receiptQueue.length + "\n" +
      "receipt_id: " + lastReceiptId + "\n" +
      "元ファイル: " + sourceFileName + "\n" +
      "元サイズ: " + sourceImage.naturalWidth + " x " + sourceImage.naturalHeight + "\n\n" +
      (lastDataUrl ? "圧縮済みです。OCR読み込みへ進めます。" : "次に「画像を圧縮」を押してください。")
    );
  }

  function drawImage() {
    if (!sourceImage) return;

    const maxSize = Number(maxSizeEl.value);
    let w = sourceImage.naturalWidth;
    let h = sourceImage.naturalHeight;

    const longSide = Math.max(w, h);

    if (longSide > maxSize) {
      const scale = maxSize / longSide;
      w = Math.round(w * scale);
      h = Math.round(h * scale);
    }

    const rotated = rotation % 180 !== 0;

    canvas.width = rotated ? h : w;
    canvas.height = rotated ? w : h;

    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (rotation === 90) {
      ctx.translate(canvas.width, 0);
      ctx.rotate(Math.PI / 2);
    } else if (rotation === 180) {
      ctx.translate(canvas.width, canvas.height);
      ctx.rotate(Math.PI);
    } else if (rotation === 270) {
      ctx.translate(0, canvas.height);
      ctx.rotate(3 * Math.PI / 2);
    }

    ctx.drawImage(sourceImage, 0, 0, w, h);
    ctx.restore();
  }

  async function compressImage() {
    if (!sourceImage) {
      setStatus("画像がありません。");
      return false;
    }

    drawImage();

    const quality = Number(qualityEl.value);

    lastDataUrl = canvas.toDataURL("image/jpeg", quality);
    lastBytes = dataUrlBytes(lastDataUrl);
    clearOcrState();

    if (!lastReceiptId) {
      lastReceiptId = makeReceiptId();
    }

    saveCurrentItem("圧縮済");

    setStatus(
      "圧縮完了\n" +
      "receipt_id: " + lastReceiptId + "\n" +
      "サイズ: 約 " + Math.round(lastBytes / 1024) + " KB\n" +
      "長辺: " + maxSizeEl.value + "px\n" +
      "画質: " + quality + "\n\n" +
      "OCRは未実行です。OCR読み込みを押してください。"
    );

    return true;
  }


  async function requestOcrForCurrent() {
    if (!sourceImage) {
      setStatus("画像がありません。");
      return { ok: false, message: "画像がありません。" };
    }

    if (!lastDataUrl) {
      const ok = await compressImage();
      if (!ok) {
        return { ok: false, message: "圧縮に失敗しました。" };
      }
    }

    clearOcrState();
    saveCurrentItem("OCR待ち");

    const payload = {
      type: "TEST_AZURE_READ_OCR",
      receiptId: lastReceiptId || makeReceiptId(),
      originalFileName: sourceFileName || "",
      compressedFileName: (lastReceiptId || makeReceiptId()) + "_compressed.jpg",
      mimeType: "image/jpeg",
      imageDataUrl: lastDataUrl,
      bytes: lastBytes,
      createdAt: new Date().toISOString()
    };

    window.parent.postMessage(payload, "*");

    setStatus(
      "Azure OCR読み込み依頼を送りました。\n" +
      "receipt_id: " + payload.receiptId + "\n" +
      "OCR結果を待っています。"
    );

    return await new Promise((resolve) => {
      const timer = setTimeout(() => {
        pendingOcrResolve = null;
        saveCurrentItem("OCRタイムアウト");
        resolve({ ok: false, message: "OCR結果が返ってきませんでした。" });
      }, 90000);

      pendingOcrResolve = (result) => {
        clearTimeout(timer);
        pendingOcrResolve = null;
        resolve(result);
      };
    });
  }

  async function requestSaveForCurrent() {
    if (!lastDataUrl) {
      const ok = await compressImage();
      if (!ok) {
        return { ok: false, message: "圧縮に失敗しました。" };
      }
    }

    const ocrIsCurrent =
      lastOcrRawText &&
      lastOcrImageKey &&
      lastOcrImageKey === currentImageKey();

    if (!ocrIsCurrent) {
      saveCurrentItem("保存不可");
      return { ok: false, message: "OCR未完了" };
    }

    saveCurrentItem("保存待ち");

    const payload = {
      type: "SAVE_RECEIPT",
      receiptId: lastReceiptId || makeReceiptId(),
      originalFileName: sourceFileName || "",
      compressedFileName: (lastReceiptId || makeReceiptId()) + "_compressed.jpg",
      mimeType: "image/jpeg",
      imageDataUrl: lastDataUrl,
      bytes: lastBytes,
      ocrRawText: lastOcrRawText,
      ocrProvider: lastOcrProvider,
      ocrLineCount: lastOcrLineCount,
      ocrWordCount: lastOcrWordCount,
      createdAt: new Date().toISOString()
    };

    window.parent.postMessage(payload, "*");

    setStatus(
      "Wixへ保存依頼を送りました。\n" +
      "receipt_id: " + payload.receiptId + "\n" +
      "保存結果を待っています。"
    );

    return await new Promise((resolve) => {
      const timer = setTimeout(() => {
        pendingSaveResolve = null;
        saveCurrentItem("保存タイムアウト");
        resolve({ ok: false, message: "保存結果が返ってきませんでした。" });
      }, 90000);

      pendingSaveResolve = (result) => {
        clearTimeout(timer);
        pendingSaveResolve = null;
        resolve(result);
      };
    });
  }

  function setBatchButtonsDisabled(disabled) {
    batchRunning = disabled;

    if (batchCompressBtn) batchCompressBtn.disabled = disabled;
    if (batchOcrBtn) batchOcrBtn.disabled = disabled;
    if (batchSaveBtn) batchSaveBtn.disabled = disabled;
    if (batchAllBtn) batchAllBtn.disabled = disabled;
    if (ocrTestBtn) ocrTestBtn.disabled = disabled;
    if (saveBtn) saveBtn.disabled = disabled;
  }

  async function batchCompressAll() {
    if (!receiptQueue.length) {
      setStatus("レシート一覧がありません。先に画像を複数選択してください。");
      return;
    }

    let count = 0;

    for (let i = 0; i < receiptQueue.length; i++) {
      await loadQueueItem(i);

      setStatus(
        "全件圧縮中\n" +
        "処理中: " + (i + 1) + " / " + receiptQueue.length + "\n" +
        "ファイル: " + sourceFileName
      );

      const ok = await compressImage();
      if (ok) count++;
    }

    setStatus(
      "全件圧縮完了\n" +
      "圧縮済: " + count + "枚\n" +
      "合計: " + receiptQueue.length + "枚"
    );
  }

  async function batchOcrAll() {
    if (!receiptQueue.length) {
      setStatus("レシート一覧がありません。先に画像を複数選択してください。");
      return;
    }

    let successCount = 0;
    let errorCount = 0;

    for (let i = 0; i < receiptQueue.length; i++) {
      await loadQueueItem(i);

      setStatus(
        "全件OCR中\n" +
        "処理中: " + (i + 1) + " / " + receiptQueue.length + "\n" +
        "ファイル: " + sourceFileName
      );

      const result = await requestOcrForCurrent();

      if (result && result.ok) {
        successCount++;
      } else {
        errorCount++;
        saveCurrentItem("OCRエラー");

        if (pendingOcrResolve) {
          pendingOcrResolve({ ok: false, message: "OCRエラー" });
        }
      }
    }

    setStatus(
      "全件OCR完了\n" +
      "成功: " + successCount + "枚\n" +
      "エラー: " + errorCount + "枚\n" +
      "合計: " + receiptQueue.length + "枚"
    );
  }

  async function batchSaveAll() {
    if (!receiptQueue.length) {
      setStatus("レシート一覧がありません。先に画像を複数選択してください。");
      return;
    }

    let successCount = 0;
    let errorCount = 0;

    for (let i = 0; i < receiptQueue.length; i++) {
      await loadQueueItem(i);

      setStatus(
        "全件保存中\n" +
        "処理中: " + (i + 1) + " / " + receiptQueue.length + "\n" +
        "ファイル: " + sourceFileName
      );

      const result = await requestSaveForCurrent();

      if (result && result.ok) {
        successCount++;
      } else {
        errorCount++;
      }
    }

    setStatus(
      "全件保存完了\n" +
      "成功: " + successCount + "枚\n" +
      "エラー: " + errorCount + "枚\n" +
      "合計: " + receiptQueue.length + "枚"
    );
  }


  async function runOcrForQueueButton() {
    if (typeof requestOcrForCurrent === "function") {
      return await requestOcrForCurrent();
    }

    if (!sourceImage) {
      setStatus("画像がありません。");
      return { ok: false, message: "画像がありません。" };
    }

    if (!lastDataUrl) {
      const ok = await compressImage();
      if (!ok) {
        return { ok: false, message: "圧縮に失敗しました。" };
      }
    }

    clearOcrState();
    saveCurrentItem("OCR待ち");

    const payload = {
      type: "TEST_AZURE_READ_OCR",
      receiptId: lastReceiptId || makeReceiptId(),
      originalFileName: sourceFileName || "",
      compressedFileName: (lastReceiptId || makeReceiptId()) + "_compressed.jpg",
      mimeType: "image/jpeg",
      imageDataUrl: lastDataUrl,
      bytes: lastBytes,
      createdAt: new Date().toISOString()
    };

    window.parent.postMessage(payload, "*");

    setStatus(
      "Azure OCR読み込み依頼を送りました。\n" +
      "receipt_id: " + payload.receiptId + "\n" +
      "OCR結果を待っています。"
    );

    return { ok: true };
  }

  fileInput.addEventListener("change", async () => {
    const files = Array.from(fileInput.files || []).filter((file) => {
      return file && file.type && file.type.indexOf("image/") === 0;
    });

    if (!files.length) return;

    const baseId = makeReceiptId();

    receiptQueue = files.map((file, index) => {
      return {
        file: file,
        image: null,
        fileName: file.name || ("receipt_" + (index + 1)),
        receiptId: baseId + "-" + pad2(index + 1),
        status: "未処理",
        rotation: 0,
        dataUrl: "",
        bytes: 0,
        ocrRawText: "",
        ocrProvider: "",
        ocrLineCount: 0,
        ocrWordCount: 0,
        ocrImageKey: ""
      };
    });

    sourceImage = null;
    sourceFileName = "";
    rotation = 0;
    lastReceiptId = "";
    clearCompressedState();

    currentQueueIndex = -1;
    renderQueue();
    renderCurrentOcrInfo();

    await loadQueueItem(0);
  });

  queueListEl.addEventListener("click", async (event) => {
    const actionButton = event.target.closest("[data-queue-action]");

    if (actionButton) {
      const index = Number(actionButton.getAttribute("data-queue-index"));
      const action = actionButton.getAttribute("data-queue-action");

      if (Number.isNaN(index)) return;

      if (action === "delete") {
        receiptQueue.splice(index, 1);

        if (!receiptQueue.length) {
          currentQueueIndex = -1;
          sourceImage = null;
          sourceFileName = "";
          rotation = 0;
          lastReceiptId = "";
          clearCompressedState();
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          renderQueue();
    renderCurrentOcrInfo();
      
          setStatus("選択中のレシートを削除しました。");
          return;
        }

        const nextIndex = Math.min(index, receiptQueue.length - 1);
        currentQueueIndex = -1;
        await loadQueueItem(nextIndex);
        setStatus("選択中のレシートを削除しました。");
        return;
      }

      await loadQueueItem(index);

      if (action === "recompress") {
        clearCompressedState();
        const ok = await compressImage();

        if (ok) {
          saveCurrentItem("圧縮済");
      
        }

        return;
      }

      if (action === "reocr") {
        await runOcrForQueueButton();
        return;
      }

      return;
    }

    const button = event.target.closest("[data-queue-index]");
    if (!button) return;

    const index = Number(button.getAttribute("data-queue-index"));
    if (Number.isNaN(index)) return;

    await loadQueueItem(index);
  });

  rotateBtn.addEventListener("click", () => {
    if (!sourceImage) {
      setStatus("画像がありません。");
      return;
    }

    rotation = (rotation + 90) % 360;
    clearCompressedState();
    drawImage();
    saveCurrentItem("未処理");

    setStatus(
      "90度回転しました。\n" +
      "圧縮画像とOCR結果はクリアしました。\n\n" +
      "もう一度「画像を圧縮」を押してください。"
    );
  });

  maxSizeEl.addEventListener("change", () => {
    if (!sourceImage) return;

    clearCompressedState();
    drawImage();
    saveCurrentItem("未処理");

    setStatus(
      "長辺pxを変更しました。\n" +
      "圧縮画像とOCR結果はクリアしました。\n\n" +
      "もう一度「画像を圧縮」を押してください。"
    );
  });

  qualityEl.addEventListener("change", () => {
    if (!sourceImage) return;

    clearCompressedState();
    saveCurrentItem("未処理");

    setStatus(
      "画質を変更しました。\n" +
      "圧縮画像とOCR結果はクリアしました。\n\n" +
      "もう一度「画像を圧縮」を押してください。"
    );
  });

  if (compressBtn) compressBtn.addEventListener("click", compressImage);

  openConfirmBtn.addEventListener("click", () => {
    window.open("http://localhost:3000/receipts/receipt-list.html", "_blank", "noopener,noreferrer");
  });

  if (ocrTestBtn) ocrTestBtn.addEventListener("click", async () => {
    await requestOcrForCurrent();
  });

  if (saveBtn) saveBtn.addEventListener("click", async () => {
    await requestSaveForCurrent();
  });


  if (batchCompressBtn) batchCompressBtn.addEventListener("click", async () => {
    if (batchRunning) return;
    setBatchButtonsDisabled(true);
    try {
      await batchCompressAll();
    } finally {
      setBatchButtonsDisabled(false);
    }
  });

  if (batchOcrBtn) batchOcrBtn.addEventListener("click", async () => {
    if (batchRunning) return;
    setBatchButtonsDisabled(true);
    try {
      await batchOcrAll();
    } finally {
      setBatchButtonsDisabled(false);
    }
  });

  if (batchSaveBtn) batchSaveBtn.addEventListener("click", async () => {
    if (batchRunning) return;
    setBatchButtonsDisabled(true);
    try {
      await batchSaveAll();
    } finally {
      setBatchButtonsDisabled(false);
    }
  });

  if (batchAllBtn) batchAllBtn.addEventListener("click", async () => {
    if (batchRunning) return;
    setBatchButtonsDisabled(true);
    try {
      await batchCompressAll();
      await batchOcrAll();
      await batchSaveAll();
    } finally {
      setBatchButtonsDisabled(false);
    }
  });

  resetBtn.addEventListener("click", () => {
    sourceImage = null;
    sourceFileName = "";
    rotation = 0;
    lastReceiptId = "";
    clearCompressedState();

    receiptQueue = [];
    currentQueueIndex = -1;
    renderQueue();
    renderCurrentOcrInfo();

    fileInput.value = "";
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    setStatus("クリアしました。画像を選んでください。");
  });

  window.addEventListener("message", (event) => {
    const data = event.data;

    if (!data || !data.type) return;

    if (data.type === "SAVE_RECEIPT_RESULT") {
      if (data.ok) {
        saveCurrentItem("保存済");

        if (pendingSaveResolve) {
          pendingSaveResolve({ ok: true });
        }

        setStatus(
          "保存完了\n" +
          "receipt_id: " + data.receiptId + "\n" +
          "status: " + (data.status || "") + "\n" +
          "画像URL: " + (data.imageUrl || "")
        );
      } else {
        saveCurrentItem("保存エラー");

        if (pendingSaveResolve) {
          pendingSaveResolve({ ok: false, message: data.message || "原因不明" });
        }
        setStatus("保存エラー\n" + (data.message || "原因不明"));
      }

      return;
    }

    if (data.type === "TEST_AZURE_READ_OCR_RESULT") {
      if (data.ok) {
        lastOcrRawText = data.rawText || "";
        lastOcrProvider = data.provider || "";
        lastOcrLineCount = data.lineCount || 0;
        lastOcrWordCount = data.wordCount || 0;
        lastOcrImageKey = currentImageKey();

        saveCurrentItem("OCR済");

        if (pendingOcrResolve) {
          pendingOcrResolve({ ok: true });
        }

        setStatus(
          "OCR読み込み完了\n" +
          "provider: " + lastOcrProvider + "\n" +
          "行数: " + lastOcrLineCount + "\n" +
          "単語数: " + lastOcrWordCount + "\n\n" +
          "----- OCR rawText -----\n" +
          lastOcrRawText
        );
      } else {
        clearOcrState();
        saveCurrentItem("OCRエラー");

        if (pendingOcrResolve) {
          pendingOcrResolve({ ok: false, message: "OCRエラー" });
        }
        setStatus("OCR読み込みエラー\n" + (data.message || "原因不明"));
      }

      return;
    }
  });
})();
</script>
</body>
</html>
