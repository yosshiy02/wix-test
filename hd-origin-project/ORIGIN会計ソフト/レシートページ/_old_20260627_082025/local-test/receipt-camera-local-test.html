<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>レシート撮影・圧縮テスト</title>
  <style>
    body {
      margin: 0;
      background: #f4f4f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111827;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 14px;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 8px;
    }

    p {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.6;
    }

    label {
      display: block;
      margin-top: 12px;
      font-size: 13px;
      font-weight: 700;
    }

    input,
    select,
    button {
      width: 100%;
      font-size: 16px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      box-sizing: border-box;
    }

    button {
      margin-top: 10px;
      background: #111827;
      color: #fff;
      border: 0;
      font-weight: 700;
    }

    canvas {
      width: 100%;
      background: #111;
      border-radius: 12px;
    }

    .status {
      white-space: pre-wrap;
      font-size: 13px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>レシート撮影</h1>
      <p>スマホではカメラ起動、PCでは画像選択になります。まずは圧縮確認用です。</p>

      <label>画像</label>
      <input id="fileInput" type="file" accept="image/*" capture="environment">

      <div class="row">
        <div>
          <label>長辺px</label>
          <select id="maxSize">
            <option value="1200">1200</option>
            <option value="1600" selected>1600</option>
            <option value="2000">2000</option>
          </select>
        </div>

        <div>
          <label>画質</label>
          <select id="quality">
            <option value="0.6">0.6</option>
            <option value="0.7" selected>0.7</option>
            <option value="0.8">0.8</option>
          </select>
        </div>
      </div>

      <button id="compressBtn">圧縮する</button>
      <button id="downloadBtn">圧縮画像を保存</button>
    </div>

    <div class="card">
      <canvas id="canvas"></canvas>
    </div>

    <div class="card">
      <div id="status" class="status">画像を選んでください。</div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const maxSizeEl = document.getElementById("maxSize");
    const qualityEl = document.getElementById("quality");
    const compressBtn = document.getElementById("compressBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    let img = null;
    let lastDataUrl = "";

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function pad2(n) {
      return String(n).padStart(2, "0");
    }

    function makeReceiptId() {
      const d = new Date();
      return "R" + d.getFullYear() + pad2(d.getMonth() + 1) + pad2(d.getDate()) + "-" + pad2(d.getHours()) + pad2(d.getMinutes()) + pad2(d.getSeconds());
    }

    function dataUrlBytes(dataUrl) {
      const base64 = dataUrl.split(",")[1] || "";
      return Math.round(base64.length * 3 / 4);
    }

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = () => {
        img = new Image();

        img.onload = () => {
          drawImage();
          setStatus("画像を読み込みました。\n元サイズ：" + img.naturalWidth + " x " + img.naturalHeight);
        };

        img.src = reader.result;
      };

      reader.readAsDataURL(file);
    });

    function drawImage() {
      if (!img) return;

      const maxSize = Number(maxSizeEl.value);
      let w = img.naturalWidth;
      let h = img.naturalHeight;

      const longSide = Math.max(w, h);

      if (longSide > maxSize) {
        const scale = maxSize / longSide;
        w = Math.round(w * scale);
        h = Math.round(h * scale);
      }

      canvas.width = w;
      canvas.height = h;

      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
    }

    compressBtn.addEventListener("click", () => {
      if (!img) {
        setStatus("画像がありません。");
        return;
      }

      drawImage();

      const quality = Number(qualityEl.value);
      lastDataUrl = canvas.toDataURL("image/jpeg", quality);
      const bytes = dataUrlBytes(lastDataUrl);

      setStatus("圧縮完了\nサイズ：約 " + Math.round(bytes / 1024) + " KB\n長辺：" + maxSizeEl.value + "px\n画質：" + quality);
    });

    downloadBtn.addEventListener("click", () => {
      if (!lastDataUrl) {
        setStatus("先に圧縮してください。");
        return;
      }

      const a = document.createElement("a");
      a.href = lastDataUrl;
      a.download = makeReceiptId() + "_compressed.jpg";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });
  </script>
</body>
</html>
