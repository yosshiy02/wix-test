<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HD GPT SYSTEM</title>
  <link rel="stylesheet" href="./css/start.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">HD Origin / Wix Test</p>
      <h1>HD GPT SYSTEM</h1>
      <p class="lead">
        会計ソフト編集とWix編集を分けて、GPT / GPT2で安全に作業するための入口画面です。
      </p>
    </header>

    <section class="menu-grid">
      <button class="menu-card" type="button" data-target="accounting">
        <span class="menu-label">会計ソフト 編集</span>
        <span class="menu-desc">支払書類・レシート・請求未払・マスタ管理など</span>
      </button>

      <button class="menu-card" type="button" data-target="wix">
        <span class="menu-label">Wix編集</span>
        <span class="menu-desc">トップページ・商品ページ・ブランドページ・外部HTML埋め込み</span>
      </button>
    </section>

    <section class="panel" id="detailPanel">
      <h2>作業入口</h2>
      <p>上のボタンを押すと、下に作業メニューが表示されます。</p>
    </section>

    <section class="panel">
      <h2>重要ルール</h2>
      <ul>
        <li>スタート時にGitUpしない</li>
        <li>サーバー再起動前にGitUpする</li>
        <li>会計ソフト編集とWix編集を混ぜない</li>
        <li>before / after / undo / memo を残す</li>
      </ul>
    </section>
  </main>

  <script src="./js/start.js"></script>
</body>
</html>
