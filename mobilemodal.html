<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone 14 Pro Chrome Modal Mockup</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Zen+Maru+Gothic:wght@700;900&display=swap');

        :root {
            --phone-w: 393px;
            --phone-h: 852px;

            --status-h: 64px;
            --chrome-address-h: 74px;
            --chrome-bottom-h: 76px;

            --bg-main: #F8F8F8;
            --text-main: #111111;
            --accent: #D4AF37;
            --border-color: rgba(17, 17, 17, 0.15);
            --font-serif: Georgia, 'Times New Roman', serif;
            --font-sans: Arial, sans-serif;
            --ease-silk: cubic-bezier(0.22, 1, 0.36, 1);

            --m-bg: #fffdf8;
            --m-text: #FF6FAE;
            --m-btn: #FF7EB3;
            --m-btn-text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #202020;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-sans);
        }

        .phone {
            width: var(--phone-w);
            height: var(--phone-h);
            background: #2f3437;
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 90px rgba(0,0,0,0.6);
        }

        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--status-h);
            background: #2f3437;
            color: #ffffff;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 36px;
            font-size: 17px;
            font-weight: 700;
        }

        .status-icons {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 14px;
        }

        .battery {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 17px;
            border-radius: 4px;
            background: #eeeeee;
            color: #333333;
            font-size: 11px;
            font-weight: 700;
        }

        .chrome-top {
            position: absolute;
            top: var(--status-h);
            left: 0;
            width: 100%;
            height: var(--chrome-address-h);
            background: #2f3437;
            z-index: 50;
            display: flex;
            align-items: center;
            padding: 0 12px 14px;
        }

        .address-bar {
            width: 100%;
            height: 44px;
            background: #666b70;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #ffffff;
            padding: 0 14px;
            font-size: 17px;
            font-weight: 500;
        }

        .address-left,
        .address-right {
            width: 30px;
            display: flex;
            justify-content: center;
            opacity: 0.95;
            font-size: 20px;
        }

        .address-domain {
            flex: 1;
            text-align: center;
            letter-spacing: 0.2px;
        }

        .web-viewport {
            position: absolute;
            top: calc(var(--status-h) + var(--chrome-address-h));
            left: 0;
            width: 100%;
            height: calc(var(--phone-h) - var(--status-h) - var(--chrome-address-h) - var(--chrome-bottom-h));
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 20%, rgba(216,167,181,0.45), transparent 42%),
                linear-gradient(180deg, #2b2026 0%, #3a2930 100%);
        }

        .mock-page-content {
            position: absolute;
            inset: 0;
            padding-top: 90px;
            text-align: center;
            color: rgba(255,255,255,0.12);
            font-family: var(--font-serif);
            font-size: 40px;
            letter-spacing: 3px;
            user-select: none;
        }

        .chrome-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--chrome-bottom-h);
            background: #2f3437;
            z-index: 50;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 18px 4px;
        }

        .chrome-btn {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            line-height: 1;
            opacity: 0.9;
        }

        .chrome-plus {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #686d72;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            line-height: 1;
        }

        .chrome-tabs {
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255,255,255,0.9);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
        }

        .brand-modal {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5%;
            overflow: hidden;
        }

        .modal-bg {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.58);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 0;
        }

        .modal-gallery-content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 100%;
            max-height: 85%;
            aspect-ratio: 3 / 4;
            background-color: #F8EECF;
            background-image:
                linear-gradient(90deg, rgba(255,126,179,0.025) 1px, transparent 1px),
                linear-gradient(0deg, rgba(255,179,107,0.018) 1px, transparent 1px),
                radial-gradient(circle at 30% 20%, rgba(255,255,255,0.55), transparent 35%);
            background-size: 14px 14px, 14px 14px, 100% 100%;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            display: grid;
            grid-template-rows: 1fr auto 1fr;
            align-content: center;
            box-sizing: border-box;
            overflow: hidden;
            padding: 40px 0;
            --m-img: min(45vw, 150px);
        }

        .modal-gallery-content::before {
            content: "";
            position: absolute;
            inset: 10px;
            border-radius: 6px;
            pointer-events: none;
            z-index: 1;
            background:
                repeating-linear-gradient(90deg, rgba(255,126,179,0.9) 0 14px, transparent 14px 28px) top left / 100% 3px no-repeat,
                repeating-linear-gradient(90deg, rgba(255,126,179,0.9) 0 14px, transparent 14px 28px) bottom left / 100% 3px no-repeat,
                repeating-linear-gradient(180deg, rgba(255,126,179,0.9) 0 14px, transparent 14px 28px) top left / 3px 100% no-repeat,
                repeating-linear-gradient(180deg, rgba(255,126,179,0.9) 0 14px, transparent 14px 28px) top right / 3px 100% no-repeat;
        }

        .modal-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--font-serif);
            font-size: 5rem;
            font-weight: 700;
            color: var(--m-text);
            opacity: 0.04;
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
            letter-spacing: 0.1em;
            z-index: 1;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 5;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            font-size: 1.8rem;
            color: var(--m-text);
            border: 1px solid rgba(255,126,179,0.35);
        }

        .modal-header {
            min-height: 0;
            text-align: center;
            color: var(--m-text);
            padding: 0 5%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .modal-cat {
            font-size: 0.62rem;
            letter-spacing: 4px;
            color: var(--accent);
            margin-bottom: 4px;
            font-weight: 600;
            white-space: nowrap;
        }

        .modal-divider {
            width: 30px;
            height: 1px;
            background-color: var(--accent);
            margin: 0 auto 10px;
            opacity: 0.6;
        }

        .brand-logo-banner {
            display: block;
            width: min(66%, 210px);
            height: auto;
            margin: -14px auto 6px;
            object-fit: contain;
        }

        .modal-desc {
            font-size: 0.66rem;
            line-height: 1.35;
            opacity: 0.85;
            max-width: 96%;
            margin: 0 auto;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .modal-desc {
            font-size: 0.66rem;
            line-height: 1.35;
            opacity: 0.85;
            max-width: 96%;
            margin: 0 auto;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cute-shop-copy {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            width: fit-content;
            max-width: 96%;
            margin: -14px auto 0;
            padding: 14px 32px 13px;
            white-space: normal;
            overflow: visible;
            text-overflow: clip;
            color: #FF6FAE;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.96) 0%, rgba(255,245,250,0.96) 52%, rgba(255,251,229,0.94) 100%);
            border: 2px solid rgba(255,126,179,0.52);
            border-radius: 10px;
            box-shadow:
                0 3px 0 rgba(255,216,77,0.65),
                0 10px 22px rgba(255,126,179,0.22),
                0 1px 0 rgba(255,255,255,0.95) inset;
            transform: rotate(-5deg);
            animation: none;
            will-change: transform;
        }

        .cute-shop-copy::before {
            content: "";
            position: absolute;
            left: -12px;
            top: -10px;
            width: 42px;
            height: 15px;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.72), rgba(150,220,255,0.9));
            border: 1px solid rgba(80,170,220,0.38);
            border-radius: 3px;
            box-shadow: 0 2px 5px rgba(80,170,220,0.18);
            transform: rotate(-18deg);
            animation: none;
            will-change: transform;
        }

        .cute-shop-copy::after {
            content: "";
            position: absolute;
            right: -11px;
            bottom: -8px;
            width: 38px;
            height: 14px;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.72), rgba(255,218,86,0.88));
            border: 1px solid rgba(230,180,40,0.42);
            border-radius: 3px;
            box-shadow: 0 2px 5px rgba(230,180,40,0.18);
            transform: rotate(16deg);
            animation: none;
            will-change: transform;
        }

        .cute-shop-copy span {
            font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
            font-size: 1.02rem;
            font-weight: 900;
            letter-spacing: 0.8px;
            line-height: 1.2;
            color: #FF6FAE;
            white-space: nowrap;
            text-shadow:
                1px 1px 0 #ffffff,
                2px 2px 0 rgba(255,216,77,0.42);
        }

        .cute-shop-copy small {
            font-family: 'Fredoka', 'Zen Maru Gothic', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            line-height: 1.1;
            color: #FF9A66;
        }

        @keyframes cuteCopyFloat {
            0%, 100% {
                transform: translateY(0) rotate(-2deg);
            }
            50% {
                transform: translateY(-3px) rotate(1deg);
            }
        }

        @keyframes cutePopHeart {
            0%, 100% {
                transform: scale(1) rotate(-18deg);
            }
            50% {
                transform: scale(1.18) rotate(-8deg);
            }
        }

        @keyframes cutePopStar {
            0%, 100% {
                transform: scale(1) rotate(14deg);
            }
            50% {
                transform: scale(1.2) rotate(28deg);
            }
        }

        .modal-track-wrap {
            position: absolute;
            left: 0;
            right: 0;
            top: 170px;
            min-height: 0;
            width: 100%;
            display: grid;
            grid-template-rows: auto auto;
            align-content: center;
            align-items: center;
            overflow: visible;
            padding: 8px 0;
            z-index: 6;
        }

        .modal-track {
            display: flex;
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding: 0 max(16px, calc(50% - var(--m-img) / 2));
            gap: 15px;
            align-items: center;
            touch-action: pan-x;
            cursor: grab;
            user-select: none;
        }

        .modal-track.is-dragging {
            cursor: grabbing;
            scroll-snap-type: none;
            scroll-behavior: auto;
        }

        .modal-track::-webkit-scrollbar {
            display: none;
        }

        .gallery-img {
            position: relative;
            z-index: 1;
            box-sizing: content-box;
            flex: 0 0 var(--m-img);
            width: var(--m-img);
            height: var(--m-img);
            aspect-ratio: 1 / 1;
            object-fit: cover;
            scroll-snap-align: center;
            border-radius: 4px;
            border: solid rgba(255,255,255,0.92);
            border-width: 11px 7px 26px;
            background: #ffffff;
            box-shadow:
                0 14px 28px rgba(0,0,0,0.30),
                0 4px 10px rgba(0,0,0,0.16),
                0 1px 0 rgba(255,255,255,0.85) inset;
            transform: scale(0.76) rotate(-3deg);
            opacity: 0.35;
            filter: brightness(0.58) saturate(0.9);
            transition: transform 0.4s ease, opacity 0.4s ease, filter 0.4s ease, box-shadow 0.4s ease, border-width 0.4s ease;
            user-select: none;
            -webkit-user-drag: none;
        }

        .gallery-img.is-focused {
            z-index: 3;
            transform: scale(1.06) rotate(0deg);
            opacity: 1;
            filter: brightness(1.04) saturate(1.08);
            border-width: 12px 8px 34px;
            box-shadow:
                0 24px 46px rgba(0,0,0,0.42),
                0 8px 18px rgba(0,0,0,0.24),
                0 0 18px rgba(255,255,255,0.55);
        }

            .swipe-indicator {
            position: absolute;
            left: 50%;
            top: 190px;
            transform: translateX(-50%);
            z-index: 8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            margin-top: 0;
            color: var(--m-text);
            opacity: 0.88;
            font-size: 0.72rem;
            letter-spacing: 1px;
           
            border: 1px solid rgba(255,126,179,0.28);
            border-radius: 999px;
            padding: 4px 10px;
            white-space: nowrap;
        }
        .swipe-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background-color: var(--accent);
        }

        .swipe-line {
            width: 40px;
            height: 1px;
            background-color: currentColor;
            opacity: 0.5;
        }

        .modal-footer {
            min-height: 0;
            text-align: center;
            margin-top: 0;
            position: absolute;
            left: 0;
            right: 0;
            bottom: 22px;
            z-index: 3;
        }

        .modal-link-btn {
            position: relative;
            display: inline-block;
            padding: 12px 30px 11px;
            background: #FFE86F;
            color: #B83F78;
            font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
            font-size: 0.9rem;
            font-weight: 900;
            letter-spacing: 1.2px;
            border: 3px solid rgba(255,126,179,0.9);
            border-radius: 999px;
            text-decoration: none;
            box-shadow:
                0 5px 0 rgba(255,154,190,0.72),
                0 9px 0 rgba(255,205,64,0.58),
                0 16px 28px rgba(255,126,179,0.25);
            text-shadow:
                1px 1px 0 rgba(255,255,255,0.95),
                2px 2px 0 rgba(255,183,213,0.35);
            transform: translateY(-3px) rotate(-2deg);
            animation: cuteCopyFloat 2.8s ease-in-out infinite;
            will-change: transform;
        }

        .modal-link-btn::before {
            content: "♥";
            position: absolute;
            left: -12px;
            top: -12px;
            color: #E83B3B;
            font-size: 1rem;
            font-weight: 900;
            text-shadow:
                -0.5px -0.5px 0 #111111,
                0.5px -0.5px 0 #111111,
                -0.5px 0.5px 0 #111111,
                0.5px 0.5px 0 #111111,
                1px 1px 0 #ffffff;
            transform: rotate(-18deg);
            animation: cutePopHeart 1.8s ease-in-out infinite;
            will-change: transform;
        }

        .modal-link-btn::after {
            content: "★";
            position: absolute;
            right: -11px;
            bottom: -10px;
            color: #8FDFFF;
            font-size: 0.95rem;
            text-shadow:
                -0.5px -0.5px 0 #111111,
                0.5px -0.5px 0 #111111,
                -0.5px 0.5px 0 #111111,
                0.5px 0.5px 0 #111111,
                1px 1px 0 #ffffff;
            transform: rotate(14deg);
            animation: cutePopStar 2.1s ease-in-out infinite;
            will-change: transform;
        }

        .cute-click-particle {
            position: fixed;
            left: 0;
            top: 0;
            z-index: 9999;
            pointer-events: none;
            font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
            font-weight: 900;
            line-height: 1;
            text-shadow: 1px 1px 0 #ffffff, 2px 2px 0 rgba(255,216,77,0.65);
            animation: cuteParticlePop 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            will-change: transform, opacity;
        }

        .cute-click-ring {
            position: fixed;
            left: 0;
            top: 0;
            z-index: 9998;
            pointer-events: none;
            width: 80px;
            height: 80px;
            margin-left: -40px;
            margin-top: -40px;
            border: 4px solid #FF7EB3;
            border-radius: 50%;
            opacity: 0;
            animation: cuteRingExpand 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            will-change: transform, opacity;
        }

        @keyframes cuteParticlePop {
            0% {
                opacity: 0;
                transform: translate(calc(var(--start-x) - 50%), calc(var(--start-y) - 50%)) scale(0.2) rotate(var(--r));
            }
            15% {
                opacity: 1;
                transform: translate(calc(var(--start-x) + var(--x) * 0.5 - 50%), calc(var(--start-y) + var(--y) * 0.5 - 50%)) scale(1.2) rotate(var(--r));
            }
            100% {
                opacity: 0;
                transform: translate(calc(var(--start-x) + var(--x) - 50%), calc(var(--start-y) + var(--y) + 20px - 50%)) scale(0.5) rotate(var(--r));
            }
        }

        @keyframes cuteRingExpand {
            0% {
                transform: translate(var(--start-x), var(--start-y)) scale(0.3);
                opacity: 0.8;
                border-width: 8px;
            }
            100% {
                transform: translate(var(--start-x), var(--start-y)) scale(2);
                opacity: 0;
                border-width: 1px;
            }
        }
        .modal-gallery-content.is-polaroid-open {
            pointer-events: auto;
        }

        .modal-gallery-content.is-polaroid-open .gallery-img.is-hero-source {
            opacity: 0;
            pointer-events: none;
        }

        .modal-gallery-content.is-polaroid-open .modal-close {
            z-index: 45;
        }

        .polaroid-deco {
            position: absolute;
            left: var(--deco-left, 50%);
            top: var(--deco-top, 38px);
            z-index: 38;
            pointer-events: none;
            transform: translate(-50%, -50%) rotate(var(--deco-rotate, -8deg)) scale(0.2);
            opacity: 0;
            animation: polaroidDecoPop 0.46s cubic-bezier(0.18, 1.45, 0.4, 1) forwards;
            will-change: transform, opacity;
        }

        .polaroid-deco.is-dropping {
            animation: polaroidDecoDrop 0.68s cubic-bezier(0.34, 0.01, 0.5, 1) forwards;
        }

        .polaroid-deco.is-pin {
            width: 23px;
            height: 23px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 35% 30%, rgba(255,255,255,0.95) 0 18%, transparent 19%),
                linear-gradient(135deg, var(--deco-color), var(--deco-color-2));
            border: 2px solid rgba(90, 20, 55, 0.28);
            box-shadow:
                0 5px 0 rgba(0,0,0,0.16),
                0 8px 14px rgba(0,0,0,0.24),
                0 0 0 3px rgba(255,255,255,0.45) inset;
        }

        .polaroid-deco.is-pin::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 18px;
            width: 3px;
            height: 16px;
            background: rgba(80,80,80,0.55);
            border-radius: 999px;
            transform: translateX(-50%) rotate(8deg);
            z-index: -1;
        }

        .polaroid-deco.is-tape {
            width: 30px;
            height: 88px;
            border-radius: 3px;
            background:
                linear-gradient(90deg, rgba(255,255,255,0.62), rgba(255,255,255,0.2) 42%, transparent 72%),
                linear-gradient(135deg, rgba(255,255,255,0.72), var(--deco-color));
            border: 1px solid var(--deco-color-2);
            box-shadow: 0 3px 7px rgba(80,80,80,0.2);
            opacity: 0.96;
        }

        .polaroid-note {
            position: absolute;
            left: 50%;
            bottom: 24px;
            z-index: 39;
            width: 214px;
            padding: 13px 14px 14px;
            background:
                linear-gradient(90deg, rgba(180,140,90,0.035) 1px, transparent 1px),
                linear-gradient(0deg, rgba(180,140,90,0.025) 1px, transparent 1px),
                linear-gradient(135deg, rgba(255,254,246,0.98), rgba(255,248,224,0.96));
            background-size: 12px 12px, 12px 12px, 100% 100%;
            border: 1px solid rgba(180,130,90,0.24);
            border-radius: 5px;
            box-shadow:
                0 10px 20px rgba(0,0,0,0.18),
                0 1px 0 rgba(255,255,255,0.88) inset;
            color: #B83F78;
            font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
            text-align: center;
            pointer-events: auto;
            transform: translateX(-50%) rotate(-3deg) scale(0.2);
            opacity: 0;
            animation: polaroidNotePop 0.5s cubic-bezier(0.18, 1.45, 0.4, 1) forwards;
            will-change: transform, opacity;
        }

        .polaroid-note.is-dropping {
            pointer-events: none;
            animation: polaroidNoteDrop 0.68s cubic-bezier(0.34, 0.01, 0.5, 1) forwards;
        }

        .polaroid-postit {
            position: absolute;
            right: 34px;
            bottom: 148px;
            z-index: 40;
            width: 78px;
            min-height: 64px;
            padding: 12px 8px 9px;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.26), transparent 42%),
                linear-gradient(180deg, var(--postit-color), var(--postit-color-2));
            border: 1px solid rgba(150,120,70,0.2);
            border-radius: 4px 4px 8px 4px;
            box-shadow:
                0 8px 16px rgba(0,0,0,0.16),
                0 1px 0 rgba(255,255,255,0.75) inset;
            color: #B83F78;
            font-family: 'Fredoka', 'Zen Maru Gothic', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1.15;
            text-align: center;
            pointer-events: none;
            transform: rotate(var(--postit-rotate, 5deg)) scale(0.2);
            opacity: 0;
            animation: polaroidPostitPop 0.48s cubic-bezier(0.18, 1.45, 0.4, 1) forwards;
            will-change: transform, opacity;
        }

        .polaroid-postit::after {
            content: "";
            position: absolute;
            right: 0;
            bottom: 0;
            width: 18px;
            height: 18px;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.45), rgba(0,0,0,0.08));
            border-radius: 8px 0 7px 0;
            opacity: 0.55;
        }

        .polaroid-postit.is-dropping {
            animation: polaroidPostitDrop 0.68s cubic-bezier(0.34, 0.01, 0.5, 1) forwards;
        }

        @keyframes polaroidPostitPop {
            0% {
                opacity: 0;
                transform: rotate(var(--postit-rotate, 5deg)) scale(0.2);
            }
            70% {
                opacity: 1;
                transform: rotate(calc(var(--postit-rotate, 5deg) + 3deg)) scale(1.12);
            }
            100% {
                opacity: 1;
                transform: rotate(var(--postit-rotate, 5deg)) scale(1);
            }
        }

        @keyframes polaroidPostitDrop {
            0% {
                opacity: 1;
                transform: rotate(var(--postit-rotate, 5deg)) scale(1);
            }
            18% {
                opacity: 1;
                transform: translateY(-8px) rotate(calc(var(--postit-rotate, 5deg) - 8deg)) scale(1.05);
            }
            100% {
                opacity: 0;
                transform: translateY(150px) rotate(calc(var(--postit-rotate, 5deg) + 24deg)) scale(0.82);
            }
        }

        .polaroid-note-title {
            display: block;
            margin-bottom: 5px;
            font-size: 0.86rem;
            font-weight: 900;
            letter-spacing: 0.8px;
            line-height: 1.2;
            color: #FF6FAE;
            text-shadow:
                1px 1px 0 #ffffff,
                2px 2px 0 rgba(255,216,77,0.34);
        }

        .polaroid-note-text {
            margin: 0 0 9px;
            font-size: 0.62rem;
            font-weight: 700;
            line-height: 1.35;
            color: #B83F78;
        }

        .polaroid-note-btn {
            display: inline-block;
            padding: 8px 24px 7px;
            background: #62BFEF;
            color: #FFFFFF;
            border: 2px solid rgba(255,143,86,0.86);
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 900;
            letter-spacing: 0.8px;
            text-decoration: none;
            white-space: nowrap;
            box-shadow:
                0 3px 0 rgba(255,143,86,0.42),
                0 6px 12px rgba(98,191,239,0.28);
        }

        @keyframes polaroidNotePop {
            0% {
                opacity: 0;
                transform: translateX(-50%) rotate(-3deg) scale(0.2);
            }
            70% {
                opacity: 1;
                transform: translateX(-50%) rotate(-5deg) scale(1.08);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) rotate(-3deg) scale(1);
            }
        }

        @keyframes polaroidNoteDrop {
            0% {
                opacity: 1;
                transform: translateX(-50%) rotate(-3deg) scale(1);
            }
            18% {
                opacity: 1;
                transform: translateX(-50%) translateY(-8px) rotate(4deg) scale(1.04);
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(150px) rotate(-18deg) scale(0.82);
            }
        }

        @keyframes polaroidDecoPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) rotate(var(--deco-rotate, -8deg)) scale(0.2);
            }
            70% {
                opacity: 1;
                transform: translate(-50%, -50%) rotate(var(--deco-rotate, -8deg)) scale(1.18);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) rotate(var(--deco-rotate, -8deg)) scale(1);
            }
        }

        @keyframes polaroidDecoDrop {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) rotate(var(--deco-rotate, -8deg)) scale(1);
            }
            18% {
                opacity: 1;
                transform: translate(-50%, calc(-50% - 8px)) rotate(calc(var(--deco-rotate, -8deg) + 8deg)) scale(1.06);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, 150px) rotate(calc(var(--deco-rotate, -8deg) + 34deg)) scale(0.82);
            }
        }

        .cute-fall-out {
            animation: cuteFallOut 0.62s cubic-bezier(0.34, 0.01, 0.5, 1) forwards;
            animation-delay: var(--fall-delay, 0s);
            pointer-events: none;
            will-change: translate, rotate, scale, opacity;
        }

        .cute-return-in {
            animation: cuteReturnIn 0.58s cubic-bezier(0.18, 1.25, 0.4, 1) both;
            animation-delay: var(--return-delay, 0s);
            will-change: translate, rotate, scale, opacity;
        }

        .polaroid-hero {
            position: absolute;
            left: var(--hero-left);
            top: var(--hero-top);
            width: var(--hero-width);
            height: var(--hero-height);
            z-index: 30;
            box-sizing: border-box;
            object-fit: cover;
            border-radius: 4px;
            border: solid rgba(255,255,255,0.95);
            border-width: 12px 8px 34px;
            background: #ffffff;
            box-shadow:
                0 4px 0 rgba(255,216,77,0.55),
                0 24px 46px rgba(0,0,0,0.42),
                0 8px 18px rgba(0,0,0,0.24),
                0 0 18px rgba(255,255,255,0.55);
            transform: rotate(0deg);
            transform-origin: center center;
            transition:
                left 0.72s var(--ease-silk),
                top 0.72s var(--ease-silk),
                width 0.72s var(--ease-silk),
                height 0.72s var(--ease-silk),
                border-width 0.72s var(--ease-silk),
                border-radius 0.72s var(--ease-silk),
                box-shadow 0.72s var(--ease-silk);
            cursor: pointer;
            user-select: none;
            -webkit-user-drag: none;
        }

        .polaroid-hero.is-open {
            left: 32px;
            top: 38px;
            width: calc(100% - 64px);
            height: calc(100% - 118px);
            border-width: 12px 9px 64px;
            border-radius: 8px;
            box-shadow:
                0 26px 54px rgba(0,0,0,0.46),
                0 0 24px rgba(255,255,255,0.56);
        }

        .polaroid-hero.is-deco-shake {
            transform-origin: var(--shake-origin-x, 50%) var(--shake-origin-y, 0%);
            animation: polaroidDecoShake 0.48s cubic-bezier(0.18, 1.25, 0.4, 1);
        }

        @keyframes polaroidDecoShake {
            0% {
                transform: rotate(0deg) translateY(0);
            }
            22% {
                transform: rotate(-2.2deg) translateY(2px);
            }
            46% {
                transform: rotate(1.7deg) translateY(-1px);
            }
            70% {
                transform: rotate(-0.8deg) translateY(1px);
            }
            100% {
                transform: rotate(0deg) translateY(0);
            }
        }

        @keyframes cuteFallOut {
            0% {
                opacity: var(--cute-opacity, 1);
                translate: 0 0;
                rotate: 0deg;
                scale: 1;
            }
            18% {
                opacity: var(--cute-opacity, 1);
                translate: 0 -7px;
                rotate: var(--fall-rotate, -4deg);
                scale: 1.04;
            }
            100% {
                opacity: 0;
                translate: 0 var(--fall-y, 120px);
                rotate: var(--fall-rotate-end, 12deg);
                scale: 0.82;
            }
        }

        @keyframes cuteReturnIn {
            0% {
                opacity: 0;
                translate: 0 var(--fall-y, 120px);
                rotate: var(--fall-rotate-end, 12deg);
                scale: 0.82;
            }
            68% {
                opacity: var(--cute-opacity, 1);
                translate: 0 -8px;
                rotate: var(--fall-rotate, -4deg);
                scale: 1.04;
            }
            100% {
                opacity: var(--cute-opacity, 1);
                translate: 0 0;
                rotate: 0deg;
                scale: 1;
            }
        }
    </style>
</head>

<body>
    <div class="phone">

        <div class="status-bar">
            <div>15:45</div>
            <div class="status-icons">
                <span>▮▮▮</span>
                <span>⌁</span>
                <span class="battery">46</span>
            </div>
        </div>

        <div class="chrome-top">
            <div class="address-bar">
                <div class="address-left">⌾</div>
                <div class="address-domain">hatodaiya.com</div>
                <div class="address-right">⌑</div>
            </div>
        </div>

        <main class="web-viewport">
            <div class="mock-page-content">
                HD<br>ONLINE
            </div>

            <div class="brand-modal">
                <div class="modal-bg"></div>

                <div class="modal-gallery-content">
                    <div class="modal-watermark">BRAND</div>

                    <button class="modal-close">×</button>

                    <div class="modal-header">
                        <img class="brand-logo-banner" src="https://static.wixstatic.com/media/414ae9_65ab64b531c549699eb7420ea84e0c95~mv2.jpg" alt="HELMETTY">
                        <p class="modal-desc cute-shop-copy">
    <small>CUTE FANCY SHOP</small>
    <span>ちょっとカワイイものを集めた<br>ファンシーなショップです</span>
</p>
                    </div>

                    <div class="modal-track-wrap">
                        <div class="modal-track" id="modalTrack">
                            <img class="gallery-img is-focused" src="https://picsum.photos/seed/he1/800/800" alt="">
                            <img class="gallery-img" src="https://picsum.photos/seed/he2/800/800" alt="">
                            <img class="gallery-img" src="https://picsum.photos/seed/he3/800/800" alt="">
                            <img class="gallery-img" src="https://picsum.photos/seed/he4/800/800" alt="">
                        </div>

                        <div class="swipe-indicator">
                            <div class="swipe-dot"></div>
                            <span>← 左右にスライドできます →</span>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <a href="#" class="modal-link-btn" id="shopGoBtn">オンラインストアへGO！</a>
                    </div>
                </div>
            </div>
        </main>

        <div class="chrome-bottom">
            <div class="chrome-btn">‹</div>
            <div class="chrome-btn">›</div>
            <div class="chrome-plus">＋</div>
            <div class="chrome-tabs">70</div>
            <div class="chrome-btn">…</div>
        </div>

    </div>
    <script>
        const modalTrack = document.getElementById('modalTrack');
        const galleryImages = document.querySelectorAll('.gallery-img');

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    galleryImages.forEach(img => img.classList.remove('is-focused'));
                    entry.target.classList.add('is-focused');
                }
            });
        }, {
            root: modalTrack,
            threshold: 0.6
        });

        galleryImages.forEach(img => observer.observe(img));

        let isDown = false;
        let startX = 0;
        let scrollLeft = 0;
        let didDrag = false;

        modalTrack.addEventListener('mousedown', (e) => {
            isDown = true;
            didDrag = false;
            modalTrack.classList.add('is-dragging');
            startX = e.pageX - modalTrack.offsetLeft;
            scrollLeft = modalTrack.scrollLeft;
        });

        modalTrack.addEventListener('mouseleave', () => {
            isDown = false;
            modalTrack.classList.remove('is-dragging');
        });

        modalTrack.addEventListener('mouseup', () => {
            isDown = false;
            modalTrack.classList.remove('is-dragging');
        });

        modalTrack.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - modalTrack.offsetLeft;
            const walk = x - startX;
            if (Math.abs(walk) > 6) didDrag = true;
            modalTrack.scrollLeft = scrollLeft - walk;
        });

        galleryImages.forEach(img => {
            img.addEventListener('dragstart', (e) => {
                e.preventDefault();
            });
        });

        const modalCard = document.querySelector('.modal-gallery-content');
        const modalClose = document.querySelector('.modal-close');
        let polaroidHero = null;
        let polaroidSource = null;
        let polaroidDeco = null;
        let polaroidDecoTimer = null;
        let polaroidNote = null;
        let polaroidNoteTimer = null;
        let polaroidPostit = null;
        let polaroidPostitTimer = null;
        let isPolaroidOpen = false;

        const fallTargets = () => {
            return [
                document.querySelector('.modal-watermark'),
                document.querySelector('.modal-header'),
                document.querySelector('.swipe-indicator'),
                document.querySelector('.modal-footer'),
                ...Array.from(galleryImages).filter(img => img !== polaroidSource)
            ].filter(Boolean);
        };

        const clearCuteState = (el) => {
            el.classList.remove('cute-fall-out', 'cute-return-in');
            el.style.removeProperty('--fall-delay');
            el.style.removeProperty('--return-delay');
            el.style.removeProperty('--fall-y');
            el.style.removeProperty('--fall-rotate');
            el.style.removeProperty('--fall-rotate-end');
            el.style.removeProperty('--cute-opacity');
        };

        const fallAwayElements = () => {
            fallTargets().forEach((el, index) => {
                const originalOpacity = getComputedStyle(el).opacity || '1';

                clearCuteState(el);
                el.dataset.cuteOpacity = originalOpacity;
                el.style.setProperty('--cute-opacity', originalOpacity);
                el.style.setProperty('--fall-delay', `${index * 0.045}s`);
                el.style.setProperty('--fall-y', `${110 + index * 9}px`);
                el.style.setProperty('--fall-rotate', `${index % 2 === 0 ? -5 : 5}deg`);
                el.style.setProperty('--fall-rotate-end', `${index % 2 === 0 ? 16 : -16}deg`);
                el.classList.add('cute-fall-out');
            });
        };

        const returnElements = () => {
            const targets = fallTargets().reverse();

            targets.forEach((el, index) => {
                const originalOpacity = el.dataset.cuteOpacity || '1';

                clearCuteState(el);
                el.style.setProperty('--cute-opacity', originalOpacity);
                el.style.setProperty('--return-delay', `${index * 0.045}s`);
                el.style.setProperty('--fall-y', `${110 + index * 9}px`);
                el.style.setProperty('--fall-rotate', `${index % 2 === 0 ? -5 : 5}deg`);
                el.style.setProperty('--fall-rotate-end', `${index % 2 === 0 ? 16 : -16}deg`);
                el.classList.add('cute-return-in');

                setTimeout(() => {
                    clearCuteState(el);
                    delete el.dataset.cuteOpacity;
                }, 900);
            });
        };

        const decoPatterns = [
            { type: 'pin', left: '50%', top: '34px', rotate: '-6deg', color: '#E83B78', color2: '#FF78A8' },
            { type: 'pin', left: '50%', top: '34px', rotate: '7deg', color: '#D94335', color2: '#FF8A66' },
            { type: 'pin', left: '50%', top: '34px', rotate: '-4deg', color: '#6E63D9', color2: '#A390FF' },
            { type: 'tape', left: '50%', top: '58px', rotate: '-4deg', color: 'rgba(150,220,255,0.9)', color2: 'rgba(80,170,220,0.38)' },
            { type: 'tape', left: '50%', top: '58px', rotate: '4deg', color: 'rgba(255,218,86,0.88)', color2: 'rgba(230,180,40,0.42)' },
            { type: 'tape', left: '50%', top: '60px', rotate: '3deg', color: 'rgba(255,165,210,0.88)', color2: 'rgba(255,126,179,0.42)' },
            { type: 'tape', left: '50%', top: '60px', rotate: '-3deg', color: 'rgba(170,235,195,0.88)', color2: 'rgba(70,180,120,0.38)' }
        ];

        const showPolaroidDeco = () => {
            if (!polaroidHero || polaroidDeco) return;

            const pattern = decoPatterns[Math.floor(Math.random() * decoPatterns.length)];

            const cardRect = modalCard.getBoundingClientRect();
            const heroRect = polaroidHero.getBoundingClientRect();
            const heroLeft = heroRect.left - cardRect.left;
            const heroTop = heroRect.top - cardRect.top;
            const decoX = pattern.left.includes('%')
                ? cardRect.width * parseFloat(pattern.left) / 100
                : parseFloat(pattern.left);
            const decoY = parseFloat(pattern.top);

            polaroidHero.style.setProperty('--shake-origin-x', `${decoX - heroLeft}px`);
            polaroidHero.style.setProperty('--shake-origin-y', `${decoY - heroTop}px`);
            shakePolaroid();

            polaroidDeco = document.createElement('div');
            polaroidDeco.className = `polaroid-deco is-${pattern.type}`;
            polaroidDeco.style.setProperty('--deco-left', pattern.left);
            polaroidDeco.style.setProperty('--deco-top', pattern.top);
            polaroidDeco.style.setProperty('--deco-rotate', pattern.rotate);
            polaroidDeco.style.setProperty('--deco-color', pattern.color);
            polaroidDeco.style.setProperty('--deco-color-2', pattern.color2);

            modalCard.appendChild(polaroidDeco);
        };

        const dropPolaroidDeco = () => {
            if (polaroidDecoTimer) {
                clearTimeout(polaroidDecoTimer);
                polaroidDecoTimer = null;
            }

            if (!polaroidDeco) return;

            const deco = polaroidDeco;
            polaroidDeco = null;
            deco.classList.add('is-dropping');

            setTimeout(() => {
                deco.remove();
            }, 700);
        };

        const shakePolaroid = () => {
            if (!polaroidHero) return;

            polaroidHero.classList.remove('is-deco-shake');
            void polaroidHero.offsetWidth;
            polaroidHero.classList.add('is-deco-shake');

            setTimeout(() => {
                if (polaroidHero) {
                    polaroidHero.classList.remove('is-deco-shake');
                }
            }, 520);
        };

        const showPolaroidNote = () => {
            if (!polaroidHero || polaroidNote) return;

            shakePolaroid();

            polaroidNote = document.createElement('div');
            polaroidNote.className = 'polaroid-note';
            polaroidNote.innerHTML = `
                <span class="polaroid-note-title">Fancy Item</span>
                <p class="polaroid-note-text">ちょっとカワイイ毎日にぴったりのアイテムです</p>
                <a href="#" class="polaroid-note-btn">この商品を見る</a>
            `;

            modalCard.appendChild(polaroidNote);
        };

        const dropPolaroidNote = () => {
            if (polaroidNoteTimer) {
                clearTimeout(polaroidNoteTimer);
                polaroidNoteTimer = null;
            }

            if (!polaroidNote) return;

            const note = polaroidNote;
            polaroidNote = null;
            note.classList.add('is-dropping');

            setTimeout(() => {
                note.remove();
            }, 700);
        };

        const postitPatterns = [
            { text: 'PICK<br>UP', color: 'rgba(255,232,120,0.96)', color2: 'rgba(255,246,172,0.94)', rotate: '6deg' },
            { text: 'NEW<br>ITEM', color: 'rgba(255,174,214,0.94)', color2: 'rgba(255,218,236,0.92)', rotate: '-5deg' },
            { text: 'CUTE<br>♡', color: 'rgba(166,226,255,0.94)', color2: 'rgba(218,244,255,0.92)', rotate: '5deg' },
            { text: 'FANCY<br>★', color: 'rgba(190,238,196,0.94)', color2: 'rgba(226,250,224,0.92)', rotate: '-6deg' }
        ];

        const showPolaroidPostit = () => {
            if (!polaroidHero || polaroidPostit) return;

            const pattern = postitPatterns[Math.floor(Math.random() * postitPatterns.length)];

            polaroidPostit = document.createElement('div');
            polaroidPostit.className = 'polaroid-postit';
            polaroidPostit.innerHTML = pattern.text;
            polaroidPostit.style.setProperty('--postit-color', pattern.color);
            polaroidPostit.style.setProperty('--postit-color-2', pattern.color2);
            polaroidPostit.style.setProperty('--postit-rotate', pattern.rotate);

            modalCard.appendChild(polaroidPostit);
        };

        const dropPolaroidPostit = () => {
            if (polaroidPostitTimer) {
                clearTimeout(polaroidPostitTimer);
                polaroidPostitTimer = null;
            }

            if (!polaroidPostit) return;

            const postit = polaroidPostit;
            polaroidPostit = null;
            postit.classList.add('is-dropping');

            setTimeout(() => {
                postit.remove();
            }, 700);
        };

        const openPolaroid = (img) => {
            if (isPolaroidOpen || didDrag) return;

            isPolaroidOpen = true;
            polaroidSource = img;

            const cardRect = modalCard.getBoundingClientRect();
            const imgRect = img.getBoundingClientRect();

            polaroidHero = img.cloneNode(true);
            polaroidHero.className = 'polaroid-hero';
            polaroidHero.removeAttribute('id');
            polaroidHero.style.setProperty('--hero-left', `${imgRect.left - cardRect.left}px`);
            polaroidHero.style.setProperty('--hero-top', `${imgRect.top - cardRect.top}px`);
            polaroidHero.style.setProperty('--hero-width', `${imgRect.width}px`);
            polaroidHero.style.setProperty('--hero-height', `${imgRect.height}px`);

            modalCard.appendChild(polaroidHero);
            modalCard.classList.add('is-polaroid-open');
            img.classList.add('is-hero-source');

            fallAwayElements();

            setTimeout(() => {
                requestAnimationFrame(() => {
                    if (polaroidHero) {
                        polaroidHero.classList.add('is-open');

                        polaroidDecoTimer = setTimeout(() => {
                            showPolaroidDeco();
                        }, 620);

                        polaroidNoteTimer = setTimeout(() => {
                            showPolaroidNote();
                        }, 820);

                        polaroidPostitTimer = setTimeout(() => {
                            showPolaroidPostit();
                        }, 980);
                    }
                });
            }, 500);

            polaroidHero.addEventListener('click', closePolaroid);
        };

        const closePolaroid = () => {
            if (!isPolaroidOpen || !polaroidHero || !polaroidSource) return;

            polaroidHero.removeEventListener('click', closePolaroid);
            dropPolaroidDeco();
            dropPolaroidNote();
            dropPolaroidPostit();
            polaroidHero.classList.remove('is-open');

            polaroidHero.addEventListener('transitionend', () => {
                if (polaroidHero) {
                    polaroidHero.remove();
                    polaroidHero = null;
                }

                polaroidSource.classList.remove('is-hero-source');
                modalCard.classList.remove('is-polaroid-open');
                returnElements();

                polaroidSource = null;
                isPolaroidOpen = false;
            }, { once: true });
        };

        galleryImages.forEach(img => {
            img.addEventListener('click', () => {
                openPolaroid(img);
            });
        });

        modalClose.addEventListener('click', () => {
            if (isPolaroidOpen) {
                closePolaroid();
            }
        });
    </script>
    <script>
        (() => {
            const createCuteClickEffect = (centerX, centerY) => {
                // 1. 魔法のリング（波紋）の生成
                const ring = document.createElement('div');
                ring.className = 'cute-click-ring';
                // 座標をCSSのtransformに直接渡す（カクつき防止）
                ring.style.setProperty('--start-x', `${centerX}px`);
                ring.style.setProperty('--start-y', `${centerY}px`);
                document.body.appendChild(ring);

                // 2. 塗りつぶし系パステルマークと発光キラキラを真円状に広げるデータ
                const particlesData = [
                    { text: '♥', color: '#FF9ACB', size: 14, dist: 72 },
                    { text: '✦', color: '#FFFFFF', size: 14, dist: 92, glow: true },
                    { text: '★', color: '#FFE680', size: 14, dist: 72 },
                    { text: '✧', color: '#FFF6C7', size: 13, dist: 92, glow: true },
                    { text: '●', color: '#9BE6FF', size: 13, dist: 72 },
                    { text: '✦', color: '#F8FDFF', size: 14, dist: 92, glow: true },
                    { text: '♥', color: '#CDB0FF', size: 14, dist: 72 },
                    { text: '✧', color: '#FFF1B8', size: 13, dist: 92, glow: true },
                    { text: '◆', color: '#A7F0C1', size: 13, dist: 72 },
                    { text: '✦', color: '#FFFFFF', size: 14, dist: 92, glow: true },
                    { text: '★', color: '#FFC98E', size: 14, dist: 72 },
                    { text: '✧', color: '#FFF6C7', size: 13, dist: 92, glow: true },
                    { text: '♥', color: '#FF9ED8', size: 14, dist: 72 },
                    { text: '✦', color: '#F8FDFF', size: 14, dist: 92, glow: true },
                    { text: '●', color: '#9CE7FF', size: 13, dist: 72 },
                    { text: '✧', color: '#FFF1B8', size: 13, dist: 92, glow: true },
                    { text: '◆', color: '#D8BFFF', size: 13, dist: 72 },
                    { text: '✦', color: '#FFFFFF', size: 14, dist: 92, glow: true },
                    { text: '★', color: '#FFEA8F', size: 14, dist: 72 },
                    { text: '✧', color: '#FFF6C7', size: 13, dist: 92, glow: true },
                    { text: '●', color: '#A8F0DD', size: 13, dist: 72 },
                    { text: '✦', color: '#F8FDFF', size: 14, dist: 92, glow: true },
                    { text: '♥', color: '#FFA8B4', size: 14, dist: 72 },
                    { text: '✧', color: '#FFF1B8', size: 13, dist: 92, glow: true }
                ];

                particlesData.forEach((p, i) => {
                    const particle = document.createElement('span');
                    particle.className = 'cute-click-particle';
                    particle.textContent = p.text;
                    particle.style.color = p.color;
                    particle.style.fontSize = `${p.size}px`;
                    if (p.glow) {
                        particle.style.textShadow = '0 0 5px rgba(255,255,255,0.95), 0 0 12px rgba(255,232,150,0.85), 1px 1px 0 rgba(255,255,255,0.9)';
                    }

                    const angle = (Math.PI * 2 / particlesData.length) * i;
                    const distance = p.dist;
                    const rotateDeg = angle * 180 / Math.PI + 90;

                    // left/topではなく、すべてtransformで動かすための変数
                    particle.style.setProperty('--start-x', `${centerX}px`);
                    particle.style.setProperty('--start-y', `${centerY}px`);
                    particle.style.setProperty('--x', `${Math.cos(angle) * distance}px`);
                    particle.style.setProperty('--y', `${Math.sin(angle) * distance}px`);
                    particle.style.setProperty('--r', `${rotateDeg}deg`);

                    document.body.appendChild(particle);

                    // パーティクルのお掃除
                    setTimeout(() => {
                        particle.remove();
                    }, 1000);
                });

                // リングのお掃除
                setTimeout(() => {
                    ring.remove();
                }, 600);
            };

            document.addEventListener('pointerdown', (e) => {
                createCuteClickEffect(e.clientX, e.clientY);
            });
        })();
    </script>
</body>
</html>
