<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Synchronized 3D Test</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111111; 
            color: #D4AF37; 
            font-family: 'Playfair Display', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .hero-title-main {
            font-size: 5vw;
            letter-spacing: 15px;
            display: flex;
            justify-content: center;
            perspective: 1500px; 
            transform-style: preserve-3d;
        }

        .hero-char {
            display: inline-block;
            opacity: 1; 
            will-change: transform, opacity, filter;
        }

        .space { width: 3vw; }

        .btn-container {
            position: fixed;
            bottom: 40px;
            display: flex;
            gap: 20px;
        }

        .test-btn {
            padding: 12px 30px;
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #D4AF37;
            cursor: pointer;
            font-family: sans-serif;
            letter-spacing: 3px;
            font-size: 0.8rem;
            transition: all 0.3s;
        }
        .test-btn:hover {
            background: #D4AF37;
            color: #111;
        }
    </style>
</head>
<body>

    <div class="hero-title-main" id="titleContainer">
        <span class="hero-char">H</span>
        <span class="hero-char">D</span>
        <span class="hero-char space"></span>
        <span class="hero-char">O</span>
        <span class="hero-char">R</span>
        <span class="hero-char">I</span>
        <span class="hero-char">G</span>
        <span class="hero-char">I</span>
        <span class="hero-char">N</span>
    </div>

    <div class="btn-container">
        <button class="test-btn" onclick="playPerfectScatter()">① ちょうどよく散る (Scatter)</button>
        <button class="test-btn" onclick="playPerfectAssemble()">② ちょうどよく集まる (Assemble)</button>
    </div>

    <script>
        // ==========================================
        // ① 「集まる」のと同じリズム・スピード感で散る
        // ==========================================
        function playPerfectScatter() {
            gsap.killTweensOf('.hero-char'); 
            const chars = gsap.utils.toArray('.hero-char:not(.space)');

            chars.forEach(char => {
                gsap.to(char, { 
                    opacity: 0, 
                    filter: "blur(8px)", 
                    
                    x: () => (Math.random() - 0.5) * 1200, 
                    y: () => (Math.random() - 0.5) * 1200, 
                    z: () => (Math.random() - 0.5) * 800 + 400, 
                    
                    rotationX: () => (Math.random() - 0.5) * 720,
                    rotationY: () => (Math.random() - 0.5) * 720,
                    rotationZ: () => (Math.random() - 0.5) * 720,
                    
                    // ✨ 時間（duration）も集まる時と全く同じ（2.2〜2.6秒）
                    duration: () => Math.random() * 0.4 + 2.2, 
                    
                    // ✨ 集まる時と同じ「power3.out」を採用。
                    // 動き出しはパッ！と飛び、最後はスゥーッと漂うように消える
                    ease: "power3.out", 
                    
                    // ランダムなズレ（一斉に動き出さず、少しバラけさせる）
                    delay: () => Math.random() * 0.2
                });
            });
        }

        // ==========================================
        // ② ちょうど良い速度でサッと集まる
        // ==========================================
        function playPerfectAssemble() {
            gsap.killTweensOf('.hero-char'); 
            const chars = gsap.utils.toArray('.hero-char:not(.space)');

            chars.forEach(char => {
                gsap.fromTo(char, 
                    { 
                        opacity: 0,
                        filter: "blur(8px)",
                        x: () => (Math.random() - 0.5) * 1200, 
                        y: () => (Math.random() - 0.5) * 1200, 
                        z: () => (Math.random() - 0.5) * 800 + 400,
                        rotationX: () => (Math.random() - 0.5) * 720,
                        rotationY: () => (Math.random() - 0.5) * 720,
                        rotationZ: () => (Math.random() - 0.5) * 720
                    }, 
                    { 
                        opacity: 1, 
                        filter: "blur(0px)",
                        x: 0, 
                        y: 0, 
                        z: 0, 
                        rotationX: 0,
                        rotationY: 0,
                        rotationZ: 0,
                        
                        duration: () => Math.random() * 0.4 + 2.2, 
                        ease: "power3.out", 
                        
                        delay: () => Math.random() * 0.2
                    }
                );
            });
        }
    </script>
</body>
</html>
