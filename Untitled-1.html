<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>商品総合HTML</title>
  <style>
  :root{
    --border:#dcdcdc;
    --bg:#ffffff;
    --muted:#666666;
    --text:#111111;
    --panel:#ffffff;
    --panelAlt:#fafafa;
    --drop:#fafafa;
    --dropActive:#f0f6ff;
    --accent:#2a6df4;
    --danger:#c62828;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    background:var(--bg);
    color:var(--text);
    font-family:Arial,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
  }

  .wrap{
    width:100%;
    padding:14px;
  }

  .layoutTop{
    display:grid;
    grid-template-columns:240px minmax(520px, 1fr) 260px;
    gap:14px;
    align-items:start;
    margin-bottom:14px;
  }

  .leftCol,
  .centerCol,
  .rightCol{
    min-width:0;
  }

  .stack{
    display:flex;
    flex-direction:column;
    gap:14px;
  }

.section{
  border:1px solid var(--border);
  border-radius:12px;
  background:var(--panel);
  padding:14px;
  margin-bottom:14px;
}

.shopBrandSection{
  width:240px;
}
  .section:last-child{
    margin-bottom:0;
  }

  .sectionTitle{
    font-size:18px;
    font-weight:700;
    line-height:1.4;
    margin:0 0 12px 0;
  }

  .subTitle{
    font-size:12px;
    color:var(--muted);
    margin:0 0 8px 0;
    font-weight:700;
  }

  .muted{
    color:var(--muted);
    font-size:12px;
    line-height:1.6;
  }

  .list{
    border:1px solid var(--border);
    border-radius:10px;
    background:#fff;
    overflow:hidden;
  }

  .brandRow{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 12px;
    border-bottom:1px solid #eee;
    background:var(--panelAlt);
    cursor:pointer;
    user-select:none;
  }

  .brandRow:last-child{
    border-bottom:none;
  }

  .brandRow:hover{
    background:#f3f7ff;
  }

  .brandRow input[type="checkbox"]{
    width:16px;
    height:16px;
    margin:0;
    cursor:pointer;
    flex:0 0 auto;
  }

  .empty{
    border:1px dashed var(--border);
    border-radius:10px;
    padding:12px;
    color:var(--muted);
    font-size:13px;
    background:#fff;
  }
.mainImageSection{
  width:180px;
}
  .drop{
    border:2px dashed #d0d0d0;
    border-radius:12px;
    background:var(--drop);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
    user-select:none;
  }

  .drop.active{
    background:var(--dropActive);
    border-color:var(--accent);
  }

.dropMain{
  width:140px;
  aspect-ratio:1 / 1;
}
  .dropSquare{
    width:112px;
    aspect-ratio:1 / 1;
  }

  .dropHint{
    color:#777;
    font-size:12px;
    text-align:center;
    padding:10px;
    line-height:1.4;
  }

  .preview{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
    background:#fff;
  }

  .dropClear{
    position:absolute;
    top:8px;
    right:8px;
    width:28px;
    height:28px;
    border-radius:999px;
    border:1px solid #d0d0d0;
    background:#fff;
    color:#555;
    font-size:18px;
    line-height:26px;
    text-align:center;
    cursor:pointer;
    user-select:none;
    z-index:10;
  }

  .dropClear:hover{
    border-color:var(--danger);
    color:var(--danger);
  }

  .note{
    margin-top:6px;
    font-size:11px;
    color:var(--muted);
    line-height:1.6;
  }

.row{
  border:1px solid #d0d0d0;
  border-radius:10px;
  padding:8px;
  margin:8px 0;
  background:#fff;
}

#mediaGalleryRoot .row{
  width:180px;
  margin:0;
  flex:0 0 auto;
}

  .rowHead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    margin-bottom:8px;
  }

  .rowTitle{
    font-size:11px;
    color:#777;
    user-select:none;
  }

.headBtns{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

#mediaGalleryRoot .headBtns{
  flex-wrap:nowrap;
}
#mediaGalleryRoot .headBtns .btn{
  min-width:56px;
  padding:6px 10px;
}
  .btn{
    appearance:none;
    border:1px solid #d0d0d0;
    background:#fff;
    border-radius:9px;
    padding:6px 10px;
    font-size:13px;
    cursor:pointer;
    line-height:1;
    user-select:none;
  }

  .btn:active{
    transform:translateY(1px);
  }

  .btnPrimary{
    border-color:var(--accent);
    color:var(--accent);
  }

  .btnDanger{
    border-color:var(--danger);
    color:var(--danger);
  }

  .footer{
    display:flex;
    justify-content:flex-end;
    margin:10px 0 4px;
  }

 .colorGrid{
  display:grid;
  grid-template-columns:240px 112px 112px;
  gap:8px;
  align-items:start;
}
.colorRowsSection{
  width:520px;
}
  .label{
    font-size:11px;
    color:#777;
    margin:0 0 4px 0;
    user-select:none;
  }

  input[type="text"],
  textarea,
  select{
    font-family:inherit;
  }

  input[type="text"]{
    width:100%;
    box-sizing:border-box;
    padding:8px 10px;
    border:1px solid #d0d0d0;
    border-radius:10px;
    font-size:14px;
    outline:none;
    height:36px;
    line-height:1.2;
  }

  select{
    width:100%;
    box-sizing:border-box;
    padding:8px 10px;
    border:1px solid #d0d0d0;
    border-radius:10px;
    font-size:14px;
    outline:none;
    height:36px;
    line-height:1.2;
    background:#fff;
  }

  input[type="text"]:focus,
  textarea:focus,
  select:focus,
  .editor:focus{
    border-color:var(--accent);
    outline:none;
  }

.mediaDropWrap{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
}

#mediaGalleryRoot{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:flex-start;
}

  .productBox{
    display:block;
  }

  .previewBox{
    width:120px;
    height:120px;
    border:1px solid var(--border);
    border-radius:10px;
    background:#f7f7f7;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:14px;
  }

  .previewBox img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
    background:#ffffff;
  }

  .previewEmpty{
    font-size:12px;
    color:#777;
    text-align:center;
    padding:10px;
    line-height:1.6;
  }

  .field{
    margin-bottom:16px;
  }

  .field:last-child{
    margin-bottom:0;
  }

  .productNo{
    min-height:42px;
    border:1px solid var(--border);
    border-radius:10px;
    background:#fafafa;
    padding:10px 12px;
    font-size:14px;
    line-height:1.5;
    word-break:break-word;
  }

  .plainBox{
    width:100%;
    border:1px solid var(--border);
    border-radius:10px;
    background:#ffffff;
    padding:12px 14px;
    font-size:15px;
    line-height:1.6;
    color:#111;
    resize:vertical;
  }

  .descriptionBox{
    min-height:72px;
  }

  .toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:10px;
    border:1px solid var(--border);
    border-radius:10px 10px 0 0;
    background:#f8f8f8;
  }

  .toolBtn,
  .toolSelect{
    height:36px;
    border:1px solid #cfcfcf;
    border-radius:8px;
    background:#fff;
    color:#111;
    font-size:14px;
  }

  .toolBtn{
    min-width:36px;
    padding:0 10px;
    cursor:pointer;
  }

  .toolBtn:hover,
  .toolSelect:hover{
    background:#f1f1f1;
  }

  .toolSelect{
    padding:0 10px;
    cursor:pointer;
  }

  .editor{
    border:1px solid var(--border);
    border-top:0;
    border-radius:0 0 10px 10px;
    padding:14px;
    font-size:15px;
    line-height:1.9;
    background:#fff;
    white-space:normal;
    word-break:break-word;
    min-height:72px;
  }

  .editorCatch{
    min-height:72px;
    line-height:1.6;
  }

  .editorTexts{
    min-height:220px;
    line-height:1.9;
  }

  .editor:empty:before{
    content:attr(data-placeholder);
    color:#999;
  }

  .editor p{
    margin:0 0 12px 0;
  }

  .editor p:last-child{
    margin-bottom:0;
  }

  .statusText{
    margin-top:12px;
    font-size:12px;
    color:#666;
    line-height:1.6;
    white-space:pre-wrap;
    word-break:break-word;
  }

  .viewMoreToggle{
    appearance:none;
    border:1px solid #d0d0d0;
    background:#fff;
    border-radius:10px;
    padding:10px 12px;
    font-size:14px;
    cursor:pointer;
    line-height:1.2;
  }

  .viewMoreToggle:active{
    transform:translateY(1px);
  }
.fieldCompact{
  width:140px;
}

.inlineMetaBox{
  display:grid;
  grid-template-columns:1.35fr 1fr 1fr 1fr;
  gap:10px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  padding:12px;
  margin-bottom:16px;
}

.inlineMetaBox .field{
  margin-bottom:0;
}.viewMorePanel{
    display:none;
    margin-top:10px;
  }
.titleBrandCol #titleInput,
.titleBrandCol #brandListBox{
  width:100%;
}

.shopBrandInline{
  margin-top:10px;
}
  .viewMorePanel.open{
    display:block;
  }

  .confirmOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    display:none;
    align-items:center;
    justify-content:center;
    padding:16px;
    z-index:9999;
  }

  .confirmOverlay.open{
    display:flex;
  }

  .confirmBox{
    width:100%;
    max-width:420px;
    border:1px solid var(--border);
    border-radius:12px;
    background:#fff;
    padding:16px;
    box-shadow:0 12px 32px rgba(0,0,0,0.18);
  }

  .confirmText{
    font-size:14px;
    line-height:1.7;
    color:#111;
    white-space:pre-wrap;
    word-break:break-word;
    margin-bottom:14px;
  }

  .confirmBtns{
    display:flex;
    justify-content:flex-end;
    gap:8px;
  }

  .metaGrid{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:10px;
    margin-bottom:16px;
  }

.checkPanel{
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  padding:10px 12px;
  width:120px;
}

  .checkList{
    display:flex;
    flex-wrap:wrap;
    gap:10px 14px;
  }

  .checkItem{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    line-height:1.4;
    color:#111;
    user-select:none;
  }

  .checkItem input{
    width:16px;
    height:16px;
    margin:0;
    cursor:pointer;
  }

 .checkGrid{
  display:grid;
  grid-template-columns:1fr;
  gap:6px 0;
}

  @media (max-width: 1200px){
    .layoutTop{
      grid-template-columns:220px minmax(420px, 1fr) 240px;
    }
  }

  @media (max-width: 980px){
    .layoutTop{
      grid-template-columns:1fr;
    }

    .metaGrid{
      grid-template-columns:1fr;
    }

    .checkGrid{
      grid-template-columns:repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 520px){
    .colorGrid{
      grid-template-columns:1fr 1fr;
      grid-template-areas:
        "color color"
        "d1 d2";
    }

    .colColor{
      grid-area:color;
    }

    .colD1{
      grid-area:d1;
    }

    .colD2{
      grid-area:d2;
    }

    .dropSquare{
      width:100%;
      max-width:140px;
    }

    .colD1 .dropSquare{
      justify-self:start;
    }

    .colD2 .dropSquare{
      justify-self:end;
    }
.colorRowsSection{
  width:260px;
}
    .checkGrid{
      grid-template-columns:1fr 1fr;
    }

    .headBtns{
      width:100%;
    }

    .confirmBtns{
      flex-direction:column-reverse;
    }

    .confirmBtns .btn{
      width:100%;
    }
  }
</style>
</head>

    const SIZE_OPTIONS = [

      { label:"M", value:"M" },
      { label:"L", value:"L" },
      { label:"LL", value:"LL" }
    ];

    let brandList = [];
    let brandOptions = [];
    let currentShopBrand = "";

    let currentMainImageUrl = "";
    let currentMainObjectUrl = "";

    let colorRows = [];
    let mediagalleryRows = [];

    let currentProductNo = "";
    let currentSalesMainImage = "";
let pendingConfirmType = "";
let pendingConfirmPayload = null;
let currentDialogMode = "";
let pinterestBusy = false;

    let currentTitle = "";
    let currentBrandValue = "";
    let currentSlughead = "";
    let currentPrice = "";
    let currentLiveviews = [];
    let currentSizes = [];

    function uid(){
      return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
    }

    function postToWix(msg){
      try{ window.parent?.postMessage(msg, "*"); }catch{}
    }

    function normalizePrefix(v){

    function initMainDrop(){
      const box = document.getElementById("mainDrop");
      const clear = document.getElementById("mainClear");

      clear.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        setMainImage("");
        postToWix({ type:"mainimageCleared" });

      box.addEventListener("dragover", (e) => {
        e.preventDefault();
        setActive(box, true);
      });
      box.addEventListener("dragleave", () => setActive(box, false));
      box.addEventListener("drop", async (e) => {
        e.preventDefault();
        setActive(box, false);
        const f = e.dataTransfer?.files?.[0];
        if (!f || !/^image\//i.test(f.type)) return;

        try{
          clearCurrentMainObjectUrl();
          currentMainObjectUrl = URL.createObjectURL(f);
          setMainImage(currentMainObjectUrl, { clearObjectUrl:false });

          const bytes = await readAsBytes(f);
          postToWix({
            type: "mainimageDropped",
            bytes,
            mimeType: String(f.type || ""),
            fileName: String(f.name || "")
          });
        }catch{}
      });
    }

    function createImageDrop({ area, rowId, slot, currentUrl, square = true, onClear, onDrop }){
      const box = document.createElement("div");
      box.className = "drop " + (square ? "dropSquare" : "dropMain");

      const hint = document.createElement("div");
      hint.className = "dropHint";
      hint.innerHTML = "画像を<br>ドロップ";

      let objectUrl = "";

      function clearObjectUrl(){
        try{ if (objectUrl) URL.revokeObjectURL(objectUrl); }catch{}
        objectUrl = "";
      }

      function setPreview(url){
        box.innerHTML = "";
        if (!url){
          box.appendChild(hint);
          return;
        }
        const img = document.createElement("img");
        img.className = "preview";
        img.src = url;
        box.appendChild(img);

        const clr = document.createElement("div");
        clr.className = "dropClear";
        clr.textContent = "×";
        clr.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          clearObjectUrl();
          setPreview("");
          if (typeof onClear === "function") onClear();
        });
        box.appendChild(clr);
      }

      setPreview(currentUrl);

      box.addEventListener("dragover", (e) => {
        e.preventDefault();
        setActive(box, true);
      });
      box.addEventListener("dragleave", () => setActive(box, false));
      box.addEventListener("drop", async (e) => {
        e.preventDefault();
        setActive(box, false);

        const f = e.dataTransfer?.files?.[0];
        if (!f || !/^image\//i.test(f.type)) return;

        try{
          clearObjectUrl();
          objectUrl = URL.createObjectURL(f);
          setPreview(objectUrl);
          const bytes = await readAsBytes(f);
          if (typeof onDrop === "function") {
            onDrop({
              area,
              rowId: String(rowId || ""),
              slot: Number(slot || 0),
              bytes,
              mimeType: String(f.type || ""),
              fileName: String(f.name || "")
            });
          }
        }catch{}
      });

      return box;
    }

      postToWix({ type:"pinterestFeedGenerateClick", mode:"variant" });
    });
  }
}

    function applyState(data){
      if (Array.isArray(data.brands)) {
        brandList = data.brands.slice();
      }
      if (Object.prototype.hasOwnProperty.call(data, "currentShopBrand")) {
        currentShopBrand = String(data.currentShopBrand ?? "");
      }
      if (Object.prototype.hasOwnProperty.call(data, "mainImageUrl")) {
        clearCurrentMainObjectUrl();
        setMainImage(String(data.mainImageUrl || ""), { clearObjectUrl:false });
      }
      if (Array.isArray(data.colorRows)) {
        colorRows = data.colorRows.map(makeColorRow);
      }
      if (Array.isArray(data.mediagalleryRows)) {
        mediagalleryRows = data.mediagalleryRows.map(makeMediaRow);
      }

      renderBrandList();
      renderColorRows();
      renderMediaRows();

      setProductInfo({
        productNo: data.productNo,
        mainImageUrl: Object.prototype.hasOwnProperty.call(data, "mainImageUrl") ? String(data.mainImageUrl || "") : currentSalesMainImage
      });

         setProductBasics({
        title: data.title,
        brandOptions: data.brandOptions,
        brand: data.brand,
        slughead: data.slughead,
        priceText: data.priceText,
        liveviews: data.liveviews,
        sizes: data.sizes
      });

setSalesEditorValues({
  description: data.description,
  salesCatch: data.salesCatch,
  salesTexts: data.salesTexts
});
    }

    window.addEventListener("message", (event) => {
      const d = event?.data;
      if (!d || typeof d !== "object") return;

      if (d.type === "initProductSummary" || d.type === "setProductSummaryState") {
        applyState(d);
        return;
      }

      if (d.type === "setCurrentShopBrand") {
        currentShopBrand = String(d.currentShopBrand ?? "");
        renderBrandList();
        return;
      }

      if (d.type === "setBrandList") {
        brandList = Array.isArray(d.brands) ? d.brands.slice() : [];
        renderBrandList();
        return;
      }

      if (d.type === "setBrandOptions") {
        brandOptions = Array.isArray(d.options) ? d.options.slice() : [];
        renderBrandSelect();
        return;
      }

      if (d.type === "setProductBasics") {
        setProductBasics(d);
        return;
      }

      if (d.type === "mainimageSetUrl") {
        clearCurrentMainObjectUrl();
        setMainImage(String(d.url || ""), { clearObjectUrl:false });
        return;
      }

      if (d.type === "setColorRows") {
        colorRows = Array.isArray(d.rows) ? d.rows.map(makeColorRow) : [ makeColorRow({}) ];
        renderColorRows();
        return;
      }

          if (d.type === "setMediaGalleryRows") {
        mediagalleryRows = Array.isArray(d.rows) ? d.rows.map(makeMediaRow) : [ makeMediaRow({}) ];
        renderMediaRows();
        return;
      }

      if (d.type === "pinterestFeedSetResponse") {
        setPinterestMsg(d.message || "");
        return;
      }

      if (d.type === "setResponseText") {
        setStatus(d.text || "");
        return;
      }

      if (d.type === "pinterestFeedSetBusy") {
        setPinterestBusy(!!d.busy);
        return;
      }

  if (d.type === "setSalesEditorData") {
  setProductInfo(d);
  setProductBasics(d);
  setSalesEditorValues(d);
  return;
}

      if (d.type === "setSalesProductInfo") {
        setProductInfo(d);
        setProductBasics(d);
        return;
      }

        if (d.type === "setSalesEditorValues") {
        setSalesEditorValues(d);
        return;
      }

      if (d.type === "openConfirmDialog") {
        openConfirmBox(d.text || "", d.confirmType || "", d.payload || null);
        return;
      }

      if (d.type === "closeConfirmDialog") {
        closeConfirmBox();
        return;
      }

      if (d.type === "clearSalesEditor") {
            currentProductNo = "";
        currentSalesMainImage = "";
        currentTitle = "";
        currentBrandValue = "";
        currentSlughead = "";
        currentPrice = "";
        currentLiveviews = [];
        currentSizes = [];

        document.getElementById("productNoBox").textContent = "";
        setSalesPreviewImage("");
        document.getElementById("titleInput").value = "";
        document.getElementById("brandSelect").value = "";
        document.getElementById("slugheadInput").value = "";
        document.getElementById("priceInput").value = "";
        setLiveviewChecks([]);
        renderSizeChecks();

          document.getElementById("descriptionEditor").value = "";
        document.getElementById("salesCatchEditor").innerHTML = "";
        document.getElementById("salesTextsEditor").innerHTML = "";
        document.getElementById("viewMoreEditor").innerHTML = "";
        document.getElementById("viewMorePanel").classList.remove("open");
        document.getElementById("viewMoreToggle").textContent = "View More を開く";
        setStatus("クリアしました。");
        return;
      }
    });

   
window.addEventListener("load", () => {
  initMainDrop();
  initButtons();
  initSalesEditor();
  bindProductBasicEvents();

  renderBrandList();
  renderBrandSelect();
  renderSizeChecks();
  renderColorRows();
  renderMediaRows();
  setLiveviewChecks([]);
  closeConfirmBox();
  setPinterestBusy(false);
  setPinterestMsg("");

  postToWix({ type:"productSummaryReady" });
  postToWix({ type:"pinterestFeedIframeReady" });
});
  </script>
