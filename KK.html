<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PC合成キャンバス（iframe完全対応・レスポンシブ）</title>
  <style>
    /* vw, vhを一切使わず、100%で管理してWixの枠内に完全に収める */
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #eef2f5;
      color: #333;
      width: 100%;
      height: 100%;
      overflow: hidden; /* デフォルトは全体スクロールなし */
      container-type: inline-size; /* ★枠のサイズを監視する最新技術 */
    }

    #app-container {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100%;
    }

    /* 左側：プレビューエリア */
    #preview-section {
      flex: 1;
      min-width: 0; /* 押し出し防止 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      padding: 10px;
      box-sizing: border-box;
    }
    
    #main-canvas {
      width: 100%;
      max-width: 450px; /* PCでの最大サイズ */
      aspect-ratio: 1 / 1;
      height: auto;
      max-height: 100%;
      box-shadow: 0 8px 25px rgba(0,0,0,0.05);
      border-radius: 12px;
      background-color: #fff;
    }
    
    #preview-info {
      margin-top: 15px;
      font-size: 13px;
      color: #666;
      background: #f8f8f8;
      padding: 8px 16px;
      border-radius: 20px;
      text-align: center;
    }

    /* 右側：コントロールパネル */
    #controls-section {
      width: 390px;
      max-width: 45%; /* ★vwではなく％を使うことで崩れを防止 */
      background-color: #fcfcfc;
      border-left: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      box-shadow: -4px 0 15px rgba(0,0,0,0.03);
      z-index: 10;
    }

    #header-area {
      padding: 15px;
      background-color: #fff;
      border-bottom: 1px solid #eee;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    #product-select {
      flex: 1;
      height: 36px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
      padding: 0 8px;
      cursor: pointer;
    }
    #clear-btn {
      height: 36px;
      padding: 0 15px;
      background-color: #ff3b30;
      color: white;
      font-weight: bold;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #layers-container {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }
    .control-group {
      background: #fff;
      border: 1px solid #eaeaea;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .control-row {
      display: flex;
      flex-direction: row;
      gap: 8px;
      align-items: center;
    }
    .label-box {
      width: 65px;
      flex: 0 0 65px;
      font-weight: bold;
      font-size: 12px;
      color: #444;
    }
    input[type="color"] {
      width: 30px;
      height: 30px;
      border: 2px solid #ddd;
      border-radius: 6px;
      padding: 0;
      cursor: pointer;
    }
    .open-catalog-btn {
      flex: 1;
      height: 32px;
      font-size: 12px;
      font-weight: bold;
      background: #f0f8ff;
      border: 1px solid #007aff;
      color: #007aff;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap; 
      padding: 0 4px;
    }
    .open-catalog-btn:disabled { border-color: #ddd; color: #aaa; background: #fafafa; }
    
    .selected-thumb-box {
      display: none;
      width: 32px;
      height: 32px;
      border: 2px solid #007aff;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
    }
    .selected-thumb-box img { width: 100%; height: 100%; object-fit: cover; }

    #save-area {
      padding: 15px;
      background: #fff;
      border-top: 1px solid #eee;
    }
    .input-group {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    .input-group label {
      width: 70px;
      font-weight: bold;
      font-size: 12px;
    }
    .input-group input, .input-group select {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    #mobileSaveBtn {
      width: 100%;
      padding: 12px;
      background-color: #222;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 5px;
    }
    #mobileSaveBtn:disabled { background-color: #aaa; cursor: not-allowed; }
    
    #responseText { margin-top: 10px; font-weight: bold; font-size: 13px; text-align: center; white-space: pre-wrap; }
    #qrImage { display: none; max-width: 130px; margin: 10px auto 0; border-radius: 6px; }

    /* ポップアップ（モーダル） */
    #texture-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }
    #overlay-modal {
      width: 100%;
      max-width: 600px;
      max-height: 90%; /* vhを使わずに枠内に収める */
      background: #fff;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .overlay-header {
      background-color: #f8f8f8;
      padding: 12px 20px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .layer-title-display { font-size: 16px; font-weight: bold; }
    .close-btn {
      background: #333; color: #fff; border: none; padding: 6px 12px;
      border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer;
    }
    .overlay-content { flex: 1; overflow-y: auto; padding: 20px; }
    
    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
      gap: 10px;
    }
    .catalog-thumb {
      width: 100%; aspect-ratio: 1; border-radius: 6px; border: 2px solid transparent;
      overflow: hidden; cursor: pointer; background: #fff;
    }
    .catalog-thumb.active { border-color: #007aff; box-shadow: 0 0 8px rgba(0, 122, 255, 0.4); transform: scale(1.05); }
    .catalog-thumb img { width: 100%; height: 100%; object-fit: cover; }
    
    .tab-container {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px;
      margin-bottom: 15px; border-bottom: 2px solid #eee;
    }
    .tab-btn {
      padding: 6px 14px; border: none; border-radius: 16px; font-size: 13px; font-weight: bold;
      cursor: pointer; background: #f0f0f0; color: #555;
    }
    .tab-btn.active { background: #007aff; color: #fff; }

    /* =======================================================
       ✨タブレット・幅が狭い時用の縦並びレイアウト（コンテナクエリ）
       ======================================================= */
    @container (max-width: 800px) {
      html, body {
        height: auto;
        overflow-y: auto; /* 全体をスクロール可能にする */
      }
      #app-container {
        flex-direction: column; /* 上下に並べる */
        height: auto;
      }
      #preview-section {
        flex: none;
        width: 100%;
        padding: 20px;
      }
      #main-canvas {
        max-width: 350px; /* 縦並びの時は少し小さく */
      }
      #controls-section {
        width: 100%;
        max-width: 100%;
        flex: none;
        border-left: none;
        border-top: 1px solid #ddd;
      }
      #layers-container {
        overflow-y: visible; /* メニュー内のスクロールを解除 */
      }
    }

  </style>
</head>
<body>

  <div id="app-container">
    <div id="preview-section">
      <canvas id="main-canvas" width="450" height="450"></canvas>
      <div id="preview-info">商品を選択してください</div>
    </div>

    <div id="controls-section">
      <div id="header-area">
        <select id="product-select">
          <option value="empty">-- 商品を選択 --</option>
        </select>
        <button id="clear-btn">クリア</button>
      </div>

      <div id="layers-container"></div>
      
      <div id="save-area">
        <div class="input-group">
          <label>お名前</label>
          <input type="text" id="fileNameBox" placeholder="名前を入力">
        </div>
        <div class="input-group">
          <label>日付</label>
          <input type="date" id="dateTextBox">
        </div>
        <div class="input-group">
          <label>サイズ</label>
          <select id="sizeSelectMobile">
            <option value="">サイズを選択</option>
          </select>
        </div>
        <button id="mobileSaveBtn">SAVE</button>
        <div id="responseText"></div>
        <img id="qrImage" src="" alt="QR Code">
      </div>
    </div>
  </div>

  <div id="texture-overlay">
    <div id="overlay-modal">
      <div class="overlay-header">
        <div class="layer-title-display" id="overlay-layer-title">パーツ名</div>
        <button class="close-btn" id="close-overlay-btn">決定・閉じる</button>
      </div>
      <div class="overlay-content" id="overlay-catalog-container"></div>
    </div>
  </div>

  <script>
    let allProductsData = {};
    let currentProductId = "empty";
    let cachedAllTextures = [];

    const canvas = document.getElementById("main-canvas");
    const ctx = canvas.getContext("2d");
    const offCanvas = document.createElement("canvas");
    offCanvas.width = 450;
    offCanvas.height = 450;
    const octx = offCanvas.getContext("2d");

    let currentColors = {};
    let currentTexturesUrls = {};
    let loadedShoeImages = {};
    let selectedTexturesInfo = {};
    let textureNamesForReport = null;

    const layerKeysOrder = ["layerBase", "layerA", "layerB", "layerC", "layerD", "layerE", "layerF", "layerG", "layerLineA", "layerLineB", "layerInsole", "layerCounter", "layerUra", "layerFrame"];

    document.getElementById("dateTextBox").value = new Date().toISOString().split('T')[0];
    const sizeSelect = document.getElementById("sizeSelectMobile");
    for (let size = 22.0; size <= 24.5; size += 0.5) {
      const opt = document.createElement("option");
      opt.value = size.toFixed(1);
      opt.textContent = size.toFixed(1) + " cm";
      sizeSelect.appendChild(opt);
    }

    function preloadImage(url) {
      return new Promise((resolve) => {
        if (!url) return resolve(null);
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = url;
      });
    }

    async function drawCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const texts = [];

      for (const key of layerKeysOrder) {
        const shoeImg = loadedShoeImages[key];
        if (!shoeImg) continue;

        const color = currentColors[key];
        const texUrl = currentTexturesUrls[key];
        let texImg = texUrl ? await preloadImage(texUrl) : null;

        octx.clearRect(0, 0, offCanvas.width, offCanvas.height);
        octx.globalCompositeOperation = "source-over";

        if (texImg) {
          octx.drawImage(texImg, 0, 0, canvas.width, canvas.height);
          octx.globalCompositeOperation = "destination-in";
          octx.drawImage(shoeImg, 0, 0, canvas.width, canvas.height);
        } else if (color) {
          octx.drawImage(shoeImg, 0, 0, canvas.width, canvas.height);
          octx.globalCompositeOperation = "source-in";
          octx.fillStyle = color;
          octx.fillRect(0, 0, canvas.width, canvas.height);
        } else {
          octx.drawImage(shoeImg, 0, 0, canvas.width, canvas.height);
        }
        ctx.drawImage(offCanvas, 0, 0);

        const label = key.replace("layer", "").toUpperCase();
        const info = selectedTexturesInfo[key];
        if (info?.color) texts.push(`${label}:${info.color}`);
        else if (info?.resolvedName) texts.push(`${label}:${info.resolvedName}`);
      }
      
      document.getElementById("preview-info").textContent = texts.length > 0 ? texts.join(" / ") : "パーツを選択してください";
    }

    const productSelect = document.getElementById("product-select");
    
    productSelect.addEventListener("change", (e) => {
      currentProductId = e.target.value;
      if (currentProductId === "empty") {
        clearAll();
      } else {
        const productData = allProductsData[currentProductId];
        if (productData) setupMobileControls(productData);
      }
    });

    document.getElementById("clear-btn").addEventListener("click", () => {
      productSelect.value = "empty";
      currentProductId = "empty";
      clearAll();
    });

    function clearAll() {
      document.getElementById("layers-container").innerHTML = "";
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      document.getElementById("preview-info").textContent = "商品を選択してください";
      currentColors = {};
      currentTexturesUrls = {};
      selectedTexturesInfo = {};
      loadedShoeImages = {};
      notifyVelo();
    }

    async function setupMobileControls(item) {
      const container = document.getElementById("layers-container");
      container.innerHTML = "";
      
      currentColors = {};
      currentTexturesUrls = {};
      selectedTexturesInfo = {};
      loadedShoeImages = {};

      document.getElementById("preview-info").textContent = "画像ダウンロード中...";

      const promises = layerKeysOrder.map(async key => {
        loadedShoeImages[key] = item[key] ? await preloadImage(item[key]) : null;
      });
      await Promise.all(promises);

      if (item.layerBase && Array.isArray(item.layerBaseColors)) {
        const group = document.createElement("div");
        group.className = "control-group";
        const row = document.createElement("div");
        row.className = "control-row";
        const labelBox = document.createElement("div");
        labelBox.className = "label-box";
        labelBox.textContent = "底 🎨";
        row.appendChild(labelBox);

        item.layerBaseColors.forEach(color => {
          const btn = document.createElement("button");
          btn.style.backgroundColor = color;
          btn.style.width = "30px";
          btn.style.height = "30px";
          btn.style.border = "2px solid #ccc";
          btn.style.borderRadius = "6px";
          btn.style.cursor = "pointer";
          btn.addEventListener("click", () => {
            currentColors["layerBase"] = color;
            currentTexturesUrls["layerBase"] = null;
            selectedTexturesInfo["layerBase"] = { color };
            drawCanvas();
            notifyVelo();
          });
          row.appendChild(btn);
        });
        group.appendChild(row);
        container.appendChild(group);
      }

      const labelMap = { layerLineA: "フチ巻A", layerLineB: "フチ巻B", layerInsole: "インソール", layerCounter: "かかと", layerUra: "裏地" };

      layerKeysOrder.forEach((key) => {
        if (key === "layerFrame" || key === "layerBase") return; 
        if (item[key]) {
          const labelText = labelMap[key] || key.replace("layer", "");
          createMobileLayerControls(key, labelText, container, cachedAllTextures);
        }
      });

      drawCanvas();
    }

    function createMobileLayerControls(layerKey, labelText, container, allTextures) {
      let memTitle = "none";
      let memFieldKey = null;
      let memUrl = null;
      let memColor = "#ebebeb";
      let activeRadio = null;

      const group = document.createElement("div");
      group.className = "control-group";
      const row = document.createElement("div");
      row.className = "control-row";

      const labelBox = document.createElement("div");
      labelBox.className = "label-box";
      labelBox.textContent = labelText;
      row.appendChild(labelBox); 

      const textureRadio = document.createElement("input");
      textureRadio.type = "radio";
      textureRadio.name = `mode_${layerKey}`;
      textureRadio.value = "texture";
      row.appendChild(textureRadio);

      const openCatalogBtn = document.createElement("button");
      openCatalogBtn.className = "open-catalog-btn";
      openCatalogBtn.textContent = "生地を選ぶ 🔍";
      openCatalogBtn.disabled = true;
      row.appendChild(openCatalogBtn);

      const selectedThumbBox = document.createElement("div");
      selectedThumbBox.className = "selected-thumb-box";
      const selectedThumbImg = document.createElement("img");
      selectedThumbBox.appendChild(selectedThumbImg);
      row.appendChild(selectedThumbBox);

      const colorRadio = document.createElement("input");
      colorRadio.type = "radio";
      colorRadio.name = `mode_${layerKey}`;
      colorRadio.value = "color";
      row.appendChild(colorRadio);
      row.appendChild(document.createTextNode("🎨"));

      const colorInput = document.createElement("input");
      colorInput.type = "color";
      colorInput.value = memColor;
      colorInput.disabled = true;
      row.appendChild(colorInput);

      group.appendChild(row);
      container.appendChild(group);

      colorInput.addEventListener("input", (e) => {
        memColor = e.target.value;
        if (activeRadio === "color") {
          currentColors[layerKey] = memColor;
          currentTexturesUrls[layerKey] = null;
          selectedTexturesInfo[layerKey] = { color: memColor };
          drawCanvas();
          notifyVelo();
        }
      });

      colorRadio.addEventListener("change", () => {
        if (colorRadio.checked) {
          activeRadio = "color";
          colorInput.disabled = false;
          openCatalogBtn.disabled = true;
          selectedThumbBox.style.opacity = "0.5";
          colorInput.value = memColor;
          currentTexturesUrls[layerKey] = null;
          currentColors[layerKey] = memColor;
          selectedTexturesInfo[layerKey] = { color: memColor };
          drawCanvas();
          notifyVelo();
        }
      });

      colorRadio.addEventListener("click", (e) => {
        if (activeRadio === "color") {
          colorRadio.checked = false;
          activeRadio = null;
          colorInput.disabled = true;
          currentColors[layerKey] = null;
          selectedTexturesInfo[layerKey] = {};
          drawCanvas();
          notifyVelo();
        } else {
          activeRadio = "color";
        }
      });

      textureRadio.addEventListener("change", () => {
        if (textureRadio.checked) {
          activeRadio = "texture";
          colorInput.disabled = true;
          openCatalogBtn.disabled = false;
          selectedThumbBox.style.opacity = "1";

          if (memTitle !== "none" && memFieldKey && memUrl) {
            currentTexturesUrls[layerKey] = memUrl;
            currentColors[layerKey] = null;
            selectedTexturesInfo[layerKey] = { title: memTitle, fieldKey: memFieldKey };
            selectedThumbImg.src = memUrl;
            selectedThumbBox.style.display = "block";
            resolveReportName(layerKey);
            drawCanvas();
            notifyVelo();
          } else {
            openOverlayCatalog(layerKey, labelText, allTextures);
          }
        }
      });

      textureRadio.addEventListener("click", (e) => {
        if (activeRadio === "texture") {
          textureRadio.checked = false;
          activeRadio = null;
          openCatalogBtn.disabled = true;
          selectedThumbBox.style.opacity = "0.5";
          currentTexturesUrls[layerKey] = null;
          selectedTexturesInfo[layerKey] = {};
          drawCanvas();
          notifyVelo();
        } else {
          activeRadio = "texture";
        }
      });

      openCatalogBtn.addEventListener("click", () => openOverlayCatalog(layerKey, labelText, allTextures));
      selectedThumbBox.addEventListener("click", () => {
        if(activeRadio === "texture") openOverlayCatalog(layerKey, labelText, allTextures);
      });

      function openOverlayCatalog(targetLayerKey, targetLabel, texturesData) {
        document.getElementById("overlay-layer-title").textContent = targetLabel + " の生地を選択";
        const catalogContainer = document.getElementById("overlay-catalog-container");
        catalogContainer.innerHTML = "";

        const uniqueCategories = [];
        const seenTitles = new Set();
        texturesData.forEach(tex => {
          if (tex.title && !seenTitles.has(tex.title)) {
            seenTitles.add(tex.title);
            uniqueCategories.push(tex);
          }
        });

        if (uniqueCategories.length === 0) return;

        const tabContainer = document.createElement("div");
        tabContainer.className = "tab-container";
        const gridContainer = document.createElement("div");

        function renderGrid(selectedCategory) {
          gridContainer.innerHTML = "";
          
          Array.from(tabContainer.children).forEach(btn => {
            if (btn.dataset.category === selectedCategory.title) {
              btn.classList.add("active");
            } else {
              btn.classList.remove("active");
            }
          });

          const gridDiv = document.createElement("div");
          gridDiv.className = "catalog-grid";

          Object.keys(selectedCategory).forEach(key => {
            if (key.startsWith("texture") && selectedCategory[key]) {
              const url = selectedCategory[key];
              const thumb = document.createElement("div");
              thumb.className = "catalog-thumb";
              
              if (key === memFieldKey && selectedCategory.title === memTitle) {
                thumb.classList.add("active");
              }

              const img = document.createElement("img");
              img.src = url;
              thumb.appendChild(img);

              thumb.addEventListener("click", () => {
                memTitle = selectedCategory.title;
                memFieldKey = key;
                memUrl = url;
                selectedThumbImg.src = url;              
                selectedThumbBox.style.display = "block";
                currentTexturesUrls[layerKey] = url;
                currentColors[layerKey] = null;
                selectedTexturesInfo[layerKey] = { title: selectedCategory.title, fieldKey: key };
                resolveReportName(layerKey);

                document.getElementById("texture-overlay").style.display = "none";
                drawCanvas();
                notifyVelo();
              });
              gridDiv.appendChild(thumb);
            }
          });
          gridContainer.appendChild(gridDiv);
        }

        uniqueCategories.forEach(cat => {
          const tabBtn = document.createElement("button");
          tabBtn.className = "tab-btn";
          tabBtn.dataset.category = cat.title;
          tabBtn.textContent = cat.title;
          tabBtn.addEventListener("click", () => renderGrid(cat));
          tabContainer.appendChild(tabBtn);
        });

        catalogContainer.appendChild(tabContainer);
        catalogContainer.appendChild(gridContainer);

        let initialCategory = uniqueCategories[0];
        if (memTitle !== "none") {
          const matched = uniqueCategories.find(c => c.title === memTitle);
          if (matched) initialCategory = matched;
        }

        renderGrid(initialCategory);
        document.getElementById("texture-overlay").style.display = "flex";
      }
    }

    document.getElementById("close-overlay-btn").addEventListener("click", () => {
      document.getElementById("texture-overlay").style.display = "none";
    });

    function resolveReportName(layerKey) {
      const info = selectedTexturesInfo[layerKey];
      if (info && info.fieldKey && textureNamesForReport) {
        const suffix = info.fieldKey.slice(-1).toUpperCase();
        const nameKey = `textureName${suffix}`;
        if (textureNamesForReport[nameKey]) {
          info.resolvedName = textureNamesForReport[nameKey];
        }
      }
    }

    function notifyVelo() {
      window.parent.postMessage({ fromMobileMainHtml: true, selectedTexturesInfo, currentProductId }, "*");
    }

    document.getElementById("mobileSaveBtn").addEventListener("click", () => {
      const fileName = document.getElementById("fileNameBox").value.trim();
      const reportDate = document.getElementById("dateTextBox").value;
      const selectedSize = document.getElementById("sizeSelectMobile").value;
      const responseEl = document.getElementById("responseText");

      if (!fileName || !reportDate) {
        responseEl.textContent = "⚠️ 名前と日付を入力してください。";
        responseEl.style.color = "red";
        return;
      }

      responseEl.textContent = "💾 保存中...";
      responseEl.style.color = "#333";
      document.getElementById("mobileSaveBtn").disabled = true;
      document.getElementById("qrImage").style.display = "none";

      generateMobileReportImage(fileName, reportDate, selectedSize);
    });

    function generateMobileReportImage(fileName, mobileDate, selectedSize) {
      const reportCanvas = document.createElement("canvas");
      reportCanvas.width = 595;
      reportCanvas.height = 842;
      const ctx = reportCanvas.getContext("2d");

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, 595, 842);
      
      ctx.drawImage(canvas, 20, 160, 250, 250);

      ctx.fillStyle = "#000000";
      ctx.font = "16px sans-serif";
      ctx.fillText(`日付：${mobileDate}`, 20, 24);
      ctx.fillText(`お名前：${fileName}`, 20, 44);
      ctx.fillText(`サイズ：${selectedSize} cm`, 20, 64);

      const leftLabels = ["BASE", "A", "B", "C"];
      let leftY = 440, rightY = 440;

      Object.keys(selectedTexturesInfo).forEach(key => {
        const label = key.replace("layer", "").toUpperCase();
        const info = selectedTexturesInfo[key];
        const line = info?.reportLine || `${label}：未定義`;

        if (leftLabels.includes(label)) {
          ctx.fillText(line, 20, leftY);
          leftY += 20;
        } else {
          ctx.fillText(line, 320, rightY);
          rightY += 20;
        }
      });

      window.parent.postMessage({
        saveDone: true,
        reportImageDataUrl: reportCanvas.toDataURL("image/jpeg", 0.95),
        fileName: fileName,
        reportDate: mobileDate,
        selectedTexturesInfo: selectedTexturesInfo
      }, "*");
    }

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data) return;

      if (data.type === "INITIAL_DATA" && data.productConfigs) {
        data.productConfigs.forEach(p => {
          allProductsData[p.productId] = p;
          const option = document.createElement("option");
          option.value = p.productId;
          option.textContent = p.title;
          productSelect.appendChild(option);
        });
        if (data.allTextures) cachedAllTextures = data.allTextures;
        return;
      }

      if (data.type === "SAVE_SUCCESS") {
        const responseEl = document.getElementById("responseText");
        responseEl.textContent = data.message;
        responseEl.style.color = "green";
        
        if (data.qrUrl) {
          const qrImage = document.getElementById("qrImage");
          qrImage.src = data.qrUrl;
          qrImage.style.display = "block";
        }
        document.getElementById("mobileSaveBtn").disabled = false;
        return;
      }

      if (data.type === "SAVE_ERROR") {
        const responseEl = document.getElementById("responseText");
        responseEl.textContent = data.message;
        responseEl.style.color = "red";
        document.getElementById("mobileSaveBtn").disabled = false;
        return;
      }

      if (data.reportTextureNames) {
        textureNamesForReport = data.reportTextureNames;
        Object.keys(selectedTexturesInfo).forEach(resolveReportName);
        drawCanvas();
      }
    });

    window.parent.postMessage({ type: "ready" }, "*");

  </script>
</body>
</html>
