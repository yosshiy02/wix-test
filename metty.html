<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>HELMETTY Logo Animation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Zen+Maru+Gothic:wght@700;900&display=swap');

  :root {
    --intro-delay: 1.28s;
  }

  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; margin: 0; background: #fff;
    font-family: 'Arial Rounded MT Bold', 'Hiragino Maru Gothic ProN', sans-serif;
    overflow: hidden;
  }

  .logo-canvas {
    position: relative;
    width: 700px;
    height: 750px;
  }

  .intro-screen {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.72) 0%, rgba(255, 255, 255, 0.24) 22%, rgba(255, 241, 168, 0) 48%),
      radial-gradient(circle at 18% 24%, rgba(255, 126, 179, 0.20) 0%, rgba(255, 126, 179, 0.08) 12%, rgba(255, 126, 179, 0) 28%),
      radial-gradient(circle at 82% 28%, rgba(94, 197, 238, 0.20) 0%, rgba(94, 197, 238, 0.08) 12%, rgba(94, 197, 238, 0) 28%),
      radial-gradient(circle at 28% 78%, rgba(142, 230, 200, 0.18) 0%, rgba(142, 230, 200, 0.07) 12%, rgba(142, 230, 200, 0) 28%),
      #FFF1A8;
    z-index: 9999;
    overflow: hidden;
    pointer-events: none;
    animation: introScreenOut 0.16s 1.22s linear forwards;
  }

  .intro-star {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 220vmax;
    height: 220vmax;
    overflow: visible;
    transform: translate(-50%, -50%) scale(0.035) rotate(-6deg);
    transform-origin: 50% 50%;
    opacity: 0;
    filter:
      drop-shadow(0 0 12px rgba(255, 126, 179, 0.30))
      drop-shadow(0 0 28px rgba(255, 255, 255, 0.55));
    animation: introStarWipe 1.18s 0.04s cubic-bezier(0.55, 0, 0.15, 1) forwards;
    will-change: transform, opacity;
  }

  .intro-star path {
    fill: #fff;
    stroke: #FF7EB3;
    stroke-width: 5;
    stroke-linejoin: round;
    stroke-linecap: round;
    animation: introStarStroke 1.18s 0.04s linear forwards;
  }

  .intro-star-ghost {
    opacity: 0;
    mix-blend-mode: normal;
    filter: blur(1.5px);
  }

  .intro-star-ghost path {
    fill: rgba(255, 126, 179, 0.16);
    stroke: rgba(255, 126, 179, 0.42);
    stroke-width: 6;
    animation: none;
  }

  .intro-star-ghost-1 {
    animation: introStarGhost 1.16s 0.10s cubic-bezier(0.55, 0, 0.15, 1) forwards;
  }

  .intro-star-ghost-2 {
    animation: introStarGhost 1.10s 0.18s cubic-bezier(0.55, 0, 0.15, 1) forwards;
  }

  @keyframes introStarWipe {
    0%   { transform: translate3d(-50%, -50%, 0) scale(0.018); opacity: 0; }
    12%  { transform: translate3d(-50%, -50%, 0) scale(0.030); opacity: 1; }
    100% { transform: translate3d(-50%, -50%, 0) scale(1.38); opacity: 1; }
  }

  @keyframes introStarStroke {
    0%   { stroke-width: 8; }
    100% { stroke-width: 2; }
  }

  @keyframes introStarGhost {
    0%   { transform: translate3d(-50%, -50%, 0) scale(0.020); opacity: 0; }
    16%  { transform: translate3d(-50%, -50%, 0) scale(0.038); opacity: 0.22; }
    100% { transform: translate3d(-50%, -50%, 0) scale(1.38); opacity: 0; }
  }

  @keyframes introScreenOut {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ===== ヘルメット ===== */
  .helmet-shadow {
    position: absolute;
    top: 444px;
    left: calc(50% - 8px);
    width: 242px;
    height: 38px;
    background: rgba(0, 0, 0, 0.48);
    border-radius: 50%;
    filter: blur(4px);
    transform: translateX(-50%) scale(0.65);
    opacity: 0;
    z-index: 1;
    pointer-events: none;
    animation: helmetShadow 1.45s linear var(--intro-delay) forwards;
    will-change: transform, opacity;
  }

  .helmet-wrapper {
    position: absolute;
    top: 250px;
    left: calc(50% - 8px);
    width: 280px;
    height: 185px;
    transform: translateX(-50%);
    opacity: 0;
    animation: helmetDrop 1.45s linear var(--intro-delay) forwards;
    isolation: isolate;
    z-index: 5;
    will-change: transform, opacity;
  }

  .helmet-motion {
    position: relative;
    width: 100%;
    height: 100%;
    transform-origin: 50% 82%;
    transform: rotate(-24deg) scale(0.96, 1.04);
    animation: helmetPoyon 1.65s linear var(--intro-delay) forwards;
    will-change: transform;
  }

  .helmet-motion {
    --helmet-body: #FFE600;
    --helmet-inner: #FFDF33;
    --helmet-rim: #E69500;
  }

  .bowl-semicircle {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 140px;
    background: var(--helmet-body);
    border-radius: 0 0 140px 140px;
    border-bottom: 8px solid var(--helmet-rim);
    box-sizing: border-box;
    z-index: 0;
  }

  .rim-ellipse-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 90px;
    background: var(--helmet-inner);
    border-radius: 50%;
    box-sizing: border-box;
    z-index: 1;
  }

  .rim-back {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 90px;
    border: 8px solid var(--helmet-rim);
    border-radius: 50%;
    box-sizing: border-box;
    z-index: 2;
    clip-path: inset(0 0 50% 0);
    pointer-events: none;
  }

  .particles {
    position: absolute;
    top: 45px;
    left: 50%;
    width: 0;
    height: 0;
    z-index: 10;
    pointer-events: none;
  }

  .rim-front {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 90px;
    border: 8px solid var(--helmet-rim);
    border-radius: 50%;
    box-sizing: border-box;
    z-index: 20;
    clip-path: inset(50% 0 0 0);
    pointer-events: none;
  }

  .particles-front {
    position: absolute;
    top: 45px;
    left: 50%;
    width: 0;
    height: 0;
    z-index: 25;
    pointer-events: none;
  }

  .helmet-glint {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 140px;
    border-radius: 0 0 140px 140px;
    overflow: hidden;
    z-index: 24;
    opacity: 0;
    pointer-events: none;
    animation: helmetGlintBase 1.05s calc(var(--intro-delay) + 3.78s) ease-out forwards;
  }

  .helmet-glint::before {
    content: "";
    position: absolute;
    top: -55px;
    left: -120px;
    width: 72px;
    height: 250px;
    background: linear-gradient(
      90deg,
      rgba(255, 255, 255, 0) 0%,
      rgba(255, 255, 255, 0.18) 30%,
      rgba(255, 255, 255, 0.95) 50%,
      rgba(255, 255, 255, 0.18) 70%,
      rgba(255, 255, 255, 0) 100%
    );
    filter: blur(1px);
    transform: translateX(0) rotate(24deg);
    animation: helmetGlintSweep 1.05s calc(var(--intro-delay) + 3.78s) ease-out forwards;
  }

  .helmet-glint::after {
    content: none;
  }

  .helmet-glint-star {
    display: none;
  }

  .helmet-glint-star::before,
  .helmet-glint-star::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    background: #ffffff;
    border-radius: 999px;
    transform: translate(-50%, -50%);
  }

  .helmet-glint-star::before {
    width: 30px;
    height: 7px;
  }

  .helmet-glint-star::after {
    width: 7px;
    height: 30px;
  }

  /* ===== パーティクル ===== */
  .particle {
    position: absolute;
    top: 0; left: 0;
    width: 36px; height: 36px;
    margin-top: -18px;
    margin-left: -18px;
    transform: translate(0, 0) scale(0) rotate(0deg);
    opacity: 0;
    will-change: transform, opacity;
  }

  .particle svg {
    width: 100%;
    height: 100%;
    overflow: visible;
    display: block;
  }

  .particle svg path {
    stroke: #1a1a1a;
    stroke-width: 7;
    stroke-linejoin: round;
    stroke-linecap: round;
  }

  .c-yellow path { fill: #FFE600; }
  .c-blue   path { fill: #5EC5EE; }
  .c-pink   path { fill: #FF7FB0; }
  .c-orange path { fill: #FFB347; }
  .c-mint   path { fill: #8EE6C8; }
  .c-purple path { fill: #C9A0FF; }
  .c-red    path { fill: #FF6B6B; }
  .c-lime   path { fill: #C6F26B; }
  .c-coral  path { fill: #FF8A7A; }

  .size-xs { width: 22px; height: 22px; margin-top: -11px; margin-left: -11px; }
  .size-s  { width: 30px; height: 30px; margin-top: -15px; margin-left: -15px; }
  .size-m  { width: 40px; height: 40px; margin-top: -20px; margin-left: -20px; }
  .size-l  { width: 52px; height: 52px; margin-top: -26px; margin-left: -26px; }
  .size-xl { width: 64px; height: 64px; margin-top: -32px; margin-left: -32px; }

  .p1  { animation: pop1  2.2s calc(var(--intro-delay) + 0.70s) ease-out forwards; }
  .p2  { animation: pop2  2.2s calc(var(--intro-delay) + 0.75s) ease-out forwards; }
  .p3  { animation: pop3  2.2s calc(var(--intro-delay) + 0.80s) ease-out forwards; }
  .p4  { animation: pop4  2.2s calc(var(--intro-delay) + 0.85s) ease-out forwards; }
  .p5  { animation: pop5  2.2s calc(var(--intro-delay) + 0.90s) ease-out forwards; }
  .p6  { animation: pop6  2.2s calc(var(--intro-delay) + 0.95s) ease-out forwards; }
  .p7  { animation: pop7  2.2s calc(var(--intro-delay) + 1.00s) ease-out forwards; }
  .p8  { animation: pop8  2.2s calc(var(--intro-delay) + 1.05s) ease-out forwards; }
  .p9  { animation: pop9  2.2s calc(var(--intro-delay) + 0.72s) ease-out forwards; }
  .p10 { animation: pop10 2.2s calc(var(--intro-delay) + 0.78s) ease-out forwards; }
  .p11 { animation: pop11 2.2s calc(var(--intro-delay) + 0.83s) ease-out forwards; }
  .p12 { animation: pop12 2.2s calc(var(--intro-delay) + 0.88s) ease-out forwards; }
  .p13 { animation: pop13 2.2s calc(var(--intro-delay) + 0.93s) ease-out forwards; }
  .p14 { animation: pop14 2.2s calc(var(--intro-delay) + 0.98s) ease-out forwards; }
  .p15 { animation: pop15 2.2s calc(var(--intro-delay) + 1.03s) ease-out forwards; }
  .p16 { animation: pop16 2.2s calc(var(--intro-delay) + 1.08s) ease-out forwards; }
  .p17 { animation: pop17 2.2s calc(var(--intro-delay) + 0.74s) ease-out forwards; }
  .p18 { animation: pop18 2.2s calc(var(--intro-delay) + 0.79s) ease-out forwards; }
  .p19 { animation: pop19 2.2s calc(var(--intro-delay) + 0.84s) ease-out forwards; }
  .p20 { animation: pop20 2.2s calc(var(--intro-delay) + 0.89s) ease-out forwards; }
  .p21 { animation: pop21 2.2s calc(var(--intro-delay) + 0.94s) ease-out forwards; }
  .p22 { animation: pop22 2.2s calc(var(--intro-delay) + 0.99s) ease-out forwards; }
  .p23 { animation: pop23 2.2s calc(var(--intro-delay) + 1.04s) ease-out forwards; }
  .p24 { animation: pop24 2.2s calc(var(--intro-delay) + 1.09s) ease-out forwards; }
  .p25 { animation: pop25 2.2s calc(var(--intro-delay) + 0.76s) ease-out forwards; }
  .p26 { animation: pop26 2.2s calc(var(--intro-delay) + 0.86s) ease-out forwards; }
  .p27 { animation: pop27 2.2s calc(var(--intro-delay) + 0.96s) ease-out forwards; }
  .p28 { animation: pop28 2.2s calc(var(--intro-delay) + 1.06s) ease-out forwards; }

  .p29 { animation: pop29 2.1s calc(var(--intro-delay) + 0.82s) ease-out forwards; }
  .p30 { animation: pop30 2.1s calc(var(--intro-delay) + 0.92s) ease-out forwards; }
  .p31 { animation: pop31 2.1s calc(var(--intro-delay) + 1.02s) ease-out forwards; }
  .p32 { animation: pop32 2.1s calc(var(--intro-delay) + 0.87s) ease-out forwards; }
  .p33 { animation: pop33 2.1s calc(var(--intro-delay) + 0.97s) ease-out forwards; }
  .p34 { animation: pop34 2.1s calc(var(--intro-delay) + 1.07s) ease-out forwards; }

  .fp1 { animation: frontPop1 1.45s calc(var(--intro-delay) + 0.86s) ease-out forwards; }
  .fp2 { animation: frontPop2 1.45s calc(var(--intro-delay) + 0.96s) ease-out forwards; }
  .fp3 { animation: frontPop3 1.45s calc(var(--intro-delay) + 1.06s) ease-out forwards; }

  /* ===== テキスト ===== */
  .text-group {
    position: absolute;
    bottom: 145px;
    width: 100%;
    text-align: center;
    z-index: 30;
  }

  .title {
    margin: 0;
    color: #FF7EB3;
    font-size: 70px;
    font-weight: 900;
    letter-spacing: 4px;
    opacity: 1;
    display: flex;
    justify-content: center;
    align-items: baseline;
  }

  .title .char {
    display: inline-block;
    opacity: 0;
    transform: translateY(36px) scale(0.4) rotate(var(--r));
    transform-origin: 50% 86%;
    animation: titleCharPoyon 1.12s var(--d) linear forwards;
    will-change: transform, opacity;
  }

  .title .char:nth-child(1) { --d: calc(var(--intro-delay) + 0.72s); --r: -7deg; }
  .title .char:nth-child(2) { --d: calc(var(--intro-delay) + 0.90s); --r: 5deg; }
  .title .char:nth-child(3) { --d: calc(var(--intro-delay) + 1.08s); --r: -4deg; }
  .title .char:nth-child(4) { --d: calc(var(--intro-delay) + 1.26s); --r: 4deg; }
  .title .char:nth-child(5) { --d: calc(var(--intro-delay) + 1.44s); --r: -3deg; }
  .title .char:nth-child(6) { --d: calc(var(--intro-delay) + 1.62s); --r: 5deg; }
  .title .char:nth-child(7) { --d: calc(var(--intro-delay) + 1.80s); --r: -4deg; }
  .title .char:nth-child(8) { --d: calc(var(--intro-delay) + 1.98s); --r: 6deg; }

  .subtitle {
    margin: 10px 0 0 0;
    color: #E6A500;
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 14px;
    padding-left: 14px;
    opacity: 0;
    animation: fadeIn 0.8s calc(var(--intro-delay) + 2.75s) forwards;
  }

  /* ===== コピーアーチ ===== */
  .copy-arch {
    position: absolute;
    top: 30px;
    left: 0;
    width: 100%;
    height: 180px;
    z-index: 34;
    pointer-events: none;
  }

  .copy-text {
    position: absolute;
    top: 98px;
    left: 0;
    width: 100%;
    text-align: center;
  }

  .copy-en {
    color: #FF7EB3;
    font-family: 'Fredoka', 'Arial Rounded MT Bold', sans-serif;
    font-size: 31px;
    font-weight: 700;
    letter-spacing: 1.2px;
    opacity: 0;
    transform: translateY(10px) scale(0.96);
    animation: copyFadeUp 0.9s calc(var(--intro-delay) + 2.72s) cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .copy-ja {
    margin-top: 7px;
    color: #D99000;
    font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 1.4px;
    opacity: 0;
    transform: translateY(10px) scale(0.96);
    animation: copyFadeUp 0.9s calc(var(--intro-delay) + 2.94s) cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .arch-mark {
    position: absolute;
    opacity: 0;
    width: var(--s);
    height: var(--s);
    transform: translateY(14px) scale(0.2) rotate(calc(var(--rot) - 22deg));
    animation: archMarkPop 0.82s var(--d) cubic-bezier(0.22, 1.45, 0.36, 1) forwards;
    will-change: transform, opacity;
  }

  .arch-mark svg {
    width: 100%;
    height: 100%;
    overflow: visible;
    display: block;
  }

  .arch-mark svg path {
    stroke: #1a1a1a;
    stroke-width: 7;
    stroke-linejoin: round;
    stroke-linecap: round;
  }

  .arch-1 { left: 118px; top: 78px; --s: 24px; --d: calc(var(--intro-delay) + 2.48s); --rot: -18deg; }
  .arch-2 { left: 178px; top: 42px; --s: 30px; --d: calc(var(--intro-delay) + 2.58s); --rot: -16deg; }
  .arch-3 { left: 260px; top: 18px; --s: 24px; --d: calc(var(--intro-delay) + 2.68s); --rot: -12deg; }
  .arch-4 { left: 334px; top: 8px; --s: 34px; --d: calc(var(--intro-delay) + 2.78s); --rot: 14deg; }
  .arch-5 { left: 416px; top: 20px; --s: 26px; --d: calc(var(--intro-delay) + 2.88s); --rot: 16deg; }
  .arch-6 { left: 492px; top: 44px; --s: 32px; --d: calc(var(--intro-delay) + 2.98s); --rot: -14deg; }
  .arch-7 { left: 562px; top: 80px; --s: 24px; --d: calc(var(--intro-delay) + 3.08s); --rot: -12deg; }

  /* ===== 最後に残る飾り ===== */
  .final-particles {
    position: absolute;
    inset: 0;
    z-index: 35;
    pointer-events: none;
  }

  .final-particle {
    position: absolute;
    width: 34px;
    height: 34px;
    opacity: 0;
    --rot: 0deg;
    transform: translateY(16px) scale(0.2) rotate(var(--rot));
    animation: finalPop 0.9s var(--d) cubic-bezier(0.22, 1.45, 0.36, 1) forwards;
    will-change: transform, opacity;
  }

  .final-particle svg {
    width: 100%;
    height: 100%;
    overflow: visible;
    display: block;
  }

  .final-particle svg path {
    stroke: #1a1a1a;
    stroke-width: 7;
    stroke-linejoin: round;
    stroke-linecap: round;
  }

  .final-1 { left: 558px; top: 500px; width: 38px; height: 38px; --d: calc(var(--intro-delay) + 2.52s); --rot: 14deg; }
  .final-2 { left: 88px; top: 470px; width: 34px; height: 34px; --d: calc(var(--intro-delay) + 2.64s); --rot: -16deg; }
  .final-3 { left: 150px; top: 548px; width: 30px; height: 30px; --d: calc(var(--intro-delay) + 2.76s); --rot: 12deg; }
  .final-4 { left: 592px; top: 454px; width: 36px; height: 36px; --d: calc(var(--intro-delay) + 2.88s); --rot: -18deg; }
  .final-5 { left: 232px; top: 468px; width: 30px; height: 30px; --d: calc(var(--intro-delay) + 3.00s); --rot: -10deg; }
  .final-6 { left: 468px; top: 444px; width: 32px; height: 32px; --d: calc(var(--intro-delay) + 3.12s); --rot: 18deg; }
  .final-7 { left: 418px; top: 548px; width: 26px; height: 26px; --d: calc(var(--intro-delay) + 3.24s); --rot: -14deg; }

  /* ===== Keyframes ===== */
  @keyframes helmetShadow {
    0%   { transform: translateX(-50%) scale(0.45); opacity: 0; }
    16%  { transform: translateX(-50%) scale(0.55); opacity: 0.08; }
    32%  { transform: translateX(-50%) scale(0.78); opacity: 0.18; }
    40%  { transform: translateX(-50%) scale(1.05); opacity: 0.34; }
    48%  { transform: translateX(-50%) scale(1.42); opacity: 0.58; }
    54%  { transform: translateX(-50%) scale(0.86); opacity: 0.24; }
    60%  { transform: translateX(-50%) scale(0.70); opacity: 0.12; }
    67%  { transform: translateX(-50%) scale(1.28); opacity: 0.42; }
    73%  { transform: translateX(-50%) scale(0.92); opacity: 0.24; }
    79%  { transform: translateX(-50%) scale(0.80); opacity: 0.14; }
    85%  { transform: translateX(-50%) scale(1.14); opacity: 0.32; }
    90%  { transform: translateX(-50%) scale(0.98); opacity: 0.22; }
    94%  { transform: translateX(-50%) scale(0.96); opacity: 0.18; }
    98%  { transform: translateX(-50%) scale(0.99); opacity: 0.08; }
    100% { transform: translateX(-50%) scale(1.02); opacity: 0; }
  }

  @keyframes helmetDrop {
    0%   { transform: translateX(-50%) translateY(-230px); opacity: 0; }
    8%   { transform: translateX(-50%) translateY(-210px); opacity: 0.18; }
    16%  { transform: translateX(-50%) translateY(-180px); opacity: 0.36; }
    24%  { transform: translateX(-50%) translateY(-140px); opacity: 0.55; }
    32%  { transform: translateX(-50%) translateY(-92px); opacity: 0.74; }
    40%  { transform: translateX(-50%) translateY(-42px); opacity: 0.92; }
    48%  { transform: translateX(-50%) translateY(0); opacity: 1; }
    54%  { transform: translateX(-50%) translateY(-26px); opacity: 1; }
    60%  { transform: translateX(-50%) translateY(-34px); opacity: 1; }
    67%  { transform: translateX(-50%) translateY(0); opacity: 1; }
    73%  { transform: translateX(-50%) translateY(-16px); opacity: 1; }
    79%  { transform: translateX(-50%) translateY(-20px); opacity: 1; }
    85%  { transform: translateX(-50%) translateY(0); opacity: 1; }
    90%  { transform: translateX(-50%) translateY(-7px); opacity: 1; }
    94%  { transform: translateX(-50%) translateY(-9px); opacity: 1; }
    98%  { transform: translateX(-50%) translateY(-2px); opacity: 1; }
    100% { transform: translateX(-50%) translateY(0); opacity: 1; }
  }

  @keyframes helmetPoyon {
    0%   { transform: rotate(-22deg) scale(0.96, 1.04); }
